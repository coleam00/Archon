# Docker Compose profiles:
# - Default (no profile): Starts archon-server, archon-mcp, and archon-frontend
# - Agents are opt-in: archon-agents starts only with the "agents" profile
# - Local DB: Use LOCAL_DB=true to run PostgreSQL + PostgREST locally instead of Supabase cloud
# Usage:
#   docker compose up                        # Starts server, mcp, frontend (agents disabled)
#   docker compose --profile agents up -d    # Also starts archon-agents
#   LOCAL_DB=true docker compose up -d       # Full stack with local database

services:
  # =====================================================
  # LOCAL DATABASE SERVICES (opt-in via LOCAL_DB=true)
  # =====================================================

  # PostgreSQL with pgvector extension
  archon-db:
    image: pgvector/pgvector:pg16
    container_name: archon-db
    profiles:
      - local-db
    ports:
      - "${LOCAL_DB_PORT:-5433}:5432"
    environment:
      - POSTGRES_USER=${LOCAL_DB_USER:-archon}
      - POSTGRES_PASSWORD=${LOCAL_DB_PASSWORD:-archon_password}
      - POSTGRES_DB=${LOCAL_DB_NAME:-archon}
    volumes:
      - archon-db-data:/var/lib/postgresql/data
      - ./local-db/complete_setup_local.sql:/docker-entrypoint-initdb.d/01_complete_setup.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_DB_USER:-archon} -d ${LOCAL_DB_NAME:-archon}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # PostgREST - exposes PostgreSQL as REST API (Supabase-compatible)
  archon-postgrest:
    image: postgrest/postgrest:latest
    container_name: archon-postgrest
    profiles:
      - local-db
    ports:
      - "${POSTGREST_PORT:-3001}:3000"
    environment:
      - PGRST_DB_URI=postgres://${LOCAL_DB_USER:-archon}:${LOCAL_DB_PASSWORD:-archon_password}@archon-db:5432/${LOCAL_DB_NAME:-archon}
      - PGRST_DB_SCHEMA=public
      - PGRST_DB_ANON_ROLE=${LOCAL_DB_USER:-archon}
      - PGRST_SERVER_PORT=3000
      - PGRST_DB_POOL=10
      - PGRST_DB_EXTRA_SEARCH_PATH=public,extensions
    networks:
      - app-network
    depends_on:
      archon-db:
        condition: service_healthy
    restart: unless-stopped

  # Lightweight proxy to map /rest/v1/ -> / (Supabase URL format compatibility)
  archon-postgrest-proxy:
    image: nginx:alpine
    container_name: archon-postgrest-proxy
    profiles:
      - local-db
    ports:
      - "${LOCAL_REST_PORT:-3002}:80"
    volumes:
      - ./local-db/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      - archon-postgrest
    restart: unless-stopped

  # =====================================================
  # CORE SERVICES
  # =====================================================

  # Server Service (FastAPI + Socket.IO + Crawling)
  archon-server:
    build:
      context: ./python
      dockerfile: Dockerfile.server
      args:
        BUILDKIT_INLINE_CACHE: 1
        ARCHON_SERVER_PORT: ${ARCHON_SERVER_PORT:-8181}
    container_name: archon-server
    ports:
      - "${ARCHON_SERVER_PORT:-8181}:${ARCHON_SERVER_PORT:-8181}"
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-http://archon-postgrest-proxy:${LOCAL_REST_PORT:-3002}}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-local-db-key}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN:-}
      - SERVICE_DISCOVERY_MODE=docker_compose
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ARCHON_SERVER_PORT=${ARCHON_SERVER_PORT:-8181}
      - ARCHON_MCP_PORT=${ARCHON_MCP_PORT:-8051}
      - ARCHON_AGENTS_PORT=${ARCHON_AGENTS_PORT:-8052}
      - AGENTS_ENABLED=${AGENTS_ENABLED:-false}
      - ARCHON_HOST=${HOST:-localhost}
      - LOCAL_DB=${LOCAL_DB:-false}
    networks:
      - app-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./python/src:/app/src
      - ./python/tests:/app/tests
      - ./migration:/app/migration
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "src.server.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "${ARCHON_SERVER_PORT:-8181}",
        "--reload",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:${ARCHON_SERVER_PORT:-8181}/health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Lightweight MCP Server Service (HTTP-based)
  archon-mcp:
    build:
      context: ./python
      dockerfile: Dockerfile.mcp
      args:
        BUILDKIT_INLINE_CACHE: 1
        ARCHON_MCP_PORT: ${ARCHON_MCP_PORT:-8051}
    container_name: archon-mcp
    ports:
      - "${ARCHON_MCP_PORT:-8051}:${ARCHON_MCP_PORT:-8051}"
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-http://archon-postgrest-proxy:${LOCAL_REST_PORT:-3002}}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-local-db-key}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN:-}
      - SERVICE_DISCOVERY_MODE=docker_compose
      - TRANSPORT=sse
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - API_SERVICE_URL=http://archon-server:${ARCHON_SERVER_PORT:-8181}
      - AGENTS_ENABLED=${AGENTS_ENABLED:-false}
      - AGENTS_SERVICE_URL=${AGENTS_SERVICE_URL:-http://archon-agents:${ARCHON_AGENTS_PORT:-8052}}
      - ARCHON_MCP_PORT=${ARCHON_MCP_PORT:-8051}
      - ARCHON_SERVER_PORT=${ARCHON_SERVER_PORT:-8181}
      - ARCHON_AGENTS_PORT=${ARCHON_AGENTS_PORT:-8052}
      - LOCAL_DB=${LOCAL_DB:-false}
    networks:
      - app-network
    depends_on:
      archon-server:
        condition: service_healthy

    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          'python -c "import socket; s=socket.socket(); s.connect((''localhost'', ${ARCHON_MCP_PORT:-8051})); s.close()"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # AI Agents Service (ML/Reranking)
  archon-agents:
    profiles:
      - agents
    build:
      context: ./python
      dockerfile: Dockerfile.agents
      args:
        BUILDKIT_INLINE_CACHE: 1
        ARCHON_AGENTS_PORT: ${ARCHON_AGENTS_PORT:-8052}
    container_name: archon-agents
    ports:
      - "${ARCHON_AGENTS_PORT:-8052}:${ARCHON_AGENTS_PORT:-8052}"
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-http://archon-postgrest-proxy:${LOCAL_REST_PORT:-3002}}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-local-db-key}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN:-}
      - SERVICE_DISCOVERY_MODE=docker_compose
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ARCHON_AGENTS_PORT=${ARCHON_AGENTS_PORT:-8052}
      - ARCHON_SERVER_PORT=${ARCHON_SERVER_PORT:-8181}
      - LOCAL_DB=${LOCAL_DB:-false}
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:${ARCHON_AGENTS_PORT:-8052}/health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  archon-frontend:
    build: ./archon-ui-main
    container_name: archon-ui
    ports:
      - "${ARCHON_UI_PORT:-3737}:3737"
    environment:
      - VITE_ARCHON_SERVER_PORT=${ARCHON_SERVER_PORT:-8181}
      - ARCHON_SERVER_PORT=${ARCHON_SERVER_PORT:-8181}
      - HOST=${HOST:-localhost}
      - PROD=${PROD:-false}
      - VITE_ALLOWED_HOSTS=${VITE_ALLOWED_HOSTS:-}
      - VITE_SHOW_DEVTOOLS=${VITE_SHOW_DEVTOOLS:-false}
      - DOCKER_ENV=true
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3737"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./archon-ui-main/src:/app/src
      - ./archon-ui-main/public:/app/public
    depends_on:
      archon-server:
        condition: service_healthy

networks:
  app-network:
    driver: bridge

volumes:
  archon-db-data:
