# =============================================================================
# Archon - Docker Compose
# =============================================================================
#
# Usage:
#   docker compose up -d                                  # App + local PostgreSQL (default)
#   docker compose --profile cloud up -d                  # App + local PostgreSQL + Caddy HTTPS reverse proxy
#   docker compose --profile cloud --profile auth up -d   # Add form-based auth
#
# Database:
#   Local PostgreSQL is started by default. The app connects to the bundled
#   postgres service unless DATABASE_URL is explicitly overridden in .env.
#   Default internal URL:
#     postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-archon}
#
# Data:
#   Set ARCHON_DATA in .env to control where Archon stores data on the host:
#     ARCHON_DATA=/opt/archon-data    # Any absolute path on the host
#   Default: Docker-managed volume (archon_data)
#
# Cloud (HTTPS):
#   1. Set DOMAIN=archon.example.com in .env
#   2. Point DNS A record to your server
#   3. Add --profile cloud — Caddy handles TLS automatically via Let's Encrypt
#

services:
  # -------------------------------------------------------------------------
  # Archon app (always runs)
  # -------------------------------------------------------------------------
  archon:
    build: .
    image: archon
    env_file: .env
    environment:
      ARCHON_DOCKER: "true"
      PORT: ${ARCHON_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-archon}}
      DEFAULT_AI_ASSISTANT: ${DEFAULT_AI_ASSISTANT:-claude}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MAX_CONCURRENT_CONVERSATIONS: ${MAX_CONCURRENT_CONVERSATIONS:-10}
    ports:
      - "${ARCHON_PORT:-3000}:${ARCHON_PORT:-3000}"
    volumes:
      - ${ARCHON_DATA:-archon_data}:/.archon
    networks:
      - archon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${ARCHON_PORT:-3000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    dns:
      - 8.8.8.8
      - 8.8.4.4
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    depends_on:
      postgres:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # PostgreSQL (default)
  # Set DATABASE_URL in .env only when you want the app to use an external DB.
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archon}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/000_combined.sql:/docker-entrypoint-initdb.d/000_combined.sql:ro
      - ./migrations:/migrations:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks:
      - archon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-archon}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Caddy reverse proxy with automatic HTTPS (optional: --profile cloud)
  # Requires DOMAIN set in .env. See Caddyfile for configuration.
  # -------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    profiles: ["cloud"]
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - archon-network
    depends_on:
      archon:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # Auth service — form-based login for Caddy forward_auth (optional: --profile auth)
  # Use alongside --profile cloud: docker compose --profile cloud --profile auth up -d
  # Requires AUTH_USERNAME, AUTH_PASSWORD_HASH, COOKIE_SECRET in .env.
  # See docs/docker.md for setup instructions.
  # -------------------------------------------------------------------------
  auth-service:
    build: ./auth-service
    profiles: ["auth"]
    restart: unless-stopped
    env_file: .env
    environment:
      AUTH_PORT: "${AUTH_SERVICE_PORT:-9000}"
    expose:
      - "${AUTH_SERVICE_PORT:-9000}"
    networks:
      - archon-network

volumes:
  archon_data:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  archon-network:
    driver: bridge
