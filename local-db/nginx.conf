events {
    worker_connections 1024;
}

http {
    upstream postgrest {
        server archon-postgrest:3000;
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;

        # Supabase-compatible REST API path
        # supabase-py sends requests to /rest/v1/table_name
        # PostgREST serves them at /table_name
        location /rest/v1/ {
            # Strip /rest/v1/ prefix
            rewrite ^/rest/v1/(.*) /$1 break;

            proxy_pass http://postgrest;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # PostgREST expects these headers
            proxy_set_header Accept "application/json";
            proxy_set_header Content-Type "application/json";
            proxy_set_header Prefer "return=representation";
        }

        # Direct RPC function calls
        # supabase-py sends RPC calls to /rest/v1/rpc/function_name
        location /rest/v1/rpc/ {
            rewrite ^/rest/v1/rpc/(.*) /rpc/$1 break;

            proxy_pass http://postgrest;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept "application/json";
            proxy_set_header Content-Type "application/json";
        }

        # Health check endpoint
        location /health {
            return 200 '{"status": "ok"}';
            add_header Content-Type application/json;
        }
    }
}
