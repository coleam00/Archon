# E2E smoke test — Pi provider with interactive plannotator plan mode
# Verifies: Pi loads plannotator extension, activates plan mode via
#   extensionFlags (equivalent to `pi --plan`), and surfaces plannotator's
#   browser UI URL to Archon via the bound ExtensionUIContext.
#
# Prerequisites (manual — not automated in CI):
#   1. `pi install npm:@plannotator/pi-extension`
#   2. `.archon/config.yaml` sets:
#        assistants:
#          pi:
#            enableExtensions: true
#            interactive: true
#            extensionFlags:
#              plan: true
#
# What this smoke test verifies:
#   - Pi session starts cleanly with extensions loaded
#   - extensionFlags: { plan: true } triggers plannotator's planning phase
#     (equivalent to `pi --plan` on the CLI)
#   - plannotator exposes the plannotator_submit_plan tool
#   - The agent writes a plan and calls plannotator_submit_plan
#   - Plannotator's `ctx.ui.notify()` output (the browser URL) reaches the
#     Archon event stream as a system chunk
#
# Provider: Uses openai-codex/gpt-5.4-mini — cheap, fast, and backed by
# the ChatGPT Plus OAuth in ~/.pi/agent/auth.json (no API keys needed).
#
# Auth: Picks up openai-codex OAuth from `pi /login` (ChatGPT Plus).
name: e2e-plannotator-smoke
description: 'Smoke test — Pi with plannotator plan mode activated via extensionFlags.'
provider: pi
model: openai-codex/gpt-5.4-mini

nodes:
  - id: plan-mode-prompt
    prompt: |
      Write a short plan (3 checkbox items) for adding a dark-mode toggle to a
      React app, then call the plannotator_submit_plan tool to submit it for
      review. Do not start implementing — this is plan mode only.
    # 10-minute idle gate: plannotator's `waitForDecision()` blocks the Pi
    # session indefinitely while a human reviews the plan in the browser UI.
    # The default (a shorter timeout) would disposer the session — and shut
    # down plannotator's HTTP server — before the reviewer can click Approve,
    # so bump this high enough for a comfortable review + approve cycle.
    idle_timeout: 600000

  - id: assert-url-emitted
    bash: |
      output="$plan-mode-prompt.output"
      if [ -z "$output" ]; then
        echo "FAIL: plan-mode-prompt returned empty output"
        exit 1
      fi
      if echo "$output" | grep -qE 'https?://[^[:space:]]+'; then
        url=$(echo "$output" | grep -oE 'https?://[^[:space:]]+' | head -1)
        echo "PASS: plannotator emitted review URL: $url"
        echo "$url" > "$ARTIFACTS_DIR/plannotator-url.txt"
      else
        echo "FAIL: no URL found in plan-mode-prompt output"
        echo "---- output follows ----"
        echo "$output"
        exit 1
      fi
    depends_on: [plan-mode-prompt]
