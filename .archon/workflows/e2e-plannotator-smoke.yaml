# E2E smoke test — Pi provider with plannotator plan mode, reject-revise-approve loop.
#
# What this proves end-to-end (validated in a real run against plannotator
# v0.x with a human clicking through the review UI — see PR #1299):
#   1. Pi loads plannotator via its extension runtime (reload + bindExtensions)
#   2. `extensionFlags: { plan: true }` activates plan mode
#      (equivalent to `pi --plan` on the CLI)
#   3. plannotator_submit_plan tool becomes available; the agent writes and
#      submits a plan
#   4. plannotator emits its review URL via `ctx.ui.notify()`, which the
#      ExtensionUIContext stub surfaces as an assistant chunk — so it lands
#      in the user's stream AND in `$plan-and-review.output`
#   5. When the reviewer rejects with an annotation, plannotator returns the
#      feedback to Pi as a tool result; Pi iterates automatically, writes a
#      revised plan, and calls plannotator_submit_plan again — the revised
#      plan appears in the review UI with a +/- diff against the prior version
#   6. On approval, Pi's session completes and the node finishes
#
# Known limitation: plannotator's tool result signals approval status but does
# NOT return the approved plan text. So the approved plan cannot be fed to a
# downstream node via `$plan-and-review.output` — only the review URL and Pi's
# final assistant message end up there. Use a separate Write step or fetch the
# plan file from plannotator's `/plan` endpoint if a downstream node needs it.
#
# Prerequisites (manual):
#   1. `pi install npm:@plannotator/pi-extension`
#   2. `.archon/config.yaml` sets:
#        assistants:
#          pi:
#            enableExtensions: true
#            interactive: true
#            extensionFlags:
#              plan: true
#   3. Export `PLANNOTATOR_REMOTE=1` in your shell before starting Archon
#      (or set it in the codebase `env:` block in .archon/config.yaml).
#      This is plannotator-specific: it forces plannotator's `openBrowser()`
#      to take the "remote session" path and emit its URL via `ctx.ui.notify()`
#      instead of spawning `xdg-open`/`start` on the Archon server host.
#      Without it, the URL never reaches Archon's event stream.
#
# Provider: openai-codex/gpt-5.4-mini — cheap, ChatGPT Plus OAuth compatible
# (gpt-5.1-codex-mini is Codex-CLI-only and fails on the Plus tier).
name: e2e-plannotator-smoke
description: 'Smoke test — Pi with plannotator plan mode + full plan-review-implement loop.'
provider: pi
model: openai-codex/gpt-5.4-mini

nodes:
  - id: plan-and-review
    prompt: |
      Write a short plan (3 checkbox items) for adding a dark-mode toggle to a
      React app. Then call the plannotator_submit_plan tool to submit it for
      review.

      If the reviewer rejects with feedback, revise the plan to address the
      feedback and resubmit. Repeat until approved.

      Do not start implementing — this is plan mode only.
    # plannotator's waitForDecision() blocks the Pi session indefinitely while
    # a human reviews. Default idle_timeout (2 min) would disposer the session
    # and kill plannotator's HTTP server before approve. Bump high enough for
    # a review + feedback iteration + approve cycle.
    idle_timeout: 1800000 # 30 min

  - id: assert-url-emitted
    bash: |
      output="$plan-and-review.output"
      if [ -z "$output" ]; then
        echo "FAIL: plan-and-review returned empty output"
        exit 1
      fi
      # All we can assert from this node's output is that plannotator's
      # notify() URL reached the stream. The approved plan content is NOT in
      # the tool result (plannotator returns an approval signal, not text);
      # downstream nodes that need the plan must fetch it separately.
      if echo "$output" | grep -qE 'https?://[^[:space:]]+'; then
        url=$(echo "$output" | grep -oE 'https?://[^[:space:]]+' | head -1)
        echo "PASS: plannotator emitted review URL: $url"
        echo "$url" > "$ARTIFACTS_DIR/plannotator-url.txt"
      else
        echo "FAIL: no review URL found — plannotator's notify() never reached the stream"
        echo "---- output follows ----"
        echo "$output"
        exit 1
      fi
    depends_on: [plan-and-review]
