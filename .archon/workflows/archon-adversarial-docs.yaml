name: adversarial-docs
description: |
  Use when: Creating documentation that must survive hostile interpretation — client
            deliverables, tutorials, guides, API docs, research reports.
  Triggers: "adversarial docs", "bulletproof documentation", "stress test this doc",
            "documentation that survives users", "client-ready report".
  Does: Writer creates section → Adversarial Reader attacks (finds ambiguities, gaps,
        untestable claims, missing evidence) → Writer revises → repeat until passes.
  NOT for: Quick drafts, internal notes, documentation you'll personally maintain.

  Adapted from adversarial-dev. The adversarial reader's job is to BREAK the documentation by:
  - Finding ambiguous statements that could be misinterpreted
  - Identifying missing evidence or unsupported claims
  - Challenging assumptions about reader knowledge
  - Reading as a skeptical, busy, distracted client

provider: claude
model: sonnet

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: SPECIFICATION
  # Define what we're documenting and success criteria
  # ═══════════════════════════════════════════════════════════════

  - id: create-spec
    prompt: |
      You are a documentation strategist preparing to create a high-stakes document.

      **User request**: $ARGUMENTS

      Your job is to create a specification that will guide both the writer and the
      adversarial reviewer. This spec becomes the CONTRACT — the document must satisfy it.

      ## Gather Context First

      Before writing the spec, explore:
      1. Read any existing files in the current directory that provide context
      2. Understand the domain and audience
      3. Identify what claims will need evidence

      ## Write the Specification

      **Write to `$ARTIFACTS_DIR/doc-spec.md`:**

      # Document Specification

      ## Overview
      - **Document type**: (Report, Tutorial, Guide, Reference, Proposal)
      - **Purpose**: What should the reader understand or be able to do after reading?
      - **Audience**: Who is reading? What do they know? What are they skeptical about?

      ## Sections

      For each section:
      ### Section N: {Title}
      - **Purpose**: What this section accomplishes
      - **Prerequisites**: What the reader must know first
      - **Success criteria**: Specific, testable requirements. Examples:
        - "Every claim has cited evidence or explicit reasoning"
        - "A skeptical reader cannot find logical gaps"
        - "Technical terms are defined before use"
        - "Recommendations include trade-offs, not just benefits"

      ## Anti-Goals
      What we are explicitly NOT trying to do. (Prevents scope creep)

      ## Evidence Standards
      What counts as sufficient evidence for claims in this document?
      - Primary sources required?
      - Expert opinion acceptable?
      - Quantitative data needed?

      ---

      After writing the spec, summarize it and confirm with the user before proceeding.
    allowed_tools: [Read, Write, Glob, Grep, Bash]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: WORKSPACE SETUP
  # ═══════════════════════════════════════════════════════════════

  - id: init-workspace
    depends_on: [create-spec]
    bash: |
      mkdir -p "$ARTIFACTS_DIR/drafts"
      mkdir -p "$ARTIFACTS_DIR/attacks"
      mkdir -p "$ARTIFACTS_DIR/final"

      # Extract section count from spec (count "### Section" headers)
      SECTION_COUNT=$(grep -c "^### Section" "$ARTIFACTS_DIR/doc-spec.md" 2>/dev/null || echo "3")
      if [ "$SECTION_COUNT" -lt 1 ]; then
        SECTION_COUNT=3
      fi
      if [ "$SECTION_COUNT" -gt 20 ]; then
        SECTION_COUNT=20
      fi

      # Initialize state machine
      cat > "$ARTIFACTS_DIR/state.json" << STATEEOF
      {
        "phase": "writing",
        "section": 1,
        "totalSections": $SECTION_COUNT,
        "retry": 0,
        "maxRetries": 3,
        "passThreshold": 7,
        "completedSections": [],
        "status": "running"
      }
      STATEEOF

      echo "Workspace initialized."
      echo "Sections to write: $SECTION_COUNT"
      echo "Pass threshold: 7/10"
      echo "Max retries per section: 3"
    timeout: 30000

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: ADVERSARIAL LOOP
  # Writer and Attacker alternate with fresh context
  # ═══════════════════════════════════════════════════════════════

  - id: adversarial-loop
    depends_on: [init-workspace]
    idle_timeout: 600000
    loop:
      prompt: |
        # Adversarial Documentation Loop

        You play ONE of two roles each iteration, determined by the state file.

        ## FIRST: Read State

        Read `$ARTIFACTS_DIR/state.json` to determine:
        - `phase`: "writing" or "attacking"
        - `section`: current section number (1-indexed)
        - `totalSections`: how many sections total
        - `retry`: current attempt (0 = first try)
        - `passThreshold`: minimum score to pass (default 7)

        Read `$ARTIFACTS_DIR/doc-spec.md` for the full specification.

        ---

        ## ROLE: WRITER (phase = "writing")

        Write the current section of the document.

        **Read these files:**
        1. `$ARTIFACTS_DIR/doc-spec.md` — find "Section {N}" for requirements
        2. Previous sections in `$ARTIFACTS_DIR/drafts/` for continuity
        3. If `retry > 0`: read `$ARTIFACTS_DIR/attacks/section-{section}-round-{retry-1}.md`
           for the attacker's feedback — address EVERY issue

        **Writing principles:**
        - Follow the spec's success criteria exactly
        - Every claim needs evidence or explicit reasoning
        - Define terms before using them
        - State assumptions explicitly — the attacker WILL challenge them
        - Anticipate skepticism — what would a doubter ask?
        - Be precise — ambiguity is a failure mode

        **If this is a RETRY:**
        The attacker found problems. Read their feedback carefully.
        - For each failed criterion, directly address the issue
        - Don't just add words — fix the underlying problem
        - If they said "no evidence for X", add evidence or remove the claim

        **Write to**: `$ARTIFACTS_DIR/drafts/section-{section}-v{retry + 1}.md`

        Use this format:
        ```markdown
        # Section {N}: {Title from spec}

        {Content that meets all success criteria}
        ```

        **Update state.json**: Set `"phase": "attacking"`. Keep all other fields unchanged.

        ---

        ## ROLE: ATTACKER (phase = "attacking")

        You are an ADVERSARIAL READER. Your job is to BREAK this document.

        **Your persona**: You are a skeptical, busy client who:
        - Has been burned by consultants before
        - Questions every claim: "How do you know that?"
        - Skims first, reads details only if the skim passes
        - Has no patience for hand-waving or unsupported assertions
        - Actively looks for reasons to distrust

        **Read**:
        1. `$ARTIFACTS_DIR/doc-spec.md` — the success criteria for this section
        2. `$ARTIFACTS_DIR/drafts/section-{section}-v{version}.md` — the draft to attack

        **Attack vectors:**

        1. **Evidence attacks**: Challenge every claim.
           - "You say X is true — where's your evidence?"
           - "This recommendation assumes Y — have you verified Y?"
           - "What's your source for this statistic?"

        2. **Logic attacks**: Find reasoning gaps.
           - "You jumped from A to C — what about B?"
           - "This doesn't follow — why would X lead to Y?"
           - "You're asserting causation from correlation"

        3. **Ambiguity attacks**: Find unclear statements.
           - "What do you mean by 'significant'? Quantify it."
           - "'Several factors' — which factors specifically?"
           - "This could be read two ways — which do you mean?"

        4. **Skeptic attacks**: Play devil's advocate.
           - "What if the opposite is true?"
           - "You're only presenting the upside — what are the risks?"
           - "This sounds like what everyone says — what's actually new?"

        5. **Skim attacks**: Test surface readability.
           - Do the headers alone tell a coherent story?
           - Can I understand the key points in 30 seconds?
           - Is there a clear takeaway?

        **Score each success criterion from the spec (1-10):**
        - **9-10**: Bulletproof. Survives aggressive skepticism.
        - **7-8**: Solid. Minor issues at most. A skeptic would accept it.
        - **5-6**: Weak. A skeptical reader would push back hard.
        - **3-4**: Poor. Clear gaps in evidence or logic.
        - **1-2**: Broken. Missing or fundamentally flawed.

        **IMPORTANT**: Score STRICTLY. A 7 means "genuinely good enough for a skeptical client."
        Do not grade on a curve. Do not give benefit of the doubt.

        **Write attack report to**: `$ARTIFACTS_DIR/attacks/section-{section}-round-{retry}.md`

        Format:
        ```markdown
        # Attack Report: Section {N}, Round {retry}

        ## Overall: PASS / FAIL
        (PASS only if ALL criteria >= 7)

        ## Scores

        | Criterion | Score | Assessment |
        |-----------|-------|------------|
        | {criterion from spec} | {1-10} | {one-line assessment} |

        ## Detailed Findings

        ### {Criterion 1}
        **Score**: {N}/10
        **Issue**: {What's wrong}
        **Evidence**: "{Quote from the draft that shows the problem}"
        **Required fix**: {Specific action the writer must take}

        ### {Criterion 2}
        ...

        ## Summary for Writer
        {What must change for this section to pass}
        ```

        **Update state.json based on result:**

        **If PASSED (all criteria >= passThreshold):**
        - Add current section to `completedSections` array
        - If `section < totalSections`: set `"phase": "writing"`, increment `section`, set `"retry": 0`
        - If `section == totalSections`: set `"status": "complete"`

        **If FAILED (any criterion < passThreshold):**
        - If `retry < maxRetries`: set `"phase": "writing"`, increment `retry`
        - If `retry >= maxRetries`: set `"status": "failed"` (section failed after max attempts)

        ---

        ## COMPLETION

        After updating state.json, check the `status` field:
        - If `"status": "complete"` → all sections passed! Output: `ADVERSARIAL_DOCS_COMPLETE`
        - If `"status": "failed"` → a section failed after max retries. Output: `ADVERSARIAL_DOCS_COMPLETE`
        - If `"status": "running"` → more work to do. Do NOT output any completion signal.

      until: ADVERSARIAL_DOCS_COMPLETE
      max_iterations: 60
      fresh_context: true
      until_bash: |
        grep -qE '"status"\s*:\s*"(complete|failed)"' "$ARTIFACTS_DIR/state.json"

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: ASSEMBLY
  # Combine sections into final document
  # ═══════════════════════════════════════════════════════════════

  - id: assemble
    depends_on: [adversarial-loop]
    trigger_rule: all_done
    context: fresh
    prompt: |
      Assemble the final document from completed sections.

      ## Instructions

      1. Read `$ARTIFACTS_DIR/state.json` to see final status and completed sections
      2. For each section, find the highest-version draft in `$ARTIFACTS_DIR/drafts/`
      3. Combine into `$ARTIFACTS_DIR/final/document.md`
      4. Add a title and table of contents
      5. Ensure smooth transitions between sections
      6. Verify internal consistency (no contradictions between sections)

      ## If any sections failed (hit max retries):

      - Include the best available draft with a warning banner:
        ```
        > **Note**: This section did not pass adversarial review after 3 attempts.
        > See `$ARTIFACTS_DIR/attacks/section-N-round-2.md` for outstanding issues.
        ```

      ## Quality Report

      After assembling, write a quality report to `$ARTIFACTS_DIR/final/quality-report.md`:

      - Sections that passed on first attempt
      - Sections that required retries (and how many)
      - Sections that failed (if any)
      - Overall quality assessment
      - Recommendations for further improvement

      Output the final document path and a summary.
    allowed_tools: [Read, Write, Glob, Grep]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 5: FINAL REPORT
  # ═══════════════════════════════════════════════════════════════

  - id: report
    depends_on: [assemble]
    context: fresh
    model: haiku
    prompt: |
      Generate a brief completion report for the user.

      Read:
      - `$ARTIFACTS_DIR/state.json` — final state
      - `$ARTIFACTS_DIR/final/quality-report.md` — quality summary

      Output a concise summary:
      1. Final status (complete/failed)
      2. Sections completed vs attempted
      3. Total adversarial rounds required
      4. Location of final document
      5. Any caveats or recommendations

      Keep it brief — the user wants to know if it's done and where to find it.
    allowed_tools: [Read, Glob]
