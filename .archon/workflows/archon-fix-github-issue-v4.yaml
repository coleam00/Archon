name: archon-fix-github-issue-v4
description: |
  V4 of archon-fix-github-issue. Identical to v3 plus a final `enable-automerge`
  node that turns on GitHub auto-merge once all v3 signals are green. The PR
  still merges through normal CI — auto-merge just removes the "human clicks
  merge button" step. If any required check fails, the PR sits and waits.

  v4 = v3 +
    - enable-automerge   — opt-in via ARCHON_AUTOMERGE_ENABLED=1; gated on
                           workflow signals + diff size + issue type + label.
                           Falls back to "leave as ready, comment why not" on
                           any guard failure.

  v3 → v4 is the trust-graduation path. Stay on v3 until you've watched
  several runs and can predict where it goes wrong; switch to v4 once the
  workflow earns its automation. v4 is reversible (one env var off) and the
  per-PR `do-not-automerge` label always blocks.

  Requires the target repo to have:
  - .archon/regression-corpus.json   (bootstrapped via the runner; see Memexia for example)
  - scripts/run-regression-corpus.sh (the runner; portable bash + jq)

  Env vars (read at the enable-automerge node, not workflow start):
  - ARCHON_AUTOMERGE_ENABLED      — must be "1" to enable; default off (safety)
  - ARCHON_AUTOMERGE_MAX_DIFF     — max +/- lines for automerge eligibility (default 300)
  - ARCHON_AUTOMERGE_TYPES        — comma-separated issue_types eligible (default: bug,chore,documentation)
  - ARCHON_AUTOMERGE_STRATEGY     — squash | merge | rebase (default: squash)

  Per-PR opt-out: add the label `do-not-automerge` to the PR and v4 will skip
  automerge regardless of env vars.

  NOT for: production until validated against several real issues. v3 first.

provider: claude
model: sonnet

nodes:
  # ═══ PHASE 1: FETCH & CLASSIFY (identical to v2) ══════════════════
  - id: extract-issue-number
    prompt: |
      Find the GitHub issue number for this request.

      Request: $ARGUMENTS

      CRITICAL: Output ONLY the bare number with no quotes, no markdown, no explanation. Example: 709

  - id: fetch-issue
    bash: |
      set -euo pipefail
      ISSUE_NUM=$(echo "$extract-issue-number.output" | tr -d "'\"\`\n " | grep -oE '[0-9]+' | head -1)
      if [ -z "$ISSUE_NUM" ]; then
        echo "Failed to extract issue number" >&2; exit 1
      fi
      gh issue view "$ISSUE_NUM" --json title,body,labels,comments,state,url,author
    depends_on: [extract-issue-number]

  - id: dedup-check
    bash: |
      set -euo pipefail
      ISSUE_NUM=$(echo "$extract-issue-number.output" | tr -d "'\"\`\n " | grep -oE '[0-9]+' | head -1)
      MERGED=$(gh pr list --search "in:body \"closes #$ISSUE_NUM\" OR \"fixes #$ISSUE_NUM\" OR \"resolves #$ISSUE_NUM\"" --state merged --json number --jq 'length')
      if [ "$MERGED" -gt 0 ]; then
        echo "BLOCKED: issue #$ISSUE_NUM already has $MERGED merged PR(s)." >&2
        gh pr list --search "in:body \"closes #$ISSUE_NUM\" OR \"fixes #$ISSUE_NUM\" OR \"resolves #$ISSUE_NUM\"" --state merged --json number,title,url
        exit 1
      fi
    depends_on: [fetch-issue]

  - id: classify
    prompt: |
      You are an issue classifier. Analyze the GitHub issue below.

      ## Issue Content
      $fetch-issue.output

      | Type | Indicators |
      |------|------------|
      | bug | "broken", "error", "crash", stack traces, regression |
      | feature | "add", "new", "support", net-new capability |
      | enhancement | "improve", "extend", incremental |
      | refactor | "clean up", "simplify" |
      | chore | "deps", "upgrade", "CI/CD" |
      | documentation | "docs", "readme" |
    depends_on: [dedup-check]
    model: haiku
    allowed_tools: []
    output_format:
      type: object
      properties:
        issue_type:
          type: string
          enum: ["bug", "feature", "enhancement", "refactor", "chore", "documentation"]
        title: { type: string }
        reasoning: { type: string }
      required: [issue_type, title, reasoning]

  - id: web-research
    command: archon-web-research
    depends_on: [classify]
    context: fresh

  - id: investigate
    command: archon-investigate-issue
    depends_on: [classify, web-research]
    when: "$classify.output.issue_type == 'bug'"
    context: fresh

  - id: plan
    command: archon-create-plan
    depends_on: [classify, web-research]
    when: "$classify.output.issue_type != 'bug'"
    context: fresh

  # ─── ARTIFACT VERIFY GATES (added 2026-04-30 — same as v3) ───
  - id: investigate-verify
    bash: |
      set -euo pipefail
      if [ ! -s "$ARTIFACTS_DIR/investigation.md" ]; then
        echo "BLOCKED: investigate did not Write \$ARTIFACTS_DIR/investigation.md" >&2
        exit 1
      fi
    depends_on: [investigate]
    when: "$classify.output.issue_type == 'bug'"

  - id: plan-verify
    bash: |
      set -euo pipefail
      if [ ! -s "$ARTIFACTS_DIR/plan.md" ]; then
        echo "BLOCKED: plan did not Write \$ARTIFACTS_DIR/plan.md" >&2
        exit 1
      fi
    depends_on: [plan]
    when: "$classify.output.issue_type != 'bug'"

  - id: bridge-artifacts
    bash: |
      set -euo pipefail
      if [ -f "$ARTIFACTS_DIR/plan.md" ] && [ ! -f "$ARTIFACTS_DIR/investigation.md" ]; then
        cp "$ARTIFACTS_DIR/plan.md" "$ARTIFACTS_DIR/investigation.md"
      elif [ ! -f "$ARTIFACTS_DIR/investigation.md" ]; then
        echo "BLOCKED: no plan or investigation produced" >&2; exit 1
      fi
    depends_on: [investigate-verify, plan-verify]
    trigger_rule: one_success

  # ═══ NEW: PEER-PR CHECK ════════════════════════════════════════
  # Surfaces overlapping in-flight Archon PRs so the planner is aware of
  # parallel work on the same files. Soft signal — doesn't block; just
  # injects context the AI can use in self-checks below.
  - id: peer-pr-check
    bash: |
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR/peer-prs"

      # Extract files mentioned in plan/investigation (rough heuristic — match
      # paths that look like 'foo/bar.ts' or 'foo/bar/baz.ts')
      grep -oE '[a-zA-Z0-9_./-]+\.(ts|tsx|js|jsx|py|go|rs|md|yaml|yml|json)' \
        "$ARTIFACTS_DIR/investigation.md" 2>/dev/null \
        | sort -u > "$ARTIFACTS_DIR/peer-prs/this-pr-files.txt" || true

      if [ ! -s "$ARTIFACTS_DIR/peer-prs/this-pr-files.txt" ]; then
        echo "No file paths extractable from plan — skipping peer-PR check"
        exit 0
      fi

      # List open Archon PRs (head branches start with archon/)
      OPEN_PRS=$(gh pr list --search 'is:open head:archon/' --json number,title,headRefName,files --limit 30)
      if [ "$(echo "$OPEN_PRS" | jq 'length')" -eq 0 ]; then
        echo "No other in-flight Archon PRs" > "$ARTIFACTS_DIR/peer-prs/overlap.md"
        exit 0
      fi

      # Find overlap
      {
        echo "# In-flight Archon PRs touching files in this plan"
        echo ""
        echo "$OPEN_PRS" | jq -r '.[] | "## PR #\(.number) — \(.title)\nBranch: \(.headRefName)\nFiles:\n\(.files | map("- \(.path)") | join("\n"))\n"' | \
        while IFS= read -r line; do
          echo "$line"
        done
      } > "$ARTIFACTS_DIR/peer-prs/all-open.md"

      # Filter to those overlapping with this PR's files
      OVERLAP_FOUND=false
      while IFS= read -r my_file; do
        echo "$OPEN_PRS" | jq -c --arg f "$my_file" '.[] | select(.files | any(.path == $f))' | while IFS= read -r overlap_pr; do
          OVERLAP_FOUND=true
          echo "$overlap_pr" | jq -r '"⚠️  PR #\(.number) (\(.title)) also touches \($ENV.MY_FILE)"' MY_FILE="$my_file"
        done
      done < "$ARTIFACTS_DIR/peer-prs/this-pr-files.txt" > "$ARTIFACTS_DIR/peer-prs/overlap.md"

      if [ -s "$ARTIFACTS_DIR/peer-prs/overlap.md" ]; then
        echo "Found overlapping in-flight PRs (see $ARTIFACTS_DIR/peer-prs/overlap.md)"
        cat "$ARTIFACTS_DIR/peer-prs/overlap.md"
      else
        echo "No file overlap with other in-flight Archon PRs"
      fi
    depends_on: [bridge-artifacts]

  - id: plan-confidence-gate
    bash: |
      set -euo pipefail
      PLAN="$ARTIFACTS_DIR/investigation.md"
      SCORE=$(grep -iE "confidence.{0,15}score|^confidence:" "$PLAN" | grep -oE '[0-9]+(\.[0-9]+)?' | head -1 || echo "")
      if [ -z "$SCORE" ]; then
        echo "WARN: no Confidence Score in plan; proceeding"
        exit 0
      fi
      if awk -v s="$SCORE" 'BEGIN { exit (s < 7) ? 0 : 1 }'; then
        echo "BLOCKED: plan Confidence Score = $SCORE (< 7)" >&2; exit 1
      fi
      echo "Plan Confidence Score = $SCORE — proceeding"
    depends_on: [peer-pr-check]

  # ═══ NEW: CORPUS BASELINE ══════════════════════════════════════
  # Runs the regression corpus on the pre-change state. Captures which
  # assertions pass right now so corpus-verify can detect newly-failing ones
  # caused by this PR's changes (vs. assertions already failing for unrelated
  # reasons).
  - id: corpus-baseline
    bash: |
      set -euo pipefail
      if [ ! -f .archon/regression-corpus.json ]; then
        echo "No regression corpus in this repo — skipping baseline (v3 degrades to v2)"
        echo '{"corpus_present": false}' > "$ARTIFACTS_DIR/corpus-baseline.json"
        exit 0
      fi
      if [ ! -x scripts/run-regression-corpus.sh ]; then
        echo "Corpus file present but runner missing — skipping baseline" >&2
        echo '{"corpus_present": false, "runner_missing": true}' > "$ARTIFACTS_DIR/corpus-baseline.json"
        exit 0
      fi
      bash scripts/run-regression-corpus.sh --json > "$ARTIFACTS_DIR/corpus-baseline.json" || true
      echo "Baseline captured:"
      jq -r '"  passed: \(.passed)  failed: \(.failed)  total: \(.total)"' "$ARTIFACTS_DIR/corpus-baseline.json"
      jq -r '.failed_ids // [] | if length > 0 then "  pre-existing failures (will be ignored by corpus-verify): " + (. | join(", ")) else "" end' "$ARTIFACTS_DIR/corpus-baseline.json"
    depends_on: [plan-confidence-gate]

  # ═══ IMPLEMENT (identical to v2) ═══════════════════════════════
  - id: implement
    command: archon-fix-issue
    depends_on: [corpus-baseline]
    context: fresh
    model: opus[1m]

  - id: validate
    command: archon-validate
    depends_on: [implement]
    context: fresh

  - id: validate-gate
    bash: |
      set -euo pipefail
      if [ -f package.json ] && jq -e '.scripts.validate' package.json >/dev/null 2>&1; then
        bun run validate
      elif [ -f package.json ]; then
        bun run type-check 2>/dev/null || true
        bun run lint 2>/dev/null || true
        bun test 2>/dev/null || true
      fi
    depends_on: [validate]
    timeout: 600000

  - id: create-pr
    prompt: |
      Create a draft pull request for the current branch.

      ## Context
      - **Issue**: $ARGUMENTS
      - **Classification**: $classify.output

      ## Instructions
      1. `git status` — ensure all changes committed.
      2. `git push -u origin HEAD`
      3. Read $ARTIFACTS_DIR/{investigation,plan,implementation,validation}.md.
      4. `gh pr list --head $(git branch --show-current)` — capture if exists.
      5. Find PR template (.github/pull_request_template.md or PULL_REQUEST_TEMPLATE.md).
      6. `gh pr create --draft --base $BASE_BRANCH` — title <70 chars, imperative mood. `Closes #...`.
      7. Capture: `gh pr view --json number -q '.number' > $ARTIFACTS_DIR/.pr-number`.
    depends_on: [validate-gate]
    context: fresh

  # ═══ REVIEW (identical to v2 — 5 read-only reviewers) ═══════════
  - id: review-scope
    command: archon-pr-review-scope
    depends_on: [create-pr]
    context: fresh

  - id: review-classify
    prompt: |
      Determine which review agents should run.

      ## PR Scope
      $review-scope.output

      Rules: code-review ALWAYS runs. Others run when their domain is touched.
    depends_on: [review-scope]
    model: haiku
    allowed_tools: []
    context: fresh
    output_format:
      type: object
      properties:
        run_code_review:     { type: string, enum: ["true", "false"] }
        run_error_handling:  { type: string, enum: ["true", "false"] }
        run_test_coverage:   { type: string, enum: ["true", "false"] }
        run_comment_quality: { type: string, enum: ["true", "false"] }
        run_docs_impact:     { type: string, enum: ["true", "false"] }
        reasoning:           { type: string }
      required: [run_code_review, run_error_handling, run_test_coverage,
                 run_comment_quality, run_docs_impact, reasoning]

  - id: code-review
    command: archon-code-review-agent-v2
    depends_on: [review-classify]
    context: fresh
    denied_tools: [Edit]

  - id: error-handling
    command: archon-error-handling-agent-v2
    depends_on: [review-classify]
    when: "$review-classify.output.run_error_handling == 'true'"
    context: fresh
    denied_tools: [Edit]

  - id: test-coverage
    command: archon-test-coverage-agent-v2
    depends_on: [review-classify]
    when: "$review-classify.output.run_test_coverage == 'true'"
    context: fresh
    denied_tools: [Edit]

  - id: comment-quality
    command: archon-comment-quality-agent-v2
    depends_on: [review-classify]
    when: "$review-classify.output.run_comment_quality == 'true'"
    context: fresh
    denied_tools: [Edit]

  - id: docs-impact
    command: archon-docs-impact-agent-v2
    depends_on: [review-classify]
    when: "$review-classify.output.run_docs_impact == 'true'"
    context: fresh
    denied_tools: [Edit]

  - id: synthesize
    command: archon-synthesize-review-v2
    depends_on: [code-review, error-handling, test-coverage, comment-quality, docs-impact]
    trigger_rule: all_done
    context: fresh

  - id: pre-fix-gate
    bash: |
      set -euo pipefail
      SYNTH="$ARTIFACTS_DIR/review/synthesis.json"
      if [ ! -f "$SYNTH" ]; then echo "BLOCKED: synthesis.json missing" >&2; exit 1; fi
      AGENTS_COMPLETED=$(jq -r '.agents_completed // 0' "$SYNTH")
      if [ "$AGENTS_COMPLETED" -lt 2 ]; then
        echo "BLOCKED: only $AGENTS_COMPLETED reviewers succeeded" >&2; exit 1
      fi
      jq -r '"completed=\(.agents_completed) failed=\(.agents_failed) crit=\(.stats.critical) high=\(.stats.high)"' "$SYNTH"
    depends_on: [synthesize]

  - id: self-fix
    command: archon-self-fix-all-v2
    depends_on: [pre-fix-gate]
    context: fresh

  - id: re-review
    loop:
      prompt: |
        Verify fixes from $ARTIFACTS_DIR/review/fix-report.json actually resolved
        CRITICAL/HIGH findings in $ARTIFACTS_DIR/review/synthesis.json.

        For each blocking finding: run its `confirmation_check`, re-read fixed
        code (root cause vs symptom), look for newly-introduced issues.

        Write $ARTIFACTS_DIR/review/re-review.json:
        { "iteration": <n>, "verified_resolved": [...], "still_present": [...],
          "newly_introduced": [...], "unresolved_count": <int> }

        End with literal token <promise>RE_REVIEW_DONE</promise>.
      until: RE_REVIEW_DONE
      until_bash: |
        set -euo pipefail
        RR="$ARTIFACTS_DIR/review/re-review.json"
        [ -f "$RR" ] && [ "$(jq -r '.unresolved_count' "$RR")" = "0" ] && [ "$(jq -r '.newly_introduced | length' "$RR")" = "0" ]
      max_iterations: 2
      fresh_context: true
    depends_on: [self-fix]

  - id: post-fix-gate
    bash: |
      set -euo pipefail
      RR="$ARTIFACTS_DIR/review/re-review.json"
      if [ ! -f "$RR" ]; then echo "BLOCKED: re-review.json missing" >&2; exit 1; fi
      UNRESOLVED=$(jq -r '.unresolved_count // 999' "$RR")
      NEW=$(jq -r '.newly_introduced | length' "$RR")
      if [ "$UNRESOLVED" -gt 0 ] || [ "$NEW" -gt 0 ]; then
        PR=$(cat "$ARTIFACTS_DIR/.pr-number" 2>/dev/null || echo "")
        if [ -n "$PR" ]; then
          gh pr ready "$PR" --undo 2>/dev/null || true
          gh pr comment "$PR" --body "⚠️ Archon v3 review-loop: $UNRESOLVED unresolved + $NEW new findings. PR reverted to draft."
        fi
        exit 1
      fi
    depends_on: [re-review]

  # ═══ NEW: CORPUS VERIFY ════════════════════════════════════════
  # Re-runs the corpus and compares against baseline. Any assertion that was
  # passing before this PR but is now failing = silent regression caused by
  # this PR's changes. Hard block.
  - id: corpus-verify
    bash: |
      set -euo pipefail
      BASELINE="$ARTIFACTS_DIR/corpus-baseline.json"
      if [ ! -f "$BASELINE" ] || ! jq -e '.corpus_present // true' "$BASELINE" >/dev/null 2>&1; then
        if [ -f "$BASELINE" ] && [ "$(jq -r '.corpus_present' "$BASELINE")" = "false" ]; then
          echo "Corpus not present in repo — skipping verify"
          exit 0
        fi
      fi

      bash scripts/run-regression-corpus.sh --json > "$ARTIFACTS_DIR/corpus-after.json" || true

      # Find IDs that PASSED in baseline but FAILED after self-fix
      jq -n \
        --slurpfile baseline "$BASELINE" \
        --slurpfile after "$ARTIFACTS_DIR/corpus-after.json" \
        '
        ($baseline[0].results // []) as $bl |
        ($after[0].results // []) as $af |
        $bl | map(select(.status == "passed")) | map(.id) as $passed_before |
        $af | map(select(.status == "failed")) | map(.id) as $failed_after |
        $passed_before - ( $passed_before - $failed_after ) | length as $regressions_count |
        {
          baseline_passed: $passed_before,
          after_failed: $failed_after,
          regressions: ($passed_before | map(select(. as $id | $failed_after | index($id))))
        }' > "$ARTIFACTS_DIR/corpus-diff.json"

      REGRESSIONS=$(jq -r '.regressions | length' "$ARTIFACTS_DIR/corpus-diff.json")
      if [ "$REGRESSIONS" -gt 0 ]; then
        echo "BLOCKED: this PR regressed $REGRESSIONS previously-passing assertion(s):" >&2
        jq -r '.regressions[]' "$ARTIFACTS_DIR/corpus-diff.json" >&2
        PR=$(cat "$ARTIFACTS_DIR/.pr-number" 2>/dev/null || echo "")
        if [ -n "$PR" ]; then
          gh pr ready "$PR" --undo 2>/dev/null || true
          BODY="🚨 Archon v3 corpus-verify: this PR has regressed $REGRESSIONS previously-passing regression-corpus assertion(s):"$'\n'"$(jq -r '.regressions[] | "- " + .' "$ARTIFACTS_DIR/corpus-diff.json")"$'\n\n'"PR reverted to draft. Investigate before re-readying."
          gh pr comment "$PR" --body "$BODY"
        fi
        exit 1
      fi
      echo "Corpus verify: no regressions introduced by this PR"
    depends_on: [post-fix-gate]

  # ═══ SIMPLIFY ═══════════════════════════════════════════════════
  - id: simplify
    command: archon-simplify-changes
    depends_on: [corpus-verify]
    context: fresh

  # ═══ NEW: READY GATE — the no-Pro merge-queue substitute ═══════
  # Rebases onto latest base branch, re-runs corpus + validate, marks PR ready.
  # If something else has merged to base while we were working, we re-test
  # against the rebased state — catching regressions parallel workspaces would
  # otherwise introduce.
  - id: ready-gate
    bash: |
      set -euo pipefail
      PR=$(cat "$ARTIFACTS_DIR/.pr-number")
      # Archon's variable substitution clashes with bash ${VAR:-default} syntax
      # for known vars like BASE_BRANCH. Use a plain assignment + fallback instead.
      BASE="$BASE_BRANCH"
      [ -z "$BASE" ] && BASE=main

      echo "Rebasing onto origin/$BASE…"
      git fetch origin "$BASE"

      # Capture base-before-rebase to detect "did anything land while we worked"
      BASE_BEFORE=$(git merge-base HEAD origin/"$BASE")
      BASE_NOW=$(git rev-parse origin/"$BASE")
      if [ "$BASE_BEFORE" != "$BASE_NOW" ]; then
        echo "Base advanced from $BASE_BEFORE → $BASE_NOW while this PR was being prepared"
        echo "Rebasing to verify no parallel-workspace regression…"
      fi

      if ! git rebase origin/"$BASE"; then
        git rebase --abort 2>/dev/null || true
        gh pr comment "$PR" --body "⚠️ Archon v3 ready-gate: rebase onto $BASE failed. Manual conflict resolution needed."
        exit 1
      fi

      # Force-push the rebased branch
      git push --force-with-lease

      # Re-run corpus against rebased state
      if [ -x scripts/run-regression-corpus.sh ]; then
        if ! bash scripts/run-regression-corpus.sh; then
          gh pr comment "$PR" --body "🚨 Archon v3 ready-gate: regression corpus FAILED after rebase onto $BASE. A parallel PR may have introduced a regression to a different fix; this PR's changes may now interact with it. Holding in draft."
          exit 1
        fi
      fi

      # Re-run validate against rebased state
      if [ -f package.json ] && jq -e '.scripts.validate' package.json >/dev/null 2>&1; then
        if ! bun run validate; then
          gh pr comment "$PR" --body "🚨 Archon v3 ready-gate: validate FAILED after rebase. Holding in draft."
          exit 1
        fi
      fi

      # All good — mark ready
      gh pr ready "$PR"
      echo "PR #$PR rebased, corpus green, validate green, marked ready for human review"
    depends_on: [simplify]

  # ═══ NEW: UPDATE CORPUS ═══════════════════════════════════════
  # Append this PR's blocking findings' confirmation_checks to the corpus.
  # Runs only when the PR is actually merged (not just ready).
  # Note: this needs a follow-up trigger after merge — for now it stages a
  # patch and instructs the human/CI to commit it post-merge.
  - id: update-corpus
    command: archon-update-regression-corpus
    depends_on: [ready-gate]
    context: fresh

  # ═══ NEW IN V4: ENABLE-AUTOMERGE ═══════════════════════════════
  # Conservative auto-merge: only enables when ALL workflow signals are green
  # AND the PR meets eligibility criteria (size, type, no opt-out label).
  # GitHub will then merge the PR automatically once required CI checks pass.
  # If anything is borderline, leaves the PR as ready-for-review and posts a
  # comment explaining why automerge was withheld.
  - id: enable-automerge
    bash: |
      set -euo pipefail

      PR=$(cat "$ARTIFACTS_DIR/.pr-number")

      # ─── Guard 1: env-var opt-in ─────────────────────────────────────
      if [ "${ARCHON_AUTOMERGE_ENABLED:-0}" != "1" ]; then
        echo "Skipping automerge: ARCHON_AUTOMERGE_ENABLED is not '1' (set it to enable)"
        exit 0
      fi

      # ─── Guard 2: per-PR opt-out label ──────────────────────────────
      if gh pr view "$PR" --json labels --jq '.labels[].name' | grep -qx "do-not-automerge"; then
        echo "Skipping automerge: PR has 'do-not-automerge' label"
        gh pr comment "$PR" --body "ℹ️ Archon v4: automerge skipped (do-not-automerge label set). PR is ready for human merge."
        exit 0
      fi

      # ─── Guard 3: workflow signals must all be green ─────────────────
      RR="$ARTIFACTS_DIR/review/re-review.json"
      if [ ! -f "$RR" ]; then
        echo "Skipping automerge: re-review.json missing (workflow may have degraded)"
        exit 0
      fi
      UNRESOLVED=$(jq -r '.unresolved_count // 999' "$RR")
      NEW=$(jq -r '.newly_introduced | length' "$RR")
      if [ "$UNRESOLVED" != "0" ] || [ "$NEW" != "0" ]; then
        echo "Skipping automerge: re-review unresolved=$UNRESOLVED newly_introduced=$NEW"
        gh pr comment "$PR" --body "ℹ️ Archon v4: automerge withheld — re-review reports $UNRESOLVED unresolved + $NEW newly-introduced findings. Human merge required."
        exit 0
      fi

      DIFF_FILE="$ARTIFACTS_DIR/corpus-diff.json"
      if [ -f "$DIFF_FILE" ]; then
        REGRESSIONS=$(jq -r '.regressions | length' "$DIFF_FILE")
        if [ "$REGRESSIONS" != "0" ]; then
          echo "Skipping automerge: corpus-diff reports $REGRESSIONS regressions"
          exit 0
        fi
      fi

      # ─── Guard 4: diff size threshold ───────────────────────────────
      MAX_DIFF=${ARCHON_AUTOMERGE_MAX_DIFF:-300}
      DIFF_TOTAL=$(gh pr view "$PR" --json additions,deletions --jq '.additions + .deletions')
      if [ "$DIFF_TOTAL" -gt "$MAX_DIFF" ]; then
        echo "Skipping automerge: diff size $DIFF_TOTAL > $MAX_DIFF (set ARCHON_AUTOMERGE_MAX_DIFF to raise)"
        gh pr comment "$PR" --body "ℹ️ Archon v4: automerge withheld — diff is $DIFF_TOTAL lines (threshold: $MAX_DIFF). Larger changes prefer human merge."
        exit 0
      fi

      # ─── Guard 5: issue-type eligibility ────────────────────────────
      ELIGIBLE_TYPES=${ARCHON_AUTOMERGE_TYPES:-bug,chore,documentation}
      ISSUE_TYPE=$(echo '$classify.output' | jq -r '.issue_type // ""')
      if [ -z "$ISSUE_TYPE" ]; then
        echo "Skipping automerge: classifier output missing"
        exit 0
      fi
      if ! echo ",$ELIGIBLE_TYPES," | grep -q ",$ISSUE_TYPE,"; then
        echo "Skipping automerge: issue_type '$ISSUE_TYPE' not in eligible list ($ELIGIBLE_TYPES)"
        gh pr comment "$PR" --body "ℹ️ Archon v4: automerge withheld — issue_type '$ISSUE_TYPE' is not in the auto-eligible list ($ELIGIBLE_TYPES). Human merge required for this change category."
        exit 0
      fi

      # ─── All guards passed: enable GitHub auto-merge ─────────────────
      STRATEGY=${ARCHON_AUTOMERGE_STRATEGY:-squash}
      case "$STRATEGY" in
        squash|merge|rebase) ;;
        *)
          echo "Invalid ARCHON_AUTOMERGE_STRATEGY '$STRATEGY' (must be squash|merge|rebase) — defaulting to squash"
          STRATEGY=squash
          ;;
      esac

      gh pr merge "$PR" --auto --"$STRATEGY"
      gh pr comment "$PR" --body "✅ Archon v4: automerge enabled — PR will merge once required CI checks pass. (strategy: $STRATEGY, diff: $DIFF_TOTAL lines, issue_type: $ISSUE_TYPE)"
      echo "Auto-merge enabled for PR #$PR (strategy: $STRATEGY)"
    depends_on: [update-corpus]

  - id: report
    command: archon-issue-completion-report
    depends_on: [enable-automerge]
    context: fresh
