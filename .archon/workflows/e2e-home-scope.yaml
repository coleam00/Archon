# E2E smoke test — home-scoped workflow discovery
# Verifies: a workflow placed at ~/.archon/workflows/ is discoverable from any
# repo. Also asserts the expected filesystem path and that the deprecation
# warning for the legacy path does NOT fire from an e2e-owned file alone.
#
# `worktree: enabled: false` keeps this run in the live checkout (no worktree
# created) so the smoke is deterministic and fast.
name: e2e-home-scope
description: "Home-scope discovery smoke. Asserts ~/.archon/workflows/ is read from any cwd."
worktree:
  enabled: false
nodes:
  - id: echo
    bash: "echo 'home-scope-smoke-ok'"
