name: archon-fix-jira-bug
description: |
  Use when: User wants to FIX or RESOLVE a JIRA bug ticket.
  Triggers: "fix jira bug", "fix PROJ-123", "resolve jira ticket", "fix this jira bug".
  NOT for: Non-bug JIRA tickets (Stories, Tasks, Epics), GitHub issues (use archon-fix-github-issue),
           questions about tickets, PR reviews, general exploration.

  Requires environment variables: JIRA_BASE_URL, JIRA_USER, JIRA_API_TOKEN.

  DAG workflow that:
  1. Fetches the JIRA bug ticket and validates it is type Bug
  2. Transitions ticket to "In Progress"
  3. Researches context (web research + codebase exploration)
  4. Investigates root cause and writes investigation plan
  5. Implements the fix with validation
  6. Creates a draft PR with JIRA ticket link for bidirectional traceability
  7. Transitions ticket to "In Review" and links PR in JIRA
  8. Runs smart review (always code review + CLAUDE.md check, conditional additional agents)
  9. Aggressively self-fixes all findings (tests, docs, error handling)
  10. Simplifies changed code
  11. Posts completion report as JIRA comment

provider: claude
model: sonnet

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: FETCH & VALIDATE
  # ═══════════════════════════════════════════════════════════════

  - id: extract-issue-key
    prompt: |
      Extract the JIRA issue key from this request: $ARGUMENTS

      Rules:
      - If the message contains an explicit JIRA key (e.g., "PROJ-123", "MYTEAM-456"), extract it exactly.
      - JIRA keys follow the pattern: one or more uppercase letters, a dash, one or more digits (e.g., ABC-123).
      - If no explicit key is found, respond with: ERROR: no JIRA key found in input.

      CRITICAL: Your final output must be ONLY the bare key with no quotes, no markdown, no explanation.
      Example correct output: PROJ-123

  - id: fetch-jira-issue
    bash: |
      KEY=$(echo "$extract-issue-key.output" | tr -d ' \n\t' | grep -oE '[A-Z]+-[0-9]+' | head -1)
      if [ -z "$KEY" ]; then
        echo "Failed to parse JIRA key from: $extract-issue-key.output" >&2
        exit 1
      fi

      RESPONSE=$(curl -s -w "\n%{http_code}" \
        -u "$JIRA_USER:$JIRA_API_TOKEN" \
        "$JIRA_BASE_URL/rest/api/3/issue/$KEY" \
        -H "Accept: application/json")

      HTTP_CODE=$(echo "$RESPONSE" | tail -1)
      BODY=$(echo "$RESPONSE" | head -n -1)

      if [ "$HTTP_CODE" != "200" ]; then
        echo "JIRA API returned HTTP $HTTP_CODE for $KEY. Check JIRA_BASE_URL, JIRA_USER, JIRA_API_TOKEN." >&2
        echo "$BODY" >&2
        exit 1
      fi

      mkdir -p "$ARTIFACTS_DIR"
      echo "$BODY" > "$ARTIFACTS_DIR/jira-issue.json"
      echo "$BODY"
    depends_on: [extract-issue-key]

  # Validates issue type is Bug, saves key, transitions to In Progress.
  # Fails fast (exit 1) if the ticket is not a Bug type.
  # Status transition is best-effort — continues if "In Progress" transition is unavailable.
  - id: validate-and-start
    bash: |
      KEY=$(echo "$extract-issue-key.output" | tr -d ' \n\t' | grep -oE '[A-Z]+-[0-9]+' | head -1)
      echo "$KEY" > "$ARTIFACTS_DIR/.jira-key"

      ISSUE_TYPE=$(jq -r '.fields.issuetype.name' "$ARTIFACTS_DIR/jira-issue.json")
      NORMALIZED=$(echo "$ISSUE_TYPE" | tr '[:upper:]' '[:lower:]')

      if ! echo "$NORMALIZED" | grep -qE '^(bug|defect)$'; then
        echo "Ticket $KEY is type '$ISSUE_TYPE' — this workflow only handles Bug tickets." >&2
        echo "For features/enhancements use archon-fix-github-issue or a feature workflow." >&2
        exit 1
      fi

      SUMMARY=$(jq -r '.fields.summary' "$ARTIFACTS_DIR/jira-issue.json")
      echo "Confirmed Bug: [$KEY] $SUMMARY"

      # Transition to In Progress (best-effort)
      TRANSITIONS=$(curl -s \
        -u "$JIRA_USER:$JIRA_API_TOKEN" \
        "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions" \
        -H "Accept: application/json")

      TRANSITION_ID=$(echo "$TRANSITIONS" | jq -r \
        '.transitions[] | select(.name | test("In Progress|Start Progress|Start Work"; "i")) | .id' | head -1)

      if [ -n "$TRANSITION_ID" ]; then
        curl -s -X POST \
          -u "$JIRA_USER:$JIRA_API_TOKEN" \
          "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions" \
          -H "Content-Type: application/json" \
          -d "{\"transition\": {\"id\": \"$TRANSITION_ID\"}}" > /dev/null
        echo "Transitioned $KEY to In Progress"
      else
        echo "No 'In Progress' transition available — skipping status change"
      fi
    depends_on: [fetch-jira-issue]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: RESEARCH
  # ═══════════════════════════════════════════════════════════════

  - id: research-classify
    prompt: |
      Analyze this JIRA bug ticket and decide whether web research is needed before investigating the codebase.

      ## JIRA Issue

      $fetch-jira-issue.output

      ## Run web research when TRUE

      - Bug involves an external library, SDK, framework, or third-party API behavior
      - Error message originates from an external package
      - Fix likely requires checking official docs, changelogs, or known upstream issues
      - Bug is version-specific or relates to a dependency upgrade
      - Bug involves network protocols, encoding standards, or browser behavior

      ## Skip web research when FALSE

      - Bug is pure internal logic or business logic in our own codebase
      - Root cause is clearly in our own code with no external dependencies in the failure path
      - Well-understood internal patterns with no external unknowns

      Provide your reasoning concisely.
    depends_on: [validate-and-start]
    model: haiku
    allowed_tools: []
    context: fresh
    output_format:
      type: object
      properties:
        run_web_research:
          type: string
          enum: ["true", "false"]
        reasoning:
          type: string
      required:
        - run_web_research
        - reasoning

  - id: web-research
    command: archon-web-research
    depends_on: [research-classify]
    when: "$research-classify.output.run_web_research == 'true'"
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: INVESTIGATE
  # ═══════════════════════════════════════════════════════════════

  - id: investigate
    command: jira-investigate-issue
    depends_on: [research-classify, web-research]
    trigger_rule: all_done
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: IMPLEMENT
  # ═══════════════════════════════════════════════════════════════

  - id: implement
    command: archon-fix-issue
    depends_on: [investigate]
    context: fresh
    model: opus[1m]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 5: VALIDATE
  # ═══════════════════════════════════════════════════════════════

  - id: validate
    command: archon-validate
    depends_on: [implement]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 6: CREATE DRAFT PR
  # ═══════════════════════════════════════════════════════════════

  - id: create-pr
    prompt: |
      Create a draft pull request for the current branch.

      ## Context

      - **JIRA ticket**: $ARGUMENTS
      - **Artifacts dir**: $ARTIFACTS_DIR

      ## Instructions

      1. Read the JIRA key and base URL:
         ```bash
         JIRA_KEY=$(cat "$ARTIFACTS_DIR/.jira-key")
         echo "Key: $JIRA_KEY"
         echo "URL: $JIRA_BASE_URL/browse/$JIRA_KEY"
         ```

      2. Check git status. If uncommitted changes exist, stage and commit ONLY source files that are part of the fix:
         - List them by name with `git add <path1> <path2> ...` — never `git add -A`, `git add .`, or `git add -u`
         - **Never commit** scratch / review / PR-body artifacts, even if they appear in `git status`:
           - `.pr-body.md`, `pr-body.md`, `*.scratch.md`, `*.tmp.md` at any path
           - `review/`, `*-report.md` at the repo root
           - Anything under `$ARTIFACTS_DIR`
         - Verify with `git status --porcelain` that nothing scratch is staged before committing

      3. Push the branch: `git push -u origin HEAD`

      4. Read implementation artifacts from `$ARTIFACTS_DIR/` for context:
         - `$ARTIFACTS_DIR/investigation.md`
         - `$ARTIFACTS_DIR/implementation.md`
         - `$ARTIFACTS_DIR/validation.md`

      5. Check if a PR already exists for this branch: `gh pr list --head $(git branch --show-current)`
         - If PR exists, skip creation and capture its number

      6. Look for the project's PR template at `.github/pull_request_template.md`,
         `.github/PULL_REQUEST_TEMPLATE.md`, or `docs/PULL_REQUEST_TEMPLATE.md`.

      7. Create a DRAFT PR: `gh pr create --draft --base $BASE_BRANCH`
         - Title: concise, imperative mood, under 70 chars — include JIRA key (e.g., "[PROJ-123] Fix null pointer in payment processor")
         - Body: if a PR template was found, fill in **every section** with details from the artifacts.
           Include at the top:
           ```
           **JIRA**: [JIRA_KEY](JIRA_BASE_URL/browse/JIRA_KEY)
           ```
           Replace any `Fixes #...` with `Refs JIRA_KEY` — JIRA and GitHub are separate systems.
         - **PR body file location**: write to `$ARTIFACTS_DIR/pr-body.md` or `/tmp/` — NEVER inside the worktree.

      8. Capture PR identifiers:
         ```bash
         PR_NUMBER=$(gh pr view --json number -q '.number')
         echo "$PR_NUMBER" > "$ARTIFACTS_DIR/.pr-number"
         PR_URL=$(gh pr view --json url -q '.url')
         echo "$PR_URL" > "$ARTIFACTS_DIR/.pr-url"
         ```
    depends_on: [validate]
    context: fresh

  # Transitions JIRA ticket to "In Review" and adds the PR as a remote link.
  # Both operations are best-effort — continues if transitions/links are unavailable.
  - id: link-and-transition
    bash: |
      KEY=$(cat "$ARTIFACTS_DIR/.jira-key")
      PR_URL=$(cat "$ARTIFACTS_DIR/.pr-url" 2>/dev/null || echo "")
      PR_NUMBER=$(cat "$ARTIFACTS_DIR/.pr-number" 2>/dev/null || echo "")

      # Transition to In Review
      TRANSITIONS=$(curl -s \
        -u "$JIRA_USER:$JIRA_API_TOKEN" \
        "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions" \
        -H "Accept: application/json")

      TRANSITION_ID=$(echo "$TRANSITIONS" | jq -r \
        '.transitions[] | select(.name | test("In Review|Code Review|Ready for Review"; "i")) | .id' | head -1)

      if [ -n "$TRANSITION_ID" ]; then
        curl -s -X POST \
          -u "$JIRA_USER:$JIRA_API_TOKEN" \
          "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions" \
          -H "Content-Type: application/json" \
          -d "{\"transition\": {\"id\": \"$TRANSITION_ID\"}}" > /dev/null
        echo "Transitioned $KEY to In Review"
      else
        echo "No 'In Review' transition available — skipping status change"
      fi

      # Link PR to JIRA ticket (remote link for bidirectional traceability)
      if [ -n "$PR_URL" ] && [ -n "$PR_NUMBER" ]; then
        REMOTE_LINK_BODY=$(jq -n \
          --arg url "$PR_URL" \
          --arg title "PR #$PR_NUMBER" \
          '{object: {url: $url, title: $title, icon: {url16x16: "https://github.com/favicon.ico", title: "GitHub PR"}}}')

        curl -s -X POST \
          -u "$JIRA_USER:$JIRA_API_TOKEN" \
          "$JIRA_BASE_URL/rest/api/3/issue/$KEY/remotelink" \
          -H "Content-Type: application/json" \
          -d "$REMOTE_LINK_BODY" > /dev/null

        echo "Linked PR #$PR_NUMBER to $KEY in JIRA"
      else
        echo "PR info not found — skipping JIRA remote link"
      fi
    depends_on: [create-pr]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 7: REVIEW
  # ═══════════════════════════════════════════════════════════════

  - id: verify-pr-base
    bash: |
      set -euo pipefail
      EXPECTED="$BASE_BRANCH"
      ACTUAL=$(gh pr view --json baseRefName -q '.baseRefName')
      if [ "$ACTUAL" != "$EXPECTED" ]; then
        PR_NUMBER=$(gh pr view --json number -q '.number')
        echo "Base mismatch on PR #$PR_NUMBER: expected=$EXPECTED actual=$ACTUAL — re-targeting" >&2
        gh pr edit "$PR_NUMBER" --base "$EXPECTED"
      else
        echo "PR base verified: $EXPECTED"
      fi
    depends_on: [link-and-transition]

  - id: review-scope
    command: archon-pr-review-scope
    depends_on: [verify-pr-base]
    context: fresh

  - id: review-classify
    prompt: |
      You are a PR review classifier. Analyze the PR scope and determine
      which review agents should run.

      ## PR Scope

      $review-scope.output

      ## Rules

      - **Code review**: ALWAYS run. This is mandatory for every PR. It also checks
        the PR against CLAUDE.md rules and project conventions.
      - **Error handling**: Run if the diff touches code with try/catch, error handling,
        async/await, or adds new failure paths.
      - **Test coverage**: Run if the diff touches source code (not just tests, docs, or config).
      - **Comment quality**: Run if the diff adds or modifies comments, docstrings, JSDoc,
        or significant documentation within code files.
      - **Docs impact**: Run if the diff adds/removes/renames public APIs, commands, CLI flags,
        environment variables, or user-facing features.

      Provide your reasoning for each decision.
    depends_on: [review-scope]
    model: haiku
    allowed_tools: []
    context: fresh
    output_format:
      type: object
      properties:
        run_code_review:
          type: string
          enum: ["true", "false"]
        run_error_handling:
          type: string
          enum: ["true", "false"]
        run_test_coverage:
          type: string
          enum: ["true", "false"]
        run_comment_quality:
          type: string
          enum: ["true", "false"]
        run_docs_impact:
          type: string
          enum: ["true", "false"]
        reasoning:
          type: string
      required:
        - run_code_review
        - run_error_handling
        - run_test_coverage
        - run_comment_quality
        - run_docs_impact
        - reasoning

  - id: code-review
    command: archon-code-review-agent
    depends_on: [review-classify]
    context: fresh

  - id: error-handling
    command: archon-error-handling-agent
    depends_on: [review-classify]
    when: "$review-classify.output.run_error_handling == 'true'"
    context: fresh

  - id: test-coverage
    command: archon-test-coverage-agent
    depends_on: [review-classify]
    when: "$review-classify.output.run_test_coverage == 'true'"
    context: fresh

  - id: comment-quality
    command: archon-comment-quality-agent
    depends_on: [review-classify]
    when: "$review-classify.output.run_comment_quality == 'true'"
    context: fresh

  - id: docs-impact
    command: archon-docs-impact-agent
    depends_on: [review-classify]
    when: "$review-classify.output.run_docs_impact == 'true'"
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 8: SYNTHESIZE + SELF-FIX
  # ═══════════════════════════════════════════════════════════════

  - id: synthesize
    command: archon-synthesize-review
    depends_on: [code-review, error-handling, test-coverage, comment-quality, docs-impact]
    trigger_rule: one_success
    context: fresh

  - id: self-fix
    command: archon-self-fix-all
    depends_on: [synthesize]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 9: SIMPLIFY
  # ═══════════════════════════════════════════════════════════════

  - id: simplify
    command: archon-simplify-changes
    depends_on: [self-fix]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 10: REPORT TO JIRA
  # ═══════════════════════════════════════════════════════════════

  - id: report-to-jira
    command: jira-issue-completion-report
    depends_on: [simplify]
    context: fresh
