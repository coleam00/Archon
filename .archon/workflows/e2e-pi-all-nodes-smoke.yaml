# E2E smoke test - Pi providerмқҳ лӘЁл“  мЈјмҡ” node type мҳҲм ң
# нҸ¬н•Ё н•ӯлӘ©: prompt, command, loop(AI node types) + bash, script bun/uv
#   (deterministic node types) + depends_on / when / trigger_rule / $nodeId.output
#   (DAG features).
# м ңмҷё н•ӯлӘ©: `approval:` - мӮ¬лһҢ мһ…л Ҙмқ„ кё°лӢӨлҰ¬лҜҖлЎң CIмҷҖ л§һм§Җ м•ҠмқҢ.
# мқёмҰқ: ANTHROPIC_API_KEY(CI) лҳҗлҠ” лЎңм»¬ `pi /login` OAuth.
# мҳҲмғҒ мӢңк°„: haiku кё°мӨҖ м•Ҫ 10мҙҲ(3нҡҢ AI round trip + deterministic nodes).
name: e2e-pi-all-nodes-smoke
description: 'Pi providerлЎң CIм—җм„ң мӢӨн–ү к°ҖлҠҘн•ң мЈјмҡ” node typeмқ„ н•ң лІҲм—җ ліҙм—¬мЈјлҠ” мҳҲм ң.'
provider: pi
model: anthropic/claude-haiku-4-5

nodes:
  # в”Җв”Җв”Җ AI node types в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  # 1. prompt: inline prompt(к°ҖмһҘ лӢЁмҲңн•ң AI node)
  - id: prompt-node
    prompt: "Reply with exactly the single word 'ok' and nothing else."
    allowed_tools: []
    effort: low
    idle_timeout: 30000

  # 2. command: мқҙлҰ„мқҙ мһҲлҠ” command file(.archon/commands/e2e-echo-command.md)
  #    commandлҠ” $ARGUMENTS(workflow invocation message)лҘј echoлЎң лҸҢл ӨмӨҖлӢӨ.
  - id: command-node
    command: e2e-echo-command
    allowed_tools: []
    idle_timeout: 30000

  # 3. loop: completion signalмқҙ лӮҳмҳ¬ л•Ңк№Ңм§Җ л°ҳліөн•ҳлҠ” AI prompt
  #    max_iterations: 2лЎң м ңн•ңн•ҙ лӘЁлҚёмқҙ мһҳлӘ» мқ‘лӢөн•ҙлҸ„ CIк°Җ л©Ҳм¶”м§Җ м•ҠкІҢ н•ңлӢӨ.
  - id: loop-node
    loop:
      prompt: "Reply with exactly 'DONE' and nothing else."
      until: 'DONE'
      max_iterations: 2
    allowed_tools: []
    effort: low
    idle_timeout: 60000

  # в”Җв”Җв”Җ Deterministic node types(AI м—ҶмқҢ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  # 4. bash: JSON outputмқ„ лӮҙлҠ” shell script
  #    downstreamм—җм„ң $nodeId.output.status dot-accessлҘј к°ҖлҠҘн•ҳкІҢ н•ңлӢӨ.
  - id: bash-json-node
    bash: 'echo ''{"status":"ok"}'''

  # 5. script: bun(TypeScript/JavaScript runtime)
  - id: script-bun-node
    script: echo-args
    runtime: bun
    timeout: 30000

  # 6. script: uv(Python runtime)
  - id: script-python-node
    script: echo-py
    runtime: uv
    timeout: 30000

  # в”Җв”Җв”Җ DAG features в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  # 7. depends_on + $nodeId.output м№ҳнҷҳ
  - id: downstream
    bash: "echo 'downstream got: $prompt-node.output'"
    depends_on: [prompt-node]

  # 8. when: мЎ°кұҙл¶Җ мӢӨн–ү(upstream outputмқҳ JSON dot-access мӮ¬мҡ©)
  - id: gated
    bash: "echo 'gated-ok'"
    depends_on: [bash-json-node]
    when: "$bash-json-node.output.status == 'ok'"

  # 9. trigger_rule: м—¬лҹ¬ dependency лі‘н•©(all_success мқҳлҜё)
  - id: merge
    bash: "echo 'merge-ok'"
    depends_on: [downstream, gated, script-bun-node, script-python-node]
    trigger_rule: all_success

  # в”Җв”Җв”Җ Final assertion в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  # 10. лӘЁл“  upstream nodeк°Җ л№„м–ҙ мһҲм§Җ м•ҠмқҖ outputмқ„ л§Ңл“Өм—ҲлҠ”м§Җ нҷ•мқё
  - id: assert
    bash: |
      fail=0
      check() {
        local name="$1"
        local value="$2"
        if [ -z "$value" ]; then
          echo "FAIL: $name produced empty output"
          fail=1
        fi
      }
      check prompt-node "$prompt-node.output"
      check command-node "$command-node.output"
      check loop-node "$loop-node.output"
      check bash-json-node "$bash-json-node.output"
      check script-bun-node "$script-bun-node.output"
      check script-python-node "$script-python-node.output"
      check downstream "$downstream.output"
      check gated "$gated.output"
      check merge "$merge.output"
      if [ "$fail" -eq 1 ]; then exit 1; fi
      echo "PASS: all 9 node types produced output"
    depends_on: [merge, loop-node, command-node]
    trigger_rule: all_success
