{name: archon-test-loop-dag,description: "Use when: User explicitly says \"test-loop-dag\" or \"run test-loop-dag\".\nIMPORTANT: This is a DAG workflow with a loop node that iterates until completion.\nNOT for: General testing questions or debugging.\nDoes: Initializes a counter, iterates until it reaches 3, then reports completion.\n",provider: omp,model: minimax-token-plan/MiniMax-M3,nodes: [{id: setup,bash: "echo \"0\" > .archon/test-loop-dag-counter.txt\necho \"Counter initialized to 0\""},{id: loop-counter,depends_on: [setup],loop: {prompt: "You are testing the loop node functionality within a DAG workflow.\n\n## Your Task\n\n1. Read the file `.archon/test-loop-dag-counter.txt`\n2. Parse the current counter value\n3. Increment it by 1\n4. Write the new value back to the file\n5. Report the current iteration\n\n## User Intent\n\n$USER_MESSAGE\n\n## Completion Criteria\n\n- If the counter reaches 3 or higher, output: <promise>COMPLETE</promise>\n- Otherwise, just report your progress and end normally\n\n## Important\n\nBe concise. Just do the task and report the counter value.\n",until: COMPLETE,max_iterations: 5,fresh_context: false}},{id: report,depends_on: [loop-counter],prompt: "The loop counter test has completed. The loop node output was:\n\n$loop-counter.output\n\nRead `.archon/test-loop-dag-counter.txt` and confirm the final counter value.\nReport: \"Test loop DAG completed successfully. Final counter: {value}\""}]}