{name: archon-idea-to-pr,description: "Use when: You have a feature idea or description and want end-to-end development.\nInput: Feature description in natural language, or path to a PRD file\nOutput: PR ready for merge with comprehensive review completed\n\nFull workflow:\n1. Create comprehensive implementation plan with codebase analysis\n2. Setup branch and extract scope limits\n3. Verify plan research is still valid\n4. Implement all tasks with type-checking\n5. Run full validation suite\n6. Create PR with template, mark ready\n7. Comprehensive code review (5 parallel agents with scope limit awareness)\n8. Synthesize and fix review findings\n9. Final summary with decision matrix -> GitHub comment + follow-up recommendations\n\nNOT for: Executing existing plans (use archon-plan-to-pr), quick fixes, standalone reviews.\n",provider: pi,model: minimax/MiniMax-M2.7,nodes: [{id: create-plan,context: fresh,command: archon-create-plan},{id: plan-setup,depends_on: [create-plan],context: fresh,command: archon-plan-setup},{id: confirm-plan,depends_on: [plan-setup],context: fresh,command: archon-confirm-plan},{id: implement-tasks,depends_on: [confirm-plan],context: fresh,command: archon-implement-tasks},{id: validate,depends_on: [implement-tasks],context: fresh,command: archon-validate},{id: finalize-pr,depends_on: [validate],context: fresh,command: archon-finalize-pr},{id: verify-pr-base,depends_on: [finalize-pr],bash: "set -euo pipefail\nEXPECTED=\"$BASE_BRANCH\"\nACTUAL=$(gh pr view --json baseRefName -q '.baseRefName')\nif [ \"$ACTUAL\" != \"$EXPECTED\" ]; then\n  PR_NUMBER=$(gh pr view --json number -q '.number')\n  echo \"Base mismatch on PR #$PR_NUMBER: expected=$EXPECTED actual=$ACTUAL — re-targeting\" >&2\n  gh pr edit \"$PR_NUMBER\" --base \"$EXPECTED\"\nelse\n  echo \"PR base verified: $EXPECTED\"\nfi"},{id: review-scope,depends_on: [verify-pr-base],context: fresh,command: archon-pr-review-scope},{id: sync,depends_on: [review-scope],context: fresh,command: archon-sync-pr-with-main},{id: code-review,depends_on: [sync],context: fresh,command: archon-code-review-agent},{id: error-handling,depends_on: [sync],context: fresh,command: archon-error-handling-agent},{id: test-coverage,depends_on: [sync],context: fresh,command: archon-test-coverage-agent},{id: comment-quality,depends_on: [sync],context: fresh,command: archon-comment-quality-agent},{id: docs-impact,depends_on: [sync],context: fresh,command: archon-docs-impact-agent},{id: synthesize,depends_on: [code-review,error-handling,test-coverage,comment-quality,docs-impact],trigger_rule: one_success,context: fresh,command: archon-synthesize-review},{id: implement-fixes,depends_on: [synthesize],context: fresh,command: archon-implement-review-fixes},{id: workflow-summary,depends_on: [implement-fixes],context: fresh,command: archon-workflow-summary}]}