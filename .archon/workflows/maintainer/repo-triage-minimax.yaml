name: repo-triage-minimax
description: >-
  Minimax variant of repo-triage. Identical node set — both parents
  include: the shared repo-triage-block — but judgment nodes run on
  Pi/Minimax M2.7 instead of Claude Sonnet.
  Use when: you'd rather not spend Claude tokens on periodic triage, or
  nested-Claude-Code session limits block the Claude variant.
  Triggers: "repo triage minimax", "triage minimax".
  NOT for: First-time setup — run the Claude variant first to validate state.
interactive: false

provider: pi
model: minimax/MiniMax-M2.7

worktree:
  enabled: false

# Thin parent over repo-triage-block (shared with repo-triage). The two
# parents differ ONLY in provider/model — edit the block, not this file,
# to change triage behavior.
nodes:
  - id: triage
    include: repo-triage-block
