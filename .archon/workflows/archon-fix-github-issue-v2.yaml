name: archon-fix-github-issue-v2
description: |
  V2 of archon-fix-github-issue. Same DAG shape, but adds the structured
  reviewer/self-fix contract from archon-comprehensive-pr-review-v2:
  - Each reviewer emits findings.json
  - synthesize-v2 produces synthesis.json with severity counts
  - pre-fix-gate validates the contract before self-fix runs
  - re-review loop verifies fixes actually fixed the findings
  - post-fix-gate converts PR back to draft if any CRITICAL/HIGH still unresolved
  - Full validate (project's own validate script) before create-pr
  - Reviewers are read-only (denied_tools on Edit/Write/Bash)
  - all bash nodes have set -euo pipefail

  NOT for: production until validated side-by-side with v1.

provider: claude
model: sonnet

nodes:
  # ═══ PHASE 1: FETCH & CLASSIFY ════════════════════════════════════
  - id: extract-issue-number
    prompt: |
      Find the GitHub issue number for this request.

      Request: $ARGUMENTS

      Rules:
      - If the message contains an explicit issue number (e.g., "#709", "issue 709", "709"), extract that number.
      - If the message is ambiguous, use `gh issue list` to search and pick the best match.

      CRITICAL: Output ONLY the bare number with no quotes, no markdown, no explanation. Example: 709

  - id: fetch-issue
    bash: |
      set -euo pipefail
      ISSUE_NUM=$(echo "$extract-issue-number.output" | tr -d "'\"\`\n " | grep -oE '[0-9]+' | head -1)
      if [ -z "$ISSUE_NUM" ]; then
        echo "Failed to extract issue number from: $extract-issue-number.output" >&2
        exit 1
      fi
      gh issue view "$ISSUE_NUM" --json title,body,labels,comments,state,url,author
    depends_on: [extract-issue-number]

  # ─── DEDUP CHECK: bail out early if issue already has merged PR ────
  - id: dedup-check
    bash: |
      set -euo pipefail
      ISSUE_NUM=$(echo "$extract-issue-number.output" | tr -d "'\"\`\n " | grep -oE '[0-9]+' | head -1)
      MERGED=$(gh pr list --search "in:body \"closes #$ISSUE_NUM\" OR \"fixes #$ISSUE_NUM\" OR \"resolves #$ISSUE_NUM\"" --state merged --json number --jq 'length')
      if [ "$MERGED" -gt 0 ]; then
        echo "BLOCKED: issue #$ISSUE_NUM already has $MERGED merged PR(s) closing it. Aborting to avoid duplicate work." >&2
        gh pr list --search "in:body \"closes #$ISSUE_NUM\" OR \"fixes #$ISSUE_NUM\" OR \"resolves #$ISSUE_NUM\"" --state merged --json number,title,url
        exit 1
      fi
    depends_on: [fetch-issue]

  - id: classify
    prompt: |
      You are an issue classifier. Analyze the GitHub issue below and determine its type.

      ## Issue Content
      $fetch-issue.output

      ## Classification Rules
      | Type | Indicators |
      |------|------------|
      | bug | "broken", "error", "crash", stack traces, regression |
      | feature | "add", "new", "support", net-new capability |
      | enhancement | "improve", "better", "extend", incremental |
      | refactor | "clean up", "simplify", "reorganize" |
      | chore | "update deps", "upgrade", "CI/CD" |
      | documentation | "docs", "readme", "examples" |

      Provide reasoning for your classification.
    depends_on: [dedup-check]
    model: haiku
    allowed_tools: []
    output_format:
      type: object
      properties:
        issue_type:
          type: string
          enum: ["bug", "feature", "enhancement", "refactor", "chore", "documentation"]
        title: { type: string }
        reasoning: { type: string }
      required: [issue_type, title, reasoning]

  # ═══ PHASE 2: RESEARCH ═══════════════════════════════════════════
  - id: web-research
    command: archon-web-research
    depends_on: [classify]
    context: fresh

  # ═══ PHASE 3: INVESTIGATE / PLAN ═════════════════════════════════
  - id: investigate
    command: archon-investigate-issue
    depends_on: [classify, web-research]
    when: "$classify.output.issue_type == 'bug'"
    context: fresh

  - id: plan
    command: archon-create-plan
    depends_on: [classify, web-research]
    when: "$classify.output.issue_type != 'bug'"
    context: fresh

  - id: bridge-artifacts
    bash: |
      set -euo pipefail
      if [ -f "$ARTIFACTS_DIR/plan.md" ] && [ ! -f "$ARTIFACTS_DIR/investigation.md" ]; then
        cp "$ARTIFACTS_DIR/plan.md" "$ARTIFACTS_DIR/investigation.md"
        echo "Bridged plan.md → investigation.md"
      elif [ -f "$ARTIFACTS_DIR/investigation.md" ]; then
        echo "investigation.md already exists from investigate step"
      else
        echo "BLOCKED: no investigation.md or plan.md was produced" >&2
        exit 1
      fi
    depends_on: [investigate, plan]
    trigger_rule: one_success

  # ═══ PHASE 4: PLAN-CONFIDENCE GATE ════════════════════════════════
  # Reads the plan's self-rated Confidence Score; aborts if < 7
  - id: plan-confidence-gate
    bash: |
      set -euo pipefail
      PLAN="$ARTIFACTS_DIR/investigation.md"
      # Plan templates write a line like "Confidence Score: 8/10" or "Confidence: 8/10"
      SCORE=$(grep -iE "confidence.{0,15}score|^confidence:" "$PLAN" | grep -oE '[0-9]+(\.[0-9]+)?' | head -1 || echo "")
      if [ -z "$SCORE" ]; then
        echo "WARN: no Confidence Score found in plan; proceeding (consider adding one to the plan template)"
        exit 0
      fi
      # bash can't do float compare; use awk
      if awk -v s="$SCORE" 'BEGIN { exit (s < 7) ? 0 : 1 }'; then
        echo "BLOCKED: plan self-rated Confidence Score = $SCORE (< 7). Re-plan or human-approve." >&2
        exit 1
      fi
      echo "Plan Confidence Score = $SCORE — proceeding"
    depends_on: [bridge-artifacts]

  # ═══ PHASE 5: IMPLEMENT ═══════════════════════════════════════════
  - id: implement
    command: archon-fix-issue
    depends_on: [plan-confidence-gate]
    context: fresh
    model: opus[1m]

  # ═══ PHASE 6: VALIDATE (full project validate, not just type-check) ─
  - id: validate
    command: archon-validate
    depends_on: [implement]
    context: fresh

  - id: validate-gate
    bash: |
      set -euo pipefail
      # Find the project's full validation command
      if [ -f package.json ] && jq -e '.scripts.validate' package.json >/dev/null 2>&1; then
        echo "Running project's full validate script…"
        bun run validate
      elif [ -f package.json ]; then
        echo "No 'validate' script; falling back to type-check + lint + test"
        bun run type-check 2>/dev/null || true
        bun run lint 2>/dev/null || true
        bun test 2>/dev/null || true
      else
        echo "No package.json — skipping language-level validate (consider running project-specific validate manually)"
      fi
    depends_on: [validate]
    timeout: 600000

  # ═══ PHASE 7: CREATE DRAFT PR (gated on validate-gate) ───────────
  - id: create-pr
    prompt: |
      Create a draft pull request for the current branch.

      ## Context
      - **Issue**: $ARGUMENTS
      - **Classification**: $classify.output
      - **Issue title**: $classify.output.title

      ## Instructions
      1. `git status` — ensure all changes committed; if not, stage + commit.
      2. `git push -u origin HEAD`
      3. Read implementation artifacts from `$ARTIFACTS_DIR/`:
         - `investigation.md` or `plan.md`, `implementation.md`, `validation.md`
      4. `gh pr list --head $(git branch --show-current)` — if PR exists, capture number; skip creation.
      5. Find PR template: `.github/pull_request_template.md`, `.github/PULL_REQUEST_TEMPLATE.md`,
         or `docs/PULL_REQUEST_TEMPLATE.md`.
      6. `gh pr create --draft --base $BASE_BRANCH` — title under 70 chars, imperative mood.
         Body: fill EVERY section of the template. `Closes #...` to auto-close issue on merge.
      7. Capture identifiers:
         ```bash
         PR_NUMBER=$(gh pr view --json number -q '.number')
         echo "$PR_NUMBER" > "$ARTIFACTS_DIR/.pr-number"
         gh pr view --json url -q '.url' > "$ARTIFACTS_DIR/.pr-url"
         ```
    depends_on: [validate-gate]
    context: fresh

  # ═══ PHASE 8: REVIEW (parallel, read-only, structured JSON) ─────
  - id: review-scope
    command: archon-pr-review-scope
    depends_on: [create-pr]
    context: fresh

  - id: review-classify
    prompt: |
      You are a PR review classifier. Determine which review agents should run.

      ## PR Scope
      $review-scope.output

      ## Rules
      - **Code review**: ALWAYS run.
      - **Error handling**: run if diff touches try/catch, error handling, async/await, new failure paths.
      - **Test coverage**: run if diff touches source code (not just tests/docs/config).
      - **Comment quality**: run if diff adds/modifies comments, docstrings, JSDoc.
      - **Docs impact**: run if diff adds/removes/renames public APIs, CLI flags, env vars.
    depends_on: [review-scope]
    model: haiku
    allowed_tools: []
    context: fresh
    output_format:
      type: object
      properties:
        run_code_review:     { type: string, enum: ["true", "false"] }
        run_error_handling:  { type: string, enum: ["true", "false"] }
        run_test_coverage:   { type: string, enum: ["true", "false"] }
        run_comment_quality: { type: string, enum: ["true", "false"] }
        run_docs_impact:     { type: string, enum: ["true", "false"] }
        reasoning:           { type: string }
      required: [run_code_review, run_error_handling, run_test_coverage,
                 run_comment_quality, run_docs_impact, reasoning]

  - id: code-review
    command: archon-code-review-agent-v2
    depends_on: [review-classify]
    context: fresh
    denied_tools: [Edit, Write, Bash]

  - id: error-handling
    command: archon-error-handling-agent-v2
    depends_on: [review-classify]
    when: "$review-classify.output.run_error_handling == 'true'"
    context: fresh
    denied_tools: [Edit, Write, Bash]

  - id: test-coverage
    command: archon-test-coverage-agent-v2
    depends_on: [review-classify]
    when: "$review-classify.output.run_test_coverage == 'true'"
    context: fresh
    denied_tools: [Edit, Write, Bash]

  - id: comment-quality
    command: archon-comment-quality-agent-v2
    depends_on: [review-classify]
    when: "$review-classify.output.run_comment_quality == 'true'"
    context: fresh
    denied_tools: [Edit, Write, Bash]

  - id: docs-impact
    command: archon-docs-impact-agent-v2
    depends_on: [review-classify]
    when: "$review-classify.output.run_docs_impact == 'true'"
    context: fresh
    denied_tools: [Edit, Write, Bash]

  # ═══ PHASE 9: SYNTHESIZE + GATES + SELF-FIX + RE-REVIEW ───────
  - id: synthesize
    command: archon-synthesize-review-v2
    depends_on: [code-review, error-handling, test-coverage, comment-quality, docs-impact]
    trigger_rule: all_done   # was: one_success
    context: fresh

  - id: pre-fix-gate
    bash: |
      set -euo pipefail
      SYNTH="$ARTIFACTS_DIR/review/synthesis.json"
      if [ ! -f "$SYNTH" ]; then
        echo "BLOCKED: synthesis.json missing" >&2
        exit 1
      fi
      jq -r '"Reviewers completed: \(.agents_completed) failed: \(.agents_failed)\nFindings: CRITICAL=\(.stats.critical) HIGH=\(.stats.high) MEDIUM=\(.stats.medium) LOW=\(.stats.low)"' "$SYNTH"
      AGENTS_COMPLETED=$(jq -r '.agents_completed // 0' "$SYNTH")
      if [ "$AGENTS_COMPLETED" -lt 2 ]; then
        echo "BLOCKED: only $AGENTS_COMPLETED reviewers succeeded (minimum 2 required)" >&2
        exit 1
      fi
    depends_on: [synthesize]

  - id: self-fix
    command: archon-self-fix-all-v2
    depends_on: [pre-fix-gate]
    context: fresh

  - id: re-review
    loop:
      prompt: |
        Verify that fixes from $ARTIFACTS_DIR/review/fix-report.json
        actually resolved the CRITICAL/HIGH findings in $ARTIFACTS_DIR/review/synthesis.json.

        For each blocking finding (severity CRITICAL or HIGH):
        1. Run its `confirmation_check` (from synthesis.json) — exit 0 = resolved.
        2. Re-read the fixed code — does it address root cause, or just symptom?
        3. Look for newly-introduced issues the fix may have caused.

        Write `$ARTIFACTS_DIR/review/re-review.json`:
        {
          "iteration": <n>,
          "verified_resolved": [<finding ids>],
          "still_present": [<finding ids with reason>],
          "newly_introduced": [<new finding objects>],
          "unresolved_count": <int>
        }

        If unresolved_count > 0, ALSO write a delta plan to
        `$ARTIFACTS_DIR/review/re-review-delta.md` for the next iteration.
        End with literal token <promise>RE_REVIEW_DONE</promise>.
      until: RE_REVIEW_DONE
      until_bash: |
        set -euo pipefail
        RR="$ARTIFACTS_DIR/review/re-review.json"
        [ -f "$RR" ] && [ "$(jq -r '.unresolved_count' "$RR")" = "0" ] && [ "$(jq -r '.newly_introduced | length' "$RR")" = "0" ]
      max_iterations: 2
      fresh_context: true
    depends_on: [self-fix]

  - id: post-fix-gate
    bash: |
      set -euo pipefail
      RR="$ARTIFACTS_DIR/review/re-review.json"
      if [ ! -f "$RR" ]; then
        echo "BLOCKED: re-review.json missing" >&2; exit 1
      fi
      UNRESOLVED=$(jq -r '.unresolved_count // 999' "$RR")
      NEW=$(jq -r '.newly_introduced | length' "$RR")
      if [ "$UNRESOLVED" -gt 0 ] || [ "$NEW" -gt 0 ]; then
        PR=$(cat "$ARTIFACTS_DIR/.pr-number" 2>/dev/null || echo "")
        if [ -n "$PR" ]; then
          gh pr ready "$PR" --undo 2>/dev/null || true
          gh pr comment "$PR" --body "⚠️ Archon v2 review-loop terminated with $UNRESOLVED unresolved + $NEW newly-introduced findings. PR reverted to draft. See \`$ARTIFACTS_DIR/review/re-review-delta.md\`."
        fi
        echo "BLOCKED: $UNRESOLVED unresolved + $NEW newly-introduced findings remain. PR reverted to draft." >&2
        exit 1
      fi
      echo "All blocking findings resolved."
    depends_on: [re-review]

  # ═══ PHASE 10: SIMPLIFY + REPORT ═════════════════════════════════
  - id: simplify
    command: archon-simplify-changes
    depends_on: [post-fix-gate]
    context: fresh

  - id: report
    command: archon-issue-completion-report
    depends_on: [simplify]
    context: fresh
