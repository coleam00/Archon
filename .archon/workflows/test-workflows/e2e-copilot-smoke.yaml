# E2E smoke test — GitHub Copilot community provider
# Verifies: Copilot connectivity (sendQuery), $nodeId.output refs,
#   streaming bridge, and SDK wiring (effort → reasoningEffort).
# Design: mirrors e2e-pi-smoke.yaml structure. effort: low keeps the
#   smoke fast; gpt-5-mini is the cheapest Copilot model.
# Auth: `gh auth login` OR COPILOT_GITHUB_TOKEN / GH_TOKEN / GITHUB_TOKEN.
#   Requires an active GitHub Copilot subscription.
name: e2e-copilot-smoke
description: 'Smoke test for Copilot community provider. Verifies prompt response via sendQuery.'
provider: copilot
model: gpt-5-mini

nodes:
  # 1. Simple prompt — verifies CopilotClient spawns, the streaming bridge
  #    yields assistant chunks, and agent_end produces a result chunk.
  - id: simple
    prompt: 'What is 2+2? Answer with just the number, nothing else.'
    effort: low
    idle_timeout: 30000

  # 2. Assert non-empty output — fails CI if Copilot returned nothing
  - id: assert
    bash: |
      output="$simple.output"
      if [ -z "$output" ]; then
        echo "FAIL: simple node returned empty output"
        exit 1
      fi
      echo "PASS: simple=$output"
    depends_on: [simple]
