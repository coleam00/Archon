name: archon-gsd-ship
description: |
  Prepare a verified GSD-style phase for shipping. Creates a ship report and,
  after approval, creates a pull request with the GitHub CLI.
provider: claude
model: sonnet
interactive: true
worktree:
  enabled: true

nodes:
  - id: readiness-check
    bash: |
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR"
      {
        echo "# Ship Readiness"
        echo ""
        echo "## Git status"
        git status --short
        echo ""
        echo "## Branch"
        git branch --show-current
        echo ""
        echo "## Verification reports"
        find .planning/phases -maxdepth 3 -name '*-VERIFICATION.md' -type f 2>/dev/null | sort || true
        echo ""
        echo "## Summaries"
        find .planning/phases -maxdepth 3 -name '*-SUMMARY.md' -type f 2>/dev/null | sort || true
      } | tee "$ARTIFACTS_DIR/ship-readiness.md"

  - id: create-ship-report
    command: archon-gsd-create-ship-report
    depends_on: [readiness-check]
    context: fresh

  - id: ship-gate
    approval:
      message: "Review the ship report and PR body. Approve to create a GitHub pull request with gh pr create."
      capture_response: true
    depends_on: [create-ship-report]

  - id: create-pr
    bash: |
      set -euo pipefail
      TITLE_FILE="$ARTIFACTS_DIR/pr-title.txt"
      BODY_FILE="$ARTIFACTS_DIR/pr-body.md"
      if [ ! -f "$TITLE_FILE" ] || [ ! -f "$BODY_FILE" ]; then
        echo "Missing PR title or body from ship report." >&2
        exit 1
      fi
      BRANCH=$(git branch --show-current)
      git push -u origin "$BRANCH"
      gh pr create --title "$(cat "$TITLE_FILE")" --body-file "$BODY_FILE" | tee "$ARTIFACTS_DIR/pr-url.txt"
    depends_on: [ship-gate]

  - id: report
    bash: |
      set -euo pipefail
      {
        echo "# GSD Ship Complete"
        echo ""
        if [ -f "$ARTIFACTS_DIR/pr-url.txt" ]; then
          echo "PR: $(cat "$ARTIFACTS_DIR/pr-url.txt")"
        fi
        echo ""
        echo "Ship report: $ARTIFACTS_DIR/ship-report.md"
      } | tee "$ARTIFACTS_DIR/ship-complete.md"
    depends_on: [create-pr]
