name: archon-plan-to-stories
description: |
  Use when: User has an approved overall plan and wants it broken into atomic
  GitHub issues with per-story plan files and a dependency graph.
  Triggers: "plan to stories", "break the plan into issues",
            "create gh issues from this plan", "story breakdown".
  NOT for: PRD/plan creation (use archon-brainstorm-to-prd / archon-prd-to-plan).
  NOT for: Implementing a single story (use archon-execute-story).

  Pipeline workflow 3 of 4. Implements PRD methodology phase 4.

  Reads `docs/plans/<slug>.md` (frontmatter contract from workflow 2). Detects
  greenfield vs existing-project mode. Iterates with the user on the story
  list, dependency graph, and phase labels until approved. Writes one
  `docs/stories/<slug>-<n>.md` file per story (FLAT, not subfoldered),
  creates GitHub issues, writes the issue numbers back to the story files,
  and commits. Memexia tracks per-story research with tag `story-<n>`.

  Input: a path to the plan markdown file (e.g. `docs/plans/feature-x.md`).

provider: claude
interactive: true

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE A: Load context + greenfield detection
  # Validate plan path, parse frontmatter (gets bank from PRD too if
  # missing), detect greenfield, persist context for downstream nodes.
  # ═══════════════════════════════════════════════════════════════

  - id: load-context
    bash: |
      set -euo pipefail

      MCP_FILE=".archon/mcp/memexia.json"
      if [ ! -f "${MCP_FILE}" ]; then
        echo "ERROR: ${MCP_FILE} not found. Worktree may have been created without copyFiles: [.archon/mcp]." >&2
        echo "See docs/memexia-onboarding/ in the archon repo for setup." >&2
        exit 1
      fi

      PLAN_PATH=$(printf '%s' "$ARGUMENTS" | awk '{print $1}')
      if [ -z "${PLAN_PATH}" ]; then
        echo "ERROR: usage: archon workflow run archon-plan-to-stories <path-to-plan.md>" >&2
        exit 1
      fi
      if [ ! -f "${PLAN_PATH}" ]; then
        echo "ERROR: Plan not found at ${PLAN_PATH}" >&2
        exit 1
      fi

      FRONTMATTER=$(awk '/^---$/{c++; if (c==2) exit; next} c==1' "${PLAN_PATH}")
      if [ -z "${FRONTMATTER}" ]; then
        echo "ERROR: ${PLAN_PATH} has no YAML frontmatter." >&2
        exit 1
      fi

      get_field() {
        printf '%s\n' "${FRONTMATTER}" | awk -v key="$1" '$0 ~ "^"key":" {sub("^"key":[[:space:]]*", ""); print; exit}' | sed -E 's/^"//; s/"$//'
      }

      SLUG=$(get_field "slug")
      BANK_NAME=$(get_field "memexia_bank")
      PRD_PATH=$(get_field "prd_path")
      TITLE=$(get_field "title")

      for v in SLUG BANK_NAME PRD_PATH TITLE; do
        eval "val=\${$v}"
        if [ -z "${val}" ]; then
          echo "ERROR: Plan frontmatter is missing required field: ${v}." >&2
          exit 1
        fi
      done

      if [ ! -f "${PRD_PATH}" ]; then
        echo "ERROR: PRD path from frontmatter does not exist: ${PRD_PATH}" >&2
        exit 1
      fi

      mkdir -p "docs/stories"

      # Greenfield detection: foundation files + git log activity.
      # Greenfield = no foundation file present OR only the initial commit exists.
      MODE="existing"
      FOUNDATION_FILES="package.json pyproject.toml Cargo.toml go.mod build.gradle pom.xml composer.json Gemfile setup.py setup.cfg"
      FOUND=""
      for f in ${FOUNDATION_FILES}; do
        if [ -f "${f}" ]; then
          FOUND="${FOUND} ${f}"
        fi
      done
      COMMIT_COUNT=$(git rev-list --count HEAD 2>/dev/null || echo "0")
      if [ -z "${FOUND}" ] || [ "${COMMIT_COUNT}" -lt 5 ]; then
        MODE="greenfield"
      fi

      API_URL="${MEMEXIA_API_URL:-}"
      if [ -z "${API_URL}" ]; then
        echo "ERROR: MEMEXIA_API_URL must be set in ~/.archon/.env" >&2
        exit 1
      fi

      mkdir -p "$ARTIFACTS_DIR"
      cat > "$ARTIFACTS_DIR/stories-info.env" <<EOF
      SLUG=${SLUG}
      BANK_NAME=${BANK_NAME}
      TITLE=${TITLE}
      PRD_PATH=${PRD_PATH}
      PLAN_PATH=${PLAN_PATH}
      MODE=${MODE}
      MEMEXIA_API_URL=${API_URL}
      STORIES_DIR=docs/stories
      STORIES_GLOB=docs/stories/${SLUG}-*.md
      EOF

      echo "SLUG=${SLUG}"
      echo "BANK_NAME=${BANK_NAME}"
      echo "TITLE=${TITLE}"
      echo "PRD_PATH=${PRD_PATH}"
      echo "PLAN_PATH=${PLAN_PATH}"
      echo "MODE=${MODE}"
      echo "FOUNDATION_FILES_FOUND=${FOUND# }"
      echo "COMMIT_COUNT=${COMMIT_COUNT}"

  # ═══════════════════════════════════════════════════════════════
  # PHASE B: Story drafting + iteration loop
  # Interactive — AI drafts stories, user iterates. Each story is its
  # own file at docs/stories/<slug>-<n>.md (FLAT). Writes per-story
  # research to Memexia with tag story-<n>.
  # ═══════════════════════════════════════════════════════════════

  - id: story-drafting
    depends_on: [load-context]
    idle_timeout: 600000
    loop:
      prompt: |
        # Plan-to-Stories — Story Drafting & Iteration

        You are breaking an approved overall plan into atomic GitHub issues.
        Each story will become one issue and one per-story plan file. You
        work iteratively with the user until they approve the full story set.

        **User's latest input**: $LOOP_USER_INPUT

        **Load-context output (slug, bank, paths, MODE)**:
        $load-context.output

        ---

        ## Memexia: Bash + curl pattern (loop nodes can't attach mcp:/skills:)

        1. Read `~/.claude/skills/memexia-memory/SKILL.md` once per iteration
           for zone routing rules.
        2. Auth: `jq` `MEMEXIA_API_URL` and `MEMEXIA_API_KEY` from
           `.archon/mcp/memexia.json`. Pass `agent_id: "archon-plan-to-stories"`
           in agent-memory bodies.
        3. Per-story research → `agent-memory/remember`,
           tags: `bank-name` + `story-<n>`. The `story-<n>` tag is the
           contract that workflow 4's prime node will query.

        ---

        ## Story file format (FLAT layout, YAML frontmatter)

        Each story is `docs/stories/<slug>-<n>.md` (e.g. `docs/stories/feature-x-1.md`).
        File starts with YAML frontmatter, then Markdown body:

        ```markdown
        ---
        title: <Story title>
        slug: <feature-slug>
        story_number: <n>
        memexia_bank: <bank-name>
        prd_path: <prd-path>
        plan_path: <plan-path>
        phase_label: <phase:N-name>
        depends_on_stories: [N, M]
        depends_on_issues: []
        gh_issue_number: null
        created_at: <YYYY-MM-DD>
        ---

        # Story <n>: <Story title>

        ## Summary
        2–3 sentences: what this story delivers and why.

        ## User Story
        As a <role>, I want <capability>, so that <outcome>.

        ## Decisions Locked for This Story
        - Decision 1 (cite Memexia bank entry id if applicable).
        - Decision 2.

        ## Patterns to Follow
        - Code patterns from the repo (file:line ...).
        - Libraries / install commands.
        - Skill names to preload during implementation (e.g. `memexia-memory`).

        ## Files to CREATE / UPDATE
        - `<path>` — CREATE / UPDATE — <what changes>

        ## Task List
        - [ ] Atomic step 1.
        - [ ] Atomic step 2.

        ## Acceptance Criteria
        - Specific, testable outcome 1.
        - Specific, testable outcome 2.

        ## Dependencies / Phase
        - Greenfield: <phase:N-name>
        - Existing: <human-readable dependency note — the machine-readable form
          is in `depends_on_stories` in frontmatter>
        ```

        **Frontmatter rules** (read these — silently broken frontmatter is hard to debug):
        - YAML — `#` starts a comment, so use bare numbers (no `#42`) and
          quote any string that could be misread (slugs are safe; titles
          should be quoted if they contain `:` or `#`).
        - `phase_label` — set on greenfield (e.g. `phase:0-foundation`); set to
          empty string `""` on existing-project mode. Do NOT omit the key.
        - `depends_on_stories` lists STORY NUMBERS as a YAML inline-flow array
          (`[1, 3]`). MUST be on a single line — block list (`- 1\n- 3`) is
          not parsed by the create-issues bash node. Empty case: `[]`.
        - `depends_on_issues` and `gh_issue_number` — leave as `[]` and `null`
          at draft time; create-issues fills them in after `gh issue create`.
        - Do NOT add inline comments after frontmatter values; the parser
          tolerates them but it's noise.

        ---

        ## Workflow

        ### First iteration ($LOOP_USER_INPUT empty)

        1. Read PRD (`PRD_PATH`) and plan (`PLAN_PATH`) end-to-end.
        2. Read CLAUDE.md.
        3. Recall bank context: query Memexia for `decision`, `codebase-finding`,
           `plan-revision` tags (Bash + curl).
        4. Decompose the plan's Task Breakdown bullets into atomic stories.
           - **MODE=greenfield**: assign each story a `phase:N-name` label.
             Phase 0 is foundation (project setup, build pipeline, base types).
             Phase 1 is core features. Phase 2 is polish/edge cases.
           - **MODE=existing**: build a dependency graph using `Depends on: #X, #Y`
             form (issue numbers will be filled in by the create-issues bash node;
             draft them as `Depends on: story-N` and the create-issues node will
             rewrite to issue numbers).
        5. For each story, write `docs/stories/<slug>-<n>.md` per the format above.
           Number stories sequentially starting from 1.
        6. Validate the dependency graph:
           - **No cycles** (story A depends on B, B depends on A → reject).
           - Greenfield phases are non-decreasing (a phase:1 story must not
             depend on a phase:2 story).
        7. Persist per-story research to Memexia (one `agent-memory/remember`
           per story, tags: bank-name + `story-<n>`, content: scope, locked
           decisions, key files).
        8. Present a compact summary and ask for review.

        ### Subsequent iterations

        Process feedback from $LOOP_USER_INPUT. Possible requests:
        - **Edit story N** → modify the file, re-persist research.
        - **Regenerate story N** → rewrite the file from scratch.
        - **Reorder** → renumber files (rename + update internal references).
        - **Add story** → create new file, place in graph.
        - **Remove story** → `git rm` (or `rm` then track in commit), update
          dependencies that referenced it.
        - **Change dependencies / phase** → edit metadata sections.

        After every change:
        - Re-validate the graph (no cycles, monotonic phases).
        - Re-persist any changed story's research to Memexia (overwrite/supersede).
        - Show the user a delta summary.

        ### Approval

        **CRITICAL — completion signal discipline**

        NEVER emit `<promise>STORIES_APPROVED</promise>` unless the user's
        latest message EXPLICITLY says "approved", "looks good", "ship it",
        "lgtm" or a clear synonym. Questions / "almost" / "one more thing"
        are NOT approval. When unsure, ASK.

        On approval:
        - Output a final story list:
          ```
          ## Stories Approved
          1. story-1 — <title> — <phase:N-name | Depends on: ...>
          2. story-2 — ...
          ```
        - Emit `<promise>STORIES_APPROVED</promise>`.

        ### Always include in your response

        ```
        ## Story Status
        Total: {n}
        Mode: {greenfield | existing}
        Pending changes from this iteration: {summary}
        ```
      until: STORIES_APPROVED
      max_iterations: 20
      interactive: true
      gate_message: |
        Review docs/stories/<slug>-*.md. Tell me what to edit, regenerate,
        reorder, add, or remove. Or say "approved" to create GitHub issues.

  # ═══════════════════════════════════════════════════════════════
  # PHASE C: Issue creation
  # For each story file, gh issue create with the §2.4 body. Capture
  # issue numbers, write back to story files, persist issue→slug map
  # to Memexia.
  # ═══════════════════════════════════════════════════════════════

  - id: create-issues
    depends_on: [story-drafting]
    bash: |
      set -euo pipefail

      INFO_FILE="$ARTIFACTS_DIR/stories-info.env"
      if [ ! -f "${INFO_FILE}" ]; then
        echo "ERROR: ${INFO_FILE} missing." >&2
        exit 1
      fi
      # shellcheck disable=SC1090
      . "${INFO_FILE}"

      API_URL="${MEMEXIA_API_URL:-}"
      API_KEY="${MEMEXIA_API_KEY:-}"
      if [ -z "${API_URL}" ] || [ -z "${API_KEY}" ]; then
        echo "ERROR: MEMEXIA_API_URL and MEMEXIA_API_KEY must be set in ~/.archon/.env" >&2
        exit 1
      fi

      # Collect story files in numeric order. Pattern: docs/stories/<slug>-<n>.md
      shopt -s nullglob
      STORY_FILES=( docs/stories/${SLUG}-*.md )
      if [ "${#STORY_FILES[@]}" -eq 0 ]; then
        echo "ERROR: No story files found at docs/stories/${SLUG}-*.md" >&2
        exit 1
      fi

      # Sort by trailing number (handles 2-digit numbers correctly).
      mapfile -t STORY_FILES_SORTED < <(printf '%s\n' "${STORY_FILES[@]}" | awk -F'-' '{print $NF, $0}' | sort -n | cut -d' ' -f2-)

      mkdir -p "$ARTIFACTS_DIR/issue-bodies"
      ISSUE_MAP_FILE="$ARTIFACTS_DIR/issue-map.txt"
      : > "${ISSUE_MAP_FILE}"

      # Read a single field out of YAML frontmatter (between the first two
      # `---` lines). Strips trailing inline comments, surrounding whitespace,
      # and surrounding double quotes. Returns empty if missing.
      get_fm_field() {
        awk -v key="$1" '
          BEGIN { c=0; in_fm=0 }
          /^---[[:space:]]*$/ { c++; if (c==1) {in_fm=1; next}; if (c==2) {exit} }
          in_fm && $0 ~ "^"key":" {
            sub("^"key":[[:space:]]*", "")
            sub(/[[:space:]]+#.*$/, "")
            sub(/[[:space:]]+$/, "")
            sub(/^"/, ""); sub(/"$/, "")
            print
            exit
          }
        ' "$2"
      }

      # Replace one frontmatter line in-place. If the key is missing inside the
      # frontmatter block, append it just before the closing `---`. Operates
      # ONLY on the frontmatter region — the body is left alone.
      set_fm_field() {
        local file="$1" key="$2" value="$3"
        awk -v key="${key}" -v value="${value}" '
          BEGIN { c=0; in_fm=0; replaced=0 }
          /^---[[:space:]]*$/ {
            c++
            if (c==1) { in_fm=1; print; next }
            if (c==2) {
              in_fm=0
              if (!replaced) { print key ": " value }
              print
              next
            }
          }
          in_fm && $0 ~ "^"key":" {
            print key ": " value
            replaced=1
            next
          }
          { print }
        ' "${file}" > "${file}.tmp" && mv "${file}.tmp" "${file}"
      }

      get_section() {
        # Extract a Markdown section by H2 header (## Foo). Output is the body
        # without the header line, until the next H2 or EOF.
        awk -v hdr="## $1" '
          $0==hdr {found=1; next}
          /^## / && found {exit}
          found {print}
        ' "$2"
      }

      # FIRST PASS — create all issues, capture issue numbers.
      for STORY_FILE in "${STORY_FILES_SORTED[@]}"; do
        N=$(basename "${STORY_FILE}" .md | sed -E "s/^${SLUG}-//")
        TITLE_LINE=$(grep -m1 -E '^# Story ' "${STORY_FILE}" | sed -E 's/^# Story [0-9]+:[[:space:]]*//')
        if [ -z "${TITLE_LINE}" ]; then
          echo "ERROR: ${STORY_FILE} missing '# Story <n>: <title>' header." >&2
          exit 1
        fi

        # Frontmatter sanity: required fields.
        for key in title slug story_number memexia_bank prd_path plan_path; do
          if [ -z "$(get_fm_field "${key}" "${STORY_FILE}")" ]; then
            echo "ERROR: ${STORY_FILE} frontmatter is missing required field: ${key}" >&2
            exit 1
          fi
        done

        SUMMARY=$(get_section "Summary" "${STORY_FILE}")
        USER_STORY=$(get_section "User Story" "${STORY_FILE}")
        DECISIONS=$(get_section "Decisions Locked for This Story" "${STORY_FILE}")
        PATTERNS=$(get_section "Patterns to Follow" "${STORY_FILE}")
        FILES_LIST=$(get_section "Files to CREATE / UPDATE" "${STORY_FILE}")
        TASK_LIST=$(get_section "Task List" "${STORY_FILE}")
        ACCEPTANCE=$(get_section "Acceptance Criteria" "${STORY_FILE}")
        DEPS_PHASE=$(get_section "Dependencies / Phase" "${STORY_FILE}")
        PHASE_LABEL=$(get_fm_field "phase_label" "${STORY_FILE}")

        BODY_FILE="$ARTIFACTS_DIR/issue-bodies/${SLUG}-${N}.md"
        cat > "${BODY_FILE}" <<MD
      ## Summary
      ${SUMMARY}

      ## User Story
      ${USER_STORY}

      ## Links
      - PRD: \`${PRD_PATH}\`
      - Plan: \`${PLAN_PATH}\`
      - Per-story plan: \`${STORY_FILE}\`
      - Memexia bank: \`${BANK_NAME}\`
      - Sample query: \`mcp__memexia__memexia_query {bank: "${BANK_NAME}", q: "story-${N}"}\`

      <details>
      <summary><b>Decisions locked for this story</b></summary>

      ${DECISIONS}

      </details>

      <details>
      <summary><b>Patterns to follow</b></summary>

      ${PATTERNS}

      </details>

      ## Files to CREATE / UPDATE
      ${FILES_LIST}

      ## Task List
      ${TASK_LIST}

      ## Acceptance Criteria
      ${ACCEPTANCE}

      ## Dependencies / Phase
      ${DEPS_PHASE}

      ---
      _Generated by archon-plan-to-stories. Implement with: \`archon workflow run archon-execute-story --branch feat/${SLUG}-${N} "<issue-number>"\`_
      MD

        LABEL_ARGS=()
        if [ -n "${PHASE_LABEL}" ] && [ "${MODE}" = "greenfield" ]; then
          LABEL_ARGS+=( --label "${PHASE_LABEL}" )
        fi

        echo "Creating issue for story ${N}: ${TITLE_LINE}"
        ISSUE_URL=$(gh issue create \
          --title "${TITLE_LINE}" \
          --body-file "${BODY_FILE}" \
          "${LABEL_ARGS[@]}" 2>&1) || {
            echo "ERROR: gh issue create failed for ${STORY_FILE}: ${ISSUE_URL}" >&2
            exit 1
          }

        ISSUE_NUMBER=$(printf '%s' "${ISSUE_URL}" | grep -oE '/issues/[0-9]+' | grep -oE '[0-9]+$' | head -1)
        if [ -z "${ISSUE_NUMBER}" ]; then
          echo "ERROR: Could not parse issue number from gh output: ${ISSUE_URL}" >&2
          exit 1
        fi

        printf '%s\t%s\t%s\n' "${N}" "${ISSUE_NUMBER}" "${TITLE_LINE}" >> "${ISSUE_MAP_FILE}"
        echo "  → #${ISSUE_NUMBER}"
      done

      # SECOND PASS — write gh_issue_number + depends_on_issues back into
      # story-file frontmatter. depends_on_stories (story numbers, draft form)
      # is translated into depends_on_issues (issue numbers, canonical form).
      while IFS=$'\t' read -r N ISSUE_NUMBER TITLE_LINE; do
        STORY_FILE="docs/stories/${SLUG}-${N}.md"
        set_fm_field "${STORY_FILE}" "gh_issue_number" "${ISSUE_NUMBER}"
      done < "${ISSUE_MAP_FILE}"

      # Build a story-number → issue-number lookup as JSON for jq.
      MAP_LOOKUP_JSON=$(jq -Rsn --rawfile m "${ISSUE_MAP_FILE}" '
        $m | split("\n") | map(select(length>0)) | map(split("\t")) |
        map({(.[0]): (.[1]|tonumber)}) | add // {}
      ')

      # For each story, translate depends_on_stories into depends_on_issues.
      for STORY_FILE in "${STORY_FILES_SORTED[@]}"; do
        DEPS_RAW=$(get_fm_field "depends_on_stories" "${STORY_FILE}")
        if [ -z "${DEPS_RAW}" ] || [ "${DEPS_RAW}" = "[]" ]; then
          set_fm_field "${STORY_FILE}" "depends_on_issues" "[]"
          continue
        fi
        # DEPS_RAW looks like: [1, 3, 5]  — extract the numbers, map each
        # to its issue number, fail loudly if any story-number is unknown.
        ISSUE_LIST=$(printf '%s' "${DEPS_RAW}" | jq -r --argjson lookup "${MAP_LOOKUP_JSON}" '
          # Tolerate bare YAML-style or JSON-style arrays.
          (.|tostring)
          | gsub("[\\[\\]\\s]"; "")
          | split(",")
          | map(select(length>0))
          | map($lookup[.] // (error("unknown story-number reference: " + .)))
          | tostring
        ' 2>&1) || {
          echo "ERROR: ${STORY_FILE} depends_on_stories references an unknown story: ${ISSUE_LIST}" >&2
          exit 1
        }
        set_fm_field "${STORY_FILE}" "depends_on_issues" "${ISSUE_LIST}"
      done

      # Persist issue-number → story-slug map to Memexia.
      MAP_JSON=$(jq -Rsn --rawfile m "${ISSUE_MAP_FILE}" '
        $m | split("\n") | map(select(length>0)) | map(split("\t")) |
        map({story_number: .[0], issue_number: .[1], title: .[2]})
      ')
      curl -sS -X POST "${API_URL}/api/v1/agent-memory/remember" \
        -H "x-api-key: ${API_KEY}" \
        -H "Content-Type: application/json" \
        -d "$(jq -n \
          --arg agent "archon-plan-to-stories" \
          --arg bank "${BANK_NAME}" \
          --arg slug "${SLUG}" \
          --argjson map "${MAP_JSON}" \
          '{agent_id: $agent, content: ("Issue map for " + $slug + ": " + ($map|tostring)), tags: [$bank, "issue-map", $slug], metadata: {bank: $bank, slug: $slug, issue_map: $map}}')" \
        > /dev/null || {
          echo "WARNING: Failed to persist issue map to Memexia. Continuing." >&2
        }

      ISSUE_COUNT=$(wc -l < "${ISSUE_MAP_FILE}" | tr -d ' ')
      echo "Created ${ISSUE_COUNT} issues."
      echo "Issue map: ${ISSUE_MAP_FILE}"
      cat "${ISSUE_MAP_FILE}"

  # ═══════════════════════════════════════════════════════════════
  # PHASE D: Commit + push
  # ═══════════════════════════════════════════════════════════════

  - id: commit-stories
    depends_on: [create-issues]
    bash: |
      set -euo pipefail

      INFO_FILE="$ARTIFACTS_DIR/stories-info.env"
      # shellcheck disable=SC1090
      . "${INFO_FILE}"

      git add docs/stories/${SLUG}-*.md
      if git diff --cached --quiet; then
        echo "No story file changes to commit."
      else
        git commit -m "docs: stories for ${SLUG}"
      fi

      if ! git push -u origin HEAD 2>&1; then
        echo "ERROR: push failed — verify remote auth and branch state, then push + merge manually." >&2
        echo "(Note: GitHub issues were already created during the create-issues node and persist regardless.)" >&2
        exit 1
      fi

      ISSUE_COUNT=$(wc -l < "$ARTIFACTS_DIR/issue-map.txt" | tr -d ' ')
      ISSUE_LINKS=$(awk -F'\t' '{printf "  - #%s — %s\n", $2, $3}' "$ARTIFACTS_DIR/issue-map.txt")

      PR_TITLE="docs: stories for ${SLUG}"
      PR_BODY=$(cat <<BODY
      Auto-generated by archon-plan-to-stories.

      - Plan: \`${PLAN_PATH}\`
      - Memexia bank: \`${BANK_NAME}\`
      - Stories created: ${ISSUE_COUNT}

      ## GitHub issues created
      ${ISSUE_LINKS}

      Next pipeline step (per issue):
      \`archon workflow run archon-execute-story <issue-number>\`
      BODY
      )

      PR_URL=$(gh pr create --base "$BASE_BRANCH" --title "${PR_TITLE}" --body "${PR_BODY}" 2>&1) || {
        echo "ERROR: gh pr create failed: ${PR_URL}" >&2
        exit 1
      }
      echo "PR created: ${PR_URL}"

      if gh pr merge "${PR_URL}" --squash 2>/tmp/merge.log; then
        echo "Squash-merged immediately."
      elif gh pr merge "${PR_URL}" --squash --auto 2>/tmp/merge.log; then
        echo "Auto-merge scheduled — waiting for branch protection checks."
      else
        echo "WARNING: could not merge PR. Reason:" >&2
        cat /tmp/merge.log >&2
        echo "Review and merge manually: ${PR_URL}" >&2
        exit 0
      fi

      WAIT_TIMEOUT=60
      WAIT_INTERVAL=5
      WAITED=0
      MERGED=0
      while [ "${WAITED}" -lt "${WAIT_TIMEOUT}" ]; do
        STATE=$(gh pr view "${PR_URL}" --json state -q '.state' 2>/dev/null || echo "UNKNOWN")
        case "${STATE}" in
          MERGED) MERGED=1; break ;;
          CLOSED) echo "WARNING: PR closed without merging: ${PR_URL}"; exit 0 ;;
          OPEN)   sleep "${WAIT_INTERVAL}"; WAITED=$((WAITED + WAIT_INTERVAL)) ;;
          *)      echo "Unexpected PR state '${STATE}'; stopping wait."; break ;;
        esac
      done

      echo ""
      echo "Issue numbers (story → #issue):"
      cat "$ARTIFACTS_DIR/issue-map.txt"
      echo ""

      if [ "${MERGED}" -eq 1 ]; then
        echo "Stories merged into ${BASE_BRANCH} after ${WAITED}s."
        echo "Next: archon workflow run archon-execute-story <issue-number> (per issue you want to implement)"
      else
        echo "PR not yet merged after ${WAIT_TIMEOUT}s — auto-merge scheduled."
        echo "Run the next workflow once ${PR_URL} merges:"
        echo "  archon workflow run archon-execute-story <issue-number>"
      fi
