name: bmad-create-ux-design
description: |
  BMAD Phase 2 - Create UX design specification.
  Triggers: "bmad ux design", "ux design", "create ux spec", "bmad ux".

  UX Designer agent (Sally) creates a UX design spec, reading the PRD as context.
  Produces ux-spec.md in _bmad-output/planning-artifacts/.

provider: claude
interactive: true

nodes:
  - id: verify-prd
    bash: |
      if [ -f "$PWD/_bmad-output/planning-artifacts/PRD.md" ]; then
        echo "PRD FOUND"
        echo "--- Preview ---"
        head -40 "$PWD/_bmad-output/planning-artifacts/PRD.md"
        echo "--- end ---"
      else
        echo "ERROR: PRD.md not found. Run /bmad-create-prd first."
        exit 1
      fi

  - id: create-ux-spec
    model: sonnet
    skills:
      - bmad/bmm/ux-designer
    prompt: |
      You are Sally, the BMAD UX Designer agent. Create a comprehensive UX design specification.

      ## PRD Context
      Read the full PRD at `$ARTIFACTS_DIR/planning-artifacts/PRD.md`

      ## User Input
      $ARGUMENTS

      ## Instructions

      Design the user experience based on the PRD requirements. Focus on:
      1. User flows and journey maps
      2. Information architecture
      3. Interaction patterns
      4. Accessibility considerations
      5. Responsive design requirements

      Write the UX specification to `$ARTIFACTS_DIR/planning-artifacts/ux-spec.md`:

      ```markdown
      # UX Design Specification

      **Product**: {name}
      **Based on PRD**: PRD.md
      **Date**: {date}
      **Author**: BMAD UX Designer (Sally)

      ## 1. Design Principles
      {guiding principles for the UX}

      ## 2. User Personas
      {detailed persona descriptions from the PRD, expanded with UX context}

      ## 3. User Journeys
      ### Journey: {journey name}
      | Step | User Action | System Response | Emotion |
      |------|------------|-----------------|---------|
      | 1 | {action} | {response} | {emotion} |

      ## 4. Information Architecture
      {site map or navigation structure}

      ## 5. Screen Specifications
      ### Screen: {screen name}
      - **Purpose**: {what this screen does}
      - **Key Elements**: {list of UI elements}
      - **User Flow**: {where the user comes from and goes to}
      - **States**: {loading, error, empty, success states}
      - **Accessibility**: {a11y requirements}

      ## 6. Interaction Patterns
      {reusable interaction patterns}

      ## 7. Responsive Behavior
      {how the design adapts across breakpoints}

      ## 8. Accessibility Requirements
      {WCAG compliance level, specific requirements}

      ## 9. Open UX Questions
      {decisions still needed}
      ```

    depends_on: [verify-prd]

  - id: review-ux
    approval:
      message: "Review the UX specification. Provide feedback or say 'approved' to finalize."
      capture_response: true
    depends_on: [create-ux-spec]

  - id: finalize-ux
    model: sonnet
    prompt: |
      The UX spec has been reviewed.

      ## Reviewer Feedback
      $review-ux.output

      ## Instructions
      Apply feedback to `$ARTIFACTS_DIR/planning-artifacts/ux-spec.md`.
      Present the final path and recommend `/bmad-create-architecture` for the next phase.

    depends_on: [review-ux]
