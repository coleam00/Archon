name: archon-feature-development
description: |
  사용할 때: 기존 plan을 바탕으로 feature를 구현할 때.
  입력: plan 파일 경로($ARTIFACTS_DIR/plan.md) 또는 plan이 포함된 GitHub issue.
  하는 일: validation loop와 함께 plan을 구현 -> pull request 생성.
  사용하지 않을 때: plan 작성(별도로 만들어야 함), 버그 수정, code review.

nodes:
  - id: implement
    command: archon-implement
    model: claude-opus-4-6[1m]

  - id: create-pr
    command: archon-create-pr
    depends_on: [implement]
    context: fresh
