name: archon-feature-development
description: |
  Use when: Implementing a feature from an existing plan.
  Input: Path to a plan file ($ARTIFACTS_DIR/plan.md) or GitHub issue containing a plan.
  Does: Implements the plan with validation loops -> creates pull request.
  NOT for: Creating plans (plans should be created separately), bug fixes, code reviews.

nodes:
  - id: implement
    command: archon-implement
    provider: claude
    model: large

  - id: create-pr
    command: archon-create-pr
    depends_on: [implement]
    context: fresh

  - id: verify-pr-base
    bash: |
      set -euo pipefail
      HEAD_BRANCH=$(git rev-parse --abbrev-ref HEAD)
      PR_REPO=$(gh repo view "$(git remote get-url "$PR_REMOTE")" --json nameWithOwner -q .nameWithOwner)
      ORIGIN_REPO=$(gh repo view "$(git remote get-url origin)" --json nameWithOwner -q .nameWithOwner)
      ORIGIN_OWNER=${ORIGIN_REPO%%/*}
      if [ "$ORIGIN_REPO" = "$PR_REPO" ]; then
        PR_HEAD="$HEAD_BRANCH"
      else
        PR_HEAD="${ORIGIN_OWNER}:$HEAD_BRANCH"
      fi
      PR_NUMBER=$(gh pr list --repo "$PR_REPO" --head "$PR_HEAD" --state open --json number -q '.[0].number')
      if [ -z "$PR_NUMBER" ]; then
        echo "No open PR found for branch $HEAD_BRANCH" >&2
        exit 1
      fi
      EXPECTED="$BASE_BRANCH"
      ACTUAL=$(gh pr view "$PR_NUMBER" --repo "$PR_REPO" --json baseRefName -q '.baseRefName')
      if [ "$ACTUAL" != "$EXPECTED" ]; then
        echo "Base mismatch on PR #$PR_NUMBER: expected=$EXPECTED actual=$ACTUAL — re-targeting" >&2
        gh pr edit "$PR_NUMBER" --repo "$PR_REPO" --base "$EXPECTED"
      else
        echo "PR base verified: $EXPECTED"
      fi
    depends_on: [create-pr]
