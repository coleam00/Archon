name: bdc-ce-feature-surface-freeze
description: |
  Use when: Shipping WO-CE-FEATURE-SURFACE-FREEZE-01 — audit + freeze CE-visible feature surface.
  Input: WO_ID = WO-CE-FEATURE-SURFACE-FREEZE-01.
  Does: Audits all routes/components in lspro-react that CE plan users can see, ensures higher-tier
        features (PRO/HQ/multi-category) are gated, produces audit report + ensures entitlement
        registry blocks the disallowed surfaces, opens PR.
  Repo: bluedevilcollectibles/lspro-react. Cross-repo spec from bdc-xo.
  parallel_ok: true (independent from #1/#2/#3 — surface audit is read-mostly with config edits).

policyFile: harness/policies/agent-behavior.md
model: sonnet

nodes:
  - id: read-spec
    bash: |
      set -euo pipefail
      WO_ID="${WO_ID:-WO-CE-FEATURE-SURFACE-FREEZE-01}"
      SPEC_PATH="docs/superpowers/specs/ce-release-branch/work-orders/${WO_ID}.md"
      SPEC=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/${SPEC_PATH}?ref=main" --jq .content 2>/dev/null | base64 -d 2>/dev/null || true)
      [ -z "$SPEC" ] && { echo "Spec not found" >&2; exit 1; }
      printf 'WO_ID=%s\nSPEC_PATH=bdc-xo:%s\nWORKFLOW_ID=%s\n\n' "$WO_ID" "$SPEC_PATH" "$WORKFLOW_ID"
      printf -- '--- SPEC ---\n%s\n' "$SPEC"

  # post-started node REMOVED 2026-05-12 - n8n webhook hangs from Archon executor subprocess
  # (see WO-HARNESS-N8N-WEBHOOK-EGRESS-FIX-01). Builder-status feed is optional bookkeeping;
  # flip-notion is the canonical close action.

  - id: audit
    depends_on: [read-spec]
    task_class: medium_work
    prompt: |
      Audit CE-visible feature surface in lspro-react.

      ## Inputs
      - CE allowed surfaces: CE import, AutoFix, cover lookup, blocker resolution, price review,
        WhatNot export, sample data, onboarding walkthrough, license status, help/support
      - Explicitly hidden: multi-category import, card/toy/vinyl sources, HQ workflows,
        ShopOps customer management, advanced inventory, team/staff admin, billing mutation UI,
        experimental AI features

      ## Required Output (Markdown)
      - WO ID: WO-CE-FEATURE-SURFACE-FREEZE-01
      - Audit report path: `docs/CE-FEATURE-SURFACE-AUDIT.md`
      - For each top-level route under `src/pages/` or `app/`:
        - Route path
        - Visible to CE plan: yes / no
        - Source of gating: `tiers.ts`, `<plan>` prop check, route guard, or NONE (leak risk)
        - Required action: keep, gate, or add explicit hide
      - Component sweep: `src/components/` — flag any TopNav/Sidebar items that show higher-tier features without a tier guard
      - Entitlement registry (src/lib/tiers.ts or similar): list current CE allowlist; identify any of the "allowed" list that's missing from CE
      - Required code changes:
        - Add tier guards where leak detected
        - Update entitlement registry if needed
      - Verification: `grep -rE "plan ===? 'ce'\\|plan ===? 'pro'\\|plan ===? 'hq'" src/ | wc -l` (audit count)
      - Commit msg: `feat(ce): WO-CE-FEATURE-SURFACE-FREEZE-01 — audit + close higher-tier UI leaks for CE plan`
      - Push: `wo/ce-feature-surface-freeze-01` -> PR against main

      ## Spec
      $read-spec.output

  - id: implement
    depends_on: [audit]
    task_class: medium_work
    loop:
      fresh_context: true
      until: COMPLETE
      max_iterations: 5
      prompt: |
        Implement the surface freeze per the audit.

        ## Audit
        $audit.output

        ## Execution Rules
        - Create `docs/CE-FEATURE-SURFACE-AUDIT.md` with full audit (route table + flags + remediation).
        - Apply MINIMAL code changes to close confirmed leaks (add tier guards). Do NOT refactor unrelated tier code.
        - If entitlement registry needs an update, edit `src/lib/tiers.ts` (or equivalent) to make CE allowlist explicit.
        - Do NOT touch CE wizard component internals (CEStep01-04). Those are CE-allowed already.
        - Do NOT add new features. Do NOT delete features that ARE allowed for CE.

        Output <promise>COMPLETE</promise> when audit doc exists + all flagged leaks closed + grep verification passes.

  - id: verify
    depends_on: [implement]
    bash: |
      set -euo pipefail
      ls docs/CE-FEATURE-SURFACE-AUDIT.md
      echo "tier-related code paths (audit count):"
      grep -rE "plan ===? 'ce'|plan ===? 'pro'|plan ===? 'hq'" src/ 2>/dev/null | wc -l || true

  - id: commit-and-push
    depends_on: [verify]
    bash: |
      set -euo pipefail
      BRANCH="wo/ce-feature-surface-freeze-01"
      # Idempotent checkout: handle retry-into-existing-worktree case + worktree-locked-branch case
      if git show-ref --quiet "refs/heads/$BRANCH"; then
        if git worktree list --porcelain | grep -q "branch refs/heads/$BRANCH" && \
           [ "$(git rev-parse --abbrev-ref HEAD)" != "$BRANCH" ]; then
          BRANCH="${BRANCH}-run-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
        else
          git checkout "$BRANCH"
        fi
      else
        git checkout -b "$BRANCH"
      fi
      git add -A
      # Idempotent commit: skip if branch already contains the work (retry-safe).
      if git diff --cached --quiet; then
        echo "No staged changes; branch already contains requested work"
      else
        git -c user.name="John Ranson" -c user.email="admin@bluedevilcollectibles.com" \
          commit -m "feat(ce): WO-CE-FEATURE-SURFACE-FREEZE-01 — audit + close higher-tier UI leaks for CE plan

        Adds docs/CE-FEATURE-SURFACE-AUDIT.md.
        Applies minimal tier guards to close confirmed leaks where PRO/HQ surfaces would be visible to CE plan.

        Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>"
      fi
      git push -u origin "$BRANCH"
      echo "BRANCH=${BRANCH}"

  - id: open-pr
    depends_on: [commit-and-push]
    bash: |
      set -euo pipefail
      BRANCH=$(printf '%s\n' "$commit-and-push.output" | sed -n 's/^BRANCH=//p' | head -n 1)
      REPO="bluedevilcollectibles/lspro-react"
      BASE="main"
      TITLE="feat(ce): WO-CE-FEATURE-SURFACE-FREEZE-01 — audit + freeze CE surface"
      BODY="Implements WO-CE-FEATURE-SURFACE-FREEZE-01. Audit report at docs/CE-FEATURE-SURFACE-AUDIT.md. Tier guards added where leaks confirmed. 🤖 Generated with Claude Code"
      # Idempotent PR creation. See WO-HARNESS-OPEN-PR-GRAPHQL-NO-COMMITS-FIX-01.
      existing_pr_url() {
        gh pr list --repo "$REPO" --head "$BRANCH" --state open --json url --jq '.[0].url // empty' 2>/dev/null
      }
      PR_URL="$(existing_pr_url)"
      if [ -n "$PR_URL" ]; then
        echo "PR_URL=$PR_URL"
        exit 0
      fi
      for attempt in 1 2 3 4 5; do
        if PR_OUT=$(gh pr create --repo "$REPO" --base "$BASE" --head "$BRANCH" \
            --title "$TITLE" --body "$BODY" 2>&1); then
          echo "PR_URL=$PR_OUT"
          exit 0
        fi
        PR_URL="$(existing_pr_url)"
        if [ -n "$PR_URL" ]; then
          echo "PR_URL=$PR_URL"
          exit 0
        fi
        echo "open-pr attempt $attempt failed: $PR_OUT" >&2
        sleep 10
      done
      echo "open-pr failed after retries; branch pushed at $BRANCH but no PR exists" >&2
      exit 1

  - id: build-manifest
    depends_on: [open-pr]
    task_class: clerical
    prompt: |
      Manifest v2 for WO-CE-FEATURE-SURFACE-FREEZE-01.
      Required: WO, Builder, Audit report path, leaks closed (count), files modified, PR URL,
      Grep verification, VALIDATION: PASS.
      Inputs: $read-spec.output $audit.output $verify.output $commit-and-push.output $open-pr.output

  # post-completed node REMOVED 2026-05-12 - n8n webhook hangs from Archon executor subprocess
  # (see WO-HARNESS-N8N-WEBHOOK-EGRESS-FIX-01). Builder-status feed is optional bookkeeping;
  # flip-notion below is the canonical close action.

  - id: flip-notion
    depends_on: [build-manifest]
    task_class: clerical
    prompt: |
      Flip Notion WO-CE-FEATURE-SURFACE-FREEZE-01 to REVIEW.
      Page ID: 35eef4c9-ce00-818f-8e7a-d3ec9fcfd0ee
      Notes = $build-manifest.output. Claude Status -> REVIEW, Status -> Review.
      If MCP unavailable: XO_TODO line.
