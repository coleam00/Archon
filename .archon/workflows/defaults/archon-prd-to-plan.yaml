name: archon-prd-to-plan
description: |
  Use when: User has an approved PRD and wants the overall implementation plan
  drafted, refined, and committed before stories are broken out.
  Triggers: "prd to plan", "draft the plan from this prd",
            "create implementation plan", "plan from prd <path>".
  NOT for: Story-level breakdowns (use archon-plan-to-stories).
  NOT for: PRD creation (use archon-brainstorm-to-prd).

  Pipeline workflow 2 of 4. Implements PRD methodology phase 6 (overall plan).

  Reads `docs/prd-<slug>.md` (frontmatter contract from workflow 1), queries the
  Memexia bank for relevant decisions and findings, drafts `docs/plans/<slug>.md`,
  iterates with the user until approved, persists architectural decisions back
  into Memexia, then commits and pushes.

  Input: a path to the PRD markdown file (e.g. `docs/prd-feature-x.md`).

provider: claude
interactive: true

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE A: Load context
  # Validate PRD path, parse frontmatter, persist context to
  # $ARTIFACTS_DIR/plan-info.env for downstream nodes.
  # ═══════════════════════════════════════════════════════════════

  - id: load-context
    bash: |
      set -euo pipefail

      MCP_FILE=".archon/mcp/memexia.json"
      if [ ! -f "${MCP_FILE}" ]; then
        echo "ERROR: ${MCP_FILE} not found. Worktree may have been created without copyFiles: [.archon/mcp]." >&2
        echo "See docs/memexia-onboarding/ in the archon repo for setup." >&2
        exit 1
      fi

      # PRD path is the workflow argument. Reject empty / multi-arg input.
      PRD_PATH=$(printf '%s' "$ARGUMENTS" | awk '{print $1}')
      if [ -z "${PRD_PATH}" ]; then
        echo "ERROR: usage: archon workflow run archon-prd-to-plan <path-to-prd.md>" >&2
        exit 1
      fi
      if [ ! -f "${PRD_PATH}" ]; then
        echo "ERROR: PRD not found at ${PRD_PATH}" >&2
        exit 1
      fi

      # Extract YAML frontmatter (between the first two --- lines).
      FRONTMATTER=$(awk '/^---$/{c++; if (c==2) exit; next} c==1' "${PRD_PATH}")
      if [ -z "${FRONTMATTER}" ]; then
        echo "ERROR: ${PRD_PATH} has no YAML frontmatter. Was it produced by archon-brainstorm-to-prd?" >&2
        exit 1
      fi

      get_field() {
        printf '%s\n' "${FRONTMATTER}" | awk -v key="$1" '$0 ~ "^"key":" {sub("^"key":[[:space:]]*", ""); print; exit}' | sed -E 's/^"//; s/"$//'
      }

      SLUG=$(get_field "slug")
      BANK_NAME=$(get_field "memexia_bank")
      TITLE=$(get_field "title")

      for v in SLUG BANK_NAME TITLE; do
        eval "val=\${$v}"
        if [ -z "${val}" ]; then
          echo "ERROR: PRD frontmatter is missing required field for ${v}." >&2
          exit 1
        fi
      done

      PLAN_PATH="docs/plans/${SLUG}.md"
      mkdir -p "docs/plans"

      API_URL="${MEMEXIA_API_URL:-}"
      if [ -z "${API_URL}" ]; then
        echo "ERROR: MEMEXIA_API_URL must be set in ~/.archon/.env" >&2
        exit 1
      fi

      mkdir -p "$ARTIFACTS_DIR"
      cat > "$ARTIFACTS_DIR/plan-info.env" <<EOF
      SLUG=${SLUG}
      BANK_NAME=${BANK_NAME}
      TITLE=${TITLE}
      PRD_PATH=${PRD_PATH}
      PLAN_PATH=${PLAN_PATH}
      MEMEXIA_API_URL=${API_URL}
      EOF

      echo "SLUG=${SLUG}"
      echo "BANK_NAME=${BANK_NAME}"
      echo "TITLE=${TITLE}"
      echo "PRD_PATH=${PRD_PATH}"
      echo "PLAN_PATH=${PLAN_PATH}"
      echo "MEMEXIA_API_URL=${API_URL}"

  # ═══════════════════════════════════════════════════════════════
  # PHASE B: Plan creation
  # Fresh prompt — gets MCP + skill preload. Reads PRD + bank +
  # CLAUDE.md and writes docs/plans/<slug>.md.
  # ═══════════════════════════════════════════════════════════════

  - id: plan-create
    depends_on: [load-context]
    model: sonnet
    context: fresh
    mcp: .archon/mcp/memexia.json
    skills: [memexia-memory]
    prompt: |
      # PRD-to-Plan — Plan Creation

      You are creating the overall implementation plan from an approved PRD.
      The plan is the input to archon-plan-to-stories — it must be specific
      enough that someone can derive atomic stories from it without re-deriving
      architectural decisions.

      You have:
      - The Memexia MCP attached — use `mcp__memexia__*` tools directly.
      - The `memexia-memory` skill preloaded — follow its zone routing rules.

      ---

      ## Step 1: Pull context

      Parse `SLUG=...`, `BANK_NAME=...`, `PRD_PATH=...`, `PLAN_PATH=...` from:
      $load-context.output

      Then:
      1. Read the PRD at `PRD_PATH` end-to-end. Note user stories, features,
         edge cases, success criteria, open questions.
      2. `mcp__memexia__memexia_agent_memory_query` the bank for everything
         tagged `decision`, `codebase-finding`, and `prd-revision`. These are
         the locked decisions and findings from the brainstorm + PRD workflows.
      3. Read CLAUDE.md to capture conventions, constraints, validation commands.
      4. Read every file the PRD references (file:line citations).
      5. `git log --oneline -20` for recent activity in the area.

      ## Step 2: Write the plan

      Write to `PLAN_PATH` (i.e. `docs/plans/<slug>.md`). Use this template —
      every section filled with specific, verified information:

      ```markdown
      ---
      title: <Title from PRD>
      slug: <slug>
      memexia_bank: <bank-name>
      prd_path: <prd-path>
      plan_path: docs/plans/<slug>.md
      created_at: <YYYY-MM-DD>
      ---

      # Plan: <Title>

      ## Summary
      1–2 sentences: what changes overall and why.

      ## Mission
      The core goal in one statement.

      ## Success Criteria
      - [ ] Specific, testable outcome.
      - [ ] All validation passes (`bun run validate` or project equivalent).
      - [ ] No regressions in existing tests.

      ## Scope
      ### In Scope
      - <Specific deliverables>
      ### Out of Scope
      - <Explicitly excluded — and why>

      ## Codebase Context
      ### Key Files
      | File | Role | Likely action |
      |------|------|---------------|
      | `path` | what it does | CREATE / UPDATE / READ |

      ### Patterns to Follow
      Cite actual code from the repo (file:line ...) the implementation should mirror.

      ## Architecture
      - Decision 1 — with rationale (cite Memexia bank entry if applicable).
      - Decision 2 — with rationale.

      ## Task Breakdown (overall — story-level granularity)
      A bulleted list where each bullet becomes ~1 GitHub issue in workflow 3.
      Group by phase if greenfield (Phase 0 foundation, Phase 1 features, ...).
      Each bullet: title + 1-line scope hint + dependency notes.

      ## Testing Strategy
      | Layer | Test files / patterns | What it validates |
      |-------|----------------------|-------------------|
      | unit  | path/pattern | behavior |
      | integration | path/pattern | behavior |

      ## Validation Commands
      1. Type check: `<command>`
      2. Lint: `<command>`
      3. Tests: `<command>`
      4. Full validation: `<command>`

      ## Risks
      | Risk | Impact | Mitigation |
      |------|--------|------------|
      | risk | HIGH/MED/LOW | mitigation |

      ## Open Questions
      Items that need answering before stories can be drafted, OR that should
      be deferred to per-story refinement in workflow 4.
      ```

      ## Step 3: Persist new architectural decisions

      For each decision the plan locks that wasn't already in Memexia:
      - `mcp__memexia__memexia_agent_memory_remember`
      - `bank: <bank-name>`, `tags: ["decision", "plan"]`
      - Content: decision + rationale.

      ## Step 4: Verify before reporting

      - Every file path in the plan exists (or is explicitly marked CREATE).
      - Every cited pattern: confirm the source file:line still matches.
      - Story-level bullets are independently scopeable (no "and also..." chains).

      ## Step 5: Report

      ```
      ## Plan Drafted

      Path: <plan-path>
      Bank: <bank-name>
      Story-level bullets: {n}
      New decisions persisted to Memexia: {n}

      Please review and provide feedback in the next loop.
      ```

  # ═══════════════════════════════════════════════════════════════
  # PHASE C: Plan refine loop
  # Mirrors PIV's refine-plan. MCP/skills can't attach to a loop —
  # AI uses Bash+Read of the skill file for Memexia access.
  # ═══════════════════════════════════════════════════════════════

  - id: refine-plan
    depends_on: [plan-create]
    idle_timeout: 600000
    loop:
      prompt: |
        # PRD-to-Plan — Plan Refinement

        The user is reviewing the plan and providing feedback.

        **User's feedback**: $LOOP_USER_INPUT

        **Load-context output (slug, bank, paths)**:
        $load-context.output

        ---

        ## Memexia: Bash + curl pattern (loop nodes can't attach mcp:/skills:)

        1. Read `~/.claude/skills/memexia-memory/SKILL.md` once per iteration
           for zone routing / dedup / TTL rules.
        2. Auth: `jq` `MEMEXIA_API_URL` and `MEMEXIA_API_KEY` from
           `.archon/mcp/memexia.json`. Pass `agent_id: "archon-prd-to-plan"`
           in agent-memory bodies.
        3. Endpoints used in this loop:
           - `POST /api/v1/agent-memory/remember` — persist locked decisions.
           - `POST /api/v1/agent-memory/query` — recall prior decisions.

        ---

        ## Step 1: Read the plan

        Parse `PLAN_PATH=...` from load-context output. Read it. Read CLAUDE.md.

        ## Step 2: Process feedback

        **No user feedback yet (first iteration, $LOOP_USER_INPUT empty)**:
        - Summarize the plan's key decisions and story-level breakdown.
        - Highlight any "Open Questions" the plan defers.
        - Ask for review feedback.
        - Do NOT emit the completion signal on the first iteration.

        **User explicitly approved** (latest message: "approved", "looks good",
        "ship it", "ready", "lgtm"):
        - Make no further edits.
        - Output: "Plan approved. Ready to commit."
        - Emit `<promise>PLAN_APPROVED</promise>`.

        **User provided specific feedback**:
        - Edit the plan file directly.
        - For each architectural decision changed/added, persist to Memexia
          (`agent-memory/remember`, tags: `decision` + `plan-revision`).
        - Re-verify file:line references after edits.

        ## Step 3: CRITICAL — completion signal discipline

        NEVER emit `<promise>PLAN_APPROVED</promise>` unless the user's latest
        message EXPLICITLY says "approved", "looks good", "ship it", "lgtm" or
        a clear synonym. Questions, "almost", "one more thing" are NOT approval.
        When unsure, ASK.

        ## Step 4: Show changes

        ```
        ## Plan Revised

        Changes:
        - {change 1}
        - {change 2}

        Updated counts:
        - Story-level bullets: {n}
        - Risks: {n}
        - Open Questions: {n}

        Review and provide more feedback, or say "approved" to commit.
        ```
      until: PLAN_APPROVED
      max_iterations: 15
      interactive: true
      gate_message: |
        Review docs/plans/<slug>.md. Provide specific feedback on what to
        change, or say "approved" to commit the plan and finish.

  # ═══════════════════════════════════════════════════════════════
  # PHASE D: Commit + push
  # ═══════════════════════════════════════════════════════════════

  - id: commit-plan
    depends_on: [refine-plan]
    bash: |
      set -euo pipefail

      INFO_FILE="$ARTIFACTS_DIR/plan-info.env"
      if [ ! -f "${INFO_FILE}" ]; then
        echo "ERROR: ${INFO_FILE} missing." >&2
        exit 1
      fi
      # shellcheck disable=SC1090
      . "${INFO_FILE}"

      if [ -z "${SLUG:-}" ] || [ -z "${PLAN_PATH:-}" ]; then
        echo "ERROR: SLUG or PLAN_PATH not set in ${INFO_FILE}." >&2
        exit 1
      fi
      if [ ! -f "${PLAN_PATH}" ]; then
        echo "ERROR: Plan file not found at ${PLAN_PATH}." >&2
        exit 1
      fi

      # Frontmatter sanity — workflow 3 depends on slug + memexia_bank + plan_path.
      for key in slug memexia_bank plan_path; do
        if ! grep -qE "^${key}:" "${PLAN_PATH}"; then
          echo "ERROR: Plan frontmatter is missing '${key}'." >&2
          exit 1
        fi
      done

      git add "${PLAN_PATH}"
      if git diff --cached --quiet; then
        echo "No plan changes to commit."
      else
        git commit -m "docs: implementation plan for ${SLUG}"
      fi

      if ! git push -u origin HEAD 2>&1; then
        echo "ERROR: push failed — verify remote auth and branch state, then push + merge manually." >&2
        exit 1
      fi

      PR_TITLE="docs: plan for ${SLUG}"
      PR_BODY=$(cat <<BODY
      Auto-generated by archon-prd-to-plan.

      - Plan: \`${PLAN_PATH}\`
      - PRD: \`${PRD_PATH}\`
      - Memexia bank: \`${BANK_NAME}\`

      Next pipeline step: \`archon workflow run archon-plan-to-stories ${PLAN_PATH}\`
      BODY
      )

      PR_URL=$(gh pr create --base "$BASE_BRANCH" --title "${PR_TITLE}" --body "${PR_BODY}" 2>&1) || {
        echo "ERROR: gh pr create failed: ${PR_URL}" >&2
        exit 1
      }
      echo "PR created: ${PR_URL}"

      if gh pr merge "${PR_URL}" --squash 2>/tmp/merge.log; then
        echo "Squash-merged immediately."
      elif gh pr merge "${PR_URL}" --squash --auto 2>/tmp/merge.log; then
        echo "Auto-merge scheduled — waiting for branch protection checks."
      else
        echo "WARNING: could not merge PR. Reason:" >&2
        cat /tmp/merge.log >&2
        echo "Review and merge manually: ${PR_URL}" >&2
        exit 0
      fi

      WAIT_TIMEOUT=60
      WAIT_INTERVAL=5
      WAITED=0
      MERGED=0
      while [ "${WAITED}" -lt "${WAIT_TIMEOUT}" ]; do
        STATE=$(gh pr view "${PR_URL}" --json state -q '.state' 2>/dev/null || echo "UNKNOWN")
        case "${STATE}" in
          MERGED) MERGED=1; break ;;
          CLOSED) echo "WARNING: PR closed without merging: ${PR_URL}"; exit 0 ;;
          OPEN)   sleep "${WAIT_INTERVAL}"; WAITED=$((WAITED + WAIT_INTERVAL)) ;;
          *)      echo "Unexpected PR state '${STATE}'; stopping wait."; break ;;
        esac
      done

      if [ "${MERGED}" -eq 1 ]; then
        echo "Plan merged into ${BASE_BRANCH} after ${WAITED}s."
        echo "Next: archon workflow run archon-plan-to-stories ${PLAN_PATH}"
      else
        echo "PR not yet merged after ${WAIT_TIMEOUT}s — auto-merge scheduled."
        echo "Run the next workflow once ${PR_URL} merges:"
        echo "  archon workflow run archon-plan-to-stories ${PLAN_PATH}"
      fi
