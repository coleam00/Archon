name: bmad-research
description: |
  BMAD Phase 1 - Market, domain, or technical research.
  Triggers: "bmad research", "research", "market research", "technical research",
            "bmad research market", "bmad research technical".

  Analyst agent conducts structured research, produces findings in _bmad-output/.

provider: claude

nodes:
  - id: classify-research
    model: haiku
    prompt: |
      Classify the research request and determine scope.

      ## Request
      $ARGUMENTS

      Determine the research type and produce a JSON object:
      {
        "type": "market" | "domain" | "technical" | "competitive" | "mixed",
        "topic": "short description",
        "scope": "narrow" | "broad",
        "key_questions": ["question 1", "question 2", "question 3"]
      }
    output_format:
      type: object
      properties:
        type:
          type: string
          enum: [market, domain, technical, competitive, mixed]
        topic:
          type: string
        scope:
          type: string
          enum: [narrow, broad]
        key_questions:
          type: array
          items:
            type: string
      required: [type, topic, scope, key_questions]

  - id: conduct-research
    model: sonnet
    skills:
      - bmad/bmm/analyst
    prompt: |
      You are Mary, the BMAD Analyst agent. Conduct structured research.

      ## Research Classification
      - Type: $classify-research.output.type
      - Topic: $classify-research.output.topic
      - Scope: $classify-research.output.scope
      - Key Questions: $classify-research.output.key_questions

      ## User Input
      $ARGUMENTS

      ## Instructions

      Conduct thorough research based on the classified type:

      **Market Research**:
      - Market size, growth trends, TAM/SAM/SOM estimates
      - Customer segments and personas
      - Buying behavior and decision factors
      - Regulatory or compliance considerations

      **Domain Research**:
      - Industry-specific terminology and concepts
      - Standard practices and conventions
      - Common pain points and workflows
      - Domain experts and thought leaders

      **Technical Research**:
      - Existing solutions and approaches
      - Technology stack options and trade-offs
      - Implementation complexity estimates
      - Known pitfalls and edge cases

      **Competitive Research**:
      - Direct and indirect competitors
      - Feature comparison matrix
      - Pricing models and positioning
      - Gaps in the market

      Write your findings to `$ARTIFACTS_DIR/research-findings.md` with this structure:

      ```markdown
      # Research Findings

      **Type**: {research type}
      **Topic**: {topic}
      **Date**: {date}

      ## Executive Summary
      {key findings in 3-5 bullet points}

      ## Detailed Findings
      {organized by research dimension}

      ## Data Sources
      {where information came from}

      ## Confidence Level
      HIGH / MEDIUM / LOW per finding

      ## Gaps Requiring Further Research
      {what is still unknown}

      ## Implications for Product
      {how findings should influence the product}
      ```

    depends_on: [classify-research]
