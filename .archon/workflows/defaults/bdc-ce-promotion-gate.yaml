name: bdc-ce-promotion-gate
description: |
  Use when: Shipping WO-CI-CE-PROMOTION-GATE-01 — Captain CI gate that blocks unsafe main→release/ce promotions.
  Input: WO_ID = WO-CI-CE-PROMOTION-GATE-01.
  Does: Adds GitHub Actions workflow .github/workflows/ce-promotion-gate.yml on lspro-react that
        runs when a PR targets release/ce. Checks: source is main or promotion/ce/*, PR body
        matches the promotion template, CE regression passed, no PRO/HQ labels, no entitlement
        registry drift, no forbidden file patterns.
  Repo: bluedevilcollectibles/lspro-react. Cross-repo spec from bdc-xo.
  Depends on: WO-RELEASE-CE-BRANCH-MODEL-01 (branch exists), WO-CI-CE-REGRESSION-SUITE-01 (regression check name).

policyFile: harness/policies/agent-behavior.md
model: sonnet

nodes:
  - id: read-spec
    bash: |
      set -euo pipefail
      WO_ID="${WO_ID:-WO-CI-CE-PROMOTION-GATE-01}"
      SPEC_PATH="docs/superpowers/specs/ce-release-branch/work-orders/${WO_ID}.md"
      SPEC=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/${SPEC_PATH}?ref=main" --jq .content 2>/dev/null | base64 -d 2>/dev/null || true)
      TEMPLATE=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/docs/superpowers/specs/ce-release-branch/templates/ce-promotion-pr-template.md?ref=main" --jq .content 2>/dev/null | base64 -d 2>/dev/null || true)
      [ -z "$SPEC" ] && { echo "Spec not found" >&2; exit 1; }
      printf 'WO_ID=%s\nSPEC_PATH=bdc-xo:%s\nWORKFLOW_ID=%s\n\n' "$WO_ID" "$SPEC_PATH" "$WORKFLOW_ID"
      printf -- '--- SPEC ---\n%s\n\n' "$SPEC"
      printf -- '--- PROMOTION PR TEMPLATE ---\n%s\n' "$TEMPLATE"

  - id: verify-prereq
    depends_on: [read-spec]
    bash: |
      set -euo pipefail
      gh api "repos/bluedevilcollectibles/lspro-react/branches/release/ce" --jq .name >/dev/null 2>&1 \
        || { echo "BLOCKER: release/ce missing. Run WO-RELEASE-CE-BRANCH-MODEL-01 first." >&2; exit 1; }
      echo "release/ce verified."

  - id: post-started
    depends_on: [verify-prereq]
    bash: |
      set -euo pipefail
      WO_ID=$(printf '%s\n' "$read-spec.output" | sed -n 's/^WO_ID=//p' | head -n 1)
      curl -sS -X POST "https://n8n.bluedevilcollectibles.com/webhook/builder-status" \
        -H "Content-Type: application/json" \
        -d "{\"action\":\"started\",\"wo_id\":\"${WO_ID}\",\"builder\":\"Major Build\"}" || true

  - id: implement
    depends_on: [verify-prereq]
    task_class: medium_work
    loop:
      fresh_context: true
      until: COMPLETE
      max_iterations: 5
      prompt: |
        Implement the CE promotion gate as a GitHub Actions workflow on lspro-react.

        ## Spec
        $read-spec.output

        ## Required File
        `.github/workflows/ce-promotion-gate.yml`

        ## Checks (each is a job step)
        1. **Source branch valid** — pr.head.ref must be `main` or match `promotion/ce/*`. Fail if not.
        2. **PR body matches promotion template** — check for required headings: "Commits included", "CE impact", "Shared systems touched", "Regression result", "Risk summary", "Rollback plan". Fail if any missing.
        3. **CE regression check** — wait for `ce-regression` check (from WO-CI-CE-REGRESSION-SUITE-01) to pass. Block until it does.
        4. **No PRO/HQ labels introduced** — `gh pr view --json labels --jq '.labels[].name'` must NOT include any of: `pro-feature`, `hq-feature`, `multi-category`, `experimental`. Fail if present.
        5. **No entitlement registry drift** — compare `src/lib/tiers.ts` diff: if any line touching `ce` plan removed/changed, require explicit `ce-entitlement-change` label. Fail if missing.
        6. **No deploy config drift** — fail if `.github/workflows/` files touched without `ce-deploy-config` label.
        7. **No forbidden file patterns** — fail if any `**/experimental/**`, `**/hq/**`, `**/pro-only/**` paths modified.

        Each check posts a PR comment with pass/fail reasons.

        ## Triggers
        - `pull_request.types: [opened, synchronize, reopened, edited, labeled, unlabeled]`
        - `pull_request.branches: [release/ce]`

        ## Permissions
        - `pull-requests: write` (for comments)
        - `contents: read`
        - `checks: write`

        Output <promise>COMPLETE</promise> when the yml exists + lints cleanly (yq or yamllint).

  - id: verify
    depends_on: [implement]
    bash: |
      set -euo pipefail
      ls .github/workflows/ce-promotion-gate.yml
      grep -E "release/ce" .github/workflows/ce-promotion-gate.yml >/dev/null
      grep -cE "promotion/ce" .github/workflows/ce-promotion-gate.yml

  - id: commit-and-push
    depends_on: [verify]
    bash: |
      set -euo pipefail
      BRANCH="wo/ci-ce-promotion-gate-01"
      git checkout -b "$BRANCH"
      git add .github/workflows/ce-promotion-gate.yml
      git -c user.name="John Ranson" -c user.email="admin@bluedevilcollectibles.com" \
        commit -m "feat(ci): WO-CI-CE-PROMOTION-GATE-01 — Captain CI gate for main → release/ce

      Adds .github/workflows/ce-promotion-gate.yml. Runs on PRs targeting release/ce.
      7 checks: source branch valid, PR body template, CE regression, no PRO/HQ labels,
      no entitlement drift, no deploy config drift, no forbidden file patterns.

      Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>"
      git push -u origin "$BRANCH"
      echo "BRANCH=${BRANCH}"

  - id: open-pr
    depends_on: [commit-and-push]
    bash: |
      set -euo pipefail
      BRANCH=$(printf '%s\n' "$commit-and-push.output" | sed -n 's/^BRANCH=//p' | head -n 1)
      gh pr create --base main --head "$BRANCH" \
        --title "feat(ci): WO-CI-CE-PROMOTION-GATE-01 — CE promotion gate" \
        --body "Implements WO-CI-CE-PROMOTION-GATE-01. Adds Captain CI workflow that gates PRs targeting release/ce. 7 checks. 🤖 Generated with Claude Code"
      gh pr view --json url --jq '"PR_URL=\(.url)"'

  - id: build-manifest
    depends_on: [open-pr]
    task_class: clerical
    prompt: |
      Manifest v2 for WO-CI-CE-PROMOTION-GATE-01. Files created (.github/workflows/ce-promotion-gate.yml),
      7 checks summarized, PR URL, VALIDATION: PASS.
      Inputs: $read-spec.output $verify.output $commit-and-push.output $open-pr.output

  - id: post-completed
    depends_on: [build-manifest]
    bash: |
      set -euo pipefail
      WO_ID=$(printf '%s\n' "$read-spec.output" | sed -n 's/^WO_ID=//p' | head -n 1)
      DETAIL=$(printf '%s\n' "$build-manifest.output" | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
      curl -sS -X POST "https://n8n.bluedevilcollectibles.com/webhook/builder-status" \
        -H "Content-Type: application/json" \
        -d "{\"action\":\"completed\",\"wo_id\":\"${WO_ID}\",\"builder\":\"Major Build\",\"detail\":${DETAIL}}" || true

  - id: flip-notion
    depends_on: [post-completed]
    task_class: clerical
    prompt: |
      Flip Notion WO-CI-CE-PROMOTION-GATE-01 to REVIEW.
      Page ID: 35def4c9-ce00-810f-ae0f-d0d8e49f45a0
      Notes = $build-manifest.output. Status -> Review. Claude Status -> REVIEW.
