name: bmad-create-prd
description: |
  BMAD Phase 2 - Create Product Requirements Document.
  Triggers: "bmad create prd", "create prd", "bmad prd", "product requirements".

  PM agent (John) creates a PRD, reading any existing analysis artifacts.
  Produces PRD.md in _bmad-output/planning-artifacts/.

provider: claude
interactive: true

nodes:
  - id: gather-context
    bash: |
      echo "=== Analysis Artifacts ==="
      for f in \
        brainstorming-report.md \
        research-findings.md \
        product-brief.md \
        planning-artifacts/prfaq.md \
      ; do
        if [ -f "$PWD/_bmad-output/$f" ]; then
          echo "FOUND: $f"
          echo "--- Preview ---"
          head -30 "$PWD/_bmad-output/$f"
          echo "--- end ---"
        else
          echo "MISSING: $f"
        fi
      done
      echo ""
      echo "=== Existing PRD ==="
      if [ -f "$PWD/_bmad-output/planning-artifacts/PRD.md" ]; then
        echo "PRD EXISTS - will update"
      else
        echo "NO_EXISTING_PRD - will create new"
      fi

  - id: create-prd
    model: sonnet
    skills:
      - bmad/bmm/pm
    context: shared
    prompt: |
      You are John, the BMAD Product Manager agent. Create a comprehensive Product Requirements Document.

      ## User Input
      $ARGUMENTS

      ## Available Analysis Artifacts
      $gather-context.output

      ## Instructions

      Synthesize all available analysis artifacts into a structured PRD. If analysis
      artifacts exist, use them as input. If not, work directly from the user's description
      and ask clarifying questions through the approval gate.

      Write the PRD to `$ARTIFACTS_DIR/planning-artifacts/PRD.md`:

      ```markdown
      # Product Requirements Document

      **Product**: {name}
      **Version**: 1.0
      **Date**: {date}
      **Author**: BMAD PM (John)
      **Status**: Draft

      ## 1. Problem Statement
      {clear problem description with evidence from research/brief if available}

      ## 2. Target Audience
      ### Primary Users
      {persona descriptions}
      ### Secondary Users
      {secondary personas}

      ## 3. Goals and Success Metrics
      ### Product Goals
      - {goal 1 with metric}
      - {goal 2 with metric}
      ### Success Metrics
      | Metric | Target | Measurement |
      |--------|--------|-------------|
      | {metric} | {target} | {how measured} |

      ## 4. User Stories
      ### Epic: {epic name}
      - As a {user}, I want {action}, so that {benefit}
      - Acceptance criteria: {criteria}

      ## 5. Functional Requirements
      ### FR-{N}: {requirement title}
      - **Priority**: {P0/P1/P2}
      - **Description**: {detail}
      - **Acceptance Criteria**: {criteria}

      ## 6. Non-Functional Requirements
      ### Performance
      {performance requirements}
      ### Security
      {security requirements}
      ### Scalability
      {scalability requirements}

      ## 7. Out of Scope
      {explicitly excluded items}

      ## 8. Dependencies
      {external dependencies and assumptions}

      ## 9. Timeline Estimates
      {rough order-of-magnitude estimates}

      ## 10. Open Questions
      {unresolved items needing decision}
      ```

    depends_on: [gather-context]

  - id: review-prd
    approval:
      message: "Review the PRD above. Provide specific feedback or say 'approved' to finalize."
      capture_response: true
    depends_on: [create-prd]

  - id: finalize-prd
    model: sonnet
    prompt: |
      The PRD has been reviewed.

      ## Reviewer Feedback
      $review-prd.output

      ## Instructions
      Apply the feedback to `$ARTIFACTS_DIR/planning-artifacts/PRD.md`. Update the version
      number and mark status as "Approved" if the review was an approval.

      Present the final PRD path and recommend next workflow:
      - If the product has a UI: `/bmad-create-ux-design`
      - Otherwise: `/bmad-create-architecture`

    depends_on: [review-prd]
