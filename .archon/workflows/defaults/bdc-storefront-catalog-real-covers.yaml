      Notion database ID: a6df831c-0b52-449f-8ca4-d77be6b70d0a
      Notion page ID: 35fef4c9-ce00-8193-9f29-dabf85f07390

      Required Notion changes (single update call):
      - Claude Status -> REVIEW
