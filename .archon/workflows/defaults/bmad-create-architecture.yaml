name: bmad-create-architecture
description: |
  BMAD Phase 3 - Create architecture document with ADRs.
  Triggers: "bmad architecture", "create architecture", "bmad arch", "architecture document".

  Architect agent (Winston) creates architecture doc, reading PRD and UX spec.
  Produces architecture.md in _bmad-output/planning-artifacts/.

provider: claude
interactive: true

nodes:
  - id: gather-context
    bash: |
      if [ -f "$PWD/_bmad-output/planning-artifacts/PRD.md" ]; then
        echo "PRD: FOUND"
        echo "--- Preview ---"
        head -30 "$PWD/_bmad-output/planning-artifacts/PRD.md"
        echo "--- end ---"
      else
        echo "ERROR: PRD.md not found. Run /bmad-create-prd first."
        exit 1
      fi

      echo ""
      echo "UX SPEC:"
      if [ -f "$PWD/_bmad-output/planning-artifacts/ux-spec.md" ]; then
        echo "FOUND"
        echo "--- Preview ---"
        head -20 "$PWD/_bmad-output/planning-artifacts/ux-spec.md"
        echo "--- end ---"
      else
        echo "NOT_FOUND (optional - no UI or not yet created)"
      fi

      echo ""
      echo "CODEBASE OVERVIEW:"
      find . -maxdepth 3 -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.py' -o -name '*.rs' -o -name '*.go' \) \
        -not -path '*/node_modules/*' -not -path '*/.git/*' -not -path '*/dist/*' -not -path '*/build/*' \
        2>/dev/null | head -30

  - id: create-architecture
    model: sonnet
    skills:
      - bmad/bmm/architect
    context: shared
    prompt: |
      You are Winston, the BMAD Architect agent. Create a comprehensive architecture document.

      ## PRD Context
      $gather-context.output

      ## Instructions

      Design the system architecture based on the PRD requirements. If a UX spec
      exists, incorporate its design requirements. If not, focus on the backend
      and API architecture.

      Write the architecture document to `$ARTIFACTS_DIR/planning-artifacts/architecture.md`:

      ```markdown
      # Architecture Document

      **Product**: {name}
      **Based on PRD**: PRD.md
      **Date**: {date}
      **Author**: BMAD Architect (Winston)
      **Status**: Draft

      ## 1. Architectural Overview
      {high-level architecture description and diagram (ASCII or mermaid)}

      ## 2. System Context
      {how the system fits into the broader ecosystem}

      ## 3. Container Diagram
      {major system components and their relationships}

      ## 4. Component Design
      ### Component: {name}
      - **Responsibility**: {what it does}
      - **Technology**: {language/framework}
      - **Interfaces**: {APIs, events, data formats}
      - **Dependencies**: {what it depends on}

      ## 5. Data Architecture
      ### Data Models
      {entity descriptions and relationships}
      ### Data Flow
      {how data moves through the system}
      ### Storage Strategy
      {database choices and justification}

      ## 6. API Design
      {key endpoints or interface contracts}

      ## 7. Security Architecture
      {authentication, authorization, data protection}

      ## 8. Deployment Architecture
      {infrastructure, environments, CI/CD}

      ## 9. Non-Functional Requirements
      | Requirement | Target | How Achieved |
      |-------------|--------|-------------|
      | {requirement} | {target} | {approach} |

      ## 10. Architecture Decision Records
      ### ADR-001: {decision title}
      - **Status**: Proposed
      - **Context**: {situation}
      - **Decision**: {what was decided}
      - **Consequences**: {trade-offs}

      ## 11. Implementation Risks
      {technical risks and mitigations}

      ## 12. Open Technical Questions
      {decisions still needed}
      ```

    depends_on: [gather-context]

  - id: review-architecture
    approval:
      message: "Review the architecture document. Provide feedback or say 'approved' to finalize."
      capture_response: true
    depends_on: [create-architecture]

  - id: finalize-architecture
    model: sonnet
    prompt: |
      The architecture document has been reviewed.

      ## Reviewer Feedback
      $review-architecture.output

      ## Instructions
      Apply feedback to `$ARTIFACTS_DIR/planning-artifacts/architecture.md`.
      Mark status as "Approved" if reviewed and approved.

      Recommend next workflow: `/bmad-create-epics-and-stories` to break this into epics.

    depends_on: [review-architecture]
