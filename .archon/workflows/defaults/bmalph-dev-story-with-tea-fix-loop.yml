name: bmalph-dev-story-with-tea-fix-loop
description: |
  Use when: User wants bmalph implementation followed by TEA review gates and an explicit review-fix loop.
  Triggers: "bmalph dev story tea fix loop", "bmalph implementation tea", "bmalph review fix loop".
  Does: Runs bmalph transition and Ralph implementation, runs TA, CR, RV, NR, and TR as separate DAG nodes, records review findings, reruns BMAD dev-story to fix findings when needed, and repeats review up to three rounds.
  NOT for: Generic Archon feature work without bmalph/BMAD artifacts, or one-off review without implementation.

  Decision log policy:
  - Every finding must be written as a decision-log finding entry.
  - Every fix must be written as a decision-log fix entry.
  - Every finding and fix entry must explain what is wrong, how it was fixed, and why that fix decision was chosen.

provider: codex
model: gpt-5.5
tags: [bmalph, TEA, Review]

nodes:
  - id: prepare-bmalph-state
    bash: |
      set -e

      RUN_DIR="$ARTIFACTS_DIR/bmalph-dev-story-with-tea-fix-loop"
      mkdir -p "$RUN_DIR/findings" "$RUN_DIR/reports"

      if ! command -v bmalph >/dev/null 2>&1; then
        echo "Missing bmalph CLI on PATH."
        exit 1
      fi

      for required in \
        "bmalph/config.json" \
        ".ralph/ralph_loop.sh" \
        ".ralph/PROMPT.md" \
        ".ralph/@AGENT.md" \
        ".ralph/RALPH-REFERENCE.md" \
        ".agents/skills/bmad-bmalph/SKILL.md" \
        ".agents/skills/bmad-dev-story/SKILL.md" \
        ".agents/skills/bmad-dev-story/checklist.md" \
        "_bmad/bmm/config.yaml" \
        "_bmad/bmm/workflows/4-implementation/bmad-code-review/SKILL.md" \
        ".claude/skills/bmad-tea/SKILL.md" \
        ".claude/skills/bmad-testarch-automate/SKILL.md" \
        ".claude/skills/bmad-testarch-test-review/SKILL.md" \
        ".claude/skills/bmad-testarch-nfr/SKILL.md" \
        ".claude/skills/bmad-testarch-trace/SKILL.md"
      do
        if [ ! -f "$required" ]; then
          echo "Missing required BMAD skill: $required"
          echo "Run this workflow from a BMAD-enabled project checkout."
          exit 1
        fi
      done

      if [ ! -f "_bmad/config.yaml" ]; then
        echo "Missing _bmad/config.yaml."
        echo "Run this workflow from the bmalph-managed project root."
        exit 1
      fi

      if [ ! -f "_bmad/tea/config.yaml" ]; then
        echo "Missing _bmad/tea/config.yaml."
        echo "TEA source expects this installer-generated config file."
        echo "Install or update the TEA module with BMAD installer before running TEA gates."
        exit 1
      fi

      if [ ! -d "_bmad-output/planning-artifacts" ]; then
        echo "Missing _bmad-output/planning-artifacts."
        echo "Run BMAD planning before bmalph implementation."
        exit 1
      fi

      cat > "$RUN_DIR/state.json" << 'JSON'
      {
        "workflow": "bmalph-dev-story-with-tea-fix-loop",
        "status": "running",
        "round": 1,
        "maxRounds": 3,
        "activeStory": "",
        "activeStoryName": "",
        "activeStoryFile": "",
        "fixPlanFile": ".ralph/@fix_plan.md",
        "ralphStatusFile": ".ralph/status.json",
        "decisionLogFile": "decision-log.md",
        "openFindingsFile": "findings/open-findings.md"
      }
      JSON

      cat > "$RUN_DIR/decision-log.md" << 'MARKDOWN'
      # bmalph Implementation With TEA Fix Loop Decision Log

      Every finding and every fix must be logged here.
      Each full sentence goes on its own physical line.

      ## Required Finding Entry

      ### Finding {finding_id}

      - Source gate:
      - Severity:
      - What is wrong:
      - Evidence:
      - Why this is a defect:
      - Required fix direction:
      - Status:

      ## Required Fix Entry

      ### Fix {finding_id}

      - What was fixed:
      - How it was fixed:
      - Why this fix was chosen:
      - Alternatives considered:
      - Files changed:
      - Validation:
      - Status:
      MARKDOWN

      cat > "$RUN_DIR/findings/open-findings.md" << 'MARKDOWN'
      # Open Review Findings

      No open findings yet.
      MARKDOWN

      echo "RUN_DIR=$RUN_DIR"
      echo "STATE_FILE=$RUN_DIR/state.json"
      echo "DECISION_LOG=$RUN_DIR/decision-log.md"
      echo "OPEN_FINDINGS=$RUN_DIR/findings/open-findings.md"
      echo "FIX_PLAN=.ralph/@fix_plan.md"
      echo "RALPH_STATUS=.ralph/status.json"
      echo "TEA_SKILLS=.claude/skills/bmad-testarch-*"
      echo "TEA_CONFIG=_bmad/tea/config.yaml"
    timeout: 60000
    output_type: bmalph-state

  - id: bmalph-implementation
    command: bmalph-implementation-step
    provider: codex
    depends_on: [prepare-bmalph-state]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_format:
      type: object
      properties:
        story_name:
          type: string
        story_key:
          type: string
        story_file:
          type: string
        sprint_status:
          type: string
        implementation_summary:
          type: string
        files_changed:
          type: string
        tests_run:
          type: string
        validation_summary:
          type: string
      required:
        - story_name
        - story_key
        - story_file
        - sprint_status
        - implementation_summary
        - files_changed
        - tests_run
        - validation_summary
    output_type: bmalph-implementation

  - id: tea-automate
    command: bmalph-tea-automate-step
    provider: codex
    depends_on: [bmalph-implementation]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: tea-automation

  - id: code-review-r1
    command: bmalph-code-review-findings-step
    provider: codex
    depends_on: [tea-automate]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: code-review-findings

  - id: tea-rv-r1
    command: bmalph-tea-rv-findings-step
    provider: codex
    depends_on: [code-review-r1]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: test-review-findings

  - id: tea-nr-r1
    command: bmalph-tea-nr-findings-step
    provider: codex
    depends_on: [tea-rv-r1]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: nfr-findings

  - id: tea-tr-r1
    command: bmalph-tea-tr-findings-step
    provider: codex
    depends_on: [tea-nr-r1]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: trace-findings

  - id: collect-findings-r1
    command: bmalph-collect-findings-step
    provider: codex
    depends_on: [tea-tr-r1]
    context: fresh
    model: gpt-5.5
    output_format: &findings_gate_schema
      type: object
      properties:
        gate:
          type: string
          enum: ["PASS", "FAIL"]
        round:
          type: number
        findings_count:
          type: number
        open_findings_file:
          type: string
        decision_log_file:
          type: string
      required: [gate, round, findings_count, open_findings_file, decision_log_file]
    output_type: findings-gate

  - id: bmad-dev-story-fix-r1
    command: bmad-dev-story-step
    provider: codex
    depends_on: [collect-findings-r1]
    when: "$collect-findings-r1.output.gate == 'FAIL'"
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: bmad-dev-story-fixes

  - id: code-review-r2
    command: bmalph-code-review-findings-step
    provider: codex
    depends_on: [bmad-dev-story-fix-r1]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: code-review-findings

  - id: tea-rv-r2
    command: bmalph-tea-rv-findings-step
    provider: codex
    depends_on: [code-review-r2]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: test-review-findings

  - id: tea-nr-r2
    command: bmalph-tea-nr-findings-step
    provider: codex
    depends_on: [tea-rv-r2]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: nfr-findings

  - id: tea-tr-r2
    command: bmalph-tea-tr-findings-step
    provider: codex
    depends_on: [tea-nr-r2]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: trace-findings

  - id: collect-findings-r2
    command: bmalph-collect-findings-step
    provider: codex
    depends_on: [tea-tr-r2]
    context: fresh
    model: gpt-5.5
    output_format: *findings_gate_schema
    output_type: findings-gate

  - id: bmad-dev-story-fix-r2
    command: bmad-dev-story-step
    provider: codex
    depends_on: [collect-findings-r2]
    when: "$collect-findings-r2.output.gate == 'FAIL'"
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: bmad-dev-story-fixes

  - id: code-review-r3
    command: bmalph-code-review-findings-step
    provider: codex
    depends_on: [bmad-dev-story-fix-r2]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: code-review-findings

  - id: tea-rv-r3
    command: bmalph-tea-rv-findings-step
    provider: codex
    depends_on: [code-review-r3]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: test-review-findings

  - id: tea-nr-r3
    command: bmalph-tea-nr-findings-step
    provider: codex
    depends_on: [tea-rv-r3]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: nfr-findings

  - id: tea-tr-r3
    command: bmalph-tea-tr-findings-step
    provider: codex
    depends_on: [tea-nr-r3]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: trace-findings

  - id: collect-findings-r3
    command: bmalph-collect-findings-step
    provider: codex
    depends_on: [tea-tr-r3]
    context: fresh
    model: gpt-5.5
    output_format: *findings_gate_schema
    output_type: findings-gate

  - id: assert-review-pass
    depends_on: [collect-findings-r1, collect-findings-r2, collect-findings-r3]
    trigger_rule: all_done
    bash: |
      set -e

      STATE="$ARTIFACTS_DIR/bmalph-dev-story-with-tea-fix-loop/state.json"
      DECISIONS="$ARTIFACTS_DIR/bmalph-dev-story-with-tea-fix-loop/decision-log.md"
      OPEN_FINDINGS="$ARTIFACTS_DIR/bmalph-dev-story-with-tea-fix-loop/findings/open-findings.md"

      if ! grep -qE '"status"[[:space:]]*:[[:space:]]*"complete"' "$STATE"; then
        echo "BMAD TEA review-fix loop did not complete successfully."
        cat "$STATE"
        exit 1
      fi

      if grep -q "Status: OPEN" "$OPEN_FINDINGS"; then
        echo "Open findings remain after final review pass."
        exit 1
      fi

      echo "BMAD TEA review-fix loop completed successfully."
      echo "Decision log: $DECISIONS"
    timeout: 60000

  - id: final-summary
    command: bmalph-final-summary-step
    provider: codex
    depends_on: [assert-review-pass]
    trigger_rule: all_done
    context: fresh
    model: gpt-5.5
    output_type: summary
