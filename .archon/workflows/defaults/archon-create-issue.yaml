  - id: classify
    provider: codex
    prompt: |
      You are a problem classifier for the Archon codebase. Analyze the user's
      description and determine the issue type and which area of the system is affected.

      ## User's Description
      $ARGUMENTS

      ## Area Definitions
      | Area | Packages | Indicators |
      |------|----------|------------|
      | web-ui | @archon/web, @archon/server (routes, web adapter) | UI rendering, SSE streaming, React components, browser behavior |
      | api-server | @archon/server (routes, middleware) | HTTP endpoints, response codes, request handling |
      | cli | @archon/cli | CLI commands, workflow invocation from terminal, output formatting |
      | isolation | @archon/isolation, @archon/git | Worktrees, branch operations, cleanup, environment lifecycle |
      | workflows | @archon/workflows | YAML parsing, DAG execution, variable substitution, node types |
      | database | @archon/core (db/) | SQLite/PostgreSQL queries, schema, data integrity, migrations |
      | adapters | @archon/adapters | Slack/Telegram/GitHub/Discord message handling, auth, polling |
      | core | @archon/core (orchestrator, handlers, clients) | Message routing, session management, AI client streaming |
      | other | Any package not covered above | Cross-cutting concerns, build tooling, config, unknown area |

      ## Classification Rules
      - Choose the MOST SPECIFIC area. "SSE disconnects" = web-ui (not api-server).
      - If ambiguous between two areas, pick the one closer to the user-facing symptom.
      - Use "other" only when the problem genuinely doesn't fit any specific area.
      - needs_server: Set to "true" if reproducing requires a running Archon server.
        Typically true for: web-ui, api-server, core, adapters.
        Typically false for: cli, isolation, workflows, database.
        For "other": use your judgment based on the description.
      - repro_hint: Extract the user's reproduction steps into a concise instruction.
        If no explicit steps given, infer the most likely way to trigger the issue.

      Provide reasoning for your classification.
    model: gpt-5.4-mini
    output_format:
      type: object
      properties:
        type:
          type: string
          enum: ["bug", "regression", "crash", "performance", "configuration"]
        area:
          type: string
          enum: ["web-ui", "api-server", "cli", "isolation", "workflows", "database", "adapters", "core", "other"]
        title:
          type: string
        keywords:
          type: string
        repro_hint:
          type: string
        needs_server:
          type: string
          enum: ["true", "false"]
