  - id: start-server
    bash: |
      # Allocate a free port using Bun's OS assignment
      PORT=$(bun -e "const s = Bun.serve({port: 0, fetch: () => new Response('')}); console.log(s.port); s.stop()")
      echo "$PORT" > "$ARTIFACTS_DIR/.server-port"

      # Start dev server in background
      PORT=$PORT bun run dev:server > "$ARTIFACTS_DIR/.server-log" 2>&1 &
      SERVER_PID=$!
      echo "$SERVER_PID" > "$ARTIFACTS_DIR/.server-pid"

      # Wait for server to be ready (up to 30s)
      for i in $(seq 1 30); do
        if curl -s "http://localhost:$PORT/api/health" > /dev/null 2>&1; then
          echo "Server ready on port $PORT (PID: $SERVER_PID)"
          exit 0
        fi
        sleep 1
      done

      echo "WARNING: Server may not be fully ready after 30s (port $PORT, PID $SERVER_PID)"
      echo "Continuing anyway ├āŲÆ├é┬ó├ā┬ó├óŌé¼┼Ī├é┬¼├ā┬ó├óŌĆÜ┬¼├é┬Ø reproduce node will handle connection errors"
    depends_on: [classify]
    when: "$classify.output.needs_server == 'true'"
    timeout: 45000

  - id: reproduce
    provider: codex
    prompt: |
      You are an issue reproduction specialist. Your job is to reproduce the reported
      problem and capture evidence (screenshots, command output, error messages).

      ## Problem Context
      - **Area**: $classify.output.area
      - **Type**: $classify.output.type
      - **Title**: $classify.output.title
      - **Reproduction hint**: $classify.output.repro_hint

      ## Investigation Findings
      $investigate.output

      ## Server Info
      If a server was started, read the port from: `cat "$ARTIFACTS_DIR/.server-port"`
      If the file doesn't exist, no server is running (area doesn't need one).

      ---

      ## Reproduction Playbooks

      Follow the playbook matching the area. Capture ALL evidence to `$ARTIFACTS_DIR/`.

      ### web-ui
      1. Read the server port: `PORT=$(cat "$ARTIFACTS_DIR/.server-port" | tr -d '\n')`
      2. Open the app: `agent-browser open http://localhost:$PORT`
      3. Take a baseline screenshot: `agent-browser screenshot "$ARTIFACTS_DIR/repro-01-baseline.png"`
      4. Get interactive elements: `agent-browser snapshot -i`
      5. Navigate to the area related to the issue (use @refs from snapshot)
      6. Perform the actions described in the repro_hint
      7. Screenshot each significant state: `agent-browser screenshot "$ARTIFACTS_DIR/repro-02-action.png"`
      8. If an error appears, capture it: `agent-browser get text @errorElement`
      9. Check browser console: `agent-browser console`
      10. Check for JS errors: `agent-browser errors`
      11. Final screenshot: `agent-browser screenshot "$ARTIFACTS_DIR/repro-03-result.png"`
      12. Close browser: `agent-browser close`

      ### api-server
      1. Read the server port: `PORT=$(cat "$ARTIFACTS_DIR/.server-port" | tr -d '\n')`
      2. Create a test conversation: `curl -s -X POST http://localhost:$PORT/api/conversations -H "Content-Type: application/json" -d '{}'`
      3. Hit the problematic endpoint based on the repro_hint
      4. Capture response codes and bodies: `curl -s -w "\nHTTP_CODE: %{http_code}\n" ...`
      5. For SSE issues: `curl -s -N http://localhost:$PORT/api/stream/<id>` (timeout after 10s)
      6. Check server logs: `cat "$ARTIFACTS_DIR/.server-log" | tail -50`
      7. Save all curl output to `$ARTIFACTS_DIR/repro-api-responses.txt`

      ### cli
      1. Run the CLI command that should trigger the issue
      2. Capture stdout and stderr separately:
         `bun run cli <command> > "$ARTIFACTS_DIR/repro-cli-stdout.txt" 2> "$ARTIFACTS_DIR/repro-cli-stderr.txt"; echo "EXIT_CODE: $?" >> "$ARTIFACTS_DIR/repro-cli-stdout.txt"`
      3. If workflow-related: `bun run cli workflow list --json > "$ARTIFACTS_DIR/repro-workflow-list.json" 2>&1`
      4. If the command hangs, use timeout: `timeout 30 bun run cli <command>`
      5. Check for error messages in output

      ### isolation
      1. Check current state: `bun run cli isolation list > "$ARTIFACTS_DIR/repro-isolation-list.txt" 2>&1`
      2. Check git worktrees: `git worktree list > "$ARTIFACTS_DIR/repro-worktree-list.txt"`
      3. Check branches: `git branch -a > "$ARTIFACTS_DIR/repro-branches.txt"`
      4. Try the operation that should fail (based on repro_hint)
      5. Capture the error output
      6. Query isolation DB: `sqlite3 ~/.archon/archon.db "SELECT * FROM remote_agent_isolation_environments ORDER BY created_at DESC LIMIT 10" > "$ARTIFACTS_DIR/repro-isolation-db.txt" 2>&1`

      ### workflows
      1. List workflows: `bun run cli workflow list --json > "$ARTIFACTS_DIR/repro-workflow-list.json" 2>&1`
      2. If a specific workflow is mentioned, try running it:
         `bun run cli workflow run <name> --no-worktree "test input" > "$ARTIFACTS_DIR/repro-workflow-run.txt" 2>&1`
      3. If YAML parsing is the issue, try loading the definition directly
      4. Check for error messages in execution output

      ### database
      1. Check DB exists: `ls -la ~/.archon/archon.db 2>/dev/null`
      2. Run targeted queries against affected tables:
         - `sqlite3 ~/.archon/archon.db ".schema <table>" > "$ARTIFACTS_DIR/repro-db-schema.txt"`
         - `sqlite3 ~/.archon/archon.db "SELECT COUNT(*) FROM <table>" > "$ARTIFACTS_DIR/repro-db-counts.txt"`
      3. Check for the specific data condition described in the repro_hint
      4. If PostgreSQL: use `psql $DATABASE_URL -c "..."` instead

      ### adapters
      1. Read the server port: `PORT=$(cat "$ARTIFACTS_DIR/.server-port" | tr -d '\n')`
      2. Check adapter configuration: look for relevant env vars in `.env`
      3. Check server startup logs: `cat "$ARTIFACTS_DIR/.server-log" | grep -i "adapter\|slack\|telegram\|github\|discord" | head -20`
      4. If the adapter fails to initialize, capture the error
      5. Test message routing via web API as a proxy:
         `curl -s -X POST http://localhost:$PORT/api/conversations/<id>/message -H "Content-Type: application/json" -d '{"message":"/status"}'`

      ### core
      1. Read the server port: `PORT=$(cat "$ARTIFACTS_DIR/.server-port" | tr -d '\n')`
      2. Create a conversation: `curl -s -X POST http://localhost:$PORT/api/conversations -H "Content-Type: application/json" -d '{}'`
      3. Send a message that triggers the issue:
         `curl -s -X POST http://localhost:$PORT/api/conversations/<id>/message -H "Content-Type: application/json" -d '{"message":"<repro_hint>"}'`
      4. Poll for responses: `curl -s http://localhost:$PORT/api/conversations/<id>/messages`
      5. Check session state in DB: `sqlite3 ~/.archon/archon.db "SELECT * FROM remote_agent_sessions WHERE conversation_id='<id>'" 2>/dev/null`
      6. Check server logs: `cat "$ARTIFACTS_DIR/.server-log" | tail -50`

      ### other
      1. Run `bun run validate` to check for any obvious failures ├āŲÆ├é┬ó├ā┬ó├óŌé¼┼Ī├é┬¼├ā┬ó├óŌĆÜ┬¼├é┬Ø capture output:
         `bun run validate > "$ARTIFACTS_DIR/repro-validate.txt" 2>&1; echo "EXIT_CODE: $?" >> "$ARTIFACTS_DIR/repro-validate.txt"`
      2. Search the codebase for keywords from the repro_hint:
         - Use Grep/Glob to find related files
         - Check recent git log for relevant changes
      3. If the description implies a build or config issue:
         - Check `package.json` scripts, `tsconfig.json`, `.env.example`
         - Try running the relevant build/dev command
      4. If the description implies a runtime issue:
         - Start the server (if `.server-port` file exists) and try to trigger the behavior
