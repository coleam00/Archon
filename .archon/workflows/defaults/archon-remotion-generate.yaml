  - id: check-project
    bash: |
      if [ ! -f "src/index.ts" ] || [ ! -f "src/Root.tsx" ]; then
        echo "ERROR: Not a Remotion project. Expected src/index.ts and src/Root.tsx."
        echo "Run 'npx create-video@latest' first, then run this workflow from that directory."
        exit 1
      fi
      echo "Remotion project detected."
      npx remotion compositions src/index.ts 2>&1 | tail -5
      echo ""
      echo "PROJECT_READY"
    timeout: 60000

