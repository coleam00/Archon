  - id: generate
    provider: codex
    prompt: |
      You are working in a Remotion video project. The project root is the current directory.

      Find and read the existing composition files to understand the project structure.
      Look in src/ for Root.tsx and any composition components.

      Now create or modify the composition to match this request:

      $ARGUMENTS

      Rules:
      - Use useCurrentFrame() and interpolate()/spring() for ALL animations
      - Never use CSS transitions, Math.random(), setTimeout, or Date.now()
      - Use AbsoluteFill for layout, Sequence for scene timing
      - Use the <Img> component from 'remotion' (not native <img>) for images
      - Keep dimensions 1920x1080 at 30 fps unless the user specifies otherwise
      - Update the Zod schema and defaultProps in Root.tsx if you change props
      - Use even numbers for width/height (required for MP4)
      - Always clamp interpolations: extrapolateLeft: 'clamp', extrapolateRight: 'clamp'

      After writing the code, read it back to verify it looks correct.
    depends_on: [check-project]
