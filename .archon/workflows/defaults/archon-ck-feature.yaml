name: archon-ck-feature
description: |
  Use when: User wants to build a feature end-to-end with the Claude Kit (ck)
  pipeline running fully unattended in a worktree.
  Triggers: "ck feature", "claudekit feature", "ck plan and cook", "ck deep tdd",
            "plan then cook", "ck pipeline", "claude kit feature".
  Does: deep TDD planning (/ck:plan --deep --tdd) -> independent Codex gpt-5.5
        verify + fix of the plan (answers any questions the planner could not
        decide, and writes verification-report.md beside the plan) ->
        autonomous implementation on Codex via the ultragoal skill (oh-my-codex).
  NOT for: quick one-file fixes, bug fixes, PR reviews, or running an existing plan
        (use archon-plan-to-pr for an existing plan).

# Default provider for ck:plan (Claude Opus). The verify-fix and cook nodes override
# to codex. Codex reasoning effort is taken from assistants.codex.modelReasoningEffort
# in .archon/config.yaml (there is no per-node modelReasoningEffort field) — set it to
# `xhigh` there for maximum Codex reasoning across these nodes.
provider: claude

nodes:
  # ───────────────────────────────────────────────────────────────────
  # STEP 1 / 4 — Setup
  # ───────────────────────────────────────────────────────────────────
  - id: setup
    bash: |
      set -euo pipefail
      echo "=== CLAUDE KIT FEATURE PIPELINE ==="
      echo "Feature: $ARGUMENTS"
      echo "PROJECT_ROOT=$(pwd)"
      echo "HEAD=$(git rev-parse --short HEAD 2>/dev/null || echo 'no-git')"
      echo "ARTIFACTS_DIR=$ARTIFACTS_DIR"
      git fetch --all --prune 2>/dev/null || true
      mkdir -p plans
      echo ""
      echo "Pipeline: /ck:plan --deep --tdd  ->  codex gpt-5.5 verify+fix  ->  ultragoal (codex)"
      echo "Starting Step 1 of 4: deep TDD planning..."

  # ───────────────────────────────────────────────────────────────────
  # STEP 2 / 4 — Deep TDD plan (Claude + ck:plan), fully autonomous
  # ───────────────────────────────────────────────────────────────────
  - id: plan
    prompt: |
      /ck:plan --deep --tdd $ARGUMENTS
      When finished, print `PLAN_DIR=<absolute path to the plan directory>`.
    depends_on: [setup]
    provider: claude
    model: opus
    context: fresh
    denied_tools:
      - AskUserQuestion

  # ───────────────────────────────────────────────────────────────────
  # STEP 3a — Resolve the freshly created plan directory
  # The active-plan pointer ck:plan writes is session-scoped and does not survive
  # across workflow nodes, so locate the newest plan dir by mtime. Diagnostics go
  # to stderr; stdout is ONLY the absolute path so downstream nodes can consume it
  # via $resolve-plan.output.
  # ───────────────────────────────────────────────────────────────────
  - id: resolve-plan
    bash: |
      set -euo pipefail
      PLAN_DIR="$(ls -dt plans/*/ 2>/dev/null | head -1 || true)"
      if [ -z "$PLAN_DIR" ] || [ ! -f "${PLAN_DIR}plan.md" ]; then
        echo "ERROR: no plan directory with plan.md found under ./plans/" >&2
        exit 1
      fi
      ABS_PLAN_DIR="$(cd "$PLAN_DIR" && pwd)"
      echo "Resolved plan dir: $ABS_PLAN_DIR" >&2
      ls -la "$ABS_PLAN_DIR" >&2
      printf '%s' "$ABS_PLAN_DIR"
    depends_on: [plan]
    always_run: true

  # ───────────────────────────────────────────────────────────────────
  # STEP 3b / 4 — Independent Codex gpt-5.5 verify + fix (replaces ck:plan's
  # human review gates) and answers the planner's open questions.
  # ───────────────────────────────────────────────────────────────────
  - id: verify-fix
    prompt: |
      ## Persona

      You are a SHARP SOLUTION ARCHITECT who lives by KISS and YAGNI. You do not
      overthink, you do not invent problems that don't exist, and you reject
      over-engineering as hard as you reject band-aids. Your first instinct on any
      issue is "is this a real problem?" — most aren't, and you skip those without
      ceremony. When a problem IS real, you pick the simplest durable fix that
      matches the feature intent and the actual repo. No speculative abstractions,
      no feature flags, no "TODO: revisit".

      ## Headless mode — NO human is available

      There is no human to answer questions and no chat to ask in. Resolve every
      decision yourself from the plan plus the actual codebase, and APPLY your
      fixes directly to the plan files. Do not stop to ask.

      ## Task

      An implementation plan was just generated by `/ck:plan --deep --tdd` at:

        $resolve-plan.output

      Independently VERIFY and FIX that plan IN PLACE, then write a detailed
      verification report next to the plan so a human can review what changed and
      why. Treat every plan claim as a hypothesis to test against the real
      repository — not a verdict to accept.

      1. Read `plan.md` and every `phase-*.md` in that directory.
      2. If `$resolve-plan.output/open-questions.md` exists, answer EACH `## Q<n>`
         using bounded evidence from the actual codebase (cite file:line). Fold
         each answer into the relevant plan/phase file so the plan stays
         self-contained, then mark the question answered in open-questions.md.
         Leave a question unanswered ONLY if it truly requires a business/product
         decision unavailable from the code — and say so explicitly.
      3. Verify the plan against the real codebase. Look for:
         - feasibility — every referenced file, symbol, API, table, and command
           actually exists (inspect the repo to confirm).
         - correctness & internal consistency — phases don't contradict each
           other; dependency order is right; the TDD structure (tests-before /
           refactor / tests-after / regression gate) is concrete and runnable.
         - scope — no gold-plating beyond the feature's stated intent; flag YAGNI
           violations to cut; and do NOT expand scope.
         - the contract or edge case the plan missed that sits one step from what
           it already covers.
      4. FIX every real problem directly in `plan.md` / `phase-*.md`. Do not
         rewrite sound sections for style — change only what is wrong, risky, or
         missing. Do NOT implement the feature itself — only repair the plan.
      5. Write a verification report to
         `$resolve-plan.output/verification-report.md` (same folder as plan.md,
         for easy review). ALWAYS create this file, even when nothing needed
         fixing. Use exactly this structure:

           # Plan Verification Report
           - Plan: <relative path to the plan dir>
           - Reviewer: codex gpt-5.5
           - Verdict: <clean | fixed-with-changes | needs-human-decision>
           - Summary: <2-4 sentences>

           ## Open Questions Answered
           (one block per question; or "None" if there was no open-questions.md)
           - Q<n>: <question text>
             - Answer: <the decision you made>
             - Evidence: <file:line + quoted snippet from the codebase>
             - Folded into: <which plan/phase file + section>

           ## Issues Found & Fixed
           (one `### ` block per issue; or "None — plan verified sound" if clean)
           ### <short issue title>
           - Location: <plan.md / phase-XX-*.md + section>
           - Severity: <blocker | major | minor>
           - Problem: <what is wrong, in detail>
           - Why it's wrong: <evidence — codebase file:line, a contradiction
             between phases, an infeasible step, etc.>
           - Fix applied: <what you changed; include a short before -> after>
           - Rationale: <why this is the simplest durable fix, not a band-aid>

           ## Left As-Is (verified sound or out of scope)
           (optional — anything that looked suspicious but is actually fine, with
           the evidence that cleared it; omit the section if empty)

      Keep the report concrete and skimmable — cite real file:line evidence, no
      generic platitudes. Do NOT reference workflow/finding codes; explain the
      reason itself. When finished, print the report path and a one-line verdict,
      then end with `VERIFY_DONE`.
    depends_on: [resolve-plan]
    provider: codex
    model: gpt-5.5
    context: fresh

  # ───────────────────────────────────────────────────────────────────
  # STEP 4 / 4 — Autonomous implementation (Codex + ultragoal)
  # ───────────────────────────────────────────────────────────────────
  - id: cook
    prompt: |
      $ultragoal $resolve-plan.output
    depends_on: [verify-fix]
    provider: codex
    context: fresh
