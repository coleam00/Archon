name: gdit-sdaf-setup
description: |
  Use when: Setting up GDIT-SDAF capabilities for a project for the first time.
  Does: Installs Python security scanners, copies GDIT core scripts to ~/.kiro/scripts/,
        installs GDIT skills to ~/.kiro/skills/, and creates .kiro/config/project.yaml.
  Run once per machine per project. Re-running is safe (idempotent).
  Requires: Python 3.12+, git repository.

nodes:
  - id: check-python
    bash: |
      set -euo pipefail
      python3 --version 2>&1 | grep -qE "Python 3\.(1[2-9]|[2-9][0-9])" || {
        echo "ERROR: Python 3.12+ required. Current: $(python3 --version 2>&1)"
        echo "Install from https://python.org or via your system package manager."
        exit 1
      }
      echo "Python OK: $(python3 --version)"

  - id: install-scanners
    bash: |
      set -euo pipefail
      if command -v pip3 >/dev/null 2>&1; then
        pip3 install --quiet semgrep checkov ruff pyright gitleaks 2>/dev/null || true
      fi
      for tool in gitleaks semgrep trivy checkov ruff pyright; do
        command -v "$tool" >/dev/null 2>&1 && echo "✓ $tool" || echo "✗ $tool (install manually if needed)"
      done
    depends_on: [check-python]

  - id: copy-kiro-scripts
    bash: |
      set -euo pipefail
      KIRO_SCRIPTS="$HOME/.kiro/scripts"
      mkdir -p "$KIRO_SCRIPTS"
      ARCHON_GDIT_SCRIPTS="$(git rev-parse --show-toplevel)/.archon/scripts/gdit-sdaf"
      if [ ! -d "$ARCHON_GDIT_SCRIPTS" ]; then
        echo "ERROR: .archon/scripts/gdit-sdaf/ not found in repo root."
        exit 1
      fi
      cp "$ARCHON_GDIT_SCRIPTS"/*.py "$KIRO_SCRIPTS/"
      echo "Copied $(ls "$ARCHON_GDIT_SCRIPTS"/*.py | wc -l | tr -d ' ') GDIT scripts to $KIRO_SCRIPTS"
    depends_on: [check-python]

  - id: copy-hooks
    bash: |
      set -euo pipefail
      HOOKS_SRC="$(git rev-parse --show-toplevel)/reference_material/gdit-sdaf-hooks"
      HOOKS_DST="$HOME/.kiro/claude-code/hooks"
      mkdir -p "$HOOKS_DST"
      if [ ! -d "$HOOKS_SRC" ]; then
        echo "WARNING: reference_material/gdit-sdaf-hooks/ not found — skipping hook installation."
        exit 0
      fi
      cp "$HOOKS_SRC"/*.sh "$HOOKS_DST/"
      chmod +x "$HOOKS_DST"/*.sh
      echo "Installed hooks to $HOOKS_DST"
    depends_on: [check-python]

  - id: init-project-config
    prompt: |
      Create or update the GDIT project configuration file at `.kiro/config/project.yaml`.

      1. Check if `.kiro/config/project.yaml` already exists. If it does, read it silently and report "Config already exists — skipping creation." then stop.
      2. If missing:
         a. Scan the project root for tech stack indicators:
            - Python: requirements.txt, pyproject.toml, setup.py, *.py
            - JavaScript/TypeScript: package.json, tsconfig.json
            - Java: pom.xml, build.gradle
            - .NET: *.csproj, *.sln
            - IaC: *.tf, *.yaml with AWSTemplateFormatVersion
         b. Create `.kiro/config/` directory if missing.
         c. Write `.kiro/config/project.yaml` with this exact template, filling in detected values:

      ```yaml
      workflow:
        spec-source: gdit-sdaf
        testing: disable
        frameworks: []
        value-tracking: true
        commit-types: [fix, feat, docs, refactor, test, chore]
        audit:
          git-checkpoint: true
          spec-validation: true
          security-scans: true
          test-execution: false
          value-tracking: true
          language-validation: true
          scan-recency-seconds: 1800

      security:
        enabled-scanners: [gitleaks, semgrep, trivy, checkov, ruff]
        semgrep:
          severity-levels: [ERROR, WARNING]
        trivy:
          severity-levels: [HIGH, CRITICAL]
        log-retention:
          application-days: 90
          security-days: 365

      sysml:
        enabled: true
        scope: both

      well-architected:
        enabled: true

      finops:
        enabled: true

      shared:
        registry-path: .kiro/registry/shared-registry.yaml
      ```

         d. Report: "Created .kiro/config/project.yaml — detected: [stack list]."
    depends_on: [copy-kiro-scripts]
    context: fresh

  - id: install-kiro-skills
    bash: |
      set -euo pipefail
      KIRO_SKILLS="$HOME/.kiro/skills"
      REPO_ROOT="$(git rev-parse --show-toplevel)"
      mkdir -p "$KIRO_SKILLS"
      for skill_dir in "$REPO_ROOT/.claude/skills/gdit-sdaf-"*/; do
        [ -d "$skill_dir" ] || continue
        skill_name=$(basename "$skill_dir" | sed 's/^gdit-sdaf-//')
        target="$KIRO_SKILLS/$skill_name"
        if [ -d "$target" ]; then
          echo "SKIP $skill_name (already installed at $target)"
        else
          cp -r "$skill_dir" "$target"
          echo "INSTALL $skill_name → $target"
        fi
      done
    depends_on: [copy-kiro-scripts]

  - id: verify
    bash: |
      set -euo pipefail
      echo "=== GDIT-SDAF Setup Verification ==="
      echo ""
      echo "Scripts:"
      if [ -d "$HOME/.kiro/scripts" ]; then
        count=$(ls "$HOME/.kiro/scripts"/*.py 2>/dev/null | wc -l | tr -d ' ')
        echo "  Python scripts installed: $count"
      else
        echo "  ERROR: ~/.kiro/scripts/ not found"
      fi
      echo ""
      echo "Scanners:"
      for tool in gitleaks semgrep trivy checkov ruff pyright; do
        command -v "$tool" >/dev/null 2>&1 && echo "  ✓ $tool" || echo "  ✗ $tool (install manually: pip install $tool)"
      done
      echo ""
      echo "Config:"
      test -f ".kiro/config/project.yaml" && echo "  ✓ .kiro/config/project.yaml" || echo "  ✗ .kiro/config/project.yaml (missing)"
      echo ""
      echo "Setup complete. You can now use gdit-sdaf-* workflows."
    depends_on: [install-kiro-skills, init-project-config, install-scanners, copy-hooks]
    trigger_rule: all_done
