name: bmad-correct-course
description: |
  BMAD Phase 4 - Handle mid-sprint changes.
  Triggers: "bmad correct course", "change plan", "mid-sprint change",
            "bmad correct", "pivot", "scope change".

  PM agent handles mid-sprint changes, updates planning artifacts.

provider: claude
interactive: true

nodes:
  - id: assess-current-state
    bash: |
      echo "=== Current Sprint Status ==="
      if [ -f "$PWD/_bmad-output/implementation-artifacts/sprints/sprint-status.yaml" ]; then
        cat "$PWD/_bmad-output/implementation-artifacts/sprints/sprint-status.yaml"
      else
        echo "NO_SPRINT_STATUS"
      fi

      echo ""
      echo "=== Completed Stories ==="
      if [ -d "$PWD/_bmad-output/implementation-artifacts/stories" ]; then
        ls "$PWD/_bmad-output/implementation-artifacts/stories/" 2>/dev/null || echo "(none)"
      fi

      echo ""
      echo "=== Current Branch ==="
      git branch --show-current 2>/dev/null || echo "(not a git repo)"
      git log --oneline -10 2>/dev/null

      echo ""
      echo "=== Planning Artifacts ==="
      for f in \
        planning-artifacts/PRD.md \
        planning-artifacts/architecture.md \
        planning-artifacts/epics/epics.md \
      ; do
        if [ -f "$PWD/_bmad-output/$f" ]; then
          echo "FOUND: $f"
        else
          echo "MISSING: $f"
        fi
      done

  - id: propose-changes
    model: sonnet
    skills:
      - bmad/bmm/pm
    prompt: |
      You are John, the BMAD Product Manager agent. Handle a mid-sprint course correction.

      ## Current State
      $assess-current-state.output

      ## Change Request
      $ARGUMENTS

      ## Instructions

      1. Understand the requested change and its impact
      2. Assess which stories/epics are affected
      3. Determine if this change:
         - Can be absorbed into the current sprint
         - Requires adding a new story
         - Requires modifying existing stories
         - Requires changing the PRD or architecture
         - Requires a new epic entirely
      4. Propose specific changes to planning artifacts

      Present your analysis:

      ```markdown
      # Course Correction Analysis

      **Change Request**: {description}
      **Impact Assessment**: {scope of change}

      ## Affected Artifacts
      - {artifact}: {what needs to change}

      ## Proposed Changes
      1. {specific change 1}
      2. {specific change 2}

      ## Sprint Impact
      - Stories affected: {list}
      - Additional effort: {estimate}
      - Timeline impact: {assessment}

      ## Recommendation
      {proceed as proposed / modified approach / defer to next sprint}
      ```

    depends_on: [assess-current-state]

  - id: approve-changes
    approval:
      message: "Review the course correction analysis. Approve the proposed changes or provide alternative direction."
      capture_response: true
    depends_on: [propose-changes]

  - id: apply-changes
    model: sonnet
    prompt: |
      The course correction has been approved.

      ## Proposed Changes
      $propose-changes.output

      ## Approval Feedback
      $approve-changes.output

      ## Instructions
      Apply the approved changes to the relevant planning artifacts:
      - Update PRD.md if requirements changed
      - Update architecture.md if technical approach changed
      - Update epics.md and story files if scope changed
      - Update sprint-status.yaml to reflect new story status

      Document all changes made in `$ARTIFACTS_DIR/implementation-artifacts/course-correction.md`.

    depends_on: [approve-changes]
