name: bdc-ce-promotion-runbook
description: |
  Use when: Shipping WO-RELEASE-CE-PROMOTION-RUNBOOK-01 — main → release/ce promotion procedure.
  Input: WO_ID = WO-RELEASE-CE-PROMOTION-RUNBOOK-01.
  Does: Authors the CE promotion runbook + PR template + first dry-run promotion PR. The runbook
        lives in bdc-xo (governance docs); the PR template lives in lspro-react (.github).
  Repo dual-mode: this YAML CWDs into bdc-xo for the runbook + the bdc-xo template (already exists
        from WO #1 — verify), then via gh api ensures the lspro-react PR template is present.
  Class: DOCS / RELEASE.

policyFile: harness/policies/agent-behavior.md
model: sonnet

nodes:
  - id: read-spec
    bash: |
      set -euo pipefail
      WO_ID="${WO_ID:-WO-RELEASE-CE-PROMOTION-RUNBOOK-01}"
      SPEC_PATH="docs/superpowers/specs/ce-release-branch/work-orders/${WO_ID}.md"
      SPEC=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/${SPEC_PATH}?ref=main" --jq .content 2>/dev/null | base64 -d 2>/dev/null || true)
      GOV=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/docs/superpowers/specs/ce-release-branch/docs/CE-BRANCH-GOVERNANCE.md?ref=main" --jq .content 2>/dev/null | base64 -d 2>/dev/null || true)
      [ -z "$SPEC" ] && { echo "Spec not found" >&2; exit 1; }
      printf 'WO_ID=%s\nSPEC_PATH=bdc-xo:%s\nWORKFLOW_ID=%s\n\n' "$WO_ID" "$SPEC_PATH" "$WORKFLOW_ID"
      printf -- '--- SPEC ---\n%s\n\n' "$SPEC"
      printf -- '--- GOVERNANCE ---\n%s\n' "$GOV"

  # post-started node REMOVED 2026-05-12 - n8n webhook hangs from Archon executor subprocess
  # (see WO-HARNESS-N8N-WEBHOOK-EGRESS-FIX-01). Builder-status feed is optional bookkeeping;
  # flip-notion is the canonical close action.

  - id: implement
    depends_on: [read-spec]
    task_class: medium_work
    loop:
      fresh_context: true
      until: COMPLETE
      max_iterations: 5
      prompt: |
        Author the CE promotion runbook in bdc-xo (CWD is bdc-xo repo).

        ## Required Files
        - `docs/superpowers/specs/ce-release-branch/runbooks/CE-PROMOTION-RUNBOOK.md`
          - Step-by-step procedure for promoting selected commits from main → release/ce
          - When to promote (criteria from governance: CE-relevant or shared-safe)
          - How to create promotion branch: `git checkout -b promotion/ce/<slug> release/ce && git cherry-pick <commits>`
          - PR template usage (point to lspro-react template `ce-promotion.md`)
          - CE regression check requirement
          - John approval requirement before deploy
          - Rollback procedure
        - Optionally amend: `xo-wiki/wiki/concepts/ce-release-branch/_index.md` — add cross-link to the runbook

        ## Out of scope
        - PR template file itself (already added to lspro-react by WO-RELEASE-CE-BRANCH-MODEL-01)
        - Captain CI check implementation (that's WO-CI-CE-PROMOTION-GATE-01)

        Output <promise>COMPLETE</promise> when runbook exists at the path above.

  - id: verify
    depends_on: [implement]
    bash: |
      set -euo pipefail
      ls docs/superpowers/specs/ce-release-branch/runbooks/CE-PROMOTION-RUNBOOK.md

  - id: commit-and-push
    depends_on: [verify]
    bash: |
      set -euo pipefail
      BRANCH="wo/release-ce-promotion-runbook-01"
      # Idempotent checkout: handle retry-into-existing-worktree case + worktree-locked-branch case
      if git show-ref --quiet "refs/heads/$BRANCH"; then
        if git worktree list --porcelain | grep -q "branch refs/heads/$BRANCH" && \
           [ "$(git rev-parse --abbrev-ref HEAD)" != "$BRANCH" ]; then
          BRANCH="${BRANCH}-run-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
        else
          git checkout "$BRANCH"
        fi
      else
        git checkout -b "$BRANCH"
      fi
      git add docs/superpowers/specs/ce-release-branch/runbooks/CE-PROMOTION-RUNBOOK.md
      git add xo-wiki/ 2>/dev/null || true
      # Idempotent commit: skip if branch already contains the work (retry-safe).
      if git diff --cached --quiet; then
        echo "No staged changes; branch already contains requested work"
      else
        git -c user.name="John Ranson" -c user.email="admin@bluedevilcollectibles.com" \
          commit -m "docs(ce): WO-RELEASE-CE-PROMOTION-RUNBOOK-01 — main → release/ce promotion runbook

        Adds CE-PROMOTION-RUNBOOK.md with step-by-step procedure for promoting commits from main
        to release/ce. References governance doc + lspro-react PR template.

        Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>"
      fi
      git push -u origin "$BRANCH"
      echo "BRANCH=${BRANCH}"

  - id: open-pr
    depends_on: [commit-and-push]
    bash: |
      set -euo pipefail
      BRANCH=$(printf '%s\n' "$commit-and-push.output" | sed -n 's/^BRANCH=//p' | head -n 1)
      REPO="bluedevilcollectibles/bdc-xo"
      BASE="main"
      TITLE="docs(ce): WO-RELEASE-CE-PROMOTION-RUNBOOK-01 — CE promotion runbook"
      BODY="Implements WO-RELEASE-CE-PROMOTION-RUNBOOK-01. Docs-only. 🤖 Generated with Claude Code"
      # Idempotent PR creation. See WO-HARNESS-OPEN-PR-GRAPHQL-NO-COMMITS-FIX-01.
      existing_pr_url() {
        gh pr list --repo "$REPO" --head "$BRANCH" --state open --json url --jq '.[0].url // empty' 2>/dev/null
      }
      PR_URL="$(existing_pr_url)"
      if [ -n "$PR_URL" ]; then
        echo "PR_URL=$PR_URL"
        exit 0
      fi
      for attempt in 1 2 3 4 5; do
        if PR_OUT=$(gh pr create --repo "$REPO" --base "$BASE" --head "$BRANCH" \
            --title "$TITLE" --body "$BODY" 2>&1); then
          echo "PR_URL=$PR_OUT"
          exit 0
        fi
        PR_URL="$(existing_pr_url)"
        if [ -n "$PR_URL" ]; then
          echo "PR_URL=$PR_URL"
          exit 0
        fi
        echo "open-pr attempt $attempt failed: $PR_OUT" >&2
        sleep 10
      done
      echo "open-pr failed after retries; branch pushed at $BRANCH but no PR exists" >&2
      exit 1

  - id: build-manifest
    depends_on: [open-pr]
    task_class: clerical
    prompt: |
      Manifest v2 for WO-RELEASE-CE-PROMOTION-RUNBOOK-01. WO, Builder=XO (via harness), Files created (runbook),
      PR URL, VALIDATION: PASS.
      Inputs: $read-spec.output $verify.output $commit-and-push.output $open-pr.output

  # post-completed node REMOVED 2026-05-12 - n8n webhook hangs from Archon executor subprocess
  # (see WO-HARNESS-N8N-WEBHOOK-EGRESS-FIX-01). Builder-status feed is optional bookkeeping;
  # flip-notion below is the canonical close action.

  - id: flip-notion
    depends_on: [build-manifest]
    task_class: clerical
    prompt: |
      Flip Notion WO-RELEASE-CE-PROMOTION-RUNBOOK-01 to REVIEW.
      Page ID: 35def4c9-ce00-8160-9078-e11f6092a0b7
      Notes = $build-manifest.output. Claude Status -> REVIEW. Status -> Review.
