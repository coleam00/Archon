name: bmad-help
description: |
  BMAD Method intelligent guide. Inspects project state, recommends next steps.
  Triggers: "bmad help", "what next", "bmad next step", "bmad status",
            "where am i in bmad", "bmad progress".

  Inspects _bmad-output/ to determine which BMAD artifacts exist,
  then recommends the most appropriate next workflow to run.

provider: claude
interactive: true

nodes:
  - id: inspect-state
    bash: |
      OUTPUT_DIR="$PWD/_bmad-output"
      echo "=== Directory Structure ==="
      if [ -d "$OUTPUT_DIR" ]; then
        find "$OUTPUT_DIR" -type f 2>/dev/null | sort
      else
        echo "NO_BMAD_OUTPUT_DIR"
      fi

      echo ""
      echo "=== Artifact Inventory ==="
      for f in \
        brainstorming-report.md \
        research-findings.md \
        product-brief.md \
        planning-artifacts/prfaq.md \
        planning-artifacts/PRD.md \
        planning-artifacts/ux-spec.md \
        planning-artifacts/architecture.md \
        planning-artifacts/epics/epics.md \
        implementation-artifacts/sprints/sprint-status.yaml \
      ; do
        if [ -f "$OUTPUT_DIR/$f" ]; then
          echo "FOUND: $f"
        else
          echo "MISSING: $f"
        fi
      done

      echo ""
      echo "=== Story Files ==="
      if [ -d "$OUTPUT_DIR/implementation-artifacts/stories" ]; then
        ls -1 "$OUTPUT_DIR/implementation-artifacts/stories/" 2>/dev/null | head -20
      else
        echo "NO_STORIES_DIR"
      fi

      echo ""
      echo "=== Sprint Status ==="
      if [ -f "$OUTPUT_DIR/implementation-artifacts/sprints/sprint-status.yaml" ]; then
        cat "$OUTPUT_DIR/implementation-artifacts/sprints/sprint-status.yaml"
      else
        echo "NO_SPRINT_STATUS"
      fi

  - id: recommend
    model: sonnet
    prompt: |
      You are the BMAD Method navigator. Analyze the current project state and recommend the next best workflow to run.

      ## Current State
      $inspect-state.output

      ## User Message
      $ARGUMENTS

      ## BMAD Phase Map

      Phase 1 - Analysis (Optional):
        - bmad-brainstorming: When no brainstorming-report.md exists
        - bmad-research: When technical/market research is needed
        - bmad-product-brief: When a brief is needed (before PRD)
        - bmad-prfaq: When Working Backwards PRFAQ is needed

      Phase 2 - Planning (Required):
        - bmad-create-prd: When PRD.md does not exist (requires brainstorming/brief or raw idea)
        - bmad-create-ux-design: When UI is involved and ux-spec.md does not exist

      Phase 3 - Solutioning:
        - bmad-create-architecture: When architecture.md does not exist (requires PRD)
        - bmad-create-epics-and-stories: When epics are not yet broken out (requires PRD + architecture)
        - bmad-check-implementation-readiness: When epics exist but before sprint starts

      Phase 4 - Implementation:
        - bmad-sprint-planning: When sprint-status.yaml does not exist (requires epics/stories)
        - bmad-create-story: When the next story has not been prepared
        - bmad-dev-story: When a story file exists ready for implementation
        - bmad-code-review: After dev-story, before merging
        - bmad-correct-course: When mid-sprint changes are needed
        - bmad-retrospective: After completing an epic

      Quick Flow:
        - bmad-quick-dev: For small changes that skip phases 1-3

      ## Instructions

      1. Read the artifact inventory above
      2. Determine which BMAD phase the project is currently in
      3. Identify gaps (missing artifacts that should exist at this stage)
      4. Recommend 1-3 next workflows in priority order

      Present your recommendation in this format:

      ```
      ## Current BMAD Phase: {Phase name}
      **Status**: {brief assessment}

      ## Recommended Next Steps

      1. **`/bmad-{workflow}`** - {one-sentence reason}
         Prerequisites: {list}
         Produces: {artifact}

      2. **`/bmad-{alternative}`** - {when to use instead}

      ## All Available BMAD Workflows

      {table of all 17 workflows with their trigger conditions}
      ```

    depends_on: [inspect-state]
