      ORDERS="shopops-api/routes/orders.js"
      INVENTORY="shopops-api/routes/inventory.js"
      TEST="shopops-api/tests/test_bundle_routes.js"

      # Migration: CREATE TABLE bundles + bundle_items + order_line_components
      [ "$(grep -c 'CREATE TABLE.*bundles' "$MIGRATION")" -ge 1 ] \
        || (echo "FAIL: CREATE TABLE bundles missing from migration" >&2; exit 1)
      [ "$(grep -c 'CREATE TABLE.*bundle_items' "$MIGRATION")" -ge 1 ] \
        || (echo "FAIL: CREATE TABLE bundle_items missing from migration" >&2; exit 1)
      [ "$(grep -c 'CREATE TABLE.*order_line_components' "$MIGRATION")" -ge 1 ] \
        || (echo "FAIL: CREATE TABLE order_line_components missing from migration" >&2; exit 1)
      [ "$(grep -c 'ALTER TABLE.*bundle_id' "$MIGRATION")" -ge 1 ] \
        || (echo "FAIL: ALTER TABLE add bundle_id missing from migration" >&2; exit 1)

      # bundles.js: 6 operator routes
      [ "$(grep -c "router\\.\\(get\\|post\\|patch\\|delete\\)" "$BUNDLES")" -ge 6 ] \
        || (echo "FAIL: Expected >= 6 routes in bundles.js" >&2; exit 1)

      # storefront-bundles.js: 4 customer routes
      [ "$(grep -c "router\\.\\(get\\|post\\)" "$STOREFRONT_BUNDLES")" -ge 4 ] \
        || (echo "FAIL: Expected >= 4 routes in storefront-bundles.js" >&2; exit 1)

      # Service helpers
      [ "$(grep -c 'isBundleAvailable' "$SERVICE")" -ge 1 ] \
        || (echo "FAIL: isBundleAvailable missing from service" >&2; exit 1)
      [ "$(grep -c 'markBundlesUnavailableByComponent' "$SERVICE")" -ge 1 ] \
        || (echo "FAIL: markBundlesUnavailableByComponent missing from service" >&2; exit 1)
      [ "$(grep -c 'reEvaluateAffectedBundles' "$SERVICE")" -ge 1 ] \
        || (echo "FAIL: reEvaluateAffectedBundles missing from service" >&2; exit 1)

      # orders.js: bundle_id handling + atomic decrement
      [ "$(grep -c 'bundle_id' "$ORDERS")" -ge 1 ] \
        || (echo "FAIL: bundle_id handling missing from orders.js" >&2; exit 1)
      [ "$(grep -ciE 'FOR UPDATE|begin transaction|BEGIN;' "$ORDERS")" -ge 1 ] \
        || (echo "FAIL: atomic locking missing from orders.js" >&2; exit 1)

      # inventory.js: restock re-evaluate trigger
      [ "$(grep -c 'reEvaluateAffectedBundles' "$INVENTORY")" -ge 1 ] \
        || (echo "FAIL: reEvaluateAffectedBundles not called from inventory.js" >&2; exit 1)

      # Test file: 6 tests (it() or test() calls)
      [ "$(grep -cE '^\s*(it|test)\(' "$TEST")" -ge 6 ] \
        || (echo "FAIL: Expected >= 6 tests in test_bundle_routes.js" >&2; exit 1)

      echo "=== all shopops-api grep assertions passed ==="

