        echo "- lspro-react: wo/storefront-bundle-builder-01 (operator admin UI)"
        echo ""
        echo "Generated by Archon bdc-storefront-bundle-builder workflow."
      } > "$BODY_FILE"

      existing_pr_url() {
        gh pr list --repo "$REPO" --head "$BRANCH" --state open --json url \
          --jq '.[0].url // empty' 2>/dev/null
      }
      PR_URL="$(existing_pr_url)"
      if [ -n "$PR_URL" ]; then
        echo "API_PR_URL=$PR_URL"
        exit 0
      fi

      for attempt in 1 2 3 4 5; do
        if PR_OUT=$(gh pr create --repo "$REPO" --base "$BASE" --head "$BRANCH" \
            --title "$TITLE" --body-file "$BODY_FILE" 2>&1); then
          echo "API_PR_URL=$PR_OUT"
          exit 0
        fi
        PR_URL="$(existing_pr_url)"
        if [ -n "$PR_URL" ]; then
          echo "API_PR_URL=$PR_URL"
          exit 0
        fi
        echo "open-pr-api attempt $attempt failed: $PR_OUT" >&2
        sleep 10
      done
      echo "open-pr-api failed after retries; branch pushed but no PR" >&2
      exit 1

