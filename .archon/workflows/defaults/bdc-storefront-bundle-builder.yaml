# Drafted by yaml-author subagent for WO-STOREFRONT-BUNDLE-BUILDER-01 on 2026-05-14
# Source pattern: bdc-storefront-portal-auth-wire.yaml (closest analogous: multi-repo MIXED
#                 with /tmp-clone, PLANNED-WO spec read, schema-verify + Rule 19 runtime).
#                 Extended from 2 repos to 3 repos (adds lspro-react), and adds explicit
#                 production schema-migration node + verify-schema-prod node per 2026-05-12
#                 metron-scrub doctrine anchor (migration MUST RUN on prod, not just be WRITTEN).
# Doctrine compliance: 13 hard rules of archon-yaml-authoring (verified at draft time)
#
# Pre-flight (OPERATOR MUST VERIFY BEFORE FIRING):
#   1. ALL THREE codebases registered in Archon:
#      ssh hetzner-prod "sqlite3 /opt/bdc/archon-data/archon.db \"SELECT name FROM remote_agent_codebases;\""
#      Expected names: bluedevilcollectibles/shopops, bluedevilcollectibles/shopops-storefront,
#                      bluedevilcollectibles/lspro-react
#      If any missing, register via Archon Dashboard before firing.
#   2. CWD when fired = shopops repo root. shopops-storefront + lspro-react are cloned into
#      /tmp inside the bash nodes. GH_TOKEN must be set with push access to all three repos.
#   3. SUPABASE_URL + SUPABASE_SERVICE_KEY must be set in Archon env for schema-verify node.
#      For production migration, the migration node uses `ssh hetzner-prod` + docker exec psql
#      per doctrine `feedback_production-writes-via-hetzner-ssh.md` (Hookify
#      block-production-supabase passes SSH wrapper transparently).
#   4. This WO is parallel_ok=NO (schema migration; one builder owns it end-to-end per WO §metadata).
#   5. WO spec must be committed + pushed to bdc-xo main:
#      docs/work-orders/WO-STOREFRONT-BUNDLE-BUILDER-01.md
#   6. Notion page ID for WO-STOREFRONT-BUNDLE-BUILDER-01: 35fef4c9-ce00-8181-9e6a-d52ec48cdf48
#      (confirmed in WO-author prompt — embedded in flip-notion node).
#   7. lspro-react default branch is "main" (confirmed). shopops default branch is "master".
#      shopops-storefront default branch is "main".
#
# OPEN QUESTIONS:
#   Q1: WO §9 references `order_line_items` table; some prior shopops migrations used
#       `order_lines`. Schema-verify node MUST resolve this before migration runs.
#       If shopops uses `order_lines`, the ALTER TABLE in the migration must target that.
#   Q2: The migration also references `tenants` and `customers` foreign keys. Schema-verify
#       must confirm these tables exist with `id UUID` PKs before applying the migration.
#   Q3: shopops-api routes are typically under shopops-api/routes/. The bundle CRUD route
#       file path is shopops-api/routes/bundles.js and storefront-side
#       shopops-api/routes/storefront-bundles.js — confirmed against WO §7.
#
# Deploy: copy this file to bdc-harness/.archon/workflows/defaults/bdc-storefront-bundle-builder.yaml
#         then run BDC_XO/scripts/archon-bridge/sync-workflows.sh
#
# REVIEW BEFORE DEPLOY — human verifies:
#   - All 3 codebases registered in Archon (Pre-flight #1)
#   - Q1/Q2 schema reality confirmed via schema-verify node output BEFORE migration applies
#   - Migration node will actually run psql against prod (uses ssh hetzner-prod wrapper)
#   - Rule 19 runtime grep targets correct paths in shopops-api container
#   - Vercel verification uses x-vercel-protection-bypass header (staging is password-gated)

name: bdc-storefront-bundle-builder
description: |
  Use when: Executing WO-STOREFRONT-BUNDLE-BUILDER-01 — Storefront bundle builder
            (cart-as-bundle + operator-curated bundles).
  Input: WO_ID = WO-STOREFRONT-BUNDLE-BUILDER-01.
  Does:
    1. Reads WO spec from bdc-xo (PLANNED-WO pattern via gh api docs/work-orders/).
    2. Verifies bundles/bundle_items/order_line_components schema status + FK target tables
       (tenants, customers, inventory_items, order_line_items) via Supabase REST.
    3. Writes migration 20260514_bundle_builder.sql in shopops-api/migrations/.
    4. Applies migration to production Supabase via ssh hetzner-prod (best-effort wrapper).
    5. Implements bundle CRUD + atomic-inventory-decrement in shopops-api
       (routes/bundles.js, routes/storefront-bundles.js, services/bundleInventoryCheck.js,
        routes/orders.js extension).
    6. Clones shopops-storefront into /tmp; adds Bundle types + bundles browse page +
       cart "Save as bundle" UI.
    7. Clones lspro-react into /tmp; adds BundleManagerPage + BundleBuilderPanel admin UI.
    8. Runs bun tests for shopops-api (incl 6 inventory-safe tests per WO §11).
    9. Opens 3 PRs (shopops base:master, shopops-storefront base:main, lspro-react base:main).
   10. Rule 19 docker exec grep on shopops-api container (best-effort post-merge).
   11. Verifies production schema reflects migration (best-effort).
   12. Verifies Vercel staging deployments for shopops-storefront + lspro-react.
   13. Builds MIXED-class manifest v2 with bash-executable grep assertions.
   14. Flips Notion WO to REVIEW (Claude Status + Status both updated). Cauldron grader
       closes to DONE after VALIDATED verdict per WO-DOCTRINE-XO-DONE-RULE-01.
  Repos: bluedevilcollectibles/shopops (Archon CWD root, shopops-api/ subdir) +
         bluedevilcollectibles/shopops-storefront (cloned to /tmp/storefront-work) +
         bluedevilcollectibles/lspro-react (cloned to /tmp/lspro-work).
         WO spec lives in bluedevilcollectibles/bdc-xo.
  parallel_ok: false — schema migration touching prod; one builder end-to-end.
  NOT for: any other WO.

policyFile: harness/policies/agent-behavior.md
model: sonnet

nodes:

  # ---------------------------------------------------------------------------
  # 1. READ-SPEC — PLANNED-WO pattern (docs/work-orders/ in bdc-xo, not GH issue)
  # ---------------------------------------------------------------------------
  - id: read-spec
    bash: |
      set -euo pipefail
      WO_ID="${WO_ID:-WO-STOREFRONT-BUNDLE-BUILDER-01}"

      # Primary path: docs/work-orders/<WO_ID>.md (PLANNED-WO canonical location)
      SPEC_CONTENT=$(gh api \
        "repos/bluedevilcollectibles/bdc-xo/contents/docs/work-orders/${WO_ID}.md?ref=main" \
        --jq .content 2>/dev/null | base64 -d 2>/dev/null || true)

      # Fallback: date-prefix glob in docs/superpowers/specs/ (Rule 5)
      if [ -z "$SPEC_CONTENT" ]; then
        GLOB_PATH=$(gh api \
          "repos/bluedevilcollectibles/bdc-xo/contents/docs/superpowers/specs?ref=main" \
          --jq '[.[] | select(.name | test("'"${WO_ID}"'")) | .path] | .[0]' \
          2>/dev/null || true)
        if [ -n "$GLOB_PATH" ] && [ "$GLOB_PATH" != "null" ]; then
          SPEC_CONTENT=$(gh api \
            "repos/bluedevilcollectibles/bdc-xo/contents/${GLOB_PATH}?ref=main" \
            --jq .content 2>/dev/null | base64 -d 2>/dev/null || true)
        fi
      fi

      if [ -z "$SPEC_CONTENT" ]; then
        echo "ERROR: Spec not found for ${WO_ID} in bdc-xo" >&2
        echo "Tried: docs/work-orders/${WO_ID}.md and date-prefix glob in docs/superpowers/specs/" >&2
        exit 1
      fi

      printf 'WO_ID=%s\nSPEC_PATH=bdc-xo:docs/work-orders/%s.md\nWORKFLOW_ID=%s\n\n' \
        "$WO_ID" "$WO_ID" "$WORKFLOW_ID"
      printf -- '--- SPEC ---\n%s\n' "$SPEC_CONTENT"

  # ---------------------------------------------------------------------------
  # 2. SCHEMA-VERIFY — confirm FK target tables + check for prior partial migration
  #    Best-effort: Supabase can legitimately 401/429/503.
  # ---------------------------------------------------------------------------
  - id: schema-verify
    depends_on: [read-spec]
    bash: |
      # set -e DELIBERATELY OMITTED — best-effort step per doctrine wrapper
      SUPABASE_URL="${SUPABASE_URL:-}"
      SUPABASE_SERVICE_KEY="${SUPABASE_SERVICE_KEY:-}"

      if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ]; then
        echo "STATUS=skipped_no_env"
        echo "DETAIL=SUPABASE_URL or SUPABASE_SERVICE_KEY not set in Archon env."
        echo "Builder MUST verify schema manually before writing migration:"
        echo "  - tenants.id UUID PK"
        echo "  - customers.id UUID PK"
        echo "  - inventory_items.id UUID PK + on_hand_qty INTEGER"
        echo "  - order_line_items OR order_lines (WO §9 names order_line_items; confirm actual)"
        exit 0
      fi

      check_table_columns() {
        local TABLE="$1"
        RESULT=$(curl -sf \
          "${SUPABASE_URL}/rest/v1/information_schema.columns?table_name=eq.${TABLE}&select=column_name,data_type&table_schema=eq.public" \
          -H "apikey: ${SUPABASE_SERVICE_KEY}" \
          -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
          2>&1) || true
        if echo "$RESULT" | grep -q '"column_name"'; then
          echo "SCHEMA_${TABLE}=VERIFIED"
          echo "COLUMNS_${TABLE}=${RESULT}"
        else
          echo "SCHEMA_${TABLE}=UNVERIFIED_OR_ABSENT"
          echo "DETAIL_${TABLE}=${RESULT}"
        fi
      }

      # FK target tables
      check_table_columns "tenants"
      check_table_columns "customers"
      check_table_columns "inventory_items"

      # WO §9 uses order_line_items; older shopops sometimes uses order_lines. Check both.
      check_table_columns "order_line_items"
      check_table_columns "order_lines"

      # Check for prior partial migration (idempotency check)
      check_table_columns "bundles"
      check_table_columns "bundle_items"
      check_table_columns "order_line_components"

      echo "STATUS=ok"
      exit 0

  # ---------------------------------------------------------------------------
  # 3. PLAN — architect all three repos + migration
  # ---------------------------------------------------------------------------
  - id: plan
    depends_on: [read-spec, schema-verify]
    task_class: medium_work
    prompt: |
      Plan the multi-repo bundle builder implementation across shopops-api,
      shopops-storefront, and lspro-react, plus the production schema migration.

      WO: WO-STOREFRONT-BUNDLE-BUILDER-01
      Class: MIXED (CODE in 3 repos + schema migration + Rule 19 runtime verification)

      ## Required Output (Markdown, exact headings)

      ### Pre-implementation schema confirmation
      Read $schema-verify.output and confirm:
        - tenants(id UUID) exists
        - customers(id UUID) exists
        - inventory_items(id UUID, on_hand_qty INTEGER) exists
        - Resolve: order_line_items OR order_lines — pick the one that VERIFIED above
        - bundles + bundle_items + order_line_components: must NOT already exist (or migration
          is idempotent with CREATE TABLE IF NOT EXISTS — preferred pattern)

      If schema-verify was skipped (no Supabase env), call this out and proceed; verify-schema-prod
      node will catch mismatches before migration applies.

      ### Migration file
      - Path: shopops-api/migrations/20260514_bundle_builder.sql
      - Content: per WO §9 — CREATE TABLE bundles, CREATE TABLE bundle_items, CREATE TABLE
        order_line_components, ALTER TABLE [order_line_items|order_lines] ADD COLUMN bundle_id,
        3 indexes. Use IF NOT EXISTS guards on all CREATE TABLE statements for re-runnability.
      - Apply mechanism: apply-migration-prod node runs `ssh hetzner-prod` + docker exec psql.

      ### shopops-api (CWD = shopops repo root; shopops-api/ is subdir)
      - Files to create:
        - shopops-api/migrations/20260514_bundle_builder.sql (per WO §9)
        - shopops-api/routes/bundles.js (per WO §7 operator-facing CRUD)
        - shopops-api/routes/storefront-bundles.js (per WO §7 customer-facing)
        - shopops-api/services/bundleInventoryCheck.js (per WO §7 atomic helpers)
        - shopops-api/tests/test_bundle_routes.js (6 tests per WO §11 Test A-F)
      - Files to modify:
        - shopops-api/routes/orders.js — extend createOrder + confirmOrder to walk bundle
          components and decrement inventory atomically (SELECT FOR UPDATE pattern)
        - shopops-api/routes/inventory.js — add restock trigger that calls
          reEvaluateAffectedBundles(sku_id)
        - shopops-api/server.js or routes-index — register the two new routers
      - Commit message: "feat(api): WO-STOREFRONT-BUNDLE-BUILDER-01 — bundle CRUD + atomic inventory + schema migration"
      - Branch: wo/storefront-bundle-builder-01 (off master)
      - PR base: master
      - Tests: minimum 6 real-behavior tests per WO §11 (NOT "did not throw"):
        Test A: operator creates published bundle (status=PUBLISHED, price=sum)
        Test B: bundle auto-marks OUT_OF_STOCK when component sells out
        Test C: customer saves cart as bundle (source=CUSTOMER, customer_id set)
        Test D: checkout decrements all bundle component inventory atomically
        Test E: concurrent purchase of last component — exactly 1 succeeds, qty never negative
        Test F: restock re-publishes bundle (OUT_OF_STOCK -> PUBLISHED)

      ### shopops-storefront (cloned to /tmp/storefront-work-$WORKFLOW_ID)
      - Files to create:
        - app/shops/[shopSlug]/bundles/page.tsx — public bundle catalog
        - components/BundleCard.tsx — bundle display card
        - components/SaveBundleModal.tsx — "Save cart as bundle" modal
        - __tests__/components/BundleCard.test.tsx — minimum 4 tests
      - Files to modify:
        - lib/storefront-types.ts — add Bundle + BundleComponent interfaces; extend
          OrderLineItem with optional bundle_id + bundle_components
        - app/shops/[shopSlug]/cart/page.tsx — add SaveBundleModal trigger + render bundle
          line items differently from single-SKU lines
        - lib/storefront-api.ts — add fetchBundles(), fetchBundle(), saveCustomerBundle()
      - Commit message: "feat(storefront): WO-STOREFRONT-BUNDLE-BUILDER-01 — Bundle UI + cart-as-bundle save"
      - Branch: wo/storefront-bundle-builder-01 (off main)
      - PR base: main

      ### lspro-react (cloned to /tmp/lspro-work-$WORKFLOW_ID)
      - Files to create:
        - src/pages/BundleManagerPage.tsx (route: /admin/bundles)
        - src/components/BundleBuilderPanel.tsx — name + description + SKU picker + price preview
        - src/components/BundleList.tsx — list with status pills
        - src/components/BundleHealthMonitor.tsx — auto-flags 0-stock components
        - src/api/bundles.ts — API client for /api/bundles endpoints
        - src/__tests__/pages/BundleManagerPage.test.tsx — minimum 4 tests
      - Files to modify:
        - src/App.tsx or router config — add /admin/bundles route
      - Commit message: "feat(admin): WO-STOREFRONT-BUNDLE-BUILDER-01 — operator bundle builder admin UI"
      - Branch: wo/storefront-bundle-builder-01 (off main)
      - PR base: main

      ## Spec
      $read-spec.output

      ## Schema verify output
      $schema-verify.output

  # ---------------------------------------------------------------------------
  # 4. SETUP-CLONES — bash clones of shopops-storefront + lspro-react in parallel-ready
  #    way; both depend on plan but run before their respective impl nodes.
  # ---------------------------------------------------------------------------
  - id: setup-storefront-clone
    depends_on: [plan]
    bash: |
      set -euo pipefail
      STOREFRONT_DIR="/tmp/storefront-work-$WORKFLOW_ID"

      if [ -d "$STOREFRONT_DIR/.git" ]; then
        cd "$STOREFRONT_DIR"
        git fetch origin
        git checkout main 2>/dev/null || git checkout master
        git reset --hard origin/main 2>/dev/null || git reset --hard origin/master
        echo "STOREFRONT_DIR=${STOREFRONT_DIR}"
        echo "STATUS=reused_existing_clone"
        exit 0
      fi

      git clone "https://github.com/bluedevilcollectibles/shopops-storefront.git" \
        "$STOREFRONT_DIR" --depth=50
      echo "STOREFRONT_DIR=${STOREFRONT_DIR}"
      echo "STATUS=fresh_clone"

  - id: setup-lspro-clone
    depends_on: [plan]
    bash: |
      set -euo pipefail
      LSPRO_DIR="/tmp/lspro-work-$WORKFLOW_ID"

      if [ -d "$LSPRO_DIR/.git" ]; then
        cd "$LSPRO_DIR"
        git fetch origin
        git checkout main
        git reset --hard origin/main
        echo "LSPRO_DIR=${LSPRO_DIR}"
        echo "STATUS=reused_existing_clone"
        exit 0
      fi

      git clone "https://github.com/bluedevilcollectibles/lspro-react.git" \
        "$LSPRO_DIR" --depth=50
      echo "LSPRO_DIR=${LSPRO_DIR}"
      echo "STATUS=fresh_clone"

  # ---------------------------------------------------------------------------
  # 5. IMPLEMENT-API — write migration + bundle routes + service + tests in shopops-api
  # ---------------------------------------------------------------------------
  - id: implement-api
    depends_on: [plan]
    task_class: medium_work
    loop:
      fresh_context: true
      until: COMPLETE
      max_iterations: 6
      prompt: |
        Implement the shopops-api side of WO-STOREFRONT-BUNDLE-BUILDER-01.
        CWD is the shopops repo root. shopops-api/ is a subdirectory.

        ## Plan
        $plan.output

        ## Spec
        $read-spec.output

        ## Schema verify
        $schema-verify.output

        ## Execution Rules

        1. Read shopops-api/routes/orders.js, shopops-api/routes/inventory.js, and the
           server.js/routes-index file in full before making any edits. Understand the
           existing routing setup and any auth middleware in play.

        2. Resolve the order line items table name from schema-verify output:
             - If order_line_items VERIFIED -> use order_line_items
             - Else if order_lines VERIFIED -> use order_lines + adjust migration ALTER TABLE
             - Else -> halt and emit "SCHEMA_RESOLUTION_NEEDED" in this iteration

        3. Write the migration shopops-api/migrations/20260514_bundle_builder.sql:
           - CREATE TABLE IF NOT EXISTS bundles (per WO §9, all columns, CHECK constraints)
           - CREATE TABLE IF NOT EXISTS bundle_items (per WO §9, PK + FK + ON DELETE CASCADE)
           - CREATE TABLE IF NOT EXISTS order_line_components (per WO §9)
           - ALTER TABLE [resolved name] ADD COLUMN IF NOT EXISTS bundle_id UUID REFERENCES bundles(id)
           - 3 indexes per WO §9 (idx_bundle_items_sku, idx_bundles_tenant_status, idx_bundles_customer)

        4. Write shopops-api/routes/bundles.js with operator-facing routes per WO §7:
           - GET    /api/bundles        — list bundles for tenant
           - GET    /api/bundles/:id    — single bundle + components + stock state
           - POST   /api/bundles        — create
           - PATCH  /api/bundles/:id    — update name/desc/components/published
           - DELETE /api/bundles/:id    — soft-delete
           - GET    /api/bundles/:id/health — { in_stock, low_stock_components }

        5. Write shopops-api/routes/storefront-bundles.js with customer-facing routes:
           - GET   /api/storefront/bundles      — public, list published
           - GET   /api/storefront/bundles/:id  — public, single bundle
           - POST  /api/storefront/bundles      — requirePortalAuth, customer saves cart
           - GET   /api/storefront/me/bundles   — requirePortalAuth, customer's saved bundles

        6. Write shopops-api/services/bundleInventoryCheck.js:
           - isBundleAvailable(bundle_id) — atomic SELECT on all components
           - markBundlesUnavailableByComponent(sku_id) — called from inventory mutation hooks
           - reEvaluateAffectedBundles(sku_id) — called from restock; flips OUT_OF_STOCK to PUBLISHED
             if all components back in stock

        7. Extend shopops-api/routes/orders.js:
           - createOrder: accept OrderLineItem with optional bundle_id; snapshot components into
             order_line_components at order time
           - confirmOrder (or whatever the ship-confirm/inventory-decrement endpoint is):
             For each bundle in the order, BEGIN TRANSACTION;
             SELECT FOR UPDATE on each component's inventory_items row;
             verify on_hand_qty >= 1 for all; if any fail, ROLLBACK with 409;
             UPDATE inventory_items SET on_hand_qty = on_hand_qty - 1 for each component;
             trigger markBundlesUnavailableByComponent for each component now at 0;
             COMMIT.

        8. Extend shopops-api/routes/inventory.js restock endpoint to call
           reEvaluateAffectedBundles($sku_id) after successful restock.

        9. Register both new routers in server.js or the routes-index file.

        10. Create shopops-api/tests/test_bundle_routes.js with 6 real-behavior tests per WO §11:
           Use bun test runner. Each test asserts ACTUAL behavior (status code, response
           shape, DB state, count), NOT "did not throw".
             Test A — operator creates published bundle (POST /api/bundles, assert status,
                       price=sum, returned id)
             Test B — bundle auto-marks OUT_OF_STOCK when component sells out
             Test C — customer saves cart as bundle (assert source=CUSTOMER + customer_id)
             Test D — checkout decrements bundle component inventory atomically
             Test E — concurrent purchase of last component (2 parallel POSTs;
                       exactly 1 succeeds, qty=0 not negative)
             Test F — restock re-publishes bundle (OUT_OF_STOCK -> PUBLISHED)

        11. Do NOT apply the migration in this node. The apply-migration-prod node owns
           production migration execution. Do NOT push or open PR — separate nodes own that.

        ## Completion Criteria
        Output <promise>COMPLETE</promise> only when:
          - Migration file exists at shopops-api/migrations/20260514_bundle_builder.sql with
            all 3 CREATE TABLE + 1 ALTER TABLE + 3 INDEX statements
          - shopops-api/routes/bundles.js has all 6 operator routes
          - shopops-api/routes/storefront-bundles.js has all 4 customer routes
          - shopops-api/services/bundleInventoryCheck.js has 3 exported helpers
          - shopops-api/routes/orders.js extended with bundle_id handling + atomic decrement
          - shopops-api/routes/inventory.js extended with re-evaluate trigger on restock
          - Both new routers registered in server.js/routes-index
          - shopops-api/tests/test_bundle_routes.js has all 6 tests A-F asserting real behavior

  # ---------------------------------------------------------------------------
  # 6. APPLY-MIGRATION-PROD — run migration against production Supabase
  #    Per 2026-05-12 metron-scrub doctrine: schema migration MUST RUN on prod, not just be
  #    written. Per feedback_production-writes-via-hetzner-ssh.md: use ssh hetzner-prod
  #    wrapper so Hookify block-production-supabase is satisfied.
  #    Best-effort wrapper: legitimate failure modes include "table already exists"
  #    from re-run + SSH unavailable + Supabase 503.
  # ---------------------------------------------------------------------------
  - id: apply-migration-prod
    depends_on: [implement-api]
    bash: |
      # set -e DELIBERATELY OMITTED — best-effort step
      MIGRATION_FILE="shopops-api/migrations/20260514_bundle_builder.sql"

      if [ ! -f "$MIGRATION_FILE" ]; then
        echo "STATUS=failed_unexpected"
        echo "DETAIL=Migration file not found at $MIGRATION_FILE — implement-api did not complete"
        exit 0
      fi

      # Pipe migration via ssh stdin to hetzner-prod, then to docker exec psql stdin
      RESULT=$(cat "$MIGRATION_FILE" | ssh hetzner-prod 'docker exec -i shopops-api psql "$DATABASE_URL"' 2>&1)
      EXIT=$?

      if [ $EXIT -eq 0 ]; then
        echo "STATUS=ok"
        echo "MIGRATION_OUTPUT=${RESULT}"
        echo "DETAIL=Migration applied to production Supabase"
      elif echo "$RESULT" | grep -qiE 'already exists|relation.*exists|column.*exists'; then
        echo "STATUS=skipped_idempotent_rerun"
        echo "DETAIL=Migration components already present (IF NOT EXISTS guards triggered; safe)"
        echo "MIGRATION_OUTPUT=${RESULT}"
      elif echo "$RESULT" | grep -qiE 'ssh:.*could not resolve|connection refused|connection timed out|permission denied'; then
        echo "STATUS=skipped_ssh_unavailable"
        echo "DETAIL=SSH to hetzner-prod failed; operator must run migration manually:"
        echo "  scp $MIGRATION_FILE hetzner-prod:/tmp/"
        echo "  ssh hetzner-prod 'docker exec -i shopops-api psql \$DATABASE_URL < /tmp/20260514_bundle_builder.sql'"
        echo "MIGRATION_OUTPUT=${RESULT}"
      else
        echo "STATUS=failed_unexpected"
        echo "DETAIL=${RESULT}"
      fi
      exit 0

  # ---------------------------------------------------------------------------
  # 7. VERIFY-SCHEMA-PROD — confirm tables exist on prod after migration ran
  #    Per metron-scrub anchor: migration WRITE is not proof; prove schema actually
  #    matches expected shape after migration applies.
  # ---------------------------------------------------------------------------
  - id: verify-schema-prod
    depends_on: [apply-migration-prod]
    bash: |
      # set -e DELIBERATELY OMITTED — best-effort step
      SUPABASE_URL="${SUPABASE_URL:-}"
      SUPABASE_SERVICE_KEY="${SUPABASE_SERVICE_KEY:-}"

      if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ]; then
        echo "STATUS=skipped_no_env"
        echo "DETAIL=Operator must verify post-migration schema manually:"
        echo "  ssh hetzner-prod 'docker exec shopops-api psql \$DATABASE_URL -c \"\\d bundles\"'"
        echo "  ssh hetzner-prod 'docker exec shopops-api psql \$DATABASE_URL -c \"\\d bundle_items\"'"
        echo "  ssh hetzner-prod 'docker exec shopops-api psql \$DATABASE_URL -c \"\\d order_line_components\"'"
        exit 0
      fi

      check_columns() {
        local TABLE="$1"
        local EXPECTED_MIN="$2"
        RESULT=$(curl -sf \
          "${SUPABASE_URL}/rest/v1/information_schema.columns?table_name=eq.${TABLE}&select=column_name&table_schema=eq.public" \
          -H "apikey: ${SUPABASE_SERVICE_KEY}" \
          -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
          2>&1) || true
        COUNT=$(echo "$RESULT" | grep -c '"column_name"' || echo 0)
        if [ "$COUNT" -ge "$EXPECTED_MIN" ]; then
          echo "POST_MIGRATION_${TABLE}=VERIFIED (${COUNT} columns)"
        else
          echo "POST_MIGRATION_${TABLE}=FAILED (${COUNT} columns; expected >= ${EXPECTED_MIN})"
        fi
      }

      # Per WO §9 expected column counts (minimum)
