  # ---------------------------------------------------------------------------
  # 22. RUNTIME-VERIFY — Rule 19: docker exec grep proves source live in shopops-api.
  #     Best-effort — container is not rebuilt at PR-open time.
  # ---------------------------------------------------------------------------
  - id: runtime-verify
    depends_on: [open-pr-api, open-pr-storefront, open-pr-lspro]
    bash: |
      # set -e DELIBERATELY OMITTED — best-effort step (Rule 19)
      RESULT=$(ssh hetzner-prod "docker exec shopops-api grep -n 'isBundleAvailable' /app/services/bundleInventoryCheck.js 2>&1" 2>&1)
      EXIT=$?
      if [ $EXIT -eq 0 ] && echo "$RESULT" | grep -q 'isBundleAvailable'; then
        echo "STATUS=ok"
        echo "RULE19_GREP_RESULT=${RESULT}"
        echo "DETAIL=Source change verified live in shopops-api container"
      elif echo "$RESULT" | grep -qiE 'No such (container|file)|not found|executable file not found'; then
        echo "STATUS=skipped_container_not_rebuilt"
        echo "DETAIL=shopops-api not yet rebuilt with PR changes. Operator runs post-merge:"
        echo "  ssh hetzner-prod 'docker exec shopops-api grep -n createBundle /app/routes/bundles.js'"
        echo "  ssh hetzner-prod 'docker exec shopops-api grep -n saveCustomerBundle /app/routes/storefront-bundles.js'"
        echo "  ssh hetzner-prod 'docker exec shopops-api grep -n isBundleAvailable /app/services/bundleInventoryCheck.js'"
      elif echo "$RESULT" | grep -qiE 'ssh:.*could not resolve|connection refused|permission denied'; then
        echo "STATUS=skipped_ssh_unavailable"
        echo "DETAIL=SSH to hetzner-prod failed; operator runs grep checks manually"
      else
        echo "STATUS=failed_unexpected"
        echo "DETAIL=${RESULT}"
      fi
      exit 0

  # ---------------------------------------------------------------------------
  # 23. VERCEL-VERIFY — best-effort Vercel preview health check
  #     Staging is password-gated; uses VERCEL_PROTECTION_BYPASS header if set.
  # ---------------------------------------------------------------------------
  - id: vercel-verify
    depends_on: [open-pr-storefront, open-pr-lspro]
    bash: |
      # set -e DELIBERATELY OMITTED — best-effort step
      BYPASS_HEADER=""
      if [ -n "${VERCEL_PROTECTION_BYPASS:-}" ]; then
        BYPASS_HEADER="-H x-vercel-protection-bypass:${VERCEL_PROTECTION_BYPASS}"
      fi

      check_url() {
        local LABEL="$1"
        local URL="$2"
        RESULT=$(curl -s -o /dev/null -w '%{http_code}' $BYPASS_HEADER "$URL" 2>&1) || RESULT="curl-failed"
        echo "${LABEL}_HTTP=${RESULT}"
      }

      check_url "STAGING_STOREFRONT_BUNDLES" "https://staging.comicstoreos.com/shops/bdc/bundles"
      check_url "STAGING_LSPRO_ADMIN_BUNDLES" "https://staging.livesellerpro.app/admin/bundles"

      echo ""
      echo "Note: 401/403 = staging deployment exists but password-gated (expected without bypass)"
      echo "      200    = staging deployment live AND bypass header accepted"
      echo "      404    = page not yet deployed (Vercel may still be building)"
      echo "STATUS=ok"
      exit 0

