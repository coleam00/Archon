        echo "- \`GET /api/storefront/bundles\` + \`/:id\` + \`POST\` save + \`GET /me/bundles\` (4 customer)"
        echo ""
        echo "## Atomic Inventory (the load-bearing case)"
        echo "Bundles are virtual SKUs with no own stock. Selling a bundle locks each"
        echo "component's \`inventory_items\` row \`SELECT FOR UPDATE\`, verifies all >= 1,"
        echo "decrements all, then triggers \`markBundlesUnavailableByComponent\` for any"
        echo "component now at 0. Test E verifies concurrent purchase resolves to exactly"
        echo "1 success with qty never negative."
        echo ""
        echo "## Files"
