    bash: |
      set -euo pipefail
      echo "=== shopops-api grep assertions ==="

      MIGRATION="shopops-api/migrations/20260514_bundle_builder.sql"
      BUNDLES="shopops-api/routes/bundles.js"
      STOREFRONT_BUNDLES="shopops-api/routes/storefront-bundles.js"
