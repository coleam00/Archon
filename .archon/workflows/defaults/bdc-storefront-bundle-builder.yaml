        echo ""
        echo "## Rule 19 Runtime Verification (post-merge)"
        echo "  docker exec shopops-api grep -n 'createBundle\\|saveCustomerBundle' /app/routes/"
        echo "  docker exec shopops-api grep -n 'isBundleAvailable' /app/services/bundleInventoryCheck.js"
