name: bdc-ce-regression-suite
description: |
  Use when: Shipping WO-CI-CE-REGRESSION-SUITE-01 — CE-only regression suite + CI wiring.
  Input: WO_ID = WO-CI-CE-REGRESSION-SUITE-01.
  Does: Reads spec from bdc-xo via gh api (cross-repo), implements `npm run test:ce-regression`
        on lspro-react covering CE matrix (auth, license, import paths, AutoFix, cover lookup,
        WhatNot export, no PRO/HQ UI), adds .github/workflows/ce-regression.yml that runs on
        PRs targeting release/ce, opens PR against main, flips Notion to REVIEW.
  Repo: bluedevilcollectibles/lspro-react. Spec lives in bluedevilcollectibles/bdc-xo.
  parallel_ok: true (independent from WO-RELEASE-CE-BRANCH-MODEL-01 — runs in parallel)
  NOT for: any other WO.

policyFile: harness/policies/agent-behavior.md
model: sonnet

nodes:
  - id: read-spec
    bash: |
      set -euo pipefail
      WO_ID="${WO_ID:-WO-CI-CE-REGRESSION-SUITE-01}"
      SPEC_PATH="docs/superpowers/specs/ce-release-branch/work-orders/${WO_ID}.md"
      SPEC_CONTENT=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/${SPEC_PATH}?ref=main" --jq .content 2>/dev/null | base64 -d 2>/dev/null || true)
      MATRIX=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/docs/superpowers/specs/ce-release-branch/docs/CE-REGRESSION-MATRIX.md?ref=main" --jq .content 2>/dev/null | base64 -d 2>/dev/null || true)
      if [ -z "$SPEC_CONTENT" ]; then
        echo "Spec not found for ${WO_ID}" >&2
        exit 1
      fi
      printf 'WO_ID=%s\nSPEC_PATH=bdc-xo:%s\nWORKFLOW_ID=%s\n\n' "$WO_ID" "$SPEC_PATH" "$WORKFLOW_ID"
      printf -- '--- SPEC ---\n%s\n\n' "$SPEC_CONTENT"
      printf -- '--- CE REGRESSION MATRIX ---\n%s\n' "$MATRIX"

  # post-started node REMOVED 2026-05-12 — n8n webhook hangs from Archon executor subprocess
  # (see WO-HARNESS-N8N-WEBHOOK-EGRESS-FIX-01). Builder-status feed is optional bookkeeping;
  # flip-notion is the canonical close action.

  - id: plan
    depends_on: [read-spec]
    task_class: medium_work
    prompt: |
      Plan the CE regression suite for lspro-react.

      ## Required Output (Markdown)
      - WO ID: WO-CI-CE-REGRESSION-SUITE-01
      - npm script to add: `test:ce-regression` in package.json
      - Test runner: existing Vitest or Playwright (whichever the repo already uses)
      - Test files to create under `tests/ce-regression/`:
        - 01-auth-license.spec.ts (CE plan resolves live_seller_comic / STARTER)
        - 02-sample-data-import.spec.ts (CE sample data import path)
        - 03-clz-xml-import.spec.ts
        - 04-csv-import.spec.ts (if CE supports)
        - 05-autofix.spec.ts (AutoFix Pass 3 runs on CE import)
        - 06-cover-lookup.spec.ts (cover cascade works for CE)
        - 07-missing-cover-flag.spec.ts (cover_followup_needed flagged correctly)
        - 08-blocker-panel-resolution.spec.ts
        - 09-whatnot-export.spec.ts (21-column WhatNot CSV export)
        - 10-sample-export-watermark.spec.ts
        - 11-no-pro-hq-ui.spec.ts (negative assertion: no PRO/HQ controls visible to CE plan)
      - CI workflow file: `.github/workflows/ce-regression.yml`
        - Triggers: pull_request targeting release/ce
        - Runs: `npm run test:ce-regression`
        - Required check: yes (blocks merge to release/ce on fail)
      - Verification commands:
        - `npm run test:ce-regression` (locally)
        - `grep -c "test:ce-regression" package.json` (>= 1)
        - `ls .github/workflows/ce-regression.yml`
      - Commit message: `feat(ci): WO-CI-CE-REGRESSION-SUITE-01 — CE regression gate for release/ce PRs`
      - Push policy: feature branch `wo/ci-ce-regression-suite-01` → PR against `main`

      ## Spec + Matrix
      $read-spec.output

  - id: implement
    depends_on: [plan]
    task_class: medium_work
    loop:
      fresh_context: true
      until: COMPLETE
      max_iterations: 5
      prompt: |
        Implement the CE regression suite per the plan.

        ## Plan
        $plan.output

        ## Spec
        $read-spec.output

        ## Execution Rules
        - Create `tests/ce-regression/` directory with the 11 .spec.ts files from the plan.
        - Each test asserts ONE matrix item from the CE Regression Matrix.
        - Add `"test:ce-regression"` script to package.json. Use Vitest if it's already a dep, else Playwright if present.
        - Create `.github/workflows/ce-regression.yml` that runs on PRs targeting release/ce ONLY (use `on.pull_request.branches: [release/ce]`).
        - The workflow MUST install deps + run `npm run test:ce-regression` and fail on non-zero exit.
        - Do NOT touch any other test files. Do NOT modify CE wizard components.
        - Do NOT deploy. Do NOT push directly to main or release/ce.

        ## Completion criteria
        Output <promise>COMPLETE</promise> only when:
          - 11 spec files exist with at least one real assertion each (no skip-only files)
          - package.json scripts.test:ce-regression set
          - .github/workflows/ce-regression.yml exists with correct trigger
          - `npm run test:ce-regression` passes locally (or skipped with clear reason logged)

  - id: verify-grep
    depends_on: [implement]
    bash: |
      set -euo pipefail
      echo "=== grep assertions ==="
      grep -c "test:ce-regression" package.json
      ls tests/ce-regression/*.spec.ts | wc -l
      ls .github/workflows/ce-regression.yml
      # Multi-line YAML check: branches: + - release/ce can be on separate lines
      grep -q "release/ce" .github/workflows/ce-regression.yml || (echo "FAIL: release/ce reference missing from workflow" >&2; exit 1)
      grep -q "pull_request" .github/workflows/ce-regression.yml || (echo "FAIL: pull_request trigger missing from workflow" >&2; exit 1)

  - id: verify-tests
    depends_on: [implement]
    bash: |
      set -euo pipefail
      if [ -f package.json ] && node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['test:ce-regression'] ? 0 : 1)"; then
        npm run test:ce-regression || echo "Tests may fail in workspace (missing env); CI is authoritative."
      else
        echo "test:ce-regression script missing" >&2
        exit 1
      fi

  - id: commit-and-push
    depends_on: [verify-grep, verify-tests]
    bash: |
      set -euo pipefail
      BASE_BRANCH="wo/ci-ce-regression-suite-01"
      BRANCH="$BASE_BRANCH"
      if git worktree list --porcelain | grep -qx "branch refs/heads/$BRANCH"; then
        BRANCH="${BASE_BRANCH}-run-$(date +%Y%m%d%H%M%S)"
      fi
      if git show-ref --quiet "refs/heads/$BRANCH"; then
        git checkout "$BRANCH"
      else
        git checkout -b "$BRANCH"
      fi
      git add tests/ce-regression/ .github/workflows/ce-regression.yml package.json
      git -c user.name="John Ranson" -c user.email="admin@bluedevilcollectibles.com" \
        commit -m "feat(ci): WO-CI-CE-REGRESSION-SUITE-01 — CE regression gate for release/ce PRs

      Adds 11 .spec.ts files under tests/ce-regression/ covering the CE Regression Matrix:
      auth/license, sample data import, CLZ/XML/CSV import, AutoFix, cover lookup,
      missing-cover flag, blocker panel, WhatNot export + sample watermark, no PRO/HQ UI.

      Adds .github/workflows/ce-regression.yml — runs on PRs targeting release/ce only.

      Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>"
      git push -u origin "$BRANCH"
      echo "BRANCH=${BRANCH}"
      echo "BRANCH_SHA=$(git rev-parse HEAD)"

  - id: open-pr
    depends_on: [commit-and-push]
    bash: |
      set -euo pipefail
      BRANCH=$(printf '%s\n' "$commit-and-push.output" | sed -n 's/^BRANCH=//p' | head -n 1)
      REPO="bluedevilcollectibles/lspro-react"
      BASE="main"
      TITLE="feat(ci): WO-CI-CE-REGRESSION-SUITE-01 — CE regression gate"
      BODY_FILE=$(mktemp)
      {
        echo "## Summary"
        echo "Implements **WO-CI-CE-REGRESSION-SUITE-01** — CE Release Branch Plan WO #2."
        echo ""
        echo "Adds CE-specific regression gate that runs on every PR targeting release/ce."
        echo ""
        echo "## Coverage (CE Regression Matrix)"
        echo "- CE auth/license loads + plan resolves live_seller_comic/STARTER"
        echo "- Sample data import, CLZ/XML import, CSV import (if CE supports)"
        echo "- AutoFix Pass 3, cover lookup, missing-cover flag"
        echo "- Blocker panel resolution"
        echo "- WhatNot CSV export (21 columns), sample export watermark"
        echo "- Negative assertion: no PRO/HQ/multi-category UI visible to CE plan"
        echo ""
        echo "## Files"
        echo "- 11 spec files under \`tests/ce-regression/\`"
        echo "- \`.github/workflows/ce-regression.yml\` — runs on \`pull_request\` targeting \`release/ce\`"
        echo "- \`package.json\` — new \`test:ce-regression\` script"
        echo ""
        echo "## Authoritative source"
        echo "- Spec: bdc-xo \`docs/superpowers/specs/ce-release-branch/work-orders/WO-CI-CE-REGRESSION-SUITE-01.md\`"
        echo "- Matrix: bdc-xo \`docs/superpowers/specs/ce-release-branch/docs/CE-REGRESSION-MATRIX.md\`"
        echo ""
        echo "🤖 Generated with [Claude Code](https://claude.com/claude-code)"
      } > "$BODY_FILE"
      # Idempotent PR creation. See WO-HARNESS-OPEN-PR-GRAPHQL-NO-COMMITS-FIX-01.
      existing_pr_url() {
        gh pr list --repo "$REPO" --head "$BRANCH" --state open --json url --jq '.[0].url // empty' 2>/dev/null
      }
      PR_URL="$(existing_pr_url)"
      if [ -n "$PR_URL" ]; then
        echo "PR_URL=$PR_URL"
        exit 0
      fi
      for attempt in 1 2 3 4 5; do
        if PR_OUT=$(gh pr create --repo "$REPO" --base "$BASE" --head "$BRANCH" \
            --title "$TITLE" --body-file "$BODY_FILE" 2>&1); then
          echo "PR_URL=$PR_OUT"
          exit 0
        fi
        PR_URL="$(existing_pr_url)"
        if [ -n "$PR_URL" ]; then
          echo "PR_URL=$PR_URL"
          exit 0
        fi
        echo "open-pr attempt $attempt failed: $PR_OUT" >&2
        sleep 10
      done
      echo "open-pr failed after retries; branch pushed at $BRANCH but no PR exists" >&2
      exit 1

  - id: build-manifest
    depends_on: [open-pr]
    task_class: clerical
    prompt: |
      Build Captain CI manifest v2 for WO-CI-CE-REGRESSION-SUITE-01.

      Required fields: WO, Builder, Files created (11 specs + 1 workflow), Files modified (package.json),
      PR URL, Merge ancestor lspro-react main HEAD, Grep assertions, Runtime verification
      (`npm run test:ce-regression` exit code), CI evidence, VALIDATION: PASS.

      ## Inputs
      $read-spec.output
      $plan.output
      $verify-grep.output
      $verify-tests.output
      $commit-and-push.output
      $open-pr.output

  # post-completed node REMOVED 2026-05-12 — n8n webhook hangs from Archon executor subprocess
  # (see WO-HARNESS-N8N-WEBHOOK-EGRESS-FIX-01). Builder-status feed is optional bookkeeping;
  # flip-notion below is the canonical close action.

  - id: flip-notion
    depends_on: [build-manifest]
    task_class: clerical
    prompt: |
      Flip Notion WO-CI-CE-REGRESSION-SUITE-01 to REVIEW with the manifest in Notes property.

      Notion page ID: 35eef4c9-ce00-812d-9329-eecf483e8bf6 (canonical, after XO archived dup)
      Required Notion changes:
      - Claude Status -> REVIEW
      - Status -> Review
      - Notes -> set to $build-manifest.output verbatim
      - claimed_by: Codex (bdc-harness)
      - claimed_at: today

      If Notion MCP unavailable, output XO_TODO line in run log.
