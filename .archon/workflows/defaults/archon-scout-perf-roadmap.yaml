name: archon-scout-perf-roadmap
description: |
  Use when: Optimizing app performance using Scout APM.
  Does:
  1. Scout MCP — top 10 slow + high-traffic HTTP routes
  2. Parallel analysis (10 nodes) — profile each route in the codebase + traces
  3. Consolidated optimization plan
  4. Interactive plan review until user approves
  5. Implement via plan pipeline (draft PR)
  6. Multi-agent code review + self-fix
  7. Mark PR ready when review satisfied

  Requires: SCOUT_API_KEY (self-hosted Docker MCP) or Scout endpoints export; Docker for scout-mcp-local.
  Input: Optional app name/id after workflow message; e.g. "My App Name" or leave default.

  NOT for: Performance work without Scout (use archon-assist) or non-HTTP routes only.

provider: claude
model: sonnet
interactive: true

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 1 — Scout discovery
  # ═══════════════════════════════════════════════════════════════

  - id: discover-routes
    command: scout-discover-routes
    context: fresh
    mcp: .archon/mcp/scout-apm.json

  - id: profile-00
    prompt: |
      You are **one of ten parallel profilers** for the Scout performance roadmap.

      **Assigned index**: 0 (0-based). **Profile file**: `$ARTIFACTS_DIR/profile-00.md`

      ## Steps

      1. Read `$ARTIFACTS_DIR/routes.json`. If there is **no** element at index 0, write to `$ARTIFACTS_DIR/profile-00.md` a single line `SKIPPED: no route at index 0` and stop.
      2. Otherwise take the route object at index 0. Map it to this codebase (routers, handlers, middleware, DB).
      3. Use **Scout MCP** when available: `get_endpoint_metrics`, `get_app_endpoint_traces`, `get_app_insights` for this app/endpoint to explain **where** time is spent (N+1, slow queries, external I/O, etc.).
      4. Read CLAUDE.md and search the codebase for the implementation path.
      5. Write **`$ARTIFACTS_DIR/profile-00.md`** with:
         - Route identity (method + path)
         - Scout metrics summary
         - Code path (files + symbols)
         - Root causes of slowness
         - Concrete optimization ideas (caching, batching, indexes, async, etc.)

      Keep stdout to a short summary line for logs.
    depends_on: [discover-routes]
    context: fresh
    mcp: .archon/mcp/scout-apm.json

