name: archon-compose-plan-implement-qa
description: |
  Use when: you want to compose a reusable sub-pipeline that gets its OWN governed
  run record — separate audit trail, separate approval gate, separate cost line —
  rather than inlining another workflow's nodes with `include:`.

  Demonstrates the `workflow:` sub-run primitive (#2121 Phase 2): the `implement-qa`
  node starts `archon-compose-child-qa` as a CHILD run (parent_run_id links the
  tree). The child pauses at its own approval gate; this parent pauses "blocked on
  child" until a reviewer approves the CHILD by its run id. When the child completes,
  this parent auto-resumes and threads the child's terminal output into
  `$implement-qa.output`.

  `include:` vs `workflow:`: use `include:` for textual reuse (the block's nodes
  flatten into THIS run); use `workflow:` when the block needs to be a separate
  governance object (its own record, gate, artifacts, and cost).

  NOT for: quick fixes or standalone reviews.

# The parent pauses "blocked on child" at the sub-run's gate, so it must run in the
# foreground on web (same requirement as any approval-gate workflow).
interactive: true

nodes:
  - id: plan
    prompt: |
      Read the request below and produce a short, one-paragraph plan for the change.

      $ARGUMENTS
    context: fresh

  # Runtime sub-run: starts archon-compose-child-qa as a governed child run. `input`
  # forwards the plan as the child's $ARGUMENTS; the child's terminal output becomes
  # $implement-qa.output.
  - id: implement-qa
    workflow: archon-compose-child-qa
    input: "$plan.output"
    depends_on: [plan]

  - id: summarize
    prompt: |
      The composed sub-run produced this result:

      $implement-qa.output

      Write a two-sentence summary of what the composed pipeline accomplished.
    depends_on: [implement-qa]
    context: fresh
