name: archon-assist-local
description: |
  Local-only assistance without GitHub or GitLab connections.
  Use when: Working offline or without forge access.
  Handles: Questions, debugging, exploration, one-off tasks, explanations, general help.
  Capability: Full Claude Code agent with all tools available, except forge APIs.
  Note: Will inform user when assist mode is used for tracking.

# Run in the live checkout, not in a fresh sub-worktree. Without this, every
# auto-routed `archon-assist-local` invocation creates an isolated sub-worktree
# whose edits are unreachable from the calling chat (no commit step, no
# branch propagation back). With `worktree.enabled: false`, edits land in
# the parent's working tree where syncWorkspace's #1516 fast-forward
# default keeps them safe across chat ticks.
worktree:
  enabled: false

nodes:
  - id: assist
    command: archon-assist-local
