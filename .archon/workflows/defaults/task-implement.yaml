        contract names every file, export, signature, query, and
        invariant your work must align with. If a signature appears in
        the contract, do not deviate from it. If you believe the contract
        is wrong, write your work the way the contract says and surface
        your concern in your final report.
      - `$ARTIFACTS_DIR/task-context.md` — task summary, description, and
        acceptance criteria. This is the behavioral spec.
      - `$ARTIFACTS_DIR/parent-attachments.md` — project tech stack,
        architecture, conventions, TechSpec, DesignDoc, STYLE_GUIDE, etc.
      - `$ARTIFACTS_DIR/feedback.json` — raw baseline quality gate output.
        Treat this as diagnostic signal, not as a specification.
      - `$ARTIFACTS_DIR/instructions.md` if it exists — validator-authored
        repair instructions from a prior deterministic gate.
      - `$ARTIFACTS_DIR/dev-review-latest.json` if it exists — implementation
        quality review feedback from a prior attempt.
      - Production source files needed to understand the relevant code path.

      Do not read tests, fixtures, Playwright artifacts, screenshots, or
      error-context files.

      **PHASE_1_CHECKPOINT:**
      - [ ] Acceptance criteria are listed in your notes
      - [ ] Relevant production source areas are identified
      - [ ] Validation feedback has been interpreted only as product symptoms

      ## Phase 2: PLAN - Map Requirements to Source

      Create a concise implementation plan:
      - Map each acceptance criterion to the production behavior it requires.
      - Map each required behavior to likely source files.
      - Identify any validation signal that points to an incomplete product
        behavior.
      - Ignore validation details that are test-shaped: selectors, fixture
        values, fake IDs, assertion wording, screenshots, stack trace lines,
        test file paths, and artifact paths.

      If the ticket is ambiguous, choose the most direct interpretation that
      fits the existing architecture. Do not ask for clarification.

      **Do not copy patterns blindly.** Existing production code is evidence,
      not authority. Before reusing a nearby pattern, prove it works for this
      exact module boundary, runtime, generated-code shape, and calling
      context. If a pattern fails in any required context, reject that pattern
      and implement the direct product behavior instead.

      Never add production code whose purpose is to make a stubbed generated
      API, mock, fixture, or validation harness behave differently. If the
      issue is context plumbing, fix the real production calling contract and
      explain why it works in every context.

      **PHASE_2_CHECKPOINT:**
      - [ ] Every planned edit is justified by the ticket or existing code
      - [ ] No planned edit exists solely to satisfy visible test mechanics
      - [ ] No test, fixture, generated, or validation artifact file is in scope
      - [ ] Any nearby pattern used as evidence has been checked against this
        exact runtime and calling context
      - [ ] No planned edit exists to accommodate a mock, stub, generated-file
        placeholder, or validation harness behavior

      ## Phase 3: IMPLEMENT - Edit Production Code

      Make only the production-code edits needed to satisfy the ticket.

      Forbidden:
      - Reading, creating, modifying, or deleting files under `tests/`, `test/`,
        `e2e/`, `__tests__/`, or matching `*.test.*` / `*.spec.*`
      - Editing test fixtures or test configs: `vitest.config.*`,
        `playwright.config.*`, `jest.config.*`
      - Running test commands: `npm test`, `npm run test*`, `vitest`,
        `playwright`, `jest`, `npx` test runners, or direct
        `node ./node_modules/.bin/...` test runners
      - Editing generated files, generated directories, or validation artifacts
        such as `test-results/`
      - Adding fake IDs, hardcoded fixture behavior, test-only branches,
        selector-driven UI, weakened auth, weakened validation, or special
        routes just because validation output exposed them
      - Using subagents or delegation tools to inspect the codebase

      **PHASE_3_CHECKPOINT:**
      - [ ] Edits are limited to production source files in ticket scope
      - [ ] No test-shaped behavior or validation-harness workaround was added
      - [ ] Existing architecture and style were followed

      ## Phase 4: VERIFY - Self-Check Without Tests

      Review your changed files manually and with non-test commands only when
      appropriate. Do not run test runners.

      Your self-check must include:

      **Requirement mapping.** Each acceptance criterion and the production
      behavior implemented for it.

      **Validation interpretation.** Product-level symptoms inferred from
      feedback, without mentioning selectors, test files, line numbers,
      screenshots, fixture values, or artifact paths.

      **Scope check.** Changed files and why each one is in ticket scope.

      **Anti-gaming check.** Confirm no fake IDs, test selectors, hardcoded
      fixtures, generated-file edits, auth weakening, or test-specific
      branches were added.

      **Execution trace.** For each function or code path you changed,
      explicitly walk through what happens when it is invoked. State each
      calling context this code path runs in (e.g. "called from a Convex
      action with ActionCtx," "called from a unit test with a mock that
      provides only `runQuery`/`runMutation`," "called from the HTTP
      handler with full request context"). For each context, state what
      your code does step by step and confirm it works in that context.
      If the code path runs in multiple contexts, the trace must cover
      all of them. Surface any context where your implementation would
      fail. If you find one, return to Phase 3 before continuing.

      **Pre-commit prediction.** State, in one sentence, what you expect
      the deterministic gate (lint, typecheck, vitest, playwright) to
      report on the next run. If your prediction is anything other than
      "all blocking gates pass for this ticket," do not commit — return
      to Phase 3 and address the cause of the predicted failure first.

      **Repeat-attempt check.** If `$ARTIFACTS_DIR/instructions.md` or
      `$ARTIFACTS_DIR/dev-review-latest.json` exists from a prior attempt,
      state in one sentence why the previous attempt's fix did not resolve
      the issue and why your fix addresses a different surface. If your
      fix operates on the same surface as a prior attempt that failed,
      your fix is likely also wrong — return to Phase 3 and look for the
      deeper cause.

      **PHASE_4_CHECKPOINT:**
      - [ ] All acceptance criteria are implemented
      - [ ] Feedback-linked source issues for this ticket were addressed
      - [ ] No forbidden files or commands were used
      - [ ] Execution trace covers every calling context for changed code
      - [ ] Pre-commit prediction is "all blocking gates pass"
      - [ ] If a prior attempt exists, this fix operates on a different
        surface than the prior failed fix

      ## Phase 5: COMMIT - Save Work

      Commit the implementation on the current branch.

      The commit message should summarize the ticket behavior implemented. If
      you had to make an assumption because the ticket was ambiguous, mention
      the assumption in the commit message.

      ## Success Criteria

      - **AC_COMPLETE**: Every acceptance criterion has corresponding
        production behavior.
      - **SCOPE_DISCIPLINED**: Every changed file is justified by the ticket
        or existing architecture.
      - **NO_TEST_GAMING**: No visible validation detail was turned into a
        test-specific implementation.
      - **NO_TEST_ACCESS**: No test, fixture, config, generated, or validation
        artifact files were read or modified; no test runner was executed.
      - **CONTEXT_FIDELITY**: Any reused production pattern was validated
        against this change's actual module boundary, runtime, and calling
        contexts; incompatible patterns were rejected instead of copied.
      - **EXECUTION_TRACED**: The self-check walked through each calling
        context for changed code and confirmed correctness in each.
      - **COMMITTED**: The production implementation is committed.
  - id: test-5
    depends_on: [ fix-after-validate-4 ]
    when: "$validate-4.output.passed == 'false' || $parse-dev-review-4.output.passed == 'false'"
    bash: |
      set -euo pipefail
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  - id: validate-5
    depends_on: [ test-5 ]
    when: "$validate-4.output.passed == 'false' || $parse-dev-review-4.output.passed == 'false'"
    context: fresh
    output_format:
      type: object
      properties:
        passed: { type: boolean }
        instructions_file: { type: string }
        raw_report: { type: string }
        summary: { type: string }
      required: [ passed, instructions_file, raw_report, summary ]
    prompt: |
      # Validate Deterministic Test Results - Attempt 5

      Do not edit repository files. Evaluate the deterministic test artifact
      produced by `test-5` and write final validation feedback.

      Read:
      - `$ARTIFACTS_DIR/task-context.md`
      - `$ARTIFACTS_DIR/parent-attachments.md`
      - `$test-5.output.report`
      - `$ARTIFACTS_DIR/dev-review-latest.json`
      - `$ARTIFACTS_DIR/validation-instructions-1.md` if it exists
      - `$ARTIFACTS_DIR/validation-instructions-2.md` if it exists
      - `$ARTIFACTS_DIR/validation-instructions-3.md` if it exists
      - `$ARTIFACTS_DIR/validation-instructions-4.md` if it exists

      Do not read tests, fixtures, Playwright artifacts, screenshots, or
      error-context files. Use only the raw report's gate summaries/logs, the
      implementation review, and prior validation-instructions artifacts.

      Before writing new guidance, compare the latest failure against every
      prior validation instruction you read. If a prior instruction already
      recommended a repair and the latest raw report still fails after that
      repair was attempted, do not repeat that same repair as the solution.
      Mark it as failed prior advice and identify a different production
      surface or explain why the repair was never actually applied.

      Write `$ARTIFACTS_DIR/validation-instructions-5.md` as Markdown, then copy
      the same content to `$ARTIFACTS_DIR/instructions.md`. `feedback.json`
      must remain the raw deterministic report from the test node; do not
      overwrite it. The Markdown instructions artifact is the specification for
      the human or future workflow run and must contain everything needed without reading tests.

      Use this exact structure:

      ```markdown
      # Validation Instructions - Attempt 5

      **Raw report**: `$test-5.output.report`
      **Canonical raw feedback**: `$ARTIFACTS_DIR/feedback.json`
      **Status**: PASS | FAIL

      ## Problem

      One or two sentences describing the remaining product behavior gap. If
      the raw report passed, state that no validation repair is required.

      ## Acceptance Criteria Impacted

      - **Criterion**: {quote or paraphrase the relevant AC from task-context.md}
        **Status**: missing | partial | uncertain
        **Why**: {why the raw report suggests this AC is not satisfied}

      ## Evidence

      - **Gate**: lint | typecheck | vitest | playwright
        **Raw artifact**: {path to raw report or gate log from feedback.json}
        **Product signal**: {product-level interpretation of the failure}
        **Allowed detail**: {only production-relevant file paths, symbols, or error categories}

      ## Production Repair Plan

      1. **Target files**: `production/file/path.ts` or `unknown`
         **Change**: {specific production behavior to implement or repair}
         **Reason**: {how this maps to the impacted AC}

      ## Prior Advice Check

      - **Prior instruction**: `validation-instructions-N.md` or `none`
        **Recommended repair**: {what it advised}
        **Was attempted**: yes | no | uncertain
        **Latest result**: fixed | still failing | changed failure
        **Decision**: keep | revise | reject
        **Why**: {why the latest advice must not repeat failed guidance}

      ## Validation To Rerun

      - **Workflow node**: `manual-rerun-task-implement`
      - **Command**: `bash /home/user/Archon/.archon/scripts/task-run-validation.sh`
      - **Success condition**: All blocking gates pass for this Jira ticket

      ## Edge Cases And Risks

      - {edge case or risk the next dev agent should consider}

      ## Out Of Scope Signals

      - {raw signal that appears test-specific, unrelated, or unsupported by the ticket}

      ## Summary

      Short product-level summary for quick scanning.
      ```

      Artifact quality bar:
      - Include a clear problem statement.
      - Include raw evidence references by artifact/log path so the handoff is
        auditable.
      - Include production file paths or symbols when the report provides them;
        use `unknown` when the raw report does not support a production target.
      - Include a step-by-step production repair plan.
      - Include a prior advice check that explicitly rejects any prior repair
        that was already attempted and still failed.
      - Include the validation command and success condition.
      - Include edge cases and risks the next dev agent or human should consider.
      - Keep `feedback.json` as raw test output and put interpreted guidance only
        in `instructions.md`.
      - Do not include selectors, fixture values, test names, assertion wording,
        screenshots, stack trace line numbers, or test file paths in repair
        guidance.

      Set the returned `passed` field true when every blocking gate in the
      deterministic report passed EXCEPT playwright. Playwright is
      TEMPORARILY EXCLUDED from the pass/fail decision while the app's
      frontend is incomplete; treat any playwright result (passed, failed,
      or skipped) as non-decisive. The lint, typecheck, and vitest gates
      remain authoritative as before. Return JSON matching the output schema, with `instructions_file`
      set to `$ARTIFACTS_DIR/validation-instructions-5.md` and `raw_report`
      set to `$test-5.output.report`.

  - id: review-dev-attempt-5
    depends_on: [ validate-5 ]
    when: "$validate-4.output.passed == 'false' || $parse-dev-review-4.output.passed == 'false'"
    context: fresh
    prompt: |
      # Review Final Implementation Attempt

      Do not edit files. Review the implementation after attempt 5 and
      write `$ARTIFACTS_DIR/dev-review-5.json` as valid JSON.

      ## Mission

      This is a late-round repair review. The dev agent has already failed at
      least two implementation attempts, so high-level feedback is no longer
      enough. Be prescriptive. Your artifact must give the next dev agent the
      exact production repair strategy, including concrete code-shape examples
      when the problem is specific enough to infer a solution.

      The goal is not to restate that validation failed. The goal is to explain
      what production surface is wrong, why prior fixes did not work, which
      nearby patterns are compatible or incompatible, and what code shape is
      likely to pass in every relevant calling context.

      ## Inputs To Read

      Read:
      - `docs/contracts/<lowercase-issue-key>.md` — **canonical**. Derive
        path: lowercase the `issue_key` from
        `$ARTIFACTS_DIR/trigger-payload.json`. The contract is the
        single source of truth for files, exports, signatures, queries
        used, and invariants. Implementation that disagrees with the
        contract is a required repair, and a frequent root cause of
        late-round failures is a quiet contract violation that earlier
        reviewers missed.
      - `$ARTIFACTS_DIR/task-context.md`
      - `$ARTIFACTS_DIR/parent-attachments.md`
      - `$ARTIFACTS_DIR/feedback.json` — raw deterministic test output
      - `$ARTIFACTS_DIR/instructions.md` — validator-authored repair instructions
      - `$ARTIFACTS_DIR/dev-review-latest.json` — prior implementation review
      - `git diff origin/main`
      - Production files changed by the implementation attempts

      Do not read tests, fixtures, Playwright artifacts, screenshots, or
      error-context files. You may cite raw validation categories and production
      file paths/symbols, but do not copy test names, selectors, fixture values,
      assertion wording, screenshots, stack trace line numbers, or test file
      paths into repair guidance.

      ## Review Requirements

      1. Identify the specific production contract that is still broken.
      2. Explain why the prior attempt did not resolve it. Name the wrong
         surface if the dev fixed a wrapper, export, helper, or call site while
         the actual failure was in another context.
      3. Examine nearby production patterns only as evidence. For each candidate
         pattern, decide whether it applies to this exact module boundary,
         runtime, generated-code shape, and calling context. Explicitly reject
         patterns that do not apply.
      4. Provide an exact implementation strategy. If the correct shape is clear,
         include a concise TypeScript example or pseudocode snippet in
         `example_code` that the next dev agent can adapt directly.
      5. Include an execution trace expectation for every relevant calling
         context. For example: Convex action with `ActionCtx`, direct helper
         invocation with mocked `runQuery`/`runMutation`, internal mutation with
         mutation context, HTTP handler, etc.
      6. Predict the next deterministic gate result. If you predict anything
         other than all blocking gates passing, mark `passed: false` and make
         the missing repair explicit.

      ## JSON Shape

      Write valid JSON with this exact shape:

      ```json
      {
        "passed": false,
        "summary": "short review summary",
        "why_previous_attempt_failed": "specific reason the prior attempt did not resolve the current failure",
        "broken_contract": {
          "file": "production/file/path.ts",
          "symbol": "symbol or function name",
          "issue": "specific production contract mismatch",
          "acceptance_criteria": ["AC identifier or quoted criterion"]
        },
        "pattern_compatibility": {
          "candidate_pattern": "production reference considered, or unknown",
          "applies": false,
          "reason": "why this pattern does or does not apply to the current runtime and calling contexts",
          "rejected_pattern": "pattern to avoid, or none"
        },
        "required_repairs": [
          {
            "file": "production/file/path.ts",
            "issue": "specific remaining issue",
            "acceptance_criterion": "criterion this repairs",
            "exact_solution": "plain-English exact solution, not just a diagnosis",
            "example_code": "concise TypeScript snippet or pseudocode showing the intended shape; escape newlines as \n",
            "execution_contexts": [
              {
                "context": "where this code runs",
                "expected_flow": "step-by-step expected behavior in this context",
                "failure_to_avoid": "context-specific bug the previous attempt hit"
              }
            ],
            "validation_prediction": "all blocking gates pass for this ticket | remaining expected failure"
          }
        ],
        "acceptance_criteria_gaps": [],
        "scope_violations": [],
        "architecture_risks": [],
        "test_gaming_risks": []
      }
      ```

      Set `passed` false if any required repair remains. For attempt 5,
      empty or vague `required_repairs` is not acceptable when validation is red.
      A valid required repair must include `exact_solution`, `example_code`, and
      at least one `execution_contexts` item. Do not recommend production code
      that exists only to satisfy a mock, generated-file stub, undefined
      placeholder, fixture, or validation harness. If a prior repair copied a
      pattern and validation still failed, the next repair must explain why that
      pattern is incompatible before proposing code.
  - id: parse-dev-review-5
    depends_on: [ review-dev-attempt-5 ]
    when: "$validate-4.output.passed == 'false' || $parse-dev-review-4.output.passed == 'false'"
    bash: |
      set -euo pipefail
      review="$ARTIFACTS_DIR/dev-review-5.json"
      latest="$ARTIFACTS_DIR/dev-review-latest.json"
      if [ ! -f "$review" ]; then
        printf '{"passed":false,"reason":"missing dev-review-5.json"}'
        exit 0
      fi
      cp "$review" "$latest"
      bun -e '
        import { readFileSync } from "node:fs";
        const review = JSON.parse(readFileSync(process.argv[1], "utf8"));
        process.stdout.write(JSON.stringify({
          passed: review.passed === true,
          required_repairs: Array.isArray(review.required_repairs) ? review.required_repairs.length : 0
        }));
      ' -- "$review"

  - id: implementation-quality-final
    depends_on: [ parse-dev-review-1, parse-dev-review-2, parse-dev-review-3, parse-dev-review-4, parse-dev-review-5 ]
    trigger_rule: all_done
    bash: |
      set -euo pipefail
      final="$ARTIFACTS_DIR/dev-review-final.json"
      if [ -f "$ARTIFACTS_DIR/dev-review-5.json" ]; then
        cp "$ARTIFACTS_DIR/dev-review-5.json" "$final"
      elif [ -f "$ARTIFACTS_DIR/dev-review-4.json" ]; then
        cp "$ARTIFACTS_DIR/dev-review-4.json" "$final"
      elif [ -f "$ARTIFACTS_DIR/dev-review-3.json" ]; then
        cp "$ARTIFACTS_DIR/dev-review-3.json" "$final"
      elif [ -f "$ARTIFACTS_DIR/dev-review-2.json" ]; then
        cp "$ARTIFACTS_DIR/dev-review-2.json" "$final"
      elif [ -f "$ARTIFACTS_DIR/dev-review-1.json" ]; then
        cp "$ARTIFACTS_DIR/dev-review-1.json" "$final"
      else
        printf '{"passed":false,"reason":"missing implementation review artifact","required_repairs":[]}\n' > "$final"
      fi
      cp "$final" "$ARTIFACTS_DIR/dev-review-latest.json"
      bun -e '
        import { readFileSync } from "node:fs";
        const review = JSON.parse(readFileSync(process.argv[1], "utf8"));
        process.stdout.write(JSON.stringify({
          passed: review.passed === true,
          required_repairs: Array.isArray(review.required_repairs) ? review.required_repairs.length : 0
        }));
      ' -- "$final"

  - id: implementation-ready
    depends_on: [ validate-1, validate-2, validate-3, validate-4, validate-5, implementation-quality-final ]
    trigger_rule: all_done
    bash: |
      set -euo pipefail
      validation_passed=false
      if [ "$validate-1.output.passed" = "true" ] || [ "$validate-2.output.passed" = "true" ] || [ "$validate-3.output.passed" = "true" ] || [ "$validate-4.output.passed" = "true" ] || [ "$validate-5.output.passed" = "true" ]; then
        validation_passed=true
      fi
      quality_passed="$implementation-quality-final.output.passed"
      if [ "$validation_passed" = "true" ] && [ "$quality_passed" = "true" ]; then
        ready=true
      else
        ready=false
      fi
      printf '{"ready":%s,"validation_passed":%s,"implementation_review_passed":%s,"review":"%s"}\n' \
        "$ready" "$validation_passed" "$quality_passed" "$ARTIFACTS_DIR/dev-review-final.json"

  - id: fail-implementation-not-ready
    depends_on: [ implementation-ready ]
    when: "$implementation-ready.output.ready == 'false'"
    bash: |
      set -euo pipefail
      echo "Implementation did not satisfy validation and review gates." >&2
      echo "See $ARTIFACTS_DIR/feedback.json, $ARTIFACTS_DIR/instructions.md, and $ARTIFACTS_DIR/dev-review-final.json for the final failed state." >&2
      exit 1

  - id: generate-docs
    depends_on: [ implementation-ready ]
    when: "$implementation-ready.output.ready == 'true'"
    context: fresh
    prompt: |
      Your task is to update user-facing documentation to reflect the changes
      on this branch.

      Inputs:
      - `git diff origin/main` — the source changes that need to be
        documented.
      - `$ARTIFACTS_DIR/task-context.md` — the task summary, description, and
        acceptance criteria. Use it to understand the user-visible intent of
        the changes (not just what files moved).
      - `$decode.output.issue_key` — the Jira key to reference in the
        CHANGELOG entry.

      Output:
      - Always create `.changelog/<issue-key>.md` (lowercase issue key,
        e.g. `.changelog/wor-42.md`). Each ticket gets its own fragment
        file — never edit the project's `CHANGELOG.md` directly. A
        release-time script concatenates fragments at version-bump time;
        per-ticket fragments avoid the merge conflicts that would
        otherwise hit every parallel branch trying to add an entry to
        the same shared file.
        Format: a short markdown block with a heading line referencing
        the issue key and a 1–3 sentence description of what shipped
        for users.
      - Update `README.md` only if the changes affect how a user/developer
        sets up or uses the project (new commands, env vars, dependencies,
        setup steps).
      - Update or add entries under `docs/**/*.md` for any
        feature/setting/concept the diff introduces.

      Constraint: write only `.changelog/<issue-key>.md`, `README.md`,
      and `docs/**/*.md`. Do not edit `CHANGELOG.md`. Do not touch
      source, tests, or package files.

      Commit only the docs files you touched.

  - id: open-pr
    depends_on: [ generate-docs ]
    bash: |
      # Push the branch and open a GitHub PR. Posts the PR URL as a Jira comment.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/task-open-pr.ts

  - id: verify-pr-ready
    depends_on: [ open-pr ]
    trigger_rule: all_done
    bash: |
      # Guard downstream review/synthesis/merge chain. If open-pr never ran,
      # stop the rest of the DAG from fabricating review output.
      set -euo pipefail
      if [ ! -f "$ARTIFACTS_DIR/pr-info.json" ]; then
        printf '{"ready":"false","reason":"missing_pr_info"}'
        exit 0
      fi
      pr_number="$(jq -r '.pr_number // ""' "$ARTIFACTS_DIR/pr-info.json" 2>/dev/null || echo "")"
      if [ -z "$pr_number" ]; then
        printf '{"ready":"false","reason":"missing_pr_number"}'
        exit 0
      fi
      printf '{"ready":"true","pr_number":"%s"}' "$pr_number"

  # ─── Review setup: write the artifacts the existing reviewer commands expect ──
  # archon-code-review-agent etc. read $ARTIFACTS_DIR/.pr-number and
  # $ARTIFACTS_DIR/review/scope.md. We have pr-info.json + task-context.md;
  # this bridge converts.
  #
  # Note: rebase-on-main now runs BEFORE dev-attempt-1, not here. The branch
  # is already on current main by the time reviewers see it.
  - id: setup-review-context
    depends_on: [ verify-pr-ready ]
    when: "$verify-pr-ready.output.ready == 'true'"
    bash: |
      set -euo pipefail
      # Refresh origin/main so the diff below compares against the actual
      # current main, not whatever stale ref this worktree last fetched.
      # Without this, sibling tickets that merged while this one was in
      # flight show up as "deleted by this PR" — leading reviewers and the
      # synthesizer to fabricate phantom regressions.
      git fetch origin main --quiet || true
      mkdir -p "$ARTIFACTS_DIR/review"
      jq -r .pr_number "$ARTIFACTS_DIR/pr-info.json" > "$ARTIFACTS_DIR/.pr-number"
      cat > "$ARTIFACTS_DIR/review/scope.md" <<EOF
      # Review Scope

      **Ticket**: $decode.output.issue_key
      **PR**: #$(cat "$ARTIFACTS_DIR/.pr-number")
      **Branch**: $(git rev-parse --abbrev-ref HEAD)
      **Compared against main SHA**: $(git rev-parse --short origin/main)

      ## Changed Files

      $(git diff origin/main --name-only | sed 's/^/- /')

      ## Task Context

      $(cat "$ARTIFACTS_DIR/task-context.md")
      EOF
      printf '\n{"pr_number":"%s","scope_path":"%s"}' \
        "$(cat "$ARTIFACTS_DIR/.pr-number")" \
        "$ARTIFACTS_DIR/review/scope.md"

  # ─── Reviewers fan out in parallel ───────────────────────────────────
  # Four use the existing Archon reviewer commands; one (scope) is custom
  # because the existing archon-pr-review-scope depends on artifacts from
  # the plan-to-pr chain that we don't produce.

  - id: review-scope
    depends_on: [ setup-review-context ]
    context: fresh
    output_format:
      type: object
      properties:
        verdict: { type: string, enum: [APPROVE, REQUEST_CHANGES, NEEDS_DISCUSSION] }
        critical_count: { type: integer }
        high_count: { type: integer }
        medium_count: { type: integer }
        low_count: { type: integer }
      required: [verdict, critical_count, high_count, medium_count, low_count]
    prompt: |
      You are the SCOPE reviewer. Read `$ARTIFACTS_DIR/review/scope.md` and
      look at the PR diff with `git diff origin/main`.

      Evaluate whether the work stayed within scope:
      - **Files in scope**: for each changed file, is it relevant to what the
        ticket asked for? Flag unrelated touches and drive-by edits — when
        someone asked to update a modal, we should not be changing an auth
        route.
      - **AC coverage**: does the diff address each acceptance criterion?
        Flag unimplemented or partial ACs. Flag work that goes BEYOND the
        ACs — extra features the ticket didn't ask for.

      You are NOT judging code quality, security, error handling, or
      documentation — other reviewers cover those.

      Write `$ARTIFACTS_DIR/review/scope-findings.md` following the same
      format the other reviewers use:

      ```markdown
      # Scope Review Findings: PR #{number}

      **Reviewer**: scope-review
      **Date**: {ISO timestamp}
      **Files Reviewed**: {count}

      ## Summary
      {2-3 sentence overview}
      **Verdict**: APPROVE | REQUEST_CHANGES | NEEDS_DISCUSSION

      ## Findings

      ### Finding 1: {Descriptive Title}
      **Severity**: CRITICAL | HIGH | MEDIUM | LOW
      **Category**: scope-creep | unrelated-change | missing-ac | ac-overreach
      **Location**: `{file}:{line}` (or `(plan-level)` for AC concerns)
      **Issue**: {description}
      **Evidence**: `{file path or snippet}`
      **Why This Matters**: {impact}

      ## Statistics
      Total findings: {n}
      - CRITICAL: {n}
      - HIGH: {n}
      - MEDIUM: {n}
      - LOW: {n}
      ```

      Severity guidance:
      - CRITICAL: a critical AC is unimplemented, or files were touched that
        risk breaking unrelated systems.
      - HIGH: an AC is partial, or scope creep is large enough to warrant
        a separate ticket.
      - MEDIUM: small unrelated change snuck in, or AC met loosely.
      - LOW: minor commentary, no real action needed.

      After writing, post to PR:
        gh pr comment "$(cat $ARTIFACTS_DIR/.pr-number)" \
          --body-file "$ARTIFACTS_DIR/review/scope-findings.md"

      Return STRICT JSON only:
        {"verdict":"...","critical_count":N,"high_count":N,"medium_count":N,"low_count":N}

  - id: review-code
    command: archon-code-review-agent
    depends_on: [ setup-review-context ]
    context: fresh

  - id: review-error-handling
    command: archon-error-handling-agent
    depends_on: [ setup-review-context ]
    context: fresh

  - id: review-docs
    command: archon-docs-impact-agent
    depends_on: [ setup-review-context ]
    context: fresh

  - id: review-comment-quality
    command: archon-comment-quality-agent
    depends_on: [ setup-review-context ]
    context: fresh

  - id: verify-reviewer-artifacts
    depends_on: [ review-scope, review-code, review-error-handling, review-docs, review-comment-quality ]
    trigger_rule: all_done
    when: "$verify-pr-ready.output.ready == 'true'"
    bash: |
      # Synthesize must not run unless at least one reviewer artifact exists.
      set -euo pipefail
      review_dir="$ARTIFACTS_DIR/review"
      mkdir -p "$review_dir"
      shopt -s nullglob
      files=("$review_dir/"*-findings.md)
      shopt -u nullglob
      count="${#files[@]}"
      if [ "${count:-0}" -lt 1 ]; then
        printf '{"has_findings":"false","count":0}'
        exit 0
      fi
      printf '{"has_findings":"true","count":%s}' "$count"

  # ─── Synthesize the five reviewers' artifacts into a consolidated review ──
  # Uses the existing Archon synthesizer command; reads all *-findings.md
  # files, decides APPROVE/REQUEST_CHANGES based on severity thresholds,
  # posts a master review comment to the PR.
  #
  # trigger_rule: all_done — synthesize must read ALL five reviewers'
  # artifacts, so it waits for every reviewer to settle. We use all_done
  # rather than all_success / none_failed_min_one_success because a
  # crashed individual reviewer shouldn't block the chain — the synth
  # command handles missing findings files internally and produces a
  # partial review from whatever DID land. The earlier `one_success`
  # would have let synthesize fire while some reviewers were still
  # running — only safe by accident because all five tend to complete
  # within seconds of each other.
  - id: synthesize
    command: archon-synthesize-review
    depends_on: [ verify-reviewer-artifacts ]
    when: "$verify-reviewer-artifacts.output.has_findings == 'true'"
    context: fresh

  # ─── Parse the synthesizer's verdict into a JSON decision field ──
  # The bundled archon-synthesize-review command emits prose narration on
  # stdout and writes consolidated-review.md to disk — it does NOT emit a
  # JSON `decision` field, so $synthesize.output.decision resolves to ''
  # and downstream `when:` gates would always evaluate false.
  # This bridge node reads the markdown verdict and re-emits it as JSON
  # ({"decision":"approve"|"changes_requested"|"needs_discussion"}) on
  # stdout so the implement-fixes / merge-pr gates can route correctly.
  - id: parse-synthesis
    depends_on: [ synthesize ]
    bash: |
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/task-parse-synthesis.ts

  # ─── Implement fixes if synthesizer requested changes ──
  # Existing Archon command; reads consolidated-review.md + per-reviewer
  # findings; makes the changes; commits.
  # Same PreToolUse hook as dev nodes (test paths + selective Bash).
  - id: implement-fixes
    # Our own fix-implementer (.archon/commands/defaults/task-implement-fixes.md — bundled), not
    # the bundled archon-implement-review-fixes. The bundled command is built
    # for human-in-the-loop workflows: it fixes only CRITICAL/HIGH and treats
    # MEDIUM/LOW as "for the user to decide." Our pipeline is autonomous, so
    # we want every actual issue (any severity) fixed in the same step,
    # leaving only literal questions ("do you want X or Y?") for humans.
    command: task-implement-fixes
    depends_on: [ parse-synthesis ]
    when: "$verify-pr-ready.output.ready == 'true' && $parse-synthesis.output.decision == 'changes_requested'"
    context: fresh
    hooks:
      PreToolUse:
        - script: /home/user/Archon/.archon/scripts/archie-pretooluse-no-tests.ts
          timeout: 30

  # ─── Deterministic quality gate after fixes ──
  # Re-runs lint/typecheck/vitest/playwright. Always exits 0; the JSON output's
  # `passed` field drives the merge gate's `when:` clause below.
  # Only runs when implement-fixes ran (which itself only runs when synthesizer
  # requested changes).
  - id: post-fix-validation
    depends_on: [ implement-fixes ]
    when: "$verify-pr-ready.output.ready == 'true' && $parse-synthesis.output.decision == 'changes_requested'"
    bash: |
      set -euo pipefail
      bash /home/user/Archon/.archon/scripts/task-run-validation.sh

  # ─── Merge gate ──
  # Two paths to merge:
  #   1) Synthesizer approved on first read → no fixes needed, no post-validation needed.
  #      synthesize: succeeded, implement-fixes: skipped, post-fix-validation: skipped.
  #   2) Synthesizer requested changes → fixes ran AND post-fix-validation succeeded.
  #      synthesize: succeeded, implement-fixes: succeeded, post-fix-validation: succeeded.
  #
  # If post-fix-validation FAILED (real test failure after fixes), merge-pr's
  # all_done + when clause keeps it from running because validation didn't
  # succeed — neither path is satisfied.
  - id: merge-pr
    depends_on: [ verify-pr-ready, parse-synthesis, implement-fixes, post-fix-validation ]
    trigger_rule: all_done
    # AND binds tighter than ||, so the gate reads as:
    #   synth approved  OR  (synth requested changes AND post-fix passed)
    # The bash itself guards against open-pr having been skipped (no
    # pr-info.json on disk) — keeping that check in the consumer rather
    # than the gate avoids duplicating `$open-pr.output.pr_number != ''`
    # in every OR branch (Archon's condition evaluator has no parentheses).
    when: "$verify-pr-ready.output.ready == 'true' &&
      $parse-synthesis.output.decision == 'approve' ||
      $verify-pr-ready.output.ready == 'true' &&
      $parse-synthesis.output.decision == 'changes_requested' &&
      $post-fix-validation.output.passed == 'true'"
    bash: |
      # Squash-merge the PR, delete the branch, post Jira confirmation.
      set -euo pipefail
      if [ ! -f "$ARTIFACTS_DIR/pr-info.json" ]; then
        echo "No pr-info.json on disk — open-pr did not run, nothing to merge." >&2
        printf '{"merged":"false","reason":"no_pr"}'
        exit 0
      fi
      bun /home/user/Archon/.archon/scripts/task-merge-pr.ts

  - id: transition-to-done
    depends_on: [ merge-pr ]
    bash: |
      # Transition Jira ticket to Done with a final summary comment.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      bun /home/user/Archon/.archon/scripts/task-transition-to-done.ts

  - id: log-elapsed-on-task
    depends_on: [ transition-to-done ]
    bash: |
      # Worklog the total task-implement elapsed time on the Jira ticket.
      set -euo pipefail
      export ARTIFACTS_DIR="$ARTIFACTS_DIR"
      export WORKFLOW_NAME="task-implement"
      bun /home/user/Archon/.archon/scripts/jira-log-elapsed.ts
