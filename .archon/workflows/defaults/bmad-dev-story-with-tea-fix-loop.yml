name: bmad-dev-story-with-tea-fix-loop
description: |
  Use when: User wants a BMAD dev-story implementation where each BMAD or TEA step is its own Archon node.
  Triggers: "bmad dev story tea fix loop", "dev story with tea", "DS TA RV NR TR CR", "bmad review fix loop".
  Does: Runs DS, TA, CR, RV, NR, and TR as separate DAG nodes, records review findings, reruns BMAD dev-story to fix them when needed, and repeats review up to three rounds.
  NOT for: Generic Archon feature work without BMAD artifacts, or one-off review without implementation.

  Decision log policy:
  - Every finding must be written as a decision-log finding entry.
  - Every fix must be written as a decision-log fix entry.
  - Every finding and fix entry must explain what is wrong, how it was fixed, and why that fix decision was chosen.

provider: codex
model: gpt-5.5
tags: [BMad, TEA, Review]

nodes:
  - id: prepare-bmad-state
    bash: |
      set -e

      RUN_DIR="$ARTIFACTS_DIR/bmad-dev-story-with-tea-fix-loop"
      mkdir -p "$RUN_DIR/findings" "$RUN_DIR/reports"

      for required in \
        ".agents/skills/bmad-dev-story/SKILL.md" \
        ".agents/skills/bmad-code-review/SKILL.md" \
        ".agents/skills/bmad-testarch-automate/SKILL.md" \
        ".agents/skills/bmad-testarch-test-review/SKILL.md" \
        ".agents/skills/bmad-testarch-nfr/SKILL.md" \
        ".agents/skills/bmad-testarch-trace/SKILL.md"
      do
        if [ ! -f "$required" ]; then
          echo "Missing required BMAD skill: $required"
          echo "Run this workflow from a BMAD-enabled project checkout."
          exit 1
        fi
      done

      if [ ! -f "_bmad/bmm/config.yaml" ]; then
        echo "Missing _bmad/bmm/config.yaml."
        echo "Run this workflow from the BMAD project root."
        exit 1
      fi

      if [ ! -f "_bmad-output/implementation-artifacts/sprint-status.yaml" ]; then
        echo "Missing _bmad-output/implementation-artifacts/sprint-status.yaml."
        echo "Run bmad sprint planning first, or provide a BMAD project with implementation artifacts."
        exit 1
      fi

      cat > "$RUN_DIR/state.json" << 'JSON'
      {
        "workflow": "bmad-dev-story-with-tea-fix-loop",
        "status": "running",
        "round": 1,
        "maxRounds": 3,
        "activeStory": "",
        "activeStoryName": "",
        "activeStoryFile": "",
        "decisionLogFile": "decision-log.md",
        "openFindingsFile": "findings/open-findings.md"
      }
      JSON

      cat > "$RUN_DIR/decision-log.md" << 'MARKDOWN'
      # BMAD Dev Story With TEA Fix Loop Decision Log

      Every finding and every fix must be logged here.
      Each full sentence goes on its own physical line.

      ## Required Finding Entry

      ### Finding {finding_id}

      - Source gate:
      - Severity:
      - What is wrong:
      - Evidence:
      - Why this is a defect:
      - Required fix direction:
      - Status:

      ## Required Fix Entry

      ### Fix {finding_id}

      - What was fixed:
      - How it was fixed:
      - Why this fix was chosen:
      - Alternatives considered:
      - Files changed:
      - Validation:
      - Status:
      MARKDOWN

      cat > "$RUN_DIR/findings/open-findings.md" << 'MARKDOWN'
      # Open Review Findings

      No open findings yet.
      MARKDOWN

      echo "RUN_DIR=$RUN_DIR"
      echo "STATE_FILE=$RUN_DIR/state.json"
      echo "DECISION_LOG=$RUN_DIR/decision-log.md"
      echo "OPEN_FINDINGS=$RUN_DIR/findings/open-findings.md"
      echo "SPRINT_STATUS=_bmad-output/implementation-artifacts/sprint-status.yaml"
    timeout: 60000
    output_type: bmad-state

  - id: dev-story
    command: bmad-dev-story-step
    provider: codex
    depends_on: [prepare-bmad-state]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_format:
      type: object
      properties:
        story_name:
          type: string
        story_key:
          type: string
        story_file:
          type: string
        sprint_status:
          type: string
        implementation_summary:
          type: string
        files_changed:
          type: string
        tests_run:
          type: string
        validation_summary:
          type: string
      required:
        - story_name
        - story_key
        - story_file
        - sprint_status
        - implementation_summary
        - files_changed
        - tests_run
        - validation_summary
    output_type: dev-story

  - id: tea-automate
    command: bmad-tea-automate-step
    provider: codex
    depends_on: [dev-story]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: tea-automation

  - id: code-review-r1
    command: bmad-code-review-findings-step
    provider: codex
    depends_on: [tea-automate]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: code-review-findings

  - id: tea-rv-r1
    command: bmad-tea-rv-findings-step
    provider: codex
    depends_on: [code-review-r1]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: test-review-findings

  - id: tea-nr-r1
    command: bmad-tea-nr-findings-step
    provider: codex
    depends_on: [tea-rv-r1]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: nfr-findings

  - id: tea-tr-r1
    command: bmad-tea-tr-findings-step
    provider: codex
    depends_on: [tea-nr-r1]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: trace-findings

  - id: collect-findings-r1
    command: bmad-collect-findings-step
    provider: codex
    depends_on: [tea-tr-r1]
    context: fresh
    model: gpt-5.5
    output_format: &findings_gate_schema
      type: object
      properties:
        gate:
          type: string
          enum: ["PASS", "FAIL"]
        round:
          type: number
        findings_count:
          type: number
        open_findings_file:
          type: string
        decision_log_file:
          type: string
      required: [gate, round, findings_count, open_findings_file, decision_log_file]
    output_type: findings-gate

  - id: dev-story-fix-r1
    command: bmad-dev-story-step
    provider: codex
    depends_on: [collect-findings-r1]
    when: "$collect-findings-r1.output.gate == 'FAIL'"
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: dev-story-fixes

  - id: code-review-r2
    command: bmad-code-review-findings-step
    provider: codex
    depends_on: [dev-story-fix-r1]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: code-review-findings

  - id: tea-rv-r2
    command: bmad-tea-rv-findings-step
    provider: codex
    depends_on: [code-review-r2]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: test-review-findings

  - id: tea-nr-r2
    command: bmad-tea-nr-findings-step
    provider: codex
    depends_on: [tea-rv-r2]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: nfr-findings

  - id: tea-tr-r2
    command: bmad-tea-tr-findings-step
    provider: codex
    depends_on: [tea-nr-r2]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: trace-findings

  - id: collect-findings-r2
    command: bmad-collect-findings-step
    provider: codex
    depends_on: [tea-tr-r2]
    context: fresh
    model: gpt-5.5
    output_format: *findings_gate_schema
    output_type: findings-gate

  - id: dev-story-fix-r2
    command: bmad-dev-story-step
    provider: codex
    depends_on: [collect-findings-r2]
    when: "$collect-findings-r2.output.gate == 'FAIL'"
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: dev-story-fixes

  - id: code-review-r3
    command: bmad-code-review-findings-step
    provider: codex
    depends_on: [dev-story-fix-r2]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: code-review-findings

  - id: tea-rv-r3
    command: bmad-tea-rv-findings-step
    provider: codex
    depends_on: [code-review-r3]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: test-review-findings

  - id: tea-nr-r3
    command: bmad-tea-nr-findings-step
    provider: codex
    depends_on: [tea-rv-r3]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: nfr-findings

  - id: tea-tr-r3
    command: bmad-tea-tr-findings-step
    provider: codex
    depends_on: [tea-nr-r3]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: trace-findings

  - id: collect-findings-r3
    command: bmad-collect-findings-step
    provider: codex
    depends_on: [tea-tr-r3]
    context: fresh
    model: gpt-5.5
    output_format: *findings_gate_schema
    output_type: findings-gate

  - id: assert-review-pass
    depends_on: [collect-findings-r1, collect-findings-r2, collect-findings-r3]
    trigger_rule: all_done
    bash: |
      set -e

      STATE="$ARTIFACTS_DIR/bmad-dev-story-with-tea-fix-loop/state.json"
      DECISIONS="$ARTIFACTS_DIR/bmad-dev-story-with-tea-fix-loop/decision-log.md"
      OPEN_FINDINGS="$ARTIFACTS_DIR/bmad-dev-story-with-tea-fix-loop/findings/open-findings.md"

      if ! grep -qE '"status"[[:space:]]*:[[:space:]]*"complete"' "$STATE"; then
        echo "BMAD TEA review-fix loop did not complete successfully."
        cat "$STATE"
        exit 1
      fi

      if grep -q "Status: OPEN" "$OPEN_FINDINGS"; then
        echo "Open findings remain after final review pass."
        exit 1
      fi

      echo "BMAD TEA review-fix loop completed successfully."
      echo "Decision log: $DECISIONS"
    timeout: 60000

  - id: final-summary
    command: bmad-final-summary-step
    provider: codex
    depends_on: [assert-review-pass]
    trigger_rule: all_done
    context: fresh
    model: gpt-5.5
    output_type: summary
