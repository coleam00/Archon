name: bmad-dev-story-with-tea-fix-loop-v2
description: |
  Use when: User wants the v2 redesign surface of the BMAD dev-story implementation where each BMAD or TEA step is its own Archon node (v2 redesign surface).
  Triggers: "bmad dev story tea fix loop v2", "dev story with tea v2", "DS TA RV NR TR CR v2", "bmad review fix loop v2", "bmad dev story tea v2".
  Does: Resolves and validates story input to a canonical story key, runs DS, TA, CR, RV, NR, and TR as separate DAG nodes, records review findings, reruns BMAD dev-story to fix them when needed, and repeats review up to three rounds.
  NOT for: Generic Archon feature work without BMAD artifacts, or one-off review without implementation.

  Decision log policy:
  - Every finding must be written as a decision-log finding entry.
  - Every fix must be written as a decision-log fix entry.
  - Every finding and fix entry must explain what is wrong, how it was fixed, and why that fix decision was chosen.

provider: codex
model: gpt-5.5
tags: [BMad, TEA, Review]

nodes:
  - id: prepare-bmad-state
    bash: |
      set -e

      RUN_DIR="$ARTIFACTS_DIR/bmad-dev-story-with-tea-fix-loop"
      mkdir -p "$RUN_DIR/findings" "$RUN_DIR/reports"

      for required in \
        ".agents/skills/bmad-dev-story/SKILL.md" \
        ".agents/skills/bmad-code-review-auto/SKILL.md" \
        ".agents/skills/bmad-testarch-automate/SKILL.md" \
        ".agents/skills/bmad-testarch-test-review/SKILL.md" \
        ".agents/skills/bmad-testarch-nfr/SKILL.md" \
        ".agents/skills/bmad-testarch-trace/SKILL.md"
      do
        if [ ! -f "$required" ]; then
          echo "Missing required BMAD skill: $required"
          echo "Run this workflow from a BMAD-enabled project checkout."
          exit 1
        fi
      done

      if [ ! -f "_bmad/bmm/config.yaml" ]; then
        echo "Missing _bmad/bmm/config.yaml."
        echo "Run this workflow from the BMAD project root."
        exit 1
      fi

      if [ ! -f "_bmad-output/implementation-artifacts/sprint-status.yaml" ]; then
        echo "Missing _bmad-output/implementation-artifacts/sprint-status.yaml."
        echo "Run bmad sprint planning first, or provide a BMAD project with implementation artifacts."
        exit 1
      fi

      cat > "$RUN_DIR/state.json" << 'JSON'
      {
        "workflow": "bmad-dev-story-with-tea-fix-loop",
        "status": "running",
        "round": 1,
        "maxRounds": 3,
        "activeStory": "",
        "activeStoryName": "",
        "activeStoryFile": "",
        "decisionLogFile": "decision-log.md",
        "openFindingsFile": "findings/open-findings.md"
      }
      JSON

      cat > "$RUN_DIR/decision-log.md" << 'MARKDOWN'
      # BMAD Dev Story With TEA Fix Loop Decision Log

      Every finding and every fix must be logged here.
      Each full sentence goes on its own physical line.

      ## Required Finding Entry

      ### Finding {finding_id}

      - Source gate:
      - Severity:
      - What is wrong:
      - Evidence:
      - Why this is a defect:
      - Required fix direction:
      - Status:

      ## Required Fix Entry

      ### Fix {finding_id}

      - What was fixed:
      - How it was fixed:
      - Why this fix was chosen:
      - Alternatives considered:
      - Files changed:
      - Validation:
      - Status:
      MARKDOWN

      cat > "$RUN_DIR/findings/open-findings.md" << 'MARKDOWN'
      # Open Review Findings

      No open findings yet.
      MARKDOWN

      echo "RUN_DIR=$RUN_DIR"
      echo "STATE_FILE=$RUN_DIR/state.json"
      echo "DECISION_LOG=$RUN_DIR/decision-log.md"
      echo "OPEN_FINDINGS=$RUN_DIR/findings/open-findings.md"
      echo "SPRINT_STATUS=_bmad-output/implementation-artifacts/sprint-status.yaml"
    timeout: 60000
    output_type: bmad-state

  - id: resolve-story-input
    bash: |
      set -e

      # Guard: input must be provided
      if [ -z "${ARGUMENTS:-}" ]; then
        echo "Missing required story input." >&2
        echo "Run this workflow with a BMAD story key, story id (e.g. a1.2), title, or story file path." >&2
        exit 1
      fi

      SPRINT_STATUS="_bmad-output/implementation-artifacts/sprint-status.yaml"

      if [ ! -f "$SPRINT_STATUS" ]; then
        echo "Missing sprint-status.yaml at $SPRINT_STATUS." >&2
        exit 1
      fi

      # Extract story keys from development_status section only.
      # Excludes keys starting with 'epic-' and keys ending with '-retrospective'.
      STORY_KEYS=$(awk '
        /^development_status:/{f=1; next}
        f && /^[^ ]/{f=0}
        f && /^  /{
          key=substr($0,3); sub(/:.*/,"",key); gsub(/[ \t]/,"",key)
          if (key ~ /^[a-z][a-z0-9]*-[0-9]+-/ && key !~ /^epic-/ && key !~ /-retrospective$/)
            print key
        }
      ' "$SPRINT_STATUS" || true)

      if [ -z "$STORY_KEYS" ]; then
        echo "No story keys found in $SPRINT_STATUS under development_status." >&2
        exit 1
      fi

      INPUT="$ARGUMENTS"

      # Reject input containing control characters (newlines, carriage returns, etc.)
      # that would produce invalid JSON string literals in the emitted contract.
      case "$INPUT" in
        *$'\n'*|*$'\r'*)
          echo "Story input contains control characters (newline or carriage return). Use only printable characters." >&2
          exit 1
          ;;
      esac

      # Normalize input: strip directory prefix for story-file path input form
      INPUT_BASENAME=$(basename -- "$INPUT")
      MATCHED_KEY=""
      MATCH_COUNT=0

      for KEY in $STORY_KEYS; do
        # Derive epic.story id form (e.g. a1-2-... → a1.2)
        EPIC_PART=$(echo "$KEY" | cut -d'-' -f1)
        STORY_NUM=$(echo "$KEY" | cut -d'-' -f2)
        STORY_ID="${EPIC_PART}.${STORY_NUM}"

        MATCH=0

        # 1. Exact story key match
        if [ "$INPUT" = "$KEY" ]; then
          MATCH=1
        # 2. epic.story id match (e.g. a1.2)
        elif [ "$INPUT" = "$STORY_ID" ]; then
          MATCH=1
        # 3. story-file basename match (accepts both bare basename and full path)
        elif [ "$INPUT_BASENAME" = "${KEY}.md" ]; then
          MATCH=1
        else
          # 4. Kebab-normalized substring match against key slug.
          # Require at least one alphanumeric character to prevent punctuation-only
          # input (e.g. "-", whitespace → "-") from matching hyphen separators in a key.
          INPUT_KEBAB=$(printf '%s\n' "$INPUT" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr '_' '-')
          if printf '%s\n' "$INPUT_KEBAB" | grep -qE '[a-z0-9]' && printf '%s\n' "$KEY" | grep -qF -- "$INPUT_KEBAB" 2>/dev/null; then
            MATCH=1
          fi
        fi

        if [ "$MATCH" = "1" ]; then
          MATCH_COUNT=$((MATCH_COUNT + 1))
          MATCHED_KEY="$KEY"
        fi
      done

      # Validate resolution result
      if [ "$MATCH_COUNT" -eq 0 ]; then
        echo "No story found matching the given input." >&2
        echo "Available story keys:" >&2
        echo "$STORY_KEYS" >&2
        exit 1
      fi

      if [ "$MATCH_COUNT" -gt 1 ]; then
        echo "Ambiguous story input: matches $MATCH_COUNT stories." >&2
        echo "Provide a more specific story key or id." >&2
        exit 1
      fi

      # Exactly one match — extract canonical fields
      EPIC_PART=$(echo "$MATCHED_KEY" | cut -d'-' -f1)
      STORY_NUM=$(echo "$MATCHED_KEY" | cut -d'-' -f2)
      STORY_ID_OUT="${EPIC_PART}.${STORY_NUM}"

      # JSON-escape the story_arguments field (INPUT may contain special chars).
      # MATCHED_KEY and STORY_ID_OUT contain only safe chars (lowercase, digits, hyphens, dots).
      INPUT_ESCAPED=$(printf '%s' "$INPUT" | sed 's/\\/\\\\/g; s/"/\\"/g')

      # Emit a single JSON object so $resolve-story-input.output.<field> access works downstream
      printf '{"story_ref":"%s","story_id":"%s","story_arguments":"%s"}' \
        "$MATCHED_KEY" "$STORY_ID_OUT" "$INPUT_ESCAPED"
    timeout: 60000
    depends_on: [prepare-bmad-state]
    output_type: story-ref

  - id: dev-story
    prompt: |
      bmad-dev-story $ARGUMENTS
    prompt_suffix: |
      The canonical story key resolved for this pipeline run is: $resolve-story-input.output.story_ref
    provider: claude
    depends_on: [prepare-bmad-state, resolve-story-input]
    context: fresh
    model: sonnet
    idle_timeout: 900000
    output_type: dev-story

  - id: tea-automate
    prompt: |
      bmad-testarch-automate $ARGUMENTS
    prompt_suffix: |
      The canonical story key resolved for this pipeline run is: $resolve-story-input.output.story_ref
    provider: codex
    depends_on: [dev-story]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: tea-automation

  - id: code-review-auto
    command: bmad-code-review-auto
    depends_on: [tea-automate]
    context: fresh
    provider: codex
    model: gpt-5.5
    idle_timeout: 900000
    output_format: &code_review_auto_gate_schema
      type: object
      properties:
        contract_version:
          type: string
        workflow:
          type: string
        node:
          type: string
        gate:
          type: string
          enum: ["PASS", "FAIL", "CONCERNS", "ERROR"]
        round:
          type: number
        findings_count:
          type: number
        open_findings_file:
          type: string
        decision_log_file:
          type: string
        code_review_report:
          type: string
        story_ref:
          type: string
          description: "Resolved canonical story key; must match $resolve-story-input.output.story_ref (enforced by verify-story-identity guard)."
      required:
        - contract_version
        - workflow
        - node
        - gate
        - round
        - findings_count
        - open_findings_file
        - decision_log_file
        - code_review_report
        - story_ref
    prompt_suffix: |
      The canonical story key for this automated code review is: $resolve-story-input.output.story_ref
      You MUST set the story_ref field in your structured output to exactly this value.
    output_type: code-review-auto

  - id: verify-story-identity
    bash: |
      set -e

      RESOLVED_REF=$resolve-story-input.output.story_ref
      CONTRACT_REF=$code-review-auto.output.story_ref
      GATE=$code-review-auto.output.gate
      CONTRACT_VERSION=$code-review-auto.output.contract_version
      CONTRACT_WORKFLOW=$code-review-auto.output.workflow
      CONTRACT_NODE=$code-review-auto.output.node

      if [ -z "$RESOLVED_REF" ]; then
        echo "ERROR: resolved story_ref is empty — resolution node did not produce a story_ref." >&2
        exit 1
      fi

      if [ -z "$CONTRACT_REF" ]; then
        echo "ERROR: code-review-auto contract story_ref is missing or empty." >&2
        exit 1
      fi

      if [ "$RESOLVED_REF" != "$CONTRACT_REF" ]; then
        echo "ERROR: story_ref mismatch detected. This is not a quality finding — it is an identity error." >&2
        echo "  Resolved: $RESOLVED_REF" >&2
        echo "  Contract: $CONTRACT_REF" >&2
        exit 1
      fi

      # Contract envelope validation — a stale or wrong producer contract must not
      # drive routing even if gate and story_ref happen to be present.
      if [ "$CONTRACT_VERSION" != "1.0" ]; then
        echo "ERROR: contract_version mismatch — expected 1.0, got '$CONTRACT_VERSION'." >&2
        exit 1
      fi

      if [ "$CONTRACT_WORKFLOW" != "bmad-dev-story-with-tea-fix-loop-v2" ]; then
        echo "ERROR: workflow mismatch — expected bmad-dev-story-with-tea-fix-loop-v2, got '$CONTRACT_WORKFLOW'." >&2
        exit 1
      fi

      if [ "$CONTRACT_NODE" != "code-review-auto" ]; then
        echo "ERROR: node mismatch — expected code-review-auto, got '$CONTRACT_NODE'." >&2
        exit 1
      fi

      # ERROR gate is a tooling or contract failure, not fixable quality work —
      # convert to a hard node failure so it never feeds the dev-story fix loop.
      if [ "$GATE" = "ERROR" ]; then
        echo "ERROR: code-review-auto reported gate=ERROR — tooling or contract failure." >&2
        exit 1
      fi

      # CONCERNS is non-blocking — treat as PASS so it does not trigger rework.
      if [ "$GATE" = "CONCERNS" ]; then
        printf '%s' "PASS"
        exit 0
      fi

      printf '%s' "$GATE"
    timeout: 60000
    depends_on: [resolve-story-input, code-review-auto]
    output_type: story-identity-verified

  - id: code-review-gate
    depends_on: [verify-story-identity]
    route_loop:
      from: verify-story-identity
      condition: "$verify-story-identity.output == 'PASS'"
      max_iterations: 20
      routes:
        positive: tea-rv
        negative: dev-story
        exhausted: review-loop-error

  - id: tea-rv
    prompt: |
      bmad-testarch-test-review $ARGUMENTS
    provider: codex
    depends_on: [code-review-gate]
    context: fresh
    model: gpt-5.5
    idle_timeout: 900000
    output_type: test-review-findings

  - id: tea-nr
    prompt: |
      bmad-testarch-nfr $ARGUMENTS
    provider: claude
    model: sonnet
    depends_on: [tea-rv]
    context: fresh
    idle_timeout: 900000
    output_type: nfr-findings

  - id: tea-tr
    prompt: |
      bmad-testarch-trace $ARGUMENTS
    provider: claude
    depends_on: [tea-nr]
    context: fresh
    model: sonnet
    idle_timeout: 900000
    output_type: trace-findings

  - id: review-loop-error
    depends_on: [code-review-gate]
    bash: |
      set -e

      STATE="$ARTIFACTS_DIR/bmad-dev-story-with-tea-fix-loop/state.json"
      DECISIONS="$ARTIFACTS_DIR/bmad-dev-story-with-tea-fix-loop/decision-log.md"
      OPEN_FINDINGS="$ARTIFACTS_DIR/bmad-dev-story-with-tea-fix-loop/findings/open-findings.md"

      echo "BMAD code-review fix loop exhausted its retry budget."
      echo "State: $STATE"
      echo "Decision log: $DECISIONS"
      echo "Open findings: $OPEN_FINDINGS"

      if [ -f "$STATE" ]; then
        cat "$STATE"
      fi

      exit 1
    timeout: 60000

  - id: create-pull-request
    command: archon-create-pr
    provider: claude
    depends_on: [tea-tr]
    context: fresh
    model: sonnet
