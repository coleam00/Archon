# Drafted by yaml-author subagent for WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01 on 2026-05-15
# Source pattern: bdc-ce-regression-suite.yaml (gold-standard DAG shape, proven 2026-05-12) +
#                 bdc-shopops-commerce-spine.yaml (cross-repo spec read + MIXED-class migration apply +
#                                                  Rule 19 runtime grep)
# Doctrine compliance: 13 hard rules of archon-yaml-authoring (verified at draft time)
#
# Pre-flight: codebase bluedevilcollectibles/shopops must be registered in Archon.
#   Verify: ssh hetzner-prod 'sqlite3 /opt/bdc/archon-data/archon.db "SELECT name FROM remote_agent_codebases"'
#   Default branch is `master` (NOT main) for shopops.
#
# Pre-flight: WO spec MUST exist + be committed in bdc-xo at:
#   docs/work-orders/WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01.md
#   Verify: gh api "repos/bluedevilcollectibles/bdc-xo/contents/docs/work-orders/WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01.md?ref=main" --template '{{.name}}'
#
# NOTE ON CWD: Archon clones bluedevilcollectibles/shopops into its worktree.
#   CWD = shopops repo root. shopops-api/ is a SUBDIRECTORY. All paths below are
#   relative to shopops repo root (e.g., shopops-api/services/coverResolver.js).
#   The WO spec lives in bdc-xo, fetched via gh api cross-repo at read-spec.
#
# NOTE ON PARALLEL SAFETY: parallel_ok=FALSE — this WO applies a production view
#   redefinition (CREATE OR REPLACE VIEW cover_images). Do NOT fire while any
#   other shopops cover/images schema WO is in-flight. Serial only.
#
# NOTE ON RULE 19: shopops-api uses `COPY . /app` at image build time with NO
#   bind-mount. Source changes need rebuild + container restart to take effect.
#   runtime-verify node enforces this with `docker exec shopops-api grep`.
#
# NOTE ON MIGRATION APPLY: Supabase view DDL goes via SSH + docker run postgres:16 psql
#   (banked doctrine `feedback_production-supabase-write-via-hetzner-ssh.md`). REST
#   API is NOT acceptable for DDL. Hookify block-production-supabase only sees the
#   SSH wrapper, not the SQL inside.
#
# Deploy: C:\Users\pcmed\projects\BDC_XO\scripts\archon-bridge\sync-workflows.sh \
#         WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01.yaml
#
# REVIEW BEFORE DEPLOY:
#   - Notion page ID resolved: 361ef4c9-ce00-8168-9df6-d72fe87f657b (filed 2026-05-15)
#   - Confirm next migration number (NN) — check shopops-api/migrations/ for highest existing
#   - Confirm staging-vs-production Supabase strategy (WO §10 says "stage first" — this
#     YAML applies directly to production via SSH; if staging dry-run needed, add a node)
#   - Confirm DATABASE_URL is available inside shopops-api container (Rule 19 verify node uses it)

name: bdc-shopops-cover-cascade-prh-visibility
description: |
  Use when: Executing WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01 —
        extend PRH cover cascade gate + drop Lunar-only filter on cover_images view.
  Input: WO_ID = WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01.
  Does: (1) reads spec from bdc-xo via gh api cross-repo;
        (2) edits shopops-api/services/coverResolver.js — adds PRH_UPC_PREFIXES const
            (Marvel 75960, DC 76194, Image 70985, BOOM 84428, IDW 82771, Dark Horse 76156)
            sourced from LSPRO_Clean/PrhCoverLookup.gs:27-49, extends looksLikePrhUpc regex
            to accept those prefixes in addition to ISBN-13 (97[89]);
        (3) writes migration shopops-api/migrations/<NN>_cover_images_view_remove_distributor_filter.sql
            that CREATE OR REPLACE VIEW cover_images AS SELECT ... FROM images WHERE
            subject_type = 'comic_issue' (drops implicit source_distributor='lunar');
        (4) writes/extends tests/test_cover_resolver.js to exercise Scenarios A-E from WO §11;
        (5) runs bun tests locally;
        (6) commits + pushes feature branch + opens PR against master;
        (7) applies migration to production Supabase via ssh hetzner-prod docker run psql;
        (8) verifies view redefinition via pg_get_viewdef introspection;
        (9) Rule 19 runtime grep inside shopops-api container (PRH_UPC_PREFIXES present in /app);
        (10) curls /api/covers/resolve to confirm cascade returns real cover for test UPC;
        (11) builds MIXED-class manifest (CODE + schema migration);
        (12) flips Notion to REVIEW (NEVER DONE — Cauldron grader closes both fields).
  Repo: bluedevilcollectibles/shopops (master branch). shopops-api/ subdir.
        Spec lives in bluedevilcollectibles/bdc-xo (docs/work-orders/).
  parallel_ok: false — production view DDL, serial only.
  NOT for: any other WO.

policyFile: harness/policies/agent-behavior.md
model: sonnet

nodes:

  # -------------------------------------------------------------------------
  # 1. READ SPEC — fetches WO spec from bdc-xo cross-repo
  # -------------------------------------------------------------------------
  - id: read-spec
    bash: |
      set -euo pipefail
      WO_ID="${WO_ID:-WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01}"

      # Primary: docs/work-orders/<WO_ID>.md in bdc-xo
      # gh --template uses Go templates (built-in, no jq dependency).
      SPEC_CONTENT=$(gh api \
        "repos/bluedevilcollectibles/bdc-xo/contents/docs/work-orders/${WO_ID}.md?ref=main" \
        --template '{{.content}}' 2>/dev/null | tr -d '\n' | base64 -d 2>/dev/null || true)

      # Fallback: glob in docs/superpowers/specs/
      if [ -z "$SPEC_CONTENT" ]; then
        GLOB_PATH=$(gh api \
          "repos/bluedevilcollectibles/bdc-xo/contents/docs/superpowers/specs?ref=main" \
          --template '{{range .}}{{.path}}{{"\n"}}{{end}}' 2>/dev/null \
          | grep "${WO_ID}.md$" | head -1 || true)
        if [ -n "$GLOB_PATH" ]; then
          SPEC_CONTENT=$(gh api \
            "repos/bluedevilcollectibles/bdc-xo/contents/${GLOB_PATH}?ref=main" \
            --template '{{.content}}' 2>/dev/null | tr -d '\n' | base64 -d 2>/dev/null || true)
        fi
      fi

      if [ -z "$SPEC_CONTENT" ]; then
        echo "ERROR: Spec not found for ${WO_ID} in bdc-xo (tried docs/work-orders/ and docs/superpowers/specs/)" >&2
        exit 1
      fi

      printf 'WO_ID=%s\nSPEC_PATH=bdc-xo:docs/work-orders/%s.md\nWORKFLOW_ID=%s\n\n' \
        "$WO_ID" "$WO_ID" "$WORKFLOW_ID"
      printf -- '--- SPEC ---\n%s\n' "$SPEC_CONTENT"

  # -------------------------------------------------------------------------
  # 2. INVENTORY — confirm current cover_images view definition + locate
  #    next migration number. Best-effort: failures fall back to defaults.
  # -------------------------------------------------------------------------
  - id: inventory
    depends_on: [read-spec]
    bash: |
      # set -e DELIBERATELY OMITTED — best-effort introspection; never fails the workflow
      set -u
      echo "=== migration directory ==="
      if [ -e shopops-api/migrations ]; then
        ls -1 shopops-api/migrations/ 2>/dev/null | tail -20 || true
      else
        echo "(migrations dir not yet present)"
      fi

      echo ""
      echo "=== current coverResolver.js — looksLikePrhUpc region ==="
      if [ -e shopops-api/services/coverResolver.js ]; then
        grep -n "looksLikePrhUpc\|PRH_UPC_PREFIXES" shopops-api/services/coverResolver.js 2>/dev/null \
          || echo "(no prior PRH_UPC_PREFIXES — fresh add)"
      else
        echo "(coverResolver.js not present at expected path)"
      fi

      echo ""
      echo "=== existing cover-resolver tests ==="
      ls -1 shopops-api/tests/test_cover_resolver* 2>/dev/null \
        || echo "(no existing test_cover_resolver.js — will create)"

      echo "STATUS=ok"
      exit 0

  # -------------------------------------------------------------------------
  # 3. PLAN — produce structured plan with exact file paths, migration NN,
  #    constant content, and test scenarios.
  # -------------------------------------------------------------------------
  - id: plan
    depends_on: [inventory]
    task_class: medium_work
    prompt: |
      Plan the implementation of WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01.

      ## Required Output (Markdown)

      - WO ID: WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01
      - Files to MODIFY:
        - `shopops-api/services/coverResolver.js` — add PRH_UPC_PREFIXES constant (6 publishers)
          alongside existing imports near top of file; extend looksLikePrhUpc() to return true
          for both ISBN-13 AND any UPC starting with one of the 6 prefixes.
      - Files to CREATE:
        - `shopops-api/migrations/<NN>_cover_images_view_remove_distributor_filter.sql` —
          `CREATE OR REPLACE VIEW cover_images AS SELECT ... FROM images WHERE subject_type = 'comic_issue';`
          (Pick NN = max existing migration number + 1. Inventory output above shows current floor.)
        - `shopops-api/tests/test_cover_resolver.js` — Vitest/Bun test exercising Scenarios A-E
          from WO §11. Must include at least 5 assertions. If file exists, EXTEND it; do not
          replace existing tests.
      - PRH_UPC_PREFIXES constant exact content (frozen object, source LSPRO_Clean/PrhCoverLookup.gs:27-49):
        ```js
        const PRH_UPC_PREFIXES = Object.freeze({
          '75960': 'Marvel',
          '76194': 'DC',
          '70985': 'Image',
          '84428': 'BOOM!',
          '82771': 'IDW',
          '76156': 'Dark Horse',
        });
        ```
      - looksLikePrhUpc extension shape:
        ```js
        function looksLikePrhUpc(upc) {
          if (!upc || typeof upc !== 'string') return false;
          if (/^97[89][0-9]{10}$/.test(upc)) return true;       // ISBN-13 branch (existing)
          const prefix = upc.slice(0, 5);
          return Object.prototype.hasOwnProperty.call(PRH_UPC_PREFIXES, prefix);
        }
        ```
      - Test scenarios (one assertion per scenario minimum):
        - A: looksLikePrhUpc('75960621516400611') === true (Marvel)
        - B: looksLikePrhUpc('76194') prefix — covered by Scenario A class
        - C: looksLikePrhUpc('9781302949686') === true (ISBN-13 trade paperback)
        - D: looksLikePrhUpc('00000000000000') === false (synthetic non-PRH)
        - E: PRH_UPC_PREFIXES has exactly 6 keys including Marvel/DC/Image/BOOM!/IDW/Dark Horse
      - Verification commands (bash-executable):
        - `grep -c "75960.*Marvel\\|76194.*DC\\|70985.*Image\\|84428.*BOOM\\|82771.*IDW\\|76156.*Dark Horse" shopops-api/services/coverResolver.js` — expected >= 6
        - `grep -c "PRH_UPC_PREFIXES" shopops-api/services/coverResolver.js` — expected >= 2 (declaration + use)
        - `ls shopops-api/migrations/*_cover_images_view_remove_distributor_filter.sql` — expected: file exists
        - `cd shopops-api && bun tests/test_cover_resolver.js` — exit code 0
      - Commit message: `fix(cover): WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01 — extend looksLikePrhUpc to 6 PRH publishers + drop Lunar filter on cover_images view`
      - Branch: `wo/shopops-cover-cascade-prh-visibility-01`
      - PR base: `master` (NOT main — shopops default is master)

      ## Inventory
      $inventory.output

      ## Spec
      $read-spec.output

  # -------------------------------------------------------------------------
  # 4. IMPLEMENT — edit coverResolver.js, write migration, write tests
  # -------------------------------------------------------------------------
  - id: implement
    depends_on: [plan]
    task_class: medium_work
    loop:
      fresh_context: true
      until: COMPLETE
      max_iterations: 5
      prompt: |
        Implement WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01 per the plan.

        ## Plan
        $plan.output

        ## Spec
        $read-spec.output

        ## Execution Rules

        1. Edit `shopops-api/services/coverResolver.js`:
           - Add `PRH_UPC_PREFIXES` constant (frozen object) near the top of the file,
             after existing imports/requires but before other top-level functions.
             6 publishers EXACTLY: Marvel 75960, DC 76194, Image 70985, BOOM! 84428,
             IDW 82771, Dark Horse 76156. Source: LSPRO_Clean/PrhCoverLookup.gs:27-49.
           - Modify `looksLikePrhUpc(upc)` (currently at ~lines 39-43) to accept either
             ISBN-13 (existing `/^97[89][0-9]{10}$/`) OR any UPC whose 5-digit prefix
             is a key in PRH_UPC_PREFIXES. Do NOT remove the ISBN-13 branch.
           - Do NOT touch any other cascade tier code. Do NOT remove or restructure
             prhUrl, findPrhCachedImage, prhApi calls, or the 9 cascade tiers.

        2. Create `shopops-api/migrations/<NN>_cover_images_view_remove_distributor_filter.sql`:
           - Pick NN = highest existing migration number + 1 (zero-pad to match existing convention).
           - Body: `CREATE OR REPLACE VIEW cover_images AS SELECT * FROM images WHERE subject_type = 'comic_issue';`
           - Add a leading comment block documenting WO ID and the Lunar-filter removal rationale.
           - DO NOT drop or rename lunar_covers — 47 codebase references depend on it.

        3. Create or extend `shopops-api/tests/test_cover_resolver.js`:
           - At least 5 assertions covering Scenarios A-E from WO §11.
           - Use real behavior: import `looksLikePrhUpc` from `../services/coverResolver.js`.
             (If not exported, add it to the module's exports.)
           - Tests must FAIL meaningfully if behavior regresses, not just check truthy.

        4. Do NOT apply the migration. Do NOT call ssh. Do NOT push to git.
           The migration-apply + commit nodes downstream handle deploy.

        ## Completion criteria
        Output <promise>COMPLETE</promise> ONLY when:
          - shopops-api/services/coverResolver.js contains PRH_UPC_PREFIXES with 6 publishers
          - looksLikePrhUpc now accepts 5-digit prefix matches in addition to ISBN-13
          - shopops-api/migrations/<NN>_cover_images_view_remove_distributor_filter.sql exists
            and contains `CREATE OR REPLACE VIEW cover_images`
          - shopops-api/tests/test_cover_resolver.js exists with >= 5 real assertions
          - `cd shopops-api && bun tests/test_cover_resolver.js` exits 0 in local run

  # -------------------------------------------------------------------------
  # 5. VERIFY-GREP — bash-executable grep assertions (WO §12 stop conditions 1-2)
  # -------------------------------------------------------------------------
  - id: verify-grep
    depends_on: [implement]
    bash: |
      set -euo pipefail
      echo "=== Stop condition 1: PRH_UPC_PREFIXES has 6 publishers ==="
      COUNT=$(grep -c "75960.*Marvel\|76194.*DC\|70985.*Image\|84428.*BOOM\|82771.*IDW\|76156.*Dark Horse" shopops-api/services/coverResolver.js || true)
      echo "publisher-prefix grep count: $COUNT (expected >= 6)"
      [ "$COUNT" -ge 6 ] || (echo "FAIL: <6 publisher prefixes present" >&2; exit 1)

      echo ""
      echo "=== Stop condition 2: looksLikePrhUpc references PRH_UPC_PREFIXES ==="
      USE_COUNT=$(grep -c "PRH_UPC_PREFIXES" shopops-api/services/coverResolver.js || true)
      echo "PRH_UPC_PREFIXES grep count: $USE_COUNT (expected >= 2)"
      [ "$USE_COUNT" -ge 2 ] || (echo "FAIL: PRH_UPC_PREFIXES not referenced (declaration + use both needed)" >&2; exit 1)

      echo ""
      echo "=== Migration file present ==="
      MIG_FILE=$(ls shopops-api/migrations/*_cover_images_view_remove_distributor_filter.sql 2>/dev/null | head -n 1)
      [ -n "$MIG_FILE" ] || (echo "FAIL: migration file missing" >&2; exit 1)
      echo "migration: $MIG_FILE"
      grep -q "CREATE OR REPLACE VIEW cover_images" "$MIG_FILE" \
        || (echo "FAIL: migration does not redefine cover_images view" >&2; exit 1)
      grep -q "subject_type" "$MIG_FILE" \
        || (echo "FAIL: migration missing subject_type filter" >&2; exit 1)

      echo ""
      echo "=== Test file present ==="
      [ -f shopops-api/tests/test_cover_resolver.js ] \
        || (echo "FAIL: test_cover_resolver.js missing" >&2; exit 1)
      ASSERTION_COUNT=$(grep -cE "expect\(|assert\(|assert\.|test\(|it\(" shopops-api/tests/test_cover_resolver.js || true)
      echo "test assertions/cases: $ASSERTION_COUNT (expected >= 5)"
      [ "$ASSERTION_COUNT" -ge 5 ] || (echo "FAIL: <5 test assertions" >&2; exit 1)

  # -------------------------------------------------------------------------
  # 6. VERIFY-TESTS — run the bun tests (Archon container is bun-only per banked memory)
  # -------------------------------------------------------------------------
  - id: verify-tests
    depends_on: [implement]
    bash: |
      set -euo pipefail
      cd shopops-api
      echo "=== bun tests/test_cover_resolver.js ==="
      bun tests/test_cover_resolver.js
      echo "TESTS=PASS"

  # -------------------------------------------------------------------------
  # 7. COMMIT-AND-PUSH — idempotent checkout, branch, commit, push
  # -------------------------------------------------------------------------
  - id: commit-and-push
    depends_on: [verify-grep, verify-tests]
    bash: |
      set -euo pipefail
      BASE="wo/shopops-cover-cascade-prh-visibility-01"
      # Default to a unique timestamped branch (worktree-safe on rerun).
      BRANCH="${BASE}-run-$(date +%Y%m%d%H%M%S)"

      # Prefer base branch only if it's not held by another worktree and either
      # we're already on it or it doesn't exist yet.
      if ! git worktree list --porcelain | grep -qx "branch refs/heads/$BASE"; then
        if [ "$(git rev-parse --abbrev-ref HEAD)" = "$BASE" ]; then
          BRANCH="$BASE"
        elif ! git show-ref --quiet "refs/heads/$BASE"; then
          BRANCH="$BASE"
        fi
      fi

      if git show-ref --quiet "refs/heads/$BRANCH"; then
        git checkout "$BRANCH" 2>/dev/null || git checkout -b "$BRANCH"
      else
        git checkout -b "$BRANCH"
      fi

      git add shopops-api/services/coverResolver.js \
              shopops-api/migrations/*_cover_images_view_remove_distributor_filter.sql \
              shopops-api/tests/test_cover_resolver.js

      if git diff --cached --quiet; then
        echo "No staged changes; branch already contains the work"
      else
        git -c user.name="John Ranson" -c user.email="admin@bluedevilcollectibles.com" \
          commit -m "fix(cover): WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01 — extend PRH cascade for 6 publishers + drop Lunar filter on cover_images view

        Adds PRH_UPC_PREFIXES constant (Marvel/DC/Image/BOOM/IDW/Dark Horse) sourced from
        LSPRO_Clean/PrhCoverLookup.gs:27-49 (lost in original Node port). Extends
        looksLikePrhUpc to accept 5-digit publisher prefixes in addition to ISBN-13.

        Adds migration redefining cover_images view to drop the implicit
        source_distributor='lunar' filter so the 884 May 2026 PRH ingest rows
        become visible to Step 1 of the cascade.

        Tests: 5 scenarios (A-E from WO §11) covering ISBN-13, publisher prefixes,
        synthetic non-PRH UPC, and constant shape.

        Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>"
      fi
      git push -u origin "$BRANCH"
      echo "BRANCH=${BRANCH}"
      echo "BRANCH_SHA=$(git rev-parse HEAD)"

  # -------------------------------------------------------------------------
  # 8. OPEN-PR — idempotent PR creation against master
  # -------------------------------------------------------------------------
  - id: open-pr
    depends_on: [commit-and-push]
    bash: |
      set -euo pipefail
      # Read actual branch from current HEAD (commit-and-push may have used unique suffix).
      BRANCH="$(git rev-parse --abbrev-ref HEAD)"
      REPO="bluedevilcollectibles/shopops"
      BASE="master"
      TITLE="fix(cover): WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01 — PRH cascade 6 publishers + view filter drop"
      BODY_FILE=$(mktemp)
      {
        echo "## Summary"
        echo "Implements **WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01** — PRH cover cascade fix."
        echo ""
        echo "Two coupled changes both required:"
        echo "1. **Regex gate** — \`looksLikePrhUpc()\` only accepted ISBN-13 (97[89]). Comic UPCs"
        echo "   from 6 PRH-distributed publishers fell through to Google CSE / placeholder."
        echo "2. **View filter** — \`cover_images\` view inherits a Lunar-only filter from"
        echo "   \`lunar_covers\`, so 884 already-ingested May 2026 PRH rows were invisible to Step 1."
        echo ""
        echo "## Files"
        echo "- \`shopops-api/services/coverResolver.js\` — PRH_UPC_PREFIXES constant + extended gate"
        echo "- \`shopops-api/migrations/<NN>_cover_images_view_remove_distributor_filter.sql\` — view redefinition"
        echo "- \`shopops-api/tests/test_cover_resolver.js\` — Scenarios A-E"
        echo ""
        echo "## Stop conditions (WO §12)"
        echo "1. grep proves PRH_UPC_PREFIXES has 6 publishers"
        echo "2. grep proves looksLikePrhUpc references the constant"
        echo "3. View redefinition applied to production (post-merge by migration-apply node)"
        echo "4. Cascade returns real cover for UPC 75960621516400611 via /api/covers/resolve"
        echo "5. Regression scenarios pass (Lunar UPC + ISBN-13 + synthetic non-PRH)"
        echo "6. Runtime grep inside shopops-api container (Rule 19)"
        echo "7. Idempotency: same UPC twice = 1 PRH API call"
        echo ""
        echo "## Authoritative source"
        echo "- WO spec: bdc-xo \`docs/work-orders/WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01.md\`"
        echo "- Publisher prefix table source: \`LSPRO_Clean/PrhCoverLookup.gs:27-49\` (GAS-era)"
        echo ""
        echo "Generated with Claude Code"
      } > "$BODY_FILE"

      existing_pr_url() {
        gh pr list --repo "$REPO" --head "$BRANCH" --state open \
          --json url --template '{{range .}}{{.url}}{{"\n"}}{{end}}' 2>/dev/null | head -1
      }
      PR_URL="$(existing_pr_url)"
      if [ -n "$PR_URL" ]; then
        echo "PR_URL=$PR_URL"
        exit 0
      fi
      for attempt in 1 2 3 4 5; do
        if PR_OUT=$(gh pr create --repo "$REPO" --base "$BASE" --head "$BRANCH" \
            --title "$TITLE" --body-file "$BODY_FILE" 2>&1); then
          echo "PR_URL=$PR_OUT"
          exit 0
        fi
        PR_URL="$(existing_pr_url)"
        if [ -n "$PR_URL" ]; then
          echo "PR_URL=$PR_URL"
          exit 0
        fi
        echo "open-pr attempt $attempt failed: $PR_OUT" >&2
        sleep 10
      done
      echo "open-pr failed after retries; branch pushed at $BRANCH but no PR exists" >&2
      exit 1

  # -------------------------------------------------------------------------
  # 9. MIGRATION-APPLY — apply view redefinition to production Supabase
  #    via SSH + docker run psql (Hookify-allowed per banked doctrine).
  #    Best-effort wrapper: SSH/network/auth can legitimately fail; surface STATUS.
  # -------------------------------------------------------------------------
  - id: migration-apply
    depends_on: [open-pr]
    bash: |
      # set -e DELIBERATELY OMITTED — best-effort production write step
      set -u
      MIG_FILE=$(ls shopops-api/migrations/*_cover_images_view_remove_distributor_filter.sql 2>/dev/null | head -n 1)
      if [ -z "$MIG_FILE" ]; then
        echo "STATUS=failed_unexpected"
        echo "DETAIL=migration file not found in shopops-api/migrations/"
        exit 0
      fi
      echo "=== applying migration $MIG_FILE to production Supabase via hetzner-prod ==="

      # Stream migration contents over SSH stdin; psql reads from stdin via -f /dev/stdin
      RESULT=$(ssh -o BatchMode=yes -o ConnectTimeout=15 hetzner-prod \
        "docker exec -i shopops-api sh -c 'psql \"\$DATABASE_URL\" -v ON_ERROR_STOP=1 -f /dev/stdin'" \
        < "$MIG_FILE" 2>&1)
      EXIT=$?

      if [ $EXIT -eq 0 ]; then
        echo "STATUS=ok"
        echo "DETAIL=migration applied: $MIG_FILE"
        echo "PSQL_OUT=$RESULT"
      elif echo "$RESULT" | grep -qiE 'already exists|relation .* already exists'; then
        echo "STATUS=skipped_idempotent"
        echo "DETAIL=view already in target state"
        echo "PSQL_OUT=$RESULT"
      else
        echo "STATUS=failed_unexpected"
        echo "DETAIL=$RESULT"
      fi
      exit 0

  # -------------------------------------------------------------------------
  # 10. VERIFY-VIEW — pg_get_viewdef proves the production view no longer
  #     filters source_distributor='lunar' (WO §12 stop condition 3).
  # -------------------------------------------------------------------------
  - id: verify-view
    depends_on: [migration-apply]
    bash: |
      # set -e DELIBERATELY OMITTED — best-effort introspection
      set -u
      RESULT=$(ssh -o BatchMode=yes -o ConnectTimeout=15 hetzner-prod \
        "docker exec shopops-api sh -c 'psql \"\$DATABASE_URL\" -tAc \"SELECT pg_get_viewdef(to_regclass(\\\"cover_images\\\"))\"'" 2>&1)
      EXIT=$?
      echo "=== current cover_images view definition ==="
      echo "$RESULT"

      if [ $EXIT -ne 0 ]; then
        echo "STATUS=failed_unexpected"
        echo "DETAIL=pg_get_viewdef call failed: $RESULT"
        exit 0
      fi

      if echo "$RESULT" | grep -qi "source_distributor"; then
        echo "STATUS=failed_unexpected"
        echo "DETAIL=view STILL filters source_distributor — migration did not take effect"
        exit 0
      fi

      if echo "$RESULT" | grep -qi "subject_type"; then
        echo "STATUS=ok"
        echo "DETAIL=view filters on subject_type only — Lunar restriction removed"
      else
        echo "STATUS=ok_unexpected_shape"
        echo "DETAIL=view definition does not match expected shape; manual review needed"
      fi
      exit 0

  # -------------------------------------------------------------------------
  # 11. RUNTIME-VERIFY — Rule 19. shopops-api uses COPY at image build time;
  #     source change must be reflected inside the running container.
  # -------------------------------------------------------------------------
  - id: runtime-verify
    depends_on: [verify-view]
    bash: |
      # set -e DELIBERATELY OMITTED — runtime grep can legitimately fail if rebuild pending
      set -u
      echo "=== Rule 19: docker exec shopops-api grep -n PRH_UPC_PREFIXES /app/services/coverResolver.js ==="
      RESULT=$(ssh -o BatchMode=yes -o ConnectTimeout=15 hetzner-prod \
        "docker exec shopops-api grep -n 'PRH_UPC_PREFIXES' /app/services/coverResolver.js" 2>&1)
      EXIT=$?

      if [ $EXIT -eq 0 ]; then
        echo "STATUS=ok"
        echo "RUNTIME_GREP=$RESULT"
      elif echo "$RESULT" | grep -qiE 'No such file|no such container'; then
        echo "STATUS=failed_unexpected"
        echo "DETAIL=container or path missing: $RESULT"
      else
        # Rebuild may be pending (PR not merged + image rebuilt yet). Surface, do not fail.
        echo "STATUS=pending_rebuild"
        echo "DETAIL=PRH_UPC_PREFIXES not yet in /app — Captain CI must verify after merge + rebuild"
        echo "RUNTIME_GREP_RAW=$RESULT"
      fi
      exit 0

  # -------------------------------------------------------------------------
  # 12. CASCADE-SMOKE — curl /api/covers/resolve for the canary UPC (WO §12 stop condition 4)
  # -------------------------------------------------------------------------
  - id: cascade-smoke
    depends_on: [runtime-verify]
    bash: |
      # set -e DELIBERATELY OMITTED — endpoint may 404/timeout/return placeholder pre-rebuild
      set -u
      echo "=== smoke: curl /api/covers/resolve?upc=75960621516400611 ==="
      RESULT=$(curl -sS --max-time 20 \
        "https://api.livesellerpro.app/api/covers/resolve?upc=75960621516400611" \
        -H "X-Shopops-Tenant: bdc" 2>&1)
      EXIT=$?

      if [ $EXIT -ne 0 ]; then
        echo "STATUS=failed_unexpected"
        echo "DETAIL=curl exited $EXIT: $RESULT"
        exit 0
      fi

      echo "RAW_RESPONSE=$RESULT"
      TIER=$(echo "$RESULT" | grep -oE '"tier"[[:space:]]*:[[:space:]]*"[^"]*"' | head -n 1 || true)
      URL_HIT=$(echo "$RESULT" | grep -oE 'penguinrandomhouse\.com' | head -n 1 || true)

      if [ -n "$URL_HIT" ]; then
        echo "STATUS=ok"
        echo "DETAIL=cascade returned PRH CDN URL — fix verified end-to-end"
        echo "TIER=$TIER"
      elif echo "$RESULT" | grep -qi 'placeholder'; then
        echo "STATUS=pending_rebuild"
        echo "DETAIL=cascade still returning placeholder — image rebuild + container restart likely pending merge"
      else
        echo "STATUS=ok_unexpected_shape"
        echo "DETAIL=response shape not recognized; manual review needed"
      fi
      exit 0

  # -------------------------------------------------------------------------
  # 13. BUILD-MANIFEST — MIXED-class manifest (CODE + schema migration)
  # -------------------------------------------------------------------------
  - id: build-manifest
    depends_on: [cascade-smoke]
    task_class: clerical
    prompt: |
      Build Captain CI manifest v2 for WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01.

      WO class: MIXED (source code change + schema migration + runtime verification).

      Required fields (Rule 2 / Three Rules):
      - WO: WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01
      - Builder: Cauldron (bdc-shopops-cover-cascade-prh-visibility workflow)
      - Files modified: shopops-api/services/coverResolver.js
      - Files created:
          shopops-api/migrations/<NN>_cover_images_view_remove_distributor_filter.sql,
          shopops-api/tests/test_cover_resolver.js
      - Tests: count passing / count total via `cd shopops-api && bun tests/test_cover_resolver.js`
      - PRs: PR URL from $open-pr.output (commit SHA from $commit-and-push.output)
      - Merge ancestors: shopops master HEAD (record before/after if PR not yet merged)
      - Grep assertions (rerunnable):
          grep -c "75960.*Marvel\|76194.*DC\|70985.*Image\|84428.*BOOM\|82771.*IDW\|76156.*Dark Horse" shopops-api/services/coverResolver.js  # expected >= 6
          grep -c "PRH_UPC_PREFIXES" shopops-api/services/coverResolver.js                                                                      # expected >= 2
          ls shopops-api/migrations/*_cover_images_view_remove_distributor_filter.sql                                                            # expected: 1 file
      - Runtime verification (Rule 19):
          $runtime-verify.output (STATUS=ok means PRH_UPC_PREFIXES present in /app/services/coverResolver.js;
                                  STATUS=pending_rebuild means awaiting PR merge + container rebuild — Captain CI must re-check)
      - Schema migration evidence:
          $migration-apply.output (STATUS=ok or skipped_idempotent)
          $verify-view.output (view definition no longer filters source_distributor)
      - Cascade smoke evidence:
          $cascade-smoke.output (STATUS=ok = PRH CDN URL returned; STATUS=pending_rebuild = re-check post-merge)
      - Vercel deployment: N/A (shopops-api is Hetzner Docker, not Vercel)
      - VALIDATION: PASS (if all STATUS=ok) or VALIDATION: PASS_PENDING_REBUILD (if any node returned pending_rebuild)

      ## Inputs
      $read-spec.output
      $inventory.output
      $plan.output
      $verify-grep.output
      $verify-tests.output
      $commit-and-push.output
      $open-pr.output
      $migration-apply.output
      $verify-view.output
      $runtime-verify.output
      $cascade-smoke.output

  # -------------------------------------------------------------------------
  # 14. FLIP-NOTION — Rule 7. Cauldron grader closes both Status fields after VALIDATED.
  #     XO/builder NEVER sets DONE — flip to REVIEW only.
  # -------------------------------------------------------------------------
  - id: flip-notion
    depends_on: [build-manifest]
    task_class: clerical
    prompt: |
      Flip Notion WO-SHOPOPS-COVER-CASCADE-PRH-VISIBILITY-01 to REVIEW with the manifest
      in the Notes property.

      Notion page ID: 361ef4c9-ce00-8168-9df6-d72fe87f657b

      Required Notion changes:
      - Claude Status -> REVIEW
      - Status -> Review
      - Notes -> set to $build-manifest.output verbatim (entire manifest body)
      - claimed_by: Cauldron (bdc-shopops-cover-cascade-prh-visibility)
      - claimed_at: today

      DO NOT set Claude Status=DONE. DO NOT set Status=Done. The Cauldron grader
      (bdc-wo-grader workflow) is the only authorized closer for both fields after
      its VALIDATED verdict. Setting DONE here = Rule 9 fraud (Three Rules / global CLAUDE.md).

      If Notion MCP unavailable, output `XO_TODO: flip-notion failed, manifest in run log`
      and exit with the manifest body printed so XO can manually update.
