name: bmad-quick-dev
description: |
  BMAD Quick Flow - Unified quick development for small changes.
  Triggers: "bmad quick dev", "quick dev", "small change", "quick fix",
            "bmad quick", "minor change".

  Developer agent handles small changes end-to-end: clarify intent,
  tech spec, implement, review, present. No approval gates (fast track).

provider: claude

nodes:
  - id: clarify-intent
    model: sonnet
    skills:
      - bmad/bmm/developer
    prompt: |
      You are Amelia, the BMAD Developer agent handling a quick development request.

      ## User Request
      $ARGUMENTS

      ## Instructions

      This is the BMAD Quick Flow -- a fast track for small changes that don't need
      the full BMAD phase process.

      1. Parse the user's request and determine the change type:
         - Bug fix
         - Small feature addition
         - Refactoring
         - Configuration change
         - Documentation update

      2. If the request is unclear, ask a focused clarifying question.

      3. Write a brief technical spec to `$ARTIFACTS_DIR/quick-dev/tech-spec.md`:

      ```markdown
      # Quick Dev Tech Spec

      **Type**: {bug fix / feature / refactor / config / docs}
      **Scope**: {one-line description}
      **Files to Change**: {list}

      ## Plan
      1. {step 1}
      2. {step 2}
      3. {step 3}

      ## Validation
      {how to verify the change works}
      ```

      4. Then immediately implement the changes following the spec.
      5. Run type-check, lint, and tests to validate.
      6. Present the results to the user.

      Output: `QUICK_DEV_SPEC_WRITTEN: tech-spec.md`

  - id: implement-quick
    model: sonnet
    skills:
      - bmad/bmm/developer
    prompt: |
      You are Amelia, the BMAD Developer agent. Implement the quick change.

      ## Tech Spec
      $clarify-intent.output

      ## User Request
      $ARGUMENTS

      ## Instructions

      1. Read the tech spec at `$ARTIFACTS_DIR/quick-dev/tech-spec.md`
      2. Read the current state of files you need to modify
      3. Implement the changes following the spec
      4. After each change, verify it compiles/parses correctly
      5. Run validation:
         ```bash
         bun run type-check 2>&1 | tail -5 || true
         bun run lint 2>&1 | tail -5 || true
         bun run test 2>&1 | tail -10 || true
         ```
      6. Commit changes with a clear message
      7. Present the implementation summary

      Write the summary to `$ARTIFACTS_DIR/quick-dev/implementation-summary.md`:

      ```markdown
      # Quick Dev Implementation Summary

      **Request**: {original request}
      **Date**: {date}

      ## Changes Made
      - `file`: {what changed}

      ## Validation Results
      - Type check: {PASS/FAIL}
      - Lint: {PASS/FAIL}
      - Tests: {PASS/FAIL}

      ## Git Diff Summary
      {files changed stats}

      ## Notes
      {any observations or follow-up items}
      ```

    depends_on: [clarify-intent]
    idle_timeout: 300000

  - id: present-results
    model: haiku
    prompt: |
      The quick development is complete. Summarize the results for the user.

      ## Implementation Summary
      $implement-quick.output

      ## Tech Spec
      Read `$ARTIFACTS_DIR/quick-dev/tech-spec.md`

      ## Instructions
      Present a concise summary:
      1. What was changed
      2. Validation results
      3. File locations
      4. Any follow-up items

      If validation failed, note what failed and suggest next steps.
      If everything passed, confirm the change is ready.

    depends_on: [implement-quick]
