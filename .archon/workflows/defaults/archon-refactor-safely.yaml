  # PHASE 4: EXECUTE REFACTOR Ã¢â‚¬â€ Implements the plan with guardrails
  # Hooks enforce type-check after every edit and plan adherence
  # Ã¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢Â

  - id: execute-refactor
    model: gpt-5.4
    prompt: |
      You are executing a refactoring plan with strict safety guardrails.

      ## Plan

      Read the full plan from `$ARTIFACTS_DIR/refactor-plan.md` Ã¢â‚¬â€ follow it LITERALLY.

      ## Rules

      - **Follow the plan exactly** Ã¢â‚¬â€ do not add extra improvements or cleanups
      - **One task at a time** Ã¢â‚¬â€ complete each task fully before starting the next
      - **Type-check after every file change** Ã¢â‚¬â€ you'll be prompted to do this after each edit
      - **Preserve all behavior** Ã¢â‚¬â€ refactoring means moving code, not changing it
      - **Preserve the public API** Ã¢â‚¬â€ if the original file exported something, it must still be
        importable from the same path (use re-exports in the original file if needed)
      - **Update all import sites** Ã¢â‚¬â€ every file that imported from the original must be updated
      - **Commit after each logical task** Ã¢â‚¬â€ one commit per plan task with a clear message

      ## Process for Each Task

      1. Read the plan task
      2. Read the source file to understand current state
      3. Create the new file (if extracting) with the functions/types being moved
      4. Update the source file to remove the moved code and add imports from the new file
      5. Update the original file's exports to re-export from the new module (API preservation)
      6. Use Grep to find and update ALL import sites across the codebase
      7. Run `bun run type-check` to verify (you'll be reminded by hooks)
      8. Commit: `git add -A && git commit -m "refactor: [task description]"`
      9. Move to next task

      ## Handling Problems

      - If type-check fails after a change: fix it immediately before proceeding
      - If a task is more complex than planned: complete it anyway, note the deviation
      - If you discover the plan missed an import site: update it and note it
      - NEVER skip a task Ã¢â‚¬â€ complete them in order
    depends_on: [plan-refactor]
    context: fresh
