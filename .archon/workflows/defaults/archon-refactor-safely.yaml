  - id: plan-refactor
    prompt: |
      You are planning a safe refactoring. You must produce a precise, ordered plan
      that another agent will follow literally.

      ## Impact Analysis

      $analyze-impact.output

      ## Refactoring Goal

      $ARGUMENTS

      ## Principles

      - **Behavior preservation**: The refactoring must NOT change any behavior Ã¢â‚¬â€ only structure
      - **Incremental**: Each step must leave the codebase in a compilable state
      - **Reversible**: Each step can be independently reverted
      - **No mixed concerns**: Do not combine refactoring with bug fixes or improvements
      - **Preserve public API**: All existing exports must remain accessible from the same import paths
      - **Maximum file size**: Target 500 lines or fewer per file after refactoring

      ## Instructions

      1. Read the impact analysis from `$ARTIFACTS_DIR/impact-analysis.md`
      2. Read the target file(s) to understand the current structure
      3. Design the decomposition:
         - Group related functions into cohesive modules
         - Identify shared utilities, types, and constants
         - Plan the new file structure with descriptive names
      4. Write an ordered task list where each task is:
         - Independent and leaves code compilable after completion
         - Specific about what to extract and where
         - Clear about import updates needed

      ## Output

      Write the plan to `$ARTIFACTS_DIR/refactor-plan.md` with:

      ### File Structure (Before)
      ```
      [current structure with line counts]
      ```

      ### File Structure (After)
      ```
      [planned structure with estimated line counts]
      ```

      ### Ordered Tasks

      For each task:
      ```
      ## Task N: [brief description]

      **Action**: CREATE | EXTRACT | UPDATE
      **Source**: [source file]
      **Target**: [target file]
      **What moves**:
      - function functionName (lines X-Y)
      - type TypeName (lines X-Y)

      **Import updates needed**:
      - [file]: change import from [old] to [new]

      **Rollback**: [how to undo this specific step]
      ```

      ### Validation Commands
      - Type check: `bun run type-check`
      - Lint: `bun run lint`
      - Tests: `bun run test`
      - Format: `bun run format:check`
    depends_on: [analyze-impact]
    context: fresh
