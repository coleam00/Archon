  # Ã¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢ÂÃ¢â€¢Â

  - id: analyze-impact
    prompt: |
      You are a senior software engineer analyzing code for a safe refactoring.

      ## Refactoring Request

      $ARGUMENTS

      ## Codebase Scan Results

      $scan-scope.output

      ## Instructions

      1. Identify the PRIMARY file(s) targeted for refactoring based on the user's request
         and the scan results above
      2. Read each target file thoroughly Ã¢â‚¬â€ understand every function, type, and export
      3. For each target file, map ALL call sites:
         - Use Grep to find every import of the target file across the codebase
         - Track which specific exports are used and where
         - Note any dynamic imports or re-exports through index files
      4. Identify risk areas:
         - Functions with complex internal dependencies (shared closures, module-level state)
         - Circular dependencies between functions in the file
         - Any module-level side effects (top-level `const`, initialization code)
         - Exports that are part of the public API vs internal-only
      5. Check for existing tests:
         - Find test files for the target module(s)
         - Note what's tested and what isn't

      ## Output

      Write a thorough impact analysis to `$ARTIFACTS_DIR/impact-analysis.md` with:

      ### Target Files
      - File path, line count, function count
      - List of all exported symbols with brief descriptions

      ### Dependency Map
      - Which files import from the target (with specific imports used)
      - Which files the target imports from

      ### Risk Assessment
      - Module-level state or side effects
      - Complex internal dependencies between functions
      - Public API surface that must be preserved exactly

      ### Test Coverage
      - Existing test files and what they cover
      - Critical paths that must remain tested

      ### Recommended Decomposition Strategy
      - Suggested module boundaries (which functions group together)
      - Rationale for each grouping (cohesion, shared dependencies)
    depends_on: [scan-scope]
    context: fresh
