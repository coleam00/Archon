name: archon-plan-to-pr
description: |
  사용할 때: 기존 implementation plan이 있고 이를 end-to-end로 실행하고 싶을 때.
  입력: plan 파일 경로($ARTIFACTS_DIR/plan.md 또는 .agents/plans/*.md).
  출력: comprehensive review까지 완료되어 merge 준비가 된 PR.

  전체 workflow:
  1. plan을 읽고 branch를 설정하며 scope limits를 추출한다.
  2. plan research가 아직 유효한지 확인한다.
  3. type-checking과 함께 모든 task를 구현한다.
  4. 전체 validation suite를 실행한다.
  5. template으로 PR을 만들고 ready 상태로 표시한다.
  6. comprehensive code review를 실행한다(scope limit을 인식하는 병렬 agent 5개).
  7. review findings를 종합하고 수정한다.
  8. decision matrix가 포함된 최종 요약 -> GitHub comment + follow-up recommendations.

  사용하지 않을 때: plan을 처음부터 작성할 때(archon-idea-to-pr 사용), 빠른 수정, 단독 review.

nodes:
  # ═══════════════════════════════════════════════════════════════════
  # PHASE 1: SETUP
  # ═══════════════════════════════════════════════════════════════════

  - id: plan-setup
    command: archon-plan-setup
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 2: CONFIRM PLAN
  # ═══════════════════════════════════════════════════════════════════

  - id: confirm-plan
    command: archon-confirm-plan
    depends_on: [plan-setup]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 3: IMPLEMENT
  # ═══════════════════════════════════════════════════════════════════

  - id: implement-tasks
    command: archon-implement-tasks
    depends_on: [confirm-plan]
    context: fresh
    model: claude-opus-4-6[1m]

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 4: VALIDATE
  # ═══════════════════════════════════════════════════════════════════

  - id: validate
    command: archon-validate
    depends_on: [implement-tasks]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 5: FINALIZE PR
  # ═══════════════════════════════════════════════════════════════════

  - id: finalize-pr
    command: archon-finalize-pr
    depends_on: [validate]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 6: CODE REVIEW
  # ═══════════════════════════════════════════════════════════════════

  - id: review-scope
    command: archon-pr-review-scope
    depends_on: [finalize-pr]
    context: fresh

  - id: sync
    command: archon-sync-pr-with-main
    depends_on: [review-scope]
    context: fresh

  - id: code-review
    command: archon-code-review-agent
    depends_on: [sync]
    context: fresh

  - id: error-handling
    command: archon-error-handling-agent
    depends_on: [sync]
    context: fresh

  - id: test-coverage
    command: archon-test-coverage-agent
    depends_on: [sync]
    context: fresh

  - id: comment-quality
    command: archon-comment-quality-agent
    depends_on: [sync]
    context: fresh

  - id: docs-impact
    command: archon-docs-impact-agent
    depends_on: [sync]
    context: fresh

  - id: synthesize
    command: archon-synthesize-review
    depends_on: [code-review, error-handling, test-coverage, comment-quality, docs-impact]
    trigger_rule: one_success
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 7: FIX REVIEW ISSUES
  # ═══════════════════════════════════════════════════════════════════

  - id: implement-fixes
    command: archon-implement-review-fixes
    depends_on: [synthesize]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 8: FINAL SUMMARY & FOLLOW-UP
  # ═══════════════════════════════════════════════════════════════════

  - id: workflow-summary
    command: archon-workflow-summary
    depends_on: [implement-fixes]
    context: fresh
