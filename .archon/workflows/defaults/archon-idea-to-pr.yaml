name: archon-idea-to-pr
description: |
  Use when: You have a feature idea or description and want end-to-end development.
  Input: Feature description in natural language, or path to a PRD file
  Output: PR ready for merge with comprehensive review completed

  Full workflow:
  1. Create comprehensive implementation plan with codebase analysis
  2. Setup branch and extract scope limits
  3. Verify plan research is still valid
  4. Implement all tasks with type-checking
  5. Run full validation suite
  6. Create PR with template, mark ready
  7. Comprehensive code review (5 parallel agents with scope limit awareness)
  8. Synthesize and fix review findings
  9. Final summary with decision matrix -> GitHub comment + follow-up recommendations

  NOT for: Executing existing plans (use archon-plan-to-pr), quick fixes, standalone reviews.

nodes:
  # ═══════════════════════════════════════════════════════════════════
  # PHASE 0a: PRE-RUN ESTIMATE (informational, runs in parallel)
  # ═══════════════════════════════════════════════════════════════════
  - id: estimate
    bash: |
      set -euo pipefail
      METRICS_DIR="$HOME/.archon/metrics"

      if ! command -v jq &>/dev/null; then
        exit 0
      fi

      JSONL_FILES=()
      while IFS= read -r -d '' f; do
        JSONL_FILES+=("$f")
      done < <(find "$METRICS_DIR" -maxdepth 1 -name 'runs-*.jsonl' -print0 2>/dev/null | sort -z)

      if [ ${#JSONL_FILES[@]} -eq 0 ]; then
        exit 0
      fi

      FILTERED=$(cat "${JSONL_FILES[@]}" | jq -c --arg w "$WORKFLOW_NAME" 'select(.workflow == $w)')

      if [ -z "$FILTERED" ]; then
        exit 0
      fi

      RUN_COUNT=$(echo "$FILTERED" | wc -l | tr -d ' ')

      echo "$FILTERED" | jq -sc --arg n "$RUN_COUNT" '
        def percentile(arr; p):
          (arr | sort) as $s | ($s | length) as $len |
          if $len == 0 then null else $s[($len * p / 100 | floor | if . >= $len then $len - 1 else . end)] end;
        . as $runs |
        ($runs | length) as $count |
        ($runs | map(select(.outcome == "success")) | length) as $ok |
        ($runs | map(.wall_clock_ms | select(. != null))) as $clocks |
        ($runs | map(.total_usd | select(. != null and . > 0))) as $costs |
        {
          workflow: $runs[0].workflow,
          run_count: $count,
          success_rate_pct: (if $count > 0 then ($ok / $count * 100 | round) else 0 end),
          wall_clock_p50_ms: (percentile($clocks; 50)),
          wall_clock_p90_ms: (percentile($clocks; 90)),
          cost_p50_usd: (percentile($costs; 50)),
          cost_p90_usd: (percentile($costs; 90))
        }
      '

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 0: CREATE PLAN
  # ═══════════════════════════════════════════════════════════════════

  - id: create-plan
    command: archon-create-plan
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 1: SETUP
  # ═══════════════════════════════════════════════════════════════════

  - id: plan-setup
    command: archon-plan-setup
    depends_on: [create-plan]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 2: CONFIRM PLAN
  # ═══════════════════════════════════════════════════════════════════

  - id: confirm-plan
    command: archon-confirm-plan
    depends_on: [plan-setup]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 3: IMPLEMENT
  # ═══════════════════════════════════════════════════════════════════

  - id: implement-tasks
    command: archon-implement-tasks
    depends_on: [confirm-plan]
    context: fresh
    provider: claude
    model: opus[1m]

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 4: VALIDATE
  # ═══════════════════════════════════════════════════════════════════

  - id: validate
    command: archon-validate
    depends_on: [implement-tasks]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 5: FINALIZE PR
  # ═══════════════════════════════════════════════════════════════════

  - id: finalize-pr
    command: archon-finalize-pr
    depends_on: [validate]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 6: CODE REVIEW
  # ═══════════════════════════════════════════════════════════════════

  - id: verify-pr-base
    bash: |
      set -euo pipefail
      EXPECTED="$BASE_BRANCH"
      BRANCH=$(git branch --show-current)
      if [ "$FORGE_PROVIDER" = "gitlab" ]; then
        MR_DATA=$(glab mr list --source-branch "$BRANCH" --output json --limit 1 2>/dev/null || echo "[]")
        ACTUAL=$(echo "$MR_DATA" | jq -r '.[0].target_branch // empty')
        if [ -n "$ACTUAL" ] && [ "$ACTUAL" != "$EXPECTED" ]; then
          MR_IID=$(echo "$MR_DATA" | jq -r '.[0].iid')
          echo "Base mismatch on MR !$MR_IID: expected=$EXPECTED actual=$ACTUAL — re-targeting" >&2
          glab mr update "$MR_IID" --target-branch "$EXPECTED"
        else
          echo "MR base verified: ${ACTUAL:-$EXPECTED}"
        fi
      else
        ACTUAL=$(gh pr view --json baseRefName -q '.baseRefName' 2>/dev/null || echo "")
        if [ -n "$ACTUAL" ] && [ "$ACTUAL" != "$EXPECTED" ]; then
          PR_NUMBER=$(gh pr view --json number -q '.number')
          echo "Base mismatch on PR #$PR_NUMBER: expected=$EXPECTED actual=$ACTUAL — re-targeting" >&2
          gh pr edit "$PR_NUMBER" --base "$EXPECTED"
        else
          echo "PR base verified: ${ACTUAL:-$EXPECTED}"
        fi
      fi
    depends_on: [finalize-pr]

  - id: review-scope
    command: archon-pr-review-scope
    depends_on: [verify-pr-base]
    context: fresh

  - id: sync
    command: archon-sync-pr-with-main
    depends_on: [review-scope]
    context: fresh

  - id: code-review
    command: archon-code-review-agent
    depends_on: [sync]
    context: fresh

  - id: error-handling
    command: archon-error-handling-agent
    depends_on: [sync]
    context: fresh

  - id: test-coverage
    command: archon-test-coverage-agent
    depends_on: [sync]
    context: fresh

  - id: comment-quality
    command: archon-comment-quality-agent
    depends_on: [sync]
    context: fresh

  - id: docs-impact
    command: archon-docs-impact-agent
    depends_on: [sync]
    context: fresh

  - id: synthesize
    command: archon-synthesize-review
    depends_on: [code-review, error-handling, test-coverage, comment-quality, docs-impact]
    trigger_rule: one_success
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 7: FIX REVIEW ISSUES
  # ═══════════════════════════════════════════════════════════════════

  - id: implement-fixes
    command: archon-implement-review-fixes
    depends_on: [synthesize]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 8: FINAL SUMMARY & FOLLOW-UP
  # ═══════════════════════════════════════════════════════════════════

  - id: workflow-summary
    command: archon-workflow-summary
    depends_on: [implement-fixes]
    context: fresh
