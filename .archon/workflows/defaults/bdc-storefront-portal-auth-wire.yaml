# Source pattern: WO-SHOPOPS-COMMERCE-SPINE-01.yaml (MIXED shopops pattern) +
#                 bdc-ce-regression-suite.yaml (gold-standard DAG shape, idempotent checkout,
#                 multi-line-safe grep, flip-notion shape)
# Doctrine compliance: 13 hard rules of archon-yaml-authoring (verified at draft time)
#
# Pre-flight (OPERATOR MUST VERIFY BEFORE FIRING):
#   1. bluedevilcollectibles/shopops registered in Archon:
#      sqlite3 /opt/bdc/archon-data/archon.db "SELECT name FROM remote_agent_codebases"
#      CWD when fired = shopops repo root (shopops-api/ is a subdir inside it).
#   2. bluedevilcollectibles/shopops-storefront NOT required to be an Archon codebase —
#      storefront work is done via git clone into /tmp in the shopops worktree context.
#      GH_TOKEN (GITHUB_TOKEN) must be set in Archon env with push access to both repos.
#   3. This WO is parallel_ok=NO. Do NOT fire while another shopops-api WO is in-flight.
#   4. WO spec committed + pushed to bdc-xo main branch:
#      docs/work-orders/WO-STOREFRONT-PORTAL-AUTH-WIRE-01.md
#   5. Notion page ID for WO-STOREFRONT-PORTAL-AUTH-WIRE-01 — FILL IN below before firing.
#      Find via: Notion search on database a6df831c-0b52-449f-8ca4-d77be6b70d0a
