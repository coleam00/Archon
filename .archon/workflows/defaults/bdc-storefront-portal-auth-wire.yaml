      echo "open-pr-storefront failed after retries; branch pushed but no PR" >&2
      exit 1

  # ---------------------------------------------------------------------------
  # 14. RUNTIME-VERIFY — Rule 19: docker exec grep proves source live in
  #     shopops-api container. Best-effort — container not rebuilt at PR-open time.
  # ---------------------------------------------------------------------------
  - id: runtime-verify
    depends_on: [open-pr-api, open-pr-storefront]
    bash: |
      # set -e DELIBERATELY OMITTED — best-effort step (Rule 19)
      RESULT=$(docker exec shopops-api grep -n "me/orders" /app/routes/storefront-portal-data.js 2>&1)
      EXIT=$?
      if [ $EXIT -eq 0 ]; then
        echo "STATUS=ok"
        echo "RULE19_GREP_RESULT=${RESULT}"
        echo "DETAIL=Source change verified live in shopops-api container"
      elif echo "$RESULT" | grep -qiE 'No such container|not found|executable file not found'; then
        echo "STATUS=skipped_container_not_rebuilt"
        echo "DETAIL=shopops-api not yet rebuilt with PR changes. Re-run post-deploy:"
        echo "  docker exec shopops-api grep -n 'me/orders' /app/routes/storefront-portal-data.js"
        echo "  docker exec shopops-api grep -n 'me/statements' /app/routes/storefront-portal-data.js"
        echo "  docker exec shopops-api grep -n 'mapOrderStatus' /app/routes/storefront-portal-data.js"
      else
        echo "STATUS=failed_unexpected"
        echo "DETAIL=${RESULT}"
      fi

      echo ""
      echo "=== RULE 19 VERIFICATION COMMANDS (run post-deploy) ==="
      echo "docker exec shopops-api grep -n 'me/orders' /app/routes/storefront-portal-data.js"
      echo "docker exec shopops-api grep -n 'me/statements' /app/routes/storefront-portal-data.js"
      echo "docker exec shopops-api grep -n 'mapOrderStatus' /app/routes/storefront-portal-data.js"
      echo "docker exec shopops-api grep -n 'mapStatementStatus' /app/routes/storefront-portal-data.js"
      echo "curl -s -H 'Cookie: portal_jwt=<test_token>' http://localhost:3402/storefront/portal/me/orders"

      exit 0

