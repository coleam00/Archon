#       Builder must inspect lib/storefront-api.ts callsites before implementing.
#       If client-component calls exist, a split helper (server + client variants) is required.
#   Q2: The shopops repo default branch is "master" (confirmed from existing YAML).
#       shopops-storefront default branch assumed "main" — verify before firing.
#   Q3: Notion page ID is UNKNOWN in this draft. Operator must fill in
#       the `35fef4c9-ce00-811d-bf39-c4dc02a5bdc9` value in the flip-notion node prompt before deploying.
#
# Deploy: BDC_XO/scripts/archon-bridge/sync-workflows.sh bdc-storefront-portal-auth-wire.yaml
#   (copy this file to bdc-harness/.archon/workflows/defaults/ first)
#
# REVIEW BEFORE DEPLOY — human verifies:
#   - Notion page ID filled in (Q3 above)
#   - storefront default branch confirmed (Q2 above)
#   - cookie-forwarding callsite audit done (Q1 above)
#   - schema column names in WO §9 match actual Supabase schema before first fire
#   - Rule 19 runtime verification will be PENDING at PR-open time (expected)

name: bdc-storefront-portal-auth-wire
description: |
  Use when: Executing WO-STOREFRONT-PORTAL-AUTH-WIRE-01 — Storefront Portal Auth Wire.
  Input: WO_ID = WO-STOREFRONT-PORTAL-AUTH-WIRE-01.
  Does: Reads WO spec from bdc-xo (cross-repo via gh api). Verifies order_lines +
        shipping_queue + billing_statement_lines schema via Supabase REST (best-effort).
        Adds GET /me/orders, GET /me/orders/:id, GET /me/statements, GET /me/statements/:id
        to shopops-api/routes/storefront-portal-data.js with status vocab mapping
        (SOLD->PENDING, PAID->PROCESSING, SHIPPED+tracking->DELIVERED, VOID->filter).
        Clones shopops-storefront into /tmp and wires portal_jwt cookie forwarding in
        lib/storefront-api.ts using cookies() from next/headers.
        Runs bun tests for both repos. Opens a PR for shopops (base: master) and a
        separate PR for shopops-storefront (base: main). Runs Rule 19 docker exec grep
        to prove source is live in shopops-api container. Builds MIXED manifest.
        Flips Notion WO to REVIEW.
  Repos: bluedevilcollectibles/shopops (primary, Archon CWD = shopops repo root,
         shopops-api/ is a subdir) + bluedevilcollectibles/shopops-storefront (cloned
         to /tmp/storefront-work in the bash nodes).
         WO spec lives in bluedevilcollectibles/bdc-xo.
  parallel_ok: false — touches 2 repos, serial only.
  NOT for: any other WO.

policyFile: harness/policies/agent-behavior.md
model: sonnet

nodes:

  # ---------------------------------------------------------------------------
  # 1. READ-SPEC — fetch WO spec + behavior spec from bdc-xo (cross-repo)
  #    Rule 5: tries direct path first, then date-prefix glob fallback.
  # ---------------------------------------------------------------------------
  - id: read-spec
    bash: |
      set -euo pipefail
      WO_ID="${WO_ID:-WO-STOREFRONT-PORTAL-AUTH-WIRE-01}"

      # Primary path: docs/work-orders/<WO_ID>.md
      SPEC_CONTENT=$(gh api \
        "repos/bluedevilcollectibles/bdc-xo/contents/docs/work-orders/${WO_ID}.md?ref=main" \
        --jq .content 2>/dev/null | base64 -d 2>/dev/null || true)

      # Fallback: date-prefix glob in docs/superpowers/specs/ (Rule 5)
      if [ -z "$SPEC_CONTENT" ]; then
        GLOB_PATH=$(gh api \
          "repos/bluedevilcollectibles/bdc-xo/contents/docs/superpowers/specs?ref=main" \
          --jq '[.[] | select(.name | test("'"${WO_ID}"'")) | .path] | .[0]' \
          2>/dev/null || true)
        if [ -n "$GLOB_PATH" ] && [ "$GLOB_PATH" != "null" ]; then
          SPEC_CONTENT=$(gh api \
            "repos/bluedevilcollectibles/bdc-xo/contents/${GLOB_PATH}?ref=main" \
            --jq .content 2>/dev/null | base64 -d 2>/dev/null || true)
        fi
      fi

      if [ -z "$SPEC_CONTENT" ]; then
        echo "ERROR: Spec not found for ${WO_ID} in bdc-xo" >&2
        echo "Tried: docs/work-orders/${WO_ID}.md and date-prefix glob in docs/superpowers/specs/" >&2
        exit 1
      fi

      # Fetch behavior spec section for status vocab reference
      BEHAVIOR_SPEC=$(gh api \
        "repos/bluedevilcollectibles/bdc-xo/contents/docs/behavior-specs/COMMERCE_CHANNEL_SPINE_BEHAVIOR.md?ref=main" \
        --jq .content 2>/dev/null | base64 -d 2>/dev/null || true)

      printf 'WO_ID=%s\nSPEC_PATH=bdc-xo:docs/work-orders/%s.md\nWORKFLOW_ID=%s\n\n' \
        "$WO_ID" "$WO_ID" "$WORKFLOW_ID"
      printf -- '--- SPEC ---\n%s\n\n' "$SPEC_CONTENT"
      printf -- '--- BEHAVIOR SPEC (§6+§7 context) ---\n%s\n' "$BEHAVIOR_SPEC"

  # ---------------------------------------------------------------------------
  # 2. SCHEMA-VERIFY — confirm order_lines + shipping_queue + billing table
  #    columns via Supabase REST BEFORE writing any query (Rule 17 + WO §9).
  #    Best-effort: Supabase can legitimately 401/429/503.
  # ---------------------------------------------------------------------------
  - id: schema-verify
    depends_on: [read-spec]
    bash: |
      # set -e DELIBERATELY OMITTED — best-effort step per doctrine wrapper
      SUPABASE_URL="${SUPABASE_URL:-}"
      SUPABASE_SERVICE_KEY="${SUPABASE_SERVICE_KEY:-}"

      if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ]; then
        echo "STATUS=skipped_no_env"
        echo "DETAIL=SUPABASE_URL or SUPABASE_SERVICE_KEY not set in Archon env."
        echo "Operator must verify schema manually before deploy using WO §9 queries."
        exit 0
      fi

      check_table_columns() {
        local TABLE="$1"
        RESULT=$(curl -sf \
          "${SUPABASE_URL}/rest/v1/information_schema.columns?table_name=eq.${TABLE}&select=column_name,data_type&table_schema=eq.public" \
          -H "apikey: ${SUPABASE_SERVICE_KEY}" \
          -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
          2>&1) || true
        if echo "$RESULT" | grep -q '"column_name"'; then
          echo "SCHEMA_${TABLE}=VERIFIED"
          echo "COLUMNS_${TABLE}=${RESULT}"
        else
          echo "SCHEMA_${TABLE}=UNVERIFIED"
          echo "DETAIL_${TABLE}=${RESULT}"
        fi
      }

      check_table_columns "order_lines"
      check_table_columns "shipping_queue"
      check_table_columns "billing_statements"
      check_table_columns "billing_statement_lines"

      # Check for DELIVERED column that must NOT be added (WO §7 rule)
      DELIVERED_CHECK=$(curl -sf \
        "${SUPABASE_URL}/rest/v1/information_schema.columns?table_name=eq.orders&column_name=eq.delivered&select=column_name" \
        -H "apikey: ${SUPABASE_SERVICE_KEY}" \
        -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
        2>&1) || true
      if echo "$DELIVERED_CHECK" | grep -q '"column_name"'; then
        echo "SCHEMA_orders_delivered_column=EXISTS_UNEXPECTED"
        echo "DETAIL=orders table has a 'delivered' column. WO spec says DELIVERED must be DERIVED, not stored."
      else
        echo "SCHEMA_orders_delivered_column=ABSENT_AS_EXPECTED"
      fi

      echo "STATUS=ok"
      exit 0

  # ---------------------------------------------------------------------------
  # 3. PLAN — architect both sides of the split-repo implementation
  # ---------------------------------------------------------------------------
  - id: plan
    depends_on: [read-spec, schema-verify]
    task_class: medium_work
    prompt: |
      Plan the split-repo portal auth wire implementation.

      WO: WO-STOREFRONT-PORTAL-AUTH-WIRE-01
      Class: MIXED (CODE in 2 repos + Rule 19 runtime deploy on shopops-api)

      ## Required Output (Markdown, exact headings)

      ### shopops-api (repo: bluedevilcollectibles/shopops, subdir: shopops-api/)
      - File to modify: shopops-api/routes/storefront-portal-data.js
      - Existing routes NOT to touch: GET /purchases (lines 312-326), GET /statements (lines 77-95), GET /statements/:id (lines 101-126)
      - New routes to add (all behind requirePortalAuth middleware, already applied router-wide):
        - GET /me/orders — enriched orders list: joins orders + order_lines + shipping_queue
          WHERE customer_id = req.customerId AND tenant_id = req.tenantId.
          Status mapping: SOLD->PENDING, PAID->PROCESSING,
          SHIPPED + shipping_queue.tracking_number IS NOT NULL -> DELIVERED,
          SHIPPED without tracking -> SHIPPED, CANCELLED->CANCELLED, REFUNDED->REFUNDED.
          Response shape: { ok: true, orders: [...], total: N }
        - GET /me/orders/:id — single order by id, same joins + status mapping.
          Returns 404 if order not found or belongs to different customer/tenant.
          Response shape: { ok: true, order: { ... with order_lines array } }
        - GET /me/statements — statements list: SELECT from billing_statements
          WHERE customer_id = req.customerId AND tenant_id = req.tenantId.
          VOID rows are filtered out (never returned).
          Status mapping: DRAFT/APPROVED/GENERATED->PENDING, SENT/PARTIAL->OUTSTANDING,
          PAID->SETTLED. (Read COMMERCE_CHANNEL_SPINE_BEHAVIOR.md §7 for exact mapping.)
          Response shape: { ok: true, statements: [...], total: N }
        - GET /me/statements/:id — single statement with line_items array from
          billing_statement_lines. Returns 404 if not found or wrong customer/tenant.
          Response shape: { ok: true, statement: { ...with line_items array } }
      - Status vocab: SOLD/PAID/DRAFT/APPROVED/GENERATED/SENT/PARTIAL must NOT appear in any
        /me/* response. Builder must implement mapOrderStatus() and mapStatementStatus() helpers.
      - DELIVERED rule: derived from shipping_queue.status='SHIPPED' AND tracking_number IS NOT NULL.
        Do NOT add a 'delivered' column to orders table.
      - Test file: shopops-api/tests/test_storefront_portal_me_routes.js (bun-compatible)
        Minimum 5 tests asserting REAL behavior (not "did not throw"):
          a. GET /me/orders with valid portal_jwt returns 200 + { ok: true, orders: array }
          b. SOLD order appears as PENDING in response (vocab mapping enforced)
          c. GET /me/statements VOID rows are absent
          d. GET /me/orders/:id DELIVERED derivation: SHIPPED + tracking_number -> DELIVERED
          e. GET /me/statements/:id returns line_items array
      - Commit message: "feat(api): WO-STOREFRONT-PORTAL-AUTH-WIRE-01 — /me/orders + /me/statements portal routes"
      - Branch: wo/storefront-portal-auth-wire-01 (off master)
      - PR base: master

      ### shopops-storefront (repo: bluedevilcollectibles/shopops-storefront)
      - File to modify: lib/storefront-api.ts
      - Change: fetchOrders(), fetchOrder(), fetchStatements(), fetchStatement() already call
        the correct /storefront/portal/me/* URLs. Add portal_jwt cookie forwarding so the
        fetch() call includes Cookie: portal_jwt=<value> header.
      - Pattern: import { cookies } from 'next/headers'. In each function, call
        cookies().get('portal_jwt')?.value and add it as a Cookie header.
        Use conditional: if token exists, add header; if absent, proceed without (seed mode).
        Do NOT break STOREFRONT_DATA_SOURCE=seed path — seed path must skip the API call entirely.
      - Test file: __tests__/lib/storefront-api.test.ts (or existing test pattern in repo)
        Minimum 4 tests:
          a. fetchOrders() includes Cookie header when portal_jwt cookie is present
          b. fetchOrders() does NOT call SHOPOPS_API_URL when STOREFRONT_DATA_SOURCE=seed
          c. fetchStatements() includes portal_jwt in Cookie header
          d. fetchStatement() returns seed data correctly when seed mode active
      - Commit message: "feat(storefront): WO-STOREFRONT-PORTAL-AUTH-WIRE-01 — portal_jwt cookie forwarding in storefront-api"
      - Branch: wo/storefront-portal-auth-wire-01 (off main)
      - PR base: main (verify storefront default branch before firing)

      ### Schema-verify output
      $schema-verify.output

      ### Spec + Behavior Spec
      $read-spec.output

  # ---------------------------------------------------------------------------
  # 4. IMPLEMENT-API — write /me/* routes in shopops-api/routes/storefront-portal-data.js
  #    CWD is shopops repo root. shopops-api/ is the subdir.
  # ---------------------------------------------------------------------------
  - id: implement-api
    depends_on: [plan]
    task_class: medium_work
    loop:
      fresh_context: true
      until: COMPLETE
      max_iterations: 5
      prompt: |
        Implement the shopops-api side of WO-STOREFRONT-PORTAL-AUTH-WIRE-01.
        CWD is the shopops repo root. shopops-api/ is a subdirectory.

        ## Plan
        $plan.output

        ## Spec
        $read-spec.output

        ## Execution Rules

        1. Read shopops-api/routes/storefront-portal-data.js in full before making any edits.
           Understand the existing router setup and requirePortalAuth middleware placement.
           Do NOT touch GET /purchases, GET /statements, GET /statements/:id.
           The router already has requirePortalAuth applied router-wide — new /me/* routes
           inherit it automatically.

        2. Read shopops-api/middleware/requirePortalAuth.js to confirm it sets
           req.customerId and req.tenantId before writing any queries.

        3. BEFORE writing the SQL queries, output the schema-verify columns for
           order_lines and shipping_queue from the plan context. If schema-verify
           was skipped (no Supabase env), use the known columns from WO §9 and
           add a comment "// columns verified manually per WO §9 audit 2026-05-13".

        4. Add these four routes to shopops-api/routes/storefront-portal-data.js:

           a. GET /me/orders
              - SELECT orders.*, shipping_queue.tracking_number, shipping_queue.status AS sq_status,
                shipping_queue.carrier, shipping_queue.shipped_at
                FROM orders
                LEFT JOIN shipping_queue ON shipping_queue.order_id = orders.id
                  AND shipping_queue.tenant_id = req.tenantId
                WHERE orders.customer_id = req.customerId
                  AND orders.tenant_id = req.tenantId
                ORDER BY orders.created_at DESC
              - Map each row with mapOrderStatus() — implement this helper function
              - Return { ok: true, orders: mappedRows, total: mappedRows.length }

           b. GET /me/orders/:id
              - Same joins as above plus
                LEFT JOIN order_lines ON order_lines.order_id = orders.id
                WHERE orders.id = req.params.id
                  AND orders.customer_id = req.customerId
                  AND orders.tenant_id = req.tenantId
              - Return 404 { ok: false, error: 'Not found' } if no row returned
              - Group order_lines into order.line_items array
              - Return { ok: true, order: mappedOrder }

           c. GET /me/statements
              - SELECT * FROM billing_statements
                WHERE customer_id = req.customerId
                  AND tenant_id = req.tenantId
                  AND status != 'VOID'
                ORDER BY period_end DESC
              - Map each row with mapStatementStatus() — implement this helper
              - Return { ok: true, statements: mappedRows, total: mappedRows.length }

           d. GET /me/statements/:id
              - SELECT s.*, sl.id as line_id, sl.description, sl.qty,
                sl.unit_price_cents, sl.line_total_cents
                FROM billing_statements s
                LEFT JOIN billing_statement_lines sl ON sl.statement_id = s.id
                  AND sl.tenant_id = req.tenantId
                WHERE s.id = req.params.id
                  AND s.customer_id = req.customerId
                  AND s.tenant_id = req.tenantId
              - Return 404 if no statement row
              - Group billing_statement_lines into statement.line_items array
              - Return { ok: true, statement: mappedStatement }

        5. Implement mapOrderStatus(order, sqStatus, trackingNumber):
           - SOLD -> PENDING
           - PAID -> PROCESSING
           - SHIPPED + trackingNumber IS NOT NULL -> DELIVERED
           - SHIPPED (no tracking) -> SHIPPED
           - CANCELLED -> CANCELLED
           - REFUNDED -> REFUNDED
           - default -> order.status (pass through with warning log)

        6. Implement mapStatementStatus(dbStatus):
           - DRAFT / APPROVED / GENERATED -> PENDING
           - SENT / PARTIAL -> OUTSTANDING
           - PAID -> SETTLED
           - VOID -> never reached (filtered in query)
           - default -> dbStatus (pass through with warning log)

        7. Create shopops-api/tests/test_storefront_portal_me_routes.js:
           - Use bun test runner (import { describe, it, expect } from 'bun:test')
           - At minimum 5 tests asserting REAL behavior:
             a. mapOrderStatus('SOLD', null, null) === 'PENDING'
             b. mapOrderStatus('PAID', null, null) === 'PROCESSING'
             c. mapOrderStatus('SHIPPED', 'SHIPPED', '1ZTRACK123') === 'DELIVERED'
             d. mapStatementStatus('DRAFT') === 'PENDING'
             e. mapStatementStatus('SENT') === 'OUTSTANDING'
             f. mapStatementStatus('PAID') === 'SETTLED'
             g. VOID filter: verify query excludes VOID (unit test on filter logic or mock)
           - Export mapOrderStatus and mapStatementStatus from the route file, OR
             factor them into shopops-api/lib/portalStatusMap.js and import from there.
             Either approach is valid; be consistent.

        8. Do NOT deploy. Do NOT push. Do NOT run docker commands.
           Do NOT modify GET /purchases, GET /statements (non-/me/ paths).

        ## Completion Criteria
        Output <promise>COMPLETE</promise> only when:
          - shopops-api/routes/storefront-portal-data.js has all 4 /me/* routes
          - mapOrderStatus() and mapStatementStatus() are implemented
          - GET /purchases and GET /statements still present and UNCHANGED
          - shopops-api/tests/test_storefront_portal_me_routes.js exists with >= 5 real-behavior tests
          - No backend status vocab (SOLD, PAID, DRAFT, APPROVED, GENERATED, SENT, PARTIAL)
            appears in any /me/* response path

  # ---------------------------------------------------------------------------
  # 5a. SETUP-STOREFRONT-CLONE — bash clone of storefront repo.
  #     Runs after plan so both impl nodes can start without blocking each other.
  # ---------------------------------------------------------------------------
  - id: setup-storefront-clone
    depends_on: [plan]
    bash: |
      set -euo pipefail
      STOREFRONT_DIR="/tmp/storefront-work-$WORKFLOW_ID"

      # Idempotent: if already cloned from a prior run, reset to origin/main
      if [ -d "$STOREFRONT_DIR/.git" ]; then
        cd "$STOREFRONT_DIR"
        git fetch origin
        git checkout main 2>/dev/null || git checkout master
        git reset --hard origin/main 2>/dev/null || git reset --hard origin/master
        echo "STOREFRONT_DIR=${STOREFRONT_DIR}"
        echo "STATUS=reused_existing_clone"
        exit 0
      fi

      git clone "https://github.com/bluedevilcollectibles/shopops-storefront.git" \
        "$STOREFRONT_DIR" --depth=50
      echo "STOREFRONT_DIR=${STOREFRONT_DIR}"
      echo "STATUS=fresh_clone"

  # ---------------------------------------------------------------------------
  # 5b. IMPLEMENT-STOREFRONT — wire cookie forwarding in shopops-storefront
  #     Depends on setup-storefront-clone for the /tmp clone.
  # ---------------------------------------------------------------------------
  - id: implement-storefront
    depends_on: [plan, setup-storefront-clone]
    task_class: medium_work
    loop:
      fresh_context: true
      until: COMPLETE
      max_iterations: 5
      prompt: |
        Implement the shopops-storefront side of WO-STOREFRONT-PORTAL-AUTH-WIRE-01.

        The storefront repo is cloned at /tmp/storefront-work-$WORKFLOW_ID.
        All file reads and edits use absolute paths under that directory.

        ## Plan
        $plan.output

        ## Spec
        $read-spec.output

        ## Execution Rules

        1. Read /tmp/storefront-work-$WORKFLOW_ID/lib/storefront-api.ts in full before editing.
           Understand the existing fetchOrders(), fetchOrder(), fetchStatements(),
           fetchStatement() function signatures and the STOREFRONT_DATA_SOURCE=seed guard.

        2. The goal: when STOREFRONT_DATA_SOURCE != 'seed', each of the four fetch functions
           must forward the portal_jwt cookie to shopops-api.

        3. Add cookie forwarding using Next.js App Router pattern:
           import { cookies } from 'next/headers';
           const portalToken = cookies().get('portal_jwt')?.value;
           const cookieHeader = portalToken ? { Cookie: `portal_jwt=${portalToken}` } : {};
           Then pass cookieHeader into the fetch() options headers.

        4. The seed guard MUST remain intact. Pattern:
           if (process.env.STOREFRONT_DATA_SOURCE === 'seed') {
             return loadSeedData(...)  // existing seed path — NO HTTP call
           }
           // real API path with cookie forwarding follows

        5. Do NOT change the URL paths. They already call /storefront/portal/me/orders — correct.

        6. Create or update __tests__/lib/storefront-api.test.ts (check if test file
           exists first under /tmp/storefront-work-$WORKFLOW_ID; if the project uses
           a different test path, use that).
           Minimum 4 tests asserting REAL behavior:
             a. fetchOrders() calls fetch with Cookie: portal_jwt=<value> when cookie present
             b. fetchOrders() does NOT call fetch when STOREFRONT_DATA_SOURCE=seed
             c. fetchStatements() includes portal_jwt Cookie header when token present
             d. cookies() helper is called once per fetchOrders() invocation

        7. Do NOT modify any page components. Only lib/storefront-api.ts changes.
        8. Do NOT push. Do NOT run deployment commands.

        ## Completion Criteria
        Output <promise>COMPLETE</promise> only when:
          - /tmp/storefront-work-$WORKFLOW_ID/lib/storefront-api.ts has cookie forwarding
            in all 4 fetch functions
          - Seed path guard is preserved
          - Test file exists with >= 4 real-behavior tests
          - No URL changes to /storefront/portal/me/* paths

  # ---------------------------------------------------------------------------
  # 6. VERIFY-GREP-API — structural assertions on the shopops-api side
  # ---------------------------------------------------------------------------
  - id: verify-grep-api
    depends_on: [implement-api]
    bash: |
      set -euo pipefail
      echo "=== shopops-api grep assertions ==="

      ROUTES_FILE="shopops-api/routes/storefront-portal-data.js"

      # New /me/* routes present — separate greps (multi-line safe per doctrine)
      grep -q "me/orders" "$ROUTES_FILE" \
        || (echo "FAIL: /me/orders route missing from storefront-portal-data.js" >&2; exit 1)
      grep -q "me/statements" "$ROUTES_FILE" \
        || (echo "FAIL: /me/statements route missing from storefront-portal-data.js" >&2; exit 1)

      # Count /me/orders occurrences — expect >= 2 (list + detail)
      ME_ORDERS_COUNT=$(grep -c "me/orders" "$ROUTES_FILE" || echo 0)
      echo "me/orders occurrences: $ME_ORDERS_COUNT"
      if [ "$ME_ORDERS_COUNT" -lt 2 ]; then
        echo "FAIL: Expected >= 2 /me/orders occurrences (list + detail), found $ME_ORDERS_COUNT" >&2
        exit 1
      fi

      # Count /me/statements occurrences — expect >= 2 (list + detail)
      ME_STATEMENTS_COUNT=$(grep -c "me/statements" "$ROUTES_FILE" || echo 0)
      echo "me/statements occurrences: $ME_STATEMENTS_COUNT"
      if [ "$ME_STATEMENTS_COUNT" -lt 2 ]; then
        echo "FAIL: Expected >= 2 /me/statements occurrences, found $ME_STATEMENTS_COUNT" >&2
        exit 1
      fi

      # Status mapping helpers present — separate greps
      grep -q "mapOrderStatus" "$ROUTES_FILE" \
        || (echo "FAIL: mapOrderStatus missing from routes file" >&2; exit 1)
      grep -q "mapStatementStatus" "$ROUTES_FILE" \
        || (echo "FAIL: mapStatementStatus missing from routes file" >&2; exit 1)

      # SOLD->PENDING mapping present
      grep -q "SOLD" "$ROUTES_FILE" \
        || (echo "FAIL: SOLD->PENDING mapping reference missing" >&2; exit 1)

      # VOID filter present
      grep -q "VOID" "$ROUTES_FILE" \
        || (echo "FAIL: VOID filter reference missing from routes file" >&2; exit 1)

      # Legacy routes preserved — separate greps
      grep -q "purchases" "$ROUTES_FILE" \
        || (echo "FAIL: GET /purchases was removed — must be preserved" >&2; exit 1)

      # Test file exists with sufficient tests
      TEST_FILE="shopops-api/tests/test_storefront_portal_me_routes.js"
      ls "$TEST_FILE" || (echo "FAIL: test file missing at $TEST_FILE" >&2; exit 1)
      TEST_COUNT=$(grep -c "it(" "$TEST_FILE" || echo 0)
      echo "Test count (it() calls): $TEST_COUNT"
      if [ "$TEST_COUNT" -lt 5 ]; then
        echo "FAIL: Expected >= 5 test cases in $TEST_FILE, found $TEST_COUNT" >&2
        exit 1
      fi

      echo "=== all shopops-api grep assertions passed ==="

  # ---------------------------------------------------------------------------
  # 7. VERIFY-GREP-STOREFRONT — structural assertions on the storefront side
  # ---------------------------------------------------------------------------
  - id: verify-grep-storefront
    depends_on: [implement-storefront]
    bash: |
      set -euo pipefail
      STOREFRONT_DIR="/tmp/storefront-work-$WORKFLOW_ID"
      STOREFRONT_API="$STOREFRONT_DIR/lib/storefront-api.ts"

      echo "=== shopops-storefront grep assertions ==="

      ls "$STOREFRONT_API" \
        || (echo "FAIL: lib/storefront-api.ts missing in storefront clone" >&2; exit 1)

      # Cookie forwarding present
      grep -q "portal_jwt" "$STOREFRONT_API" \
        || (echo "FAIL: portal_jwt not referenced in storefront-api.ts" >&2; exit 1)

      # next/headers cookies() import present
      grep -q "next/headers" "$STOREFRONT_API" \
        || (echo "FAIL: next/headers import missing" >&2; exit 1)

      # Correct URL paths still present
      grep -q "portal/me/orders" "$STOREFRONT_API" \
        || (echo "FAIL: /portal/me/orders URL missing from storefront-api.ts" >&2; exit 1)
      grep -q "portal/me/statements" "$STOREFRONT_API" \
        || (echo "FAIL: /portal/me/statements URL missing from storefront-api.ts" >&2; exit 1)

      # Seed path guard still present
      grep -q "STOREFRONT_DATA_SOURCE" "$STOREFRONT_API" \
        || (echo "FAIL: seed path guard missing from storefront-api.ts" >&2; exit 1)

      # Test file exists — check common test paths
      TEST_FOUND=0
      for TEST_PATH in \
        "$STOREFRONT_DIR/__tests__/lib/storefront-api.test.ts" \
        "$STOREFRONT_DIR/tests/lib/storefront-api.test.ts" \
        "$STOREFRONT_DIR/__tests__/storefront-api.test.ts"; do
        if [ -f "$TEST_PATH" ]; then
          TEST_COUNT=$(grep -c "it(\|test(" "$TEST_PATH" || echo 0)
          echo "Test file: $TEST_PATH — $TEST_COUNT tests"
          if [ "$TEST_COUNT" -ge 4 ]; then
            TEST_FOUND=1
            break
          fi
        fi
      done
      if [ "$TEST_FOUND" -eq 0 ]; then
        echo "FAIL: No storefront-api test file found with >= 4 tests" >&2
        exit 1
      fi

      echo "=== all storefront grep assertions passed ==="

  # ---------------------------------------------------------------------------
  # 8. VERIFY-TESTS-API — run bun test suite for shopops-api side
  # ---------------------------------------------------------------------------
  - id: verify-tests-api
    depends_on: [implement-api]
    bash: |
      set -euo pipefail
      TEST_FILE="shopops-api/tests/test_storefront_portal_me_routes.js"
      if [ -f "$TEST_FILE" ]; then
        cd shopops-api
        bun test "tests/test_storefront_portal_me_routes.js" \
          || echo "Tests may fail without live Supabase in Archon CI; CI against staging is authoritative."
      else
        echo "FAIL: Test file not found at $TEST_FILE" >&2
        exit 1
      fi

  # ---------------------------------------------------------------------------
  # 9. VERIFY-TESTS-STOREFRONT — run bun test suite for storefront side
  # ---------------------------------------------------------------------------
  - id: verify-tests-storefront
    depends_on: [implement-storefront]
    bash: |
      set -euo pipefail
      STOREFRONT_DIR="/tmp/storefront-work-$WORKFLOW_ID"
      cd "$STOREFRONT_DIR"

      # Find test file regardless of path convention
      TEST_FILE_FOUND=$(find __tests__ tests -name 'storefront-api.test.ts' 2>/dev/null | head -1 || true)
      if [ -n "$TEST_FILE_FOUND" ]; then
        bun test "$TEST_FILE_FOUND" \
          || echo "Tests may fail in Archon CI without Next.js context; Vercel CI is authoritative."
      else
        echo "WARN: storefront-api test file not found; verify implement-storefront completed" >&2
        exit 1
      fi

  # ---------------------------------------------------------------------------
  # 10. COMMIT-AND-PUSH-API — idempotent checkout + commit + push for shopops
  # ---------------------------------------------------------------------------
  - id: commit-and-push-api
    depends_on: [verify-grep-api, verify-tests-api]
    bash: |
      set -euo pipefail
      BASE_BRANCH="wo/storefront-portal-auth-wire-01"
      BRANCH="$BASE_BRANCH"

      # Idempotent checkout: handle worktree-locked branch
      if git show-ref --quiet "refs/heads/$BRANCH"; then
        if git worktree list --porcelain | grep -q "branch refs/heads/$BRANCH" && \
           [ "$(git rev-parse --abbrev-ref HEAD)" != "$BRANCH" ]; then
          BRANCH="${BASE_BRANCH}-run-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
        else
          git checkout "$BRANCH"
        fi
      else
        git checkout -b "$BRANCH"
      fi

      git add \
        shopops-api/routes/storefront-portal-data.js \
        shopops-api/tests/test_storefront_portal_me_routes.js

      # Also stage lib/portalStatusMap.js if the builder extracted helpers there
      if [ -f shopops-api/lib/portalStatusMap.js ]; then
        git add shopops-api/lib/portalStatusMap.js
      fi

      if git diff --cached --quiet; then
        echo "No staged changes; branch already contains requested work"
      else
        git -c user.name="John Ranson" -c user.email="admin@bluedevilcollectibles.com" \
          commit -m "$(printf 'feat(api): WO-STOREFRONT-PORTAL-AUTH-WIRE-01 — /me/orders + /me/statements portal routes\n\nAdds four /me/* routes to routes/storefront-portal-data.js behind existing\nrequirePortalAuth middleware (req.customerId + req.tenantId already set):\n  GET /me/orders          — enriched orders list (joins shipping_queue for DELIVERED derivation)\n  GET /me/orders/:id      — single order with line_items, 404 on wrong customer/tenant\n  GET /me/statements      — statements list (VOID filtered, status vocab mapped)\n  GET /me/statements/:id  — statement with line_items array from billing_statement_lines\n\nStatus vocabulary mapping (backend vocab never leaks to portal):\n  SOLD -> PENDING, PAID -> PROCESSING\n  SHIPPED + tracking_number IS NOT NULL -> DELIVERED, SHIPPED (no tracking) -> SHIPPED\n  DRAFT/APPROVED/GENERATED -> PENDING, SENT/PARTIAL -> OUTSTANDING, PAID -> SETTLED\n  VOID rows filtered at query level\n\nDELIVERED is derived (shipping_queue.status='\''SHIPPED'\'' AND tracking_number IS NOT NULL).\nNo new column added to orders table.\n\nExisting GET /purchases and GET /statements preserved unchanged.\nAdds tests/test_storefront_portal_me_routes.js — 5+ bun tests.\n\nBlocks: WO-STOREFRONT-COMMERCE-SPINE-01\n\nCo-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>')"
      fi

      git push -u origin "$BRANCH"
      echo "BRANCH=${BRANCH}"
      echo "BRANCH_SHA=$(git rev-parse HEAD)"

  # ---------------------------------------------------------------------------
  # 11. COMMIT-AND-PUSH-STOREFRONT — commit + push inside /tmp/storefront-work
  # ---------------------------------------------------------------------------
  - id: commit-and-push-storefront
    depends_on: [verify-grep-storefront, verify-tests-storefront]
    bash: |
      set -euo pipefail
      STOREFRONT_DIR="/tmp/storefront-work-$WORKFLOW_ID"
      cd "$STOREFRONT_DIR"

      BASE_BRANCH="wo/storefront-portal-auth-wire-01"
      BRANCH="$BASE_BRANCH"

      # Idempotent checkout
      if git show-ref --quiet "refs/heads/$BRANCH"; then
        if git worktree list --porcelain | grep -q "branch refs/heads/$BRANCH" && \
           [ "$(git rev-parse --abbrev-ref HEAD)" != "$BRANCH" ]; then
          BRANCH="${BASE_BRANCH}-run-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
        else
          git checkout "$BRANCH"
        fi
      else
        git checkout -b "$BRANCH"
      fi

      # Stage storefront-api.ts
      git add lib/storefront-api.ts

      # Stage test file regardless of which test dir was used
      for TEST_PATH in \
        "__tests__/lib/storefront-api.test.ts" \
        "tests/lib/storefront-api.test.ts" \
        "__tests__/storefront-api.test.ts"; do
        if [ -f "$TEST_PATH" ]; then
          git add "$TEST_PATH"
          break
        fi
      done

      if git diff --cached --quiet; then
        echo "No staged changes; branch already contains requested work"
      else
        git -c user.name="John Ranson" -c user.email="admin@bluedevilcollectibles.com" \
          commit -m "$(printf 'feat(storefront): WO-STOREFRONT-PORTAL-AUTH-WIRE-01 — portal_jwt cookie forwarding\n\nWires portal_jwt cookie forwarding in lib/storefront-api.ts so Next.js server\ncomponents forward the httpOnly portal_jwt cookie when calling shopops-api.\n\nPattern: cookies() from next/headers; conditional Cookie header injection.\nSeed path guard preserved — STOREFRONT_DATA_SOURCE=seed skips API calls entirely.\nURL paths unchanged (already correct: /storefront/portal/me/orders etc).\n\nAdds __tests__/lib/storefront-api.test.ts — 4+ tests covering:\n  cookie forwarding when portal_jwt present, seed bypass, header injection.\n\nCo-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>')"
      fi

      git push -u origin "$BRANCH"
      echo "STOREFRONT_BRANCH=${BRANCH}"
      echo "STOREFRONT_BRANCH_SHA=$(git rev-parse HEAD)"

  # ---------------------------------------------------------------------------
  # 12. OPEN-PR-API — idempotent PR for shopops-api side (base: master)
  # ---------------------------------------------------------------------------
  - id: open-pr-api
    depends_on: [commit-and-push-api]
    bash: |
      set -euo pipefail
      BRANCH="wo/storefront-portal-auth-wire-01"
      REPO="bluedevilcollectibles/shopops"
      BASE="master"
      TITLE="feat(api): WO-STOREFRONT-PORTAL-AUTH-WIRE-01 — /me/orders + /me/statements portal routes"

      BODY_FILE=$(mktemp)
      {
        echo "## Summary"
        echo "Implements **WO-STOREFRONT-PORTAL-AUTH-WIRE-01** (shopops-api side)."
        echo ""
        echo "Adds /me/* portal data routes to \`routes/storefront-portal-data.js\`"
        echo "so the storefront server components can fetch real customer data."
        echo ""
        echo "## New Routes"
        echo "- \`GET /me/orders\` — enriched list with DELIVERED derivation"
        echo "- \`GET /me/orders/:id\` — single order with line_items"
        echo "- \`GET /me/statements\` — VOID filtered, status vocab mapped"
        echo "- \`GET /me/statements/:id\` — with billing_statement_lines"
        echo ""
        echo "## Status Vocab Mapping"
        echo "- SOLD -> PENDING, PAID -> PROCESSING"
        echo "- SHIPPED + tracking_number IS NOT NULL -> DELIVERED"
        echo "- DRAFT/APPROVED/GENERATED -> PENDING, SENT/PARTIAL -> OUTSTANDING, PAID -> SETTLED"
        echo "- VOID filtered at query level (never returned)"
        echo ""
        echo "## Preserved"
        echo "- \`GET /purchases\` — unchanged"
        echo "- \`GET /statements\` — unchanged"
        echo "- \`GET /statements/:id\` — unchanged"
        echo ""
        echo "## Files"
        echo "- Modified: \`shopops-api/routes/storefront-portal-data.js\`"
        echo "- Created: \`shopops-api/tests/test_storefront_portal_me_routes.js\`"
        echo ""
        echo "## Tests"
        echo "- \`bun test tests/test_storefront_portal_me_routes.js\`"
        echo "- 5+ tests: status mapping, DELIVERED derivation, VOID filter, 404 handling"
        echo ""
        echo "## Rule 19 (Runtime Verification)"
        echo "After container rebuild:"
        echo "  docker exec shopops-api grep -n 'me/orders' /app/routes/storefront-portal-data.js"
        echo ""
        echo "## Companion PR"
        echo "shopops-storefront: wo/storefront-portal-auth-wire-01 (cookie forwarding)"
        echo ""
        echo "Generated by Archon bdc-storefront-portal-auth-wire workflow."
      } > "$BODY_FILE"

      existing_pr_url() {
        gh pr list --repo "$REPO" --head "$BRANCH" --state open --json url \
          --jq '.[0].url // empty' 2>/dev/null
      }
      PR_URL="$(existing_pr_url)"
      if [ -n "$PR_URL" ]; then
        echo "API_PR_URL=$PR_URL"
        exit 0
      fi

      for attempt in 1 2 3 4 5; do
        if PR_OUT=$(gh pr create --repo "$REPO" --base "$BASE" --head "$BRANCH" \
            --title "$TITLE" --body-file "$BODY_FILE" 2>&1); then
          echo "API_PR_URL=$PR_OUT"
          exit 0
        fi
        PR_URL="$(existing_pr_url)"
        if [ -n "$PR_URL" ]; then
          echo "API_PR_URL=$PR_URL"
          exit 0
        fi
        echo "open-pr-api attempt $attempt failed: $PR_OUT" >&2
        sleep 10
      done
      echo "open-pr-api failed after retries; branch pushed but no PR" >&2
      exit 1

  # ---------------------------------------------------------------------------
  # 13. OPEN-PR-STOREFRONT — idempotent PR for shopops-storefront (base: main)
