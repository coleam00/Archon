        echo ""
        echo "## Companion PR"
        echo "shopops: wo/storefront-portal-auth-wire-01 (/me/* routes)"
        echo ""
        echo "Generated by Archon bdc-storefront-portal-auth-wire workflow."
      } > "$BODY_FILE"

      existing_pr_url() {
        gh pr list --repo "$REPO" --head "$BRANCH" --state open --json url \
