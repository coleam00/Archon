name: bdc-ce-hotfix-runbook
description: |
  Use when: Shipping WO-RELEASE-CE-HOTFIX-RUNBOOK-01 — emergency CE hotfix process.
  Input: WO_ID = WO-RELEASE-CE-HOTFIX-RUNBOOK-01.
  Does: Authors the CE hotfix runbook in bdc-xo. PR template (ce-hotfix.md) already added to
        lspro-react by WO-RELEASE-CE-BRANCH-MODEL-01.
  Class: DOCS / RELEASE.

policyFile: harness/policies/agent-behavior.md
model: sonnet

nodes:
  - id: read-spec
    bash: |
      set -euo pipefail
      WO_ID="${WO_ID:-WO-RELEASE-CE-HOTFIX-RUNBOOK-01}"
      SPEC_PATH="docs/superpowers/specs/ce-release-branch/work-orders/${WO_ID}.md"
      SPEC=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/${SPEC_PATH}?ref=main" --jq .content 2>/dev/null | base64 -d 2>/dev/null || true)
      GOV=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/docs/superpowers/specs/ce-release-branch/docs/CE-BRANCH-GOVERNANCE.md?ref=main" --jq .content 2>/dev/null | base64 -d 2>/dev/null || true)
      [ -z "$SPEC" ] && { echo "Spec not found" >&2; exit 1; }
      printf 'WO_ID=%s\nSPEC_PATH=bdc-xo:%s\nWORKFLOW_ID=%s\n\n' "$WO_ID" "$SPEC_PATH" "$WORKFLOW_ID"
      printf -- '--- SPEC ---\n%s\n\n' "$SPEC"
      printf -- '--- GOVERNANCE ---\n%s\n' "$GOV"

  # post-started node REMOVED 2026-05-12 - n8n webhook hangs from Archon executor subprocess
  # (see WO-HARNESS-N8N-WEBHOOK-EGRESS-FIX-01). Builder-status feed is optional bookkeeping;
  # flip-notion is the canonical close action.

  - id: implement
    depends_on: [read-spec]
    task_class: medium_work
    loop:
      fresh_context: true
      until: COMPLETE
      max_iterations: 5
      prompt: |
        Author the CE hotfix runbook in bdc-xo.

        ## Required File
        `docs/superpowers/specs/ce-release-branch/runbooks/CE-HOTFIX-RUNBOOK.md`

        ## Content sections
        - Trigger: when to use the hotfix path (urgent CE bug, can't wait for main)
        - Allowed hotfix categories (from governance: CE import/export/auth/license/signup/UX/cover/crash)
        - NOT allowed (new features, higher-tier work, refactors, multi-category expansion)
        - Step-by-step:
          1. Reproduce + minimal fix on `hotfix/ce/<slug>` branched from `release/ce`
          2. Open PR to `release/ce` using `.github/PULL_REQUEST_TEMPLATE/ce-hotfix.md`
          3. CE regression must pass
          4. John approval (production deploy authority)
          5. Deploy CE from release/ce (per WO-RELEASE-CE-DEPLOY-LANE-01)
          6. Open backport PR to main (per WO-RELEASE-CE-BACKPORT-POLICY-01)
        - Rollback procedure: revert release/ce to prior commit, redeploy
        - Captain CI behavior: recognizes `hotfix/ce/*` branch pattern (separately wired by WO-CI-CE-PROMOTION-GATE-01 if needed)

        ## Out of scope
        - PR template file (already in lspro-react from WO #1)
        - Captain CI workflow code (separate WOs)

        Output <promise>COMPLETE</promise> when runbook exists.

  - id: verify
    depends_on: [implement]
    bash: |
      set -euo pipefail
      ls docs/superpowers/specs/ce-release-branch/runbooks/CE-HOTFIX-RUNBOOK.md

  - id: commit-and-push
    depends_on: [verify]
    bash: |
      set -euo pipefail
      BRANCH="wo/release-ce-hotfix-runbook-01"
      # Idempotent checkout: handle retry-into-existing-worktree case + worktree-locked-branch case
      if git show-ref --quiet "refs/heads/$BRANCH"; then
        if git worktree list --porcelain | grep -q "branch refs/heads/$BRANCH" && \
           [ "$(git rev-parse --abbrev-ref HEAD)" != "$BRANCH" ]; then
          BRANCH="${BRANCH}-run-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
        else
          git checkout "$BRANCH"
        fi
      else
        git checkout -b "$BRANCH"
      fi
      git add docs/superpowers/specs/ce-release-branch/runbooks/CE-HOTFIX-RUNBOOK.md
      # Idempotent commit: skip if branch already contains the work (retry-safe).
      if git diff --cached --quiet; then
        echo "No staged changes; branch already contains requested work"
      else
        git -c user.name="John Ranson" -c user.email="admin@bluedevilcollectibles.com" \
          commit -m "docs(ce): WO-RELEASE-CE-HOTFIX-RUNBOOK-01 — emergency CE hotfix process

        Adds CE-HOTFIX-RUNBOOK.md. Defines hotfix/ce/* flow to release/ce + backport to main.
        Lists allowed/disallowed hotfix categories per governance.

        Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>"
      fi
      git push -u origin "$BRANCH"
      echo "BRANCH=${BRANCH}"

  - id: open-pr
    depends_on: [commit-and-push]
    bash: |
      set -euo pipefail
      # Hardcoded — must match commit-and-push BRANCH literal. See WO-HARNESS-OPEN-PR-BRANCH-INTERPOLATION-FIX-01.
      BRANCH="wo/release-ce-hotfix-runbook-01"
      REPO="bluedevilcollectibles/bdc-xo"
      BASE="main"
      TITLE="docs(ce): WO-RELEASE-CE-HOTFIX-RUNBOOK-01 — CE hotfix runbook"
      BODY="Implements WO-RELEASE-CE-HOTFIX-RUNBOOK-01. Docs-only. 🤖 Generated with Claude Code"
      # Idempotent PR creation. See WO-HARNESS-OPEN-PR-GRAPHQL-NO-COMMITS-FIX-01.
      existing_pr_url() {
        gh pr list --repo "$REPO" --head "$BRANCH" --state open --json url --jq '.[0].url // empty' 2>/dev/null
      }
      PR_URL="$(existing_pr_url)"
      if [ -n "$PR_URL" ]; then
        echo "PR_URL=$PR_URL"
        exit 0
      fi
      for attempt in 1 2 3 4 5; do
        if PR_OUT=$(gh pr create --repo "$REPO" --base "$BASE" --head "$BRANCH" \
            --title "$TITLE" --body "$BODY" 2>&1); then
          echo "PR_URL=$PR_OUT"
          exit 0
        fi
        PR_URL="$(existing_pr_url)"
        if [ -n "$PR_URL" ]; then
          echo "PR_URL=$PR_URL"
          exit 0
        fi
        echo "open-pr attempt $attempt failed: $PR_OUT" >&2
        sleep 10
      done
      echo "open-pr failed after retries; branch pushed at $BRANCH but no PR exists" >&2
      exit 1

  - id: build-manifest
    depends_on: [open-pr]
    task_class: clerical
    prompt: |
      Manifest v2 for WO-RELEASE-CE-HOTFIX-RUNBOOK-01. Files created, PR URL, VALIDATION: PASS.
      Inputs: $read-spec.output $verify.output $commit-and-push.output $open-pr.output

  # post-completed node REMOVED 2026-05-12 - n8n webhook hangs from Archon executor subprocess
  # (see WO-HARNESS-N8N-WEBHOOK-EGRESS-FIX-01). Builder-status feed is optional bookkeeping;
  # flip-notion below is the canonical close action.

  - id: flip-notion
    depends_on: [build-manifest]
    task_class: clerical
    prompt: |
      Flip Notion WO-RELEASE-CE-HOTFIX-RUNBOOK-01 to REVIEW.
      Page ID: 35def4c9-ce00-81f2-8555-da00f6da97cb
      Notes = $build-manifest.output.
