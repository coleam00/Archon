schema_version: "1.0"

extension:
  id: "ralph-loop"
  name: "Spec-Kit Ralph Loop"
  version: "3.0.0"
  description: "External bash loop driver around a selected coding-agent CLI; v3 schema groups tasks into per-phase batches (one batch processed per iteration). Bridges via /speckit.ralph-loop.tasks-to-ralph and /speckit.ralph-loop.sync-back."
  author: "another-cowork"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"
  tools:
    - name: "git"
      required: true
    - name: "jq"
      required: true
    - name: "claude"
      required: false
      reason: "Optional loop tool when ralph-config.yml uses `tool: claude`."
    - name: "codex"
      required: false
      reason: "Optional loop tool when ralph-config.yml uses `tool: codex`."
    - name: "pi"
      required: false
      reason: "Optional loop tool when ralph-config.yml uses `tool: pi`."
    - name: "amp"
      required: false
      reason: "Optional loop tool when ralph-config.yml uses `tool: amp`."
    - name: "ccs"
      required: false
      reason: "Optional loop wrapper when ralph-config.yml uses `tool: test-gpt5.5-codex` or `tool: ccs-bp`."

provides:
  commands:
    - name: "speckit.ralph-loop.tasks-to-ralph"
      file: "commands/speckit-tasks-to-ralph.md"
      description: "Convert tasks.md → prd.json + progress.txt for the external bash loop"
    - name: "speckit.ralph-loop.sync-back"
      file: "commands/speckit-ralph-sync-back.md"
      description: "Flip [X] in tasks.md from prd.json passes:true; archive run artifacts"

  config:
    - name: "ralph-config.yml"
      template: "ralph-config.template.yml"
      description: "Defaults for the external bash loop (max_iterations, sleep_seconds)"
      required: false

tags:
  - "implementation"
  - "automation"
  - "loop"
  - "external"
  - "bash"

defaults:
  max_iterations: 50
  sleep_seconds: 2

consent_required: true
