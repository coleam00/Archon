# Default cap for ralph.sh's outer for-loop.
max_iterations: 100

# Which agent CLI to invoke per iteration. One of: amp | claude | codex.
# Overridden by `--tool <name>` on the command line.

tool: codex
model: gpt-5.5
reasoning_effort: xhigh

# Skip the consent gate (script runs the selected tool with permission bypass).
# Set to 1 to opt in. Equivalent to either:
#   export RALPH_I_UNDERSTAND_DANGEROUS=1
#   touch .specify/extensions/ralph-loop/.consent
ralph_i_understand_dangerous: 1
